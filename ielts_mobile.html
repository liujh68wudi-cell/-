y of climate change is increasingly disrupting traditional weather patterns. The Met Office has recorded a clear trend towards milder, wetter winters and hotter, drier summers over the past several decades. Extreme weather events, once considered exceptional, are becoming more frequent and severe. The devastating floods of 2015 and 2019 caused billions of pounds in damage and highlighted the inadequacy of existing flood defence infrastructure in many parts of the country. The UK commitment to achieving net-zero carbon emissions by 2050 represents one of the most ambitious climate targets of any major economy.","questions":[{"q":"What causes the UK's weather to be so unpredictable?","options":["Mountain ranges","Ocean and air mass interactions","Desert winds"],"answer":1},{"q":"What ocean current helps moderate the UK's climate?","options":["Bermuda Current","Gulf Stream","Canary Current"],"answer":1},{"q":"Which region of the UK tends to be the wettest?","options":["Eastern England","Southeast England","Western Scotland and Wales"],"answer":2},{"q":"By what year has the UK committed to achieving net-zero carbon emissions?","options":["2030","2040","2050"],"answer":2}]},"writing":{"type":"task1","title":"流程图 - 茶叶加工","task":"The diagram shows how tea is processed. Summarise the information by selecting and reporting the main features, and make comparisons where relevant.","sample":"The flow chart illustrates the tea processing method, from harvest to packaging.\n\nOverall, the process consists of four main stages: withering, rolling, oxidation, and drying, each transforming the leaf progressively.\n\nThe process begins with fresh tea leaves being harvested manually. These leaves are first spread out for withering, where they lose moisture over 10-18 hours depending on conditions.\n\nNext, the withered leaves undergo rolling. This mechanical process breaks down cell structures and shapes the leaves. Rolled leaves are then spread for oxidation, also called fermentation, where they turn darker through chemical reactions lasting 2-4 hours.\n\nFinally, the oxidized leaves enter the drying stage. This stops oxidation and reduces moisture content to around 3%. Drying can use different methods including pan-firing, tumble-drying, or sun-drying. Once dried, the tea is sorted by grade and packaged for distribution.\n\nIn conclusion, tea processing involves sequential stages transforming fresh leaves into the familiar brown or black tea product through controlled moisture removal and oxidation."},"speaking":{"topic":"天气","part1":["你喜欢什么天气？","你所在的城市天气怎么样？","你最喜欢哪个季节？","天气会影响你的心情吗？"],"part2":"Describe the weather in your city. You should say: what the weather is usually like, how the weather changes throughout the year, what activities you do in different weather, and explain how the weather affects your daily life.","part3":["气候变化会导致什么问题？","人们应该因为天气改变生活方式吗？","你喜欢住在天气稳定还是多变的地区？"]}},{"day":26,"phase":"phase1","listening":{"title":"图书馆办证","transcript":"Librarian: Welcome to Central City Library.\nVisitor: I'd like to become a member.\nLibrarian: Bring proof of address and photo ID.\nVisitor: I have utility bill and driver's license.\nLibrarian: Perfect. Study spaces on second floor, group rooms on third.\nVisitor: What are opening hours?\nLibrarian: 9 AM to 9 PM weekdays, 10 AM to 6 PM Saturday.\nVisitor: How many books can I borrow?\nLibrarian: Up to 15 items for three weeks.","questions":[{"q":"个人学习区在哪层？","options":["一层","二层","三层"],"answer":1},{"q":"工作日闭馆时间？","options":["7点","8点","9点"],"answer":2},{"q":"最多可借几本？","options":["10本","15本","20本"],"answer":1}]},"reading":{"title":"Sport and Recreation in Britain","passage":"Sport occupies a uniquely prominent position in British cultural life, with a diverse range of athletic pursuits serving as both national pastimes and passionate professional competitions that captivate millions of fans across the country and around the world. Football is undoubtedly the nation's most popular sport, with the English Premier League widely regarded as the most-watched domestic football league globally, attracting viewers from over 200 territories and generating billions of pounds in revenue through broadcasting rights, sponsorship deals, and merchandise sales. The sport has deep historical roots in Britain, with the Football Association established in 1863 being the oldest football governing body in the world, and the codified rules of the game developed in England spreading to every corner of the globe through British colonial influence. Cricket, often described as England's summer sport, enjoys particular popularity in southern England and among Commonwealth nations, with Lord's Cricket Ground in London serving as the Home of Cricket and hosting the annual finale of England's domestic cricket season. Rugby Union, which originated at Rugby School in Warwickshire in 1823 according to legend, has two major professional forms: Rugby Union and Rugby League, each with devoted followings in different regions of England. Tennis, golf, athletics, boxing, and horse racing also command substantial audiences, with the Wimbledon Championships, the Open Championship, the Grand National, and the London Marathon being among the most prestigious sporting events in the world calendar. Beyond watching sport, participation in recreational activities is actively encouraged by both government policies and community initiatives, with over 150,000 sports clubs operating across the country, offering opportunities for people of all ages and abilities to engage in regular physical activity. Sport occupies a uniquely prominent position in British cultural life, with football commanding the most passionate following of any single sport. The English Premier League is widely regarded as the most competitive and commercially successful football competition in the world, attracting the finest players from across the globe and broadcasting to hundreds of millions of households in over 200 countries. Yet the grassroots game, upon which the professional pyramid depends, faces chronic underfunding. Local authority-run sports facilities have been closing at an alarming rate as councils struggle with budget constraints, denying millions of people easy access to affordable sporting facilities.","questions":[{"q":"Which football league is considered the most-watched globally?","options":["La Liga","English Premier League","Serie A"],"answer":1},{"q":"Where is Lord's Cricket Ground located?","options":["Manchester","Birmingham","London"],"answer":2},{"q":"What is the Home of Cricket called?","options":["Old Trafford","Lord's","Edgbaston"],"answer":1},{"q":"Which sport is said to have originated at Rugby School in 1823?","options":["Football","Rugby","Cricket"],"answer":1}]},"writing":{"type":"task2","title":"讨论类 - 金钱奖励","task":"Some people believe that money is the most important factor in achieving happiness. To what extent do you agree or disagree?","sample":"The relationship between wealth and wellbeing has long been debated, with some arguing money is essential for happiness while others maintain money cannot buy happiness.\n\nI partially agree that financial security contributes significantly to happiness, but I disagree that it is the most important factor. Basic financial stability provides comfort and reduces stress associated with meeting essential needs. Without sufficient income, individuals struggle to access adequate housing, nutrition, and healthcare - all fundamental to wellbeing. Research consistently shows that money does buy happiness up to a certain income threshold, beyond which additional wealth provides diminishing returns.\n\nHowever, happiness ultimately derives from multiple dimensions that money cannot purchase. Meaningful relationships, personal achievement, health, and sense of purpose contribute substantially to life satisfaction. Many incredibly wealthy individuals report profound unhappiness, while others with modest means experience deep fulfillment. This suggests that psychological and social factors often outweigh material circumstances.\n\nFurthermore, the pursuit of wealth can actually undermine happiness. Excessive focus on accumulation creates stress, damages relationships, and may lead to ethical compromises. The hedonic adaptation phenomenon demonstrates that lifestyle improvements quickly become normalized, requiring ever-greater achievements to maintain satisfaction.\n\nIn conclusion, while financial resources certainly facilitate happiness by providing security and options, they represent merely one component of wellbeing. True happiness emerges from balanced attention to multiple life dimensions including relationships, personal growth, and meaningful contribution."},"speaking":{"topic":"购物","part1":["你喜欢购物吗？","你通常在哪里购物？","你更喜欢线上还是线下购物？","你买过最贵的东西是什么？"],"part2":"Describe something you bought recently. You should say: what you bought, where you bought it, why you bought it, and explain how satisfied you were with it.","part3":["购物对你来说意味着什么？","人们购物太多会有什么后果？","线上购物会取代实体店吗？"]}},{"day":27,"phase":"phase1","listening":{"title":"租房咨询","transcript":"Agent: City Rentals. How can I help?\nTenant: Apartment on Maple Street available?\nAgent: Yes, one-bedroom on second floor. 1,200 pounds monthly.\nTenant: What's included?\nAgent: Water and internet. Electricity separate.\nTenant: What about deposit?\nAgent: One month's rent = 1,200 pounds.\nTenant: Minimum rental period?\nAgent: 12 months initially, then month-to-month.\nTenant: I'd like to view it.\nAgent: Can meet there in 20 minutes.","questions":[{"q":"月租金？","options":["1000磅","1100磅","1200磅"],"answer":2},{"q":"租约最短多久？","options":["6个月","9个月","12个月"],"answer":2},{"q":"看房需要带什么？","options":["简历","身份证","工资单"],"answer":1}]},"reading":{"title":"Media and Entertainment in the UK","passage":"The United Kingdom has long occupied a position of extraordinary influence in the global media and entertainment industry, producing creative content ranging from groundbreaking television dramas and documentaries to influential newspapers, innovative digital platforms, and world-famous music acts that have shaped popular culture across multiple decades. The British Broadcasting Corporation, universally known as the BBC, stands as one of the oldest and most respected media organisations in the world, established in 1922 as a public service broadcaster funded primarily through the television licence fee. The BBC operates multiple television channels, national and regional radio stations, and one of the world's largest news operations, producing content distributed globally and recognised for its journalistic integrity, educational value, and entertainment quality. In the realm of commercial television, channels such as ITV, Channel 4, and Channel 5 compete for audiences with a diverse mix of news, drama, comedy, documentary, and reality programming, while subscription-based services such as Sky Atlantic and the streaming platform Britbox have expanded the range of choices available to viewers. British television drama has achieved remarkable international success, with series such as Sherlock, Doctor Who, The Crown, Peaky Blinders, and Bodyguard garnering critical acclaim and large global audiences. The British music industry has been equally influential, producing globally significant artists and bands ranging from The Beatles, The Rolling Stones, Queen, and Pink Floyd to contemporary acts such as Adele, Ed Sheeran, Stormzy, and Dua Lipa, who continue to dominate international charts and fill concert venues across every continent. The rise of social media and digital platforms has created new opportunities for British content creators on YouTube, TikTok, Instagram, and podcast platforms. The British media landscape is among the most diverse and influential in the world, ranging from the venerable broadsheet newspapers that have shaped political debate for centuries to the dynamic digital platforms that now dominate news consumption among younger audiences. The BBC, funded primarily through the television licence fee, remains one of the world most trusted news organisations, though it faces increasing competition from commercial rivals and growing criticism from both the political left and right. Concerns about the concentration of media ownership in the United Kingdom have persisted for decades, with a relatively small number of wealthy individuals controlling the majority of the national press.","questions":[{"q":"How is the BBC primarily funded?","options":["Government budget allocation","Television licence fee","Advertising revenue"],"answer":1},{"q":"Which platform has emerged as a major force alongside traditional broadcasters?","options":["Netflix","Britbox","Hulu"],"answer":1},{"q":"Which famous band originated in the UK?","options":["Nirvana","The Beatles","U2"],"answer":1},{"q":"Which social media platforms have created new opportunities for British content creators?","options":["Only Facebook","YouTube, TikTok, Instagram","LinkedIn"],"answer":1}]},"writing":{"type":"task1","title":"饼图 - 能源使用","task":"The pie charts show UK energy consumption in 1980 and 2020. Summarise the information by selecting and reporting the main features.","sample":"The pie charts illustrate changes in UK energy sources between 1980 and 2020, revealing significant shifts in the energy landscape.\n\nOverall, fossil fuel consumption decreased substantially while renewable energy emerged as a significant source.\n\nIn 1980, coal dominated at 45%, followed by oil at 40%, natural gas at 10%, and nuclear at 5%. Renewables were negligible at under 1%.\n\nBy 2020, the picture transformed dramatically. Natural gas became the largest source at 35%, overtaking coal which dropped to just 8%. Oil decreased to 28%. Nuclear remained stable at 15%. Most notably, renewables surged to 14%, representing a remarkable increase from virtually nothing.\n\nThis transformation reflects multiple factors: environmental concerns drove coal's decline, natural gas provided cleaner transition, nuclear maintained steady contribution, and policy support accelerated renewable adoption.\n\nIn conclusion, UK energy consumption shifted dramatically toward cleaner sources over four decades, with renewables showing the most significant growth despite still representing a minority of supply."},"speaking":{"topic":"朋友","part1":["你有多少好朋友？","你通常怎么认识新朋友？","你更喜欢和熟人还是陌生人相处？","你认为友情中最重要的品质是什么？"],"part2":"Describe a friend who has influenced you. You should say: who this friend is, how you met, what qualities make them special, and explain how they have influenced your life.","part3":["真正的友谊有哪些特征？","人们应该和观点不同的人交朋友吗？","社交媒体如何影响友谊？"]}},{"day":28,"phase":"phase1","listening":{"title":"健身房会员","transcript":"Staff: Welcome to FitLife Gym.\nCustomer: What's the membership options?\nStaff: Basic 25/month, Standard 40 with classes, Premium 60 with pool.\nCustomer: Premium sounds good.\nStaff: Joining fee waived with 12-month contract.\nCustomer: Can I freeze membership?\nStaff: Up to 3 months per year.\nCustomer: Opening hours?\nStaff: 6 AM to 10 PM weekdays, 8 AM to 8 PM weekends.\nCustomer: Can I bring a guest?\nStaff: One guest free per month for Premium.","questions":[{"q":"Premium月费？","options":["40磅","50磅","60磅"],"answer":2},{"q":"可暂停几个月？","options":["2个月","3个月","4个月"],"answer":1},{"q":"周末开门到几点？","options":["6点","8点","10点"],"answer":1}]},"reading":{"title":"Shopping and Consumer Culture","passage":"Shopping in Britain is a multifaceted experience that ranges from browsing the atmospheric stalls of centuries-old markets to navigating the gleaming corridors of ultra-modern shopping centres, reflecting the nation's complex relationship with consumerism, tradition, and innovation. Traditional markets remain an integral part of British retail culture, with world-famous examples including Borough Market in London, where traders have sold fresh produce since the 13th century, the Petticoat Lane Market in East London, which specialises in clothing and fabrics, and the Cambridge Market, which has operated continuously since medieval times. These markets offer a stark contrast to the sprawling shopping centres and retail parks that dominate modern British retail, such as Westfield London, one of the largest urban shopping centres in Europe, housing over 350 shops, 60 restaurants, and a cinema complex across 2.6 million square feet of retail space. The United Kingdom is widely regarded as the birthplace of the modern department store, with Selfridges on Oxford Street, founded in 1909, Harrods in Knightsbridge, and Fortnum & Mason in Piccadilly setting the standard for luxurious retail experiences. The growth of online shopping has fundamentally transformed British retail over the past two decades, with e-commerce now accounting for approximately 27 percent of all retail sales in the country, driven by the convenience of home delivery, extensive returns policies, and the vast product selection available through platforms such as Amazon, eBay, ASOS, and Ocado. This shift has had profound implications for traditional high street retailers, many of whom have struggled to compete with online rivals, leading to the closure of thousands of stores and prompting widespread debate about the future of town centres. Consumer rights in the UK are protected by comprehensive legislation, with the Consumer Rights Act 2015 establishing clear protections for buyers of goods and services. The transformation of British retail over the past two decades represents one of the most dramatic economic shifts in the nation modern history. The rise of online shopping has devastated traditional high street retailers, with household names that had anchored town centres for generations disappearing from the landscape entirely. Between 2015 and 2022, the United Kingdom lost more than 60,000 retail outlets, with clothing and footwear retailers among the hardest hit. The pandemic accelerated trends that were already well established, with consumers who had previously been reluctant to shop online discovering the convenience of home delivery and returning facilities.","questions":[{"q":"When did Borough Market in London begin trading?","options":["13th century","18th century","20th century"],"answer":0},{"q":"What percentage of British retail sales are made online?","options":["About 10 percent","About 27 percent","About 50 percent"],"answer":1},{"q":"Which legislation protects consumer rights in the UK?","options":["Consumer Protection Act","Consumer Rights Act 2015","Fair Trading Act"],"answer":1},{"q":"What type of goods does Petticoat Lane Market specialise in?","options":["Fresh food","Clothing and fabrics","Electronics"],"answer":1}]},"writing":{"type":"task2","title":"观点类 - 环保责任","task":"Some people believe that environmental problems should be solved at an international level. Others believe it is better to deal with them at the national level. Discuss both views and give your opinion.","sample":"Environmental challenges transcend borders, raising questions about appropriate scales for effective action.\n\nInternational cooperation offers compelling advantages. Climate change and biodiversity loss are inherently global problems requiring coordinated responses. No single nation can solve these challenges independently. International agreements enable knowledge sharing, resource pooling, and consistent standards. The Paris Agreement demonstrates how collective commitment can drive global progress.\n\nHowever, national approaches also possess merit. Countries face different environmental challenges and possess varying capacities for action. National governments can implement policies suited to local conditions and priorities. Furthermore, national policies can inspire international momentum through example and success.\n\nIn my view, effective environmental strategy requires both levels working in harmony. National action provides the foundation, while international coordination amplifies impact. Neither approach alone suffices for problems of global scope.\n\nPractical examples support this integrated perspective. The European Union's supranational environmental framework enables consistent standards across member states while negotiating as a bloc internationally. Similarly, national climate policies often inform international negotiations, which then encourage further national ambition.\n\nIn conclusion, environmental challenges demand solutions at multiple scales. The most effective approach combines ambitious national action with robust international cooperation, recognizing that both levels possess unique strengths and limitations."},"speaking":{"topic":"学习","part1":["你现在在做什么？","你为什么选择这个专业？","你觉得学习难吗？","你更喜欢自学还是课堂上学习？"],"part2":"Describe something you learned recently. You should say: what you learned, where or how you learned it, why you decided to learn it, and explain whether it has been useful.","part3":["学校应该教学生什么技能？","人们应该终身学习吗？","传统教育与在线教育哪个更好？"]}},{"day":29,"phase":"phase1","listening":{"title":"快递查询","transcript":"Customer: Package tracking says delivered but I didn't receive it.\nAgent: Let me check. Tracking number?\nCustomer: TD-7348291658-UK.\nAgent: Left in green recycling bin according to driver.\nCustomer: But no card left!\nAgent: Sometimes drivers run out of cards.\nCustomer: It was on top of recycling bag.\nAgent: I'll file a report about this delivery method.\nCustomer: Package found, just dirty but intact.\nAgent: Sorry for the worry. Anything else?","questions":[{"q":"包裹放在哪里？","options":["门口","绿色回收箱","邻居家"],"answer":1},{"q":"包裹状态？","options":["丢失","完好但脏了","损坏"],"answer":1},{"q":"客户希望如何处理？","options":["投诉","记录反馈","赔偿"],"answer":1}]},"reading":{"title":"British Housing and Accommodation","passage":"The British housing market is one of the most complex, competitive, and expensive in the world, reflecting a combination of high demand, limited supply, historical planning restrictions, and deeply embedded cultural attachment to property ownership as a symbol of security and success. The majority of residential properties in England fall into several broad categories: detached houses, which stand alone and typically offer generous garden space; semi-detached houses, which share a single wall with a neighbouring property; terraced houses, which are joined together in rows and often date from the Victorian or Edwardian eras; flats and apartments; and bungalows, single-storey properties that are particularly popular among older residents. The style and character of British housing varies dramatically by region and era, from the elegant Georgian townhouses of Bath and London's Bloomsbury, through the distinctive red-brick terraces of industrial northern cities built during the 19th century, to the mock-Tudor detached houses of affluent suburbia built during the 1920s and 1930s. Home ownership has traditionally been encouraged by successive British governments through policies such as Right to Buy, introduced in 1980, which allowed council tenants to purchase their homes at significant discounts, contributing to a dramatic increase in the proportion of owner-occupiers but also reducing the stock of affordable social housing. However, rising property prices have made home ownership increasingly inaccessible for young people, with average house prices in London now exceeding fifteen times the average annual salary, compared with a ratio of approximately four times that was considered normal in the 1990s. This has led to a significant growth in the private rented sector, with millions of families now spending large proportions of their income on rent, while shared ownership schemes have been introduced to help first-time buyers onto the property ladder. The United Kingdom is in the grip of a housing crisis that successive governments have failed to resolve despite decades of political promises. Average house prices in England now stand at roughly eight times the median annual earnings of working-age adults, making property ownership an impossible aspiration for millions of young people. The private rented sector has expanded rapidly as fewer people are able to purchase their own homes, yet renters enjoy far fewer legal protections than tenants in many other European countries. Rough sleeping and homelessness have risen sharply in recent years despite the efforts of charities and local authorities to provide emergency accommodation.","questions":[{"q":"What ratio of house price to salary is now considered normal in London?","options":["Four times","Ten times","Fifteen times"],"answer":2},{"q":"What policy, introduced in 1980, allowed council tenants to buy their homes?","options":["Right to Own","Right to Buy","Home Ownership Scheme"],"answer":1},{"q":"Which type of house shares a single wall with a neighbouring property?","options":["Detached","Terraced","Semi-detached"],"answer":2},{"q":"What has grown significantly due to rising property prices?","options":["Social housing","Private rented sector","Council housing"],"answer":1}]},"writing":{"type":"task1","title":"线图 - 人口增长","task":"The line graph shows population trends in three countries from 1950 to 2050. Summarise the information by selecting and reporting the main features.","sample":"The line graph illustrates population changes in India, China, and the USA over 100 years from 1950 to projected 2050.\n\nOverall, India shows the most dramatic growth, overtaking China around 2025, while the USA demonstrates steady moderate increase.\n\nChina experienced rapid growth from 1950 to 1980, rising from approximately 550 million to nearly 1 billion. Following the one-child policy, growth slowed significantly, with the curve flattening. Projections suggest gradual decline after 2025 as India surpasses China.\n\nIndia's trajectory shows consistent acceleration, growing from 400 million in 1950 to over 1.4 billion by 2025. Unlike China, India's growth rate remained high throughout, with projections indicating continued increase to 1.6 billion by 2050.\n\nThe USA displayed the most modest growth, starting at 160 million in 1950 and reaching approximately 340 million by 2025. Projections suggest continued gradual increase to around 380 million by 2050.\n\nIn conclusion, the graph reveals divergent population futures: India rising rapidly, China peaking and declining, and the USA growing steadily."},"speaking":{"topic":"运动","part1":["你喜欢运动吗？","你经常锻炼吗？","你最喜欢什么运动？","运动对你来说意味着什么？"],"part2":"Describe a sport you enjoy playing or watching. You should say: what sport it is, how often you play or watch it, how you first became interested in it, and explain why you enjoy it.","part3":["运动应该如何融入学校教育？","人们应该把运动作为日常生活的一部分吗？","竞技体育的问题是什么？"]}},{"day":30,"phase":"phase1","listening":{"title":"银行开户","transcript":"Bank Staff: High Street Bank. How can I help?\nCustomer: Open a current account.\nStaff: Basic with no fees or Premium with benefits?\nCustomer: Basic is fine.\nStaff: Includes debit card, online banking, free ATM use.\nCustomer: What documents needed?\nStaff: Passport, proof of address, proof of income.\nCustomer: I have passport and employment letter.\nStaff: Need initial deposit of 1 pound. Card arrives in 5-7 days.\nCustomer: Can I come this afternoon?\nStaff: 9 to 4 weekdays, no appointment needed.","questions":[{"q":"基本账户月费？","options":["免费","5磅","10磅"],"answer":0},{"q":"激活账户最低存款？","options":["1磅","10磅","50磅"],"answer":0},{"q":"银行卡多久到？","options":["3-5天","5-7天","7-10天"],"answer":1}]},"reading":{"title":"British Festivals and Traditions","passage":"The United Kingdom's calendar is rich with festivals, celebrations, and traditions that reflect the nation's complex history, its Christian heritage, its Celtic and Norse influences, and its increasingly diverse multicultural present. Christmas, celebrated on 25 December, is perhaps the most eagerly anticipated festival in the British calendar, with weeks of preparation involving the decoration of homes and public spaces with lights, Christmas trees, and festive displays, the preparation of traditional foods including turkey, roast potatoes, and Christmas pudding, the exchange of gifts, and the viewing of popular television specials such as the annual King's Christmas Message. New Year's Eve, known as Hogmanay in Scotland, is celebrated with particular enthusiasm north of the border, where centuries-old traditions include the burning of torches, the singing of traditional songs, and the custom of first-footing, in which the first person to cross a threshold after midnight is believed to bring either good or bad luck for the coming year. Easter, the Christian celebration of the resurrection of Jesus Christ, is observed with egg hunts, the giving of chocolate eggs and hot cross buns, and the traditional Easter bank holidays. Bonfire Night on 5 November commemorates the failed Gunpowder Plot of 1605, when Guy Fawkes and his co-conspirators attempted to blow up the Houses of Parliament, and is celebrated with bonfires, fireworks displays, and the burning of effigies of Guy Fawkes across the nation. The Notting Hill Carnival in London, held annually over the August bank holiday weekend, is Europe's largest street festival, celebrating Caribbean culture with elaborate parades, steel band music, and traditional food, attracting over two million visitors each year. Diwali, Eid, Holi, Chinese New Year, and other festivals from Britain's diverse faith communities are now widely celebrated in British cities, reflecting the multicultural character of contemporary British society. Britain heritage industry is a significant economic force, supporting hundreds of thousands of jobs and attracting millions of international visitors each year to historic castles, stately homes, museums, and sites of archaeological importance. Yet the sector faces growing tensions between preservation and accessibility. Many historic properties are owned by private charitable trusts that rely heavily on admission charges and membership schemes to fund ongoing maintenance of ancient buildings that were never designed to accommodate the demands of mass tourism. The National Trust, the largest conservation charity in Europe, has faced criticism for what some see as an overcautious approach to admitting the true complexity of the historical narratives connected to its properties.","questions":[{"q":"What is Hogmanay?","options":["A Scottish dance","Scottish New Year's Eve","A Christmas tradition"],"answer":1},{"q":"What is traditionally burned on Bonfire Night?","options":["Christmas trees","Effigies of Guy Fawkes","Old furniture"],"answer":1},{"q":"What is the Notting Hill Carnival?","options":["A theatre festival","Europe's largest street carnival","A food market"],"answer":1},{"q":"What does the first-footing tradition involve?","options":["The first guest of the new year","The first person to enter a new home","The first footstep on new land"],"answer":0}]},"writing":{"type":"task2","title":"讨论类 - 远程学习","task":"Some people believe that university students should study whatever they like. Others think that they should only be allowed to study subjects that will be useful in the future, such as those related to science and technology. Discuss both views and give your opinion.","sample":"The debate between utilitarian and liberal approaches to education continues to generate discussion.\n\nThose favoring practical subjects argue that national competitiveness depends on technical expertise. Science and technology drive economic growth and innovation. Students pursuing these fields enjoy better employment prospects and higher starting salaries. Furthermore, society requires professionals in healthcare, engineering, and computing to address pressing challenges.\n\nHowever, the alternative perspective emphasizes that education should develop well-rounded individuals capable of independent thought. Literature, philosophy, and arts cultivate critical thinking and cultural understanding. These subjects develop creativity and analytical abilities applicable across numerous careers. Moreover, human civilization's richness derives from diverse intellectual pursuits beyond immediate utility.\n\nIn my view, a balanced approach serves students and society best. While practical skills provide career foundations, humanities develop essential cognitive capabilities. The most successful individuals typically combine technical competence with broad intellectual perspective.\n\nFurthermore, the job market continues evolving unpredictably. Specific technical skills may become obsolete, while adaptable thinking and learning capacity remain valuable. Education should prepare students for change rather than narrow training.\n\nIn conclusion, although practical subjects offer clear career advantages, exclusively restricting university study to such fields would impoverish both individuals and society. A rounded education combining utility with breadth produces the most fulfilled and productive citizens."},"speaking":{"topic":"节假日","part1":["你最喜欢什么节日？","你通常怎么庆祝节日？","你最喜欢和谁一起过节？","节日期间你做什么特别的事？"],"part2":"Describe a holiday you enjoyed. You should say: where you went, when you went, who you were with, what you did, and explain why you enjoyed this holiday.","part3":["人们应该保留传统节日吗？","度假对你的身心健康重要吗？","旅游业对当地文化有什么影响？"]}},{"day":31,"phase":"phase2","listening":{"title":"大学课程咨询","transcript":"Advisor: Academic Advising. How may I help?\nStudent: I'm considering changing my major from Business to International Relations.\nAdvisor: That's quite a shift. What's prompting this change?\nStudent: I took Politics and found it fascinating. I'm interested in global trade politics.\nAdvisor: That pairs well with business understanding. Have you checked IR requirements?\nStudent: Briefly. Need Political Theory, International Security, Global Political Economy.\nAdvisor: What about languages?\nStudent: French at GCSE, want to continue and add Spanish.\nAdvisor: Good foundation. Submit request before semester end.","questions":[{"q":"学生目前专业？","options":["国际关系","商业研究","政治学"],"answer":1},{"q":"学生中学学什么语言？","options":["西班牙语","法语","中文"],"answer":1},{"q":"建议什么时候提交申请？","options":["学期末前","下学期","随时"],"answer":0}]},"reading":{"title":"The Remote Work Revolution","passage":"The global shift toward remote working, dramatically accelerated by the COVID-19 pandemic that began in 2020, represents one of the most significant transformations in the world of work since the Industrial Revolution, fundamentally altering assumptions about how, where, and when productive labour can be conducted. Prior to 2020, remote work was a privilege enjoyed by a relatively small proportion of the global workforce, typically limited to freelancers, consultants, and knowledge workers in technology sectors who possessed both the digital skills and the employer flexibility needed to work outside traditional office environments. According to data from the Office for National Statistics, only around 5 percent of the UK workforce worked primarily from home before the pandemic, a figure that jumped to over 46 percent during the initial lockdown periods of 2020, with surveys indicating that a significant majority of these workers wanted to maintain some form of remote working arrangement permanently after restrictions were lifted. This transformation has been made possible by the rapid maturation of digital collaboration tools such as Zoom, Microsoft Teams, Slack, and Google Workspace, which enable teams to conduct meetings, share documents, manage projects, and maintain constant communication entirely through cloud-based platforms without the need for physical proximity. However the remote work revolution has also exposed significant inequalities in the workforce, as employees without adequate home office space, reliable broadband access, or suitable childcare arrangements have found remote work considerably more challenging than those with greater resources. Mental health concerns have also emerged as a significant issue, with many remote workers reporting feelings of isolation, burnout from the constant pressure of video calls and instant messaging, and difficulty establishing boundaries between professional and personal life when the workplace is also the home. The shift towards remote and hybrid working models represents one of the most significant labour market transformations in modern history. What began as an emergency public health response to the COVID-19 pandemic rapidly became a permanent feature of the employment landscape, prompting fundamental reassessments of how work is organised, measured, and compensated. Proponents argue that remote working offers substantial benefits, including reduced commuting time, greater flexibility for workers with caring responsibilities, and lower overhead costs for employers. Research suggests that many employees now consider flexible working arrangements non-negotiable, and are willing to change jobs to obtain them.","questions":[{"q":"What percentage of UK workers worked from home before the pandemic?","options":["About 5 percent","About 15 percent","About 25 percent"],"answer":0},{"q":"Which tool has enabled teams to collaborate through cloud platforms?","options":["Adobe Creative Cloud","Microsoft Teams and Slack","WhatsApp"],"answer":1},{"q":"What mental health concerns have emerged among remote workers?","options":["Depression only","Feelings of isolation and burnout","Memory loss"],"answer":1},{"q":"When did the COVID-19 pandemic begin?","options":["2018","2019","2020"],"answer":2}]},"writing":{"type":"task2","title":"观点类 - 政府资助艺术","task":"Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?","sample":"The allocation of transport infrastructure funding represents a significant policy consideration. While roads have traditionally dominated investment, railway systems offer compelling advantages that suggest they merit increased funding.\n\nI strongly agree that railways deserve greater investment for several reasons. First, rail is far more environmentally sustainable. Electric trains produce significantly lower carbon emissions per passenger-kilometer than cars or buses. As climate change demands urgent action, transitioning transportation toward lower-emission options becomes essential.\n\nSecond, rail demonstrates superior efficiency in high-density corridors. A single railway line can transport more people than a multi-lane highway while occupying less land. This becomes particularly crucial in densely populated regions where road expansion proves impractical.\n\nThird, rail provides economic benefits beyond direct transport. High-speed rail creates economic corridors connecting cities, enabling labor market integration and business travel. Studies demonstrate significant productivity gains in regions connected by quality rail infrastructure.\n\nHowever, roads remain essential for certain purposes. Rural areas often lack viable rail alternatives. Last-mile connectivity requires road networks. Emergency services and freight transport depend on road infrastructure.\n\nNevertheless, the balance of evidence supports prioritizing rail investment where feasible. Roads will continue receiving substantial funding; the argument concerns appropriate emphasis rather than exclusive focus.\n\nIn conclusion, I agree that railway investment should take precedence over road building in most contexts, given environmental, efficiency, and economic considerations. Roads will maintain their importance, but rail represents the more sustainable transportation future."},"speaking":{"topic":"科技","part1":["你每天用电脑多长时间？","你觉得手机重要吗？","你会修电脑吗？","你最喜欢什么科技产品？"],"part2":"Describe a piece of technology that you find useful. You should say: what it is, how long you have had it, how often you use it, and explain how it has changed your life.","part3":["科技如何改变教育？","人们是否过度依赖科技？","人工智能会取代人类工作吗？"]}},{"day":32,"phase":"phase2","listening":{"title":"科研项目讨论","transcript":"Professor: Discuss your dissertation topic.\nStudent: Climate change misinformation on social media.\nProfessor: What's your research question?\nStudent: How does fact-checking format affect engagement and sharing?\nProfessor: Interesting. Methodology?\nStudent: Content analysis then controlled experiment with 200 participants.\nProfessor: What about ethics?\nStudent: Informed consent and debriefing planned.\nProfessor: Sound approach.","questions":[{"q":"研究主题是？","options":["气候变化政策","社交媒体错误信息","环境科学"],"answer":1},{"q":"需要多少参与者？","options":["100人","150人","200人"],"answer":2},{"q":"研究方法包括？","options":["仅调查","内容分析和实验","仅访谈"],"answer":1}]},"reading":{"title":"Electric Vehicles and the Transport Transition","passage":"The transition from internal combustion engine vehicles to electric vehicles represents a fundamental restructuring of the global automotive industry and has profound implications for energy infrastructure, environmental sustainability, employment patterns, and the geopolitics of energy production and consumption. The UK government announced in 2020 that the sale of new petrol and diesel cars would be banned from 2030, with hybrid vehicles following in 2035, representing one of the most ambitious timelines for automotive electrification in the world and sending a clear signal to manufacturers, consumers, and investors about the direction of future transport policy. This transition is driven primarily by the urgent need to reduce greenhouse gas emissions from the transport sector, which accounts for approximately 27 percent of the UK's total carbon emissions, with road transport being the single largest contributor. Electric vehicles produce zero tailpipe emissions during operation, meaning that a full transition to EVs could virtually eliminate the direct carbon footprint of private car travel, though the overall environmental benefit depends significantly on the carbon intensity of the electricity used to charge them. The infrastructure challenge of supporting a mass electric vehicle fleet is considerable, as the UK currently has approximately 30,000 public electric vehicle charging points, a figure that industry experts estimate would need to increase to at least 500,000 to support the projected 2030 electric vehicle population. The battery technology that powers electric vehicles has advanced rapidly over the past decade, with the cost of lithium-ion battery packs falling by approximately 85 percent since 2010, making electric vehicles increasingly competitive with conventional cars on a purchase price basis, though concerns remain about the environmental and social impacts of mining lithium, cobalt, and other materials required for battery production. The transition to electric vehicles is widely regarded as essential for meeting climate change commitments, yet the pathway to mass adoption is proving far more complex than early optimistic projections suggested. While electric car sales have grown substantially in recent years, they still represent a minority of total vehicle sales, and the rate of adoption varies dramatically across income groups and regions. The infrastructure challenge is considerable: the United Kingdom currently has approximately 30,000 public charging points, but research suggests that more than three times that number may be needed to support a fully electric vehicle fleet by 2035.","questions":[{"q":"From what year will the sale of new petrol and diesel cars be banned in the UK?","options":["2025","2030","2035"],"answer":1},{"q":"What percentage of the UK's total carbon emissions comes from transport?","options":["About 10 percent","About 27 percent","About 40 percent"],"answer":1},{"q":"How many public EV charging points does the UK currently have?","options":["About 5,000","About 30,000","About 300,000"],"answer":1},{"q":"By approximately what percentage has battery cost fallen since 2010?","options":["50 percent","65 percent","85 percent"],"answer":2}]},"writing":{"type":"task1","title":"柱状图 - 垃圾处理","task":"The chart shows how waste is disposed in six countries. Summarise the information by selecting and reporting the main features.","sample":"The bar chart compares waste disposal methods across six countries: USA, Japan, Germany, UK, France, and Italy.\n\nOverall, significant variation exists between nations, with recycling playing a major role in European countries while landfill dominates elsewhere.\n\nJapan leads in recycling at 40%, demonstrating strong environmental culture. Germany follows closely at 35%, reflecting effective waste management policies. These two countries also maintain relatively high incineration rates at 30% and 25% respectively, converting waste to energy.\n\nThe remaining four countries show markedly different patterns. The USA relies primarily on landfill at 55%, with recycling at only 20% and incineration at 25%. The UK shows similar landfill dependence at 50%, while France and Italy achieve 30% recycling rates.\n\nNotably, all countries employ multiple disposal methods, suggesting no single solution fits all contexts. However, European nations generally achieve higher recycling rates, possibly due to stricter policies and greater public environmental awareness.\n\nIn conclusion, waste management approaches vary considerably, with European countries generally achieving higher recycling rates than the USA."},"speaking":{"topic":"环境","part1":["你关心环境问题吗？","你做什么环保的事？","你所在的城市环境好吗？","你觉得气候变化是真的吗？"],"part2":"Describe an environmental issue in your area. You should say: what the problem is, what causes it, what effects it has, and suggest possible solutions.","part3":["个人应该如何保护环境？","经济发展和环境保护哪个更重要？","政府应该采取什么措施应对气候变化？"]}},{"day":33,"phase":"phase2","listening":{"title":"求职面试","transcript":"Interviewer: Tell me about yourself and this position.\nCandidate: Marketing graduate. Internship at digital agency. Your sustainable fashion marketing interests me.\nInterviewer: Campaign example?\nCandidate: Organic skincare brand. '30-Day Natural Beauty Challenge' with influencers. 2 million impressions, 40% Instagram growth.\nInterviewer: How measured success?\nCandidate: Engagement, conversion tracking with discount code. ROI exceeded projections by 25%.\nInterviewer: How handle negative feedback?\nCandidate: Gather feedback, propose adjustments, transparent response builds trust.","questions":[{"q":"案例带来多少曝光量？","options":["100万","200万","300万"],"answer":1},{"q":"Instagram增长多少？","options":["20%","30%","40%"],"answer":2},{"q":"ROI超过预期多少？","options":["15%","20%","25%"],"answer":2}]},"reading":{"title":"Social Media and Adolescent Mental Health","passage":"The relationship between social media use and adolescent mental health has become one of the most intensely debated and researched topics in contemporary psychology, public health, and education policy, with competing studies producing seemingly contradictory findings that have made it difficult for parents, educators, and policymakers to determine the appropriate level of concern and intervention. Proponents of social media argue that platforms such as Instagram, TikTok, Snapchat, and YouTube provide invaluable opportunities for young people to develop and maintain friendships, access educational content, explore identity and interests, and engage with communities of peers who share their experiences, including those from marginalised groups who may find it easier to connect online than in person. However critics point to a substantial body of research suggesting that heavy and passive social media use, characterised by scrolling through curated highlight reels of other people's lives without actively engaging, is associated with increased rates of anxiety, depression, loneliness, and body image dissatisfaction among adolescents, particularly girls. The mechanisms through which social media may harm mental health are thought to include social comparison, where users measure their own worth against the seemingly perfect lives presented by peers and influencers; cyberbullying, which extends traditional bullying into the home and makes it impossible to escape; the displacement of sleep, physical activity, and face-to-face social interaction; and the addictive design features built into social media platforms that exploit psychological vulnerabilities to maximise engagement and advertising revenue. Several major studies have found that adolescents who spend more than three to four hours per day on social media are at significantly higher risk of reporting poor mental health, though researchers emphasise that the relationship is likely bidirectional and complex, with young people who are already struggling with mental health issues potentially turning to social media as a coping mechanism that then exacerbates their difficulties. The relationship between social media use and mental health, particularly among adolescents, has become one of the most contested areas of public health research and policy debate. A substantial body of evidence now links heavy social media use with increased rates of anxiety, depression, and body image concerns, particularly among teenage girls. The mechanisms through which social media might harm mental health are debated: some researchers point to the displacement of in-person social interaction, while others emphasise the role of social comparison, cyberbullying, and the addictive design features that platforms employ to maximise engagement.","questions":[{"q":"What type of social media use is particularly associated with poor mental health outcomes?","options":["Active posting and commenting","Passive scrolling through content","Video calling with friends"],"answer":1},{"q":"What psychological mechanism involves comparing oneself to others on social media?","options":["Identity exploration","Social comparison","Emotional bonding"],"answer":1},{"q":"How many hours of daily social media use is associated with higher mental health risk?","options":["More than one hour","More than three to four hours","More than eight hours"],"answer":1},{"q":"Which group may find it easier to connect online than in person?","options":["Athletes","Young people from marginalised groups","Academic high achievers"],"answer":1}]},"writing":{"type":"task2","title":"讨论类 - 动物权利","task":"Some people think that animals should be treated as equals as human beings. Others say that it is acceptable to use animals for our benefits. Discuss both views and give your opinion.","sample":"The moral status of animals has long provoked philosophical debate, with positions ranging from utilitarianism to anthropocentrism.\n\nThose advocating animal equality invoke sentience as the relevant criterion. If capacity for suffering grants moral consideration, animals - capable of experiencing pain, pleasure, and emotion - deserve protection. This perspective notes that humans lack rational grounds for privileging their interests over species membership alone.\n\nHowever, opponents emphasize fundamental differences between humans and animals. Human cognitive capacities, including abstract reasoning, language, and self-awareness, establish unique moral status. Humans possess moral responsibility that animals cannot share. Furthermore, animal use has driven human civilization's development through agriculture, medicine, and companionship.\n\nI adopt a middle position acknowledging animal welfare without demanding full equality. Animals deserve protection from unnecessary suffering, but complete equality with humans remains neither achievable nor desirable. Practical application involves reducing cruelty while accepting certain uses.\n\nThis balanced view recognizes that humans occupy a privileged position enabling moral consideration of other species. We should minimize animal suffering while accepting some level of animal use for human benefit, particularly where alternatives remain unavailable.\n\nIn conclusion, while complete equality proves impractical, significant moral obligations toward animals exist. Society should continue reducing unnecessary animal suffering while maintaining realistic approaches to human-animal relationships."},"speaking":{"topic":"健康","part1":["你健康吗？","你锻炼身体吗？","你注意饮食吗？","你上次看医生是什么时候？"],"part2":"Describe a way to stay healthy. You should say: what it is, how you do it, how long you have been doing it, and explain why it is important for health.","part3":["如何让人们更健康？","医疗应该免费吗？","心理健康和身体健康一样重要吗？"]}},{"day":34,"phase":"phase2","listening":{"title":"产品发布会","transcript":"Presenter: Introducing Smart Hub 3000. Our engineering team has been working on this for two years.\nTraditional smart home systems are fragmented. We're changing that.\nThree key innovations: First, Universal Compatibility - supports 50+ protocols.\nSecond, Predictive Automation - AI learns your routines in two weeks.\nThird, Privacy by Design - all AI processing happens locally.\nAvailable next month at $349. Early buyers get 20% discount.","questions":[{"q":"产品名称？","options":["Smart Hub 2000","Smart Hub 3000","Smart Hub Pro"],"answer":1},{"q":"支持多少种协议？","options":["30+","40+","50+"],"answer":2},{"q":"AI学习需要多久？","options":["一周","两周","三周"],"answer":1},{"q":"早鸟折扣？","options":["10%","15%","20%"],"answer":2}]},"reading":{"title":"Global Water Scarcity","passage":"Water scarcity has emerged as one of the defining challenges of the 21st century, threatening food security, political stability, public health, and economic development across vast swaths of the globe, with the United Nations warning that by 2025 as many as 1.8 billion people could be living under conditions of absolute water scarcity, and two-thirds of the world's population could face water-stressed conditions. The crisis stems from a combination of factors including population growth, urbanisation, agricultural expansion, industrial development, and the increasingly severe impacts of climate change on precipitation patterns and glacier meltwater supplies that feed major river systems. Agriculture is by far the largest consumer of freshwater resources, accounting for approximately 70 percent of global freshwater withdrawal, much of it used to irrigate crops in arid and semi-arid regions where rainfall is insufficient to support reliable harvests, including in countries such as India, Pakistan, China, the United States, and across the Middle East and North Africa. The over-extraction of groundwater for irrigation has led to rapidly falling water tables in many of the world's most important agricultural regions, threatening the long-term viability of food production systems upon which billions of people depend. In wealthy countries, per capita water consumption is often far higher than is necessary or sustainable, with water-intensive diets featuring large quantities of meat and dairy products driving indirect water consumption through the water required to grow animal feed. Technological solutions such as water recycling, desalination, and precision irrigation offer promising avenues for addressing water scarcity, though each comes with significant limitations and costs that make them unsuitable as universal solutions, particularly for the world's poorest communities who are often the most severely affected by water scarcity. Despite its reputation as a rainy country, the United Kingdom faces serious and growing challenges in managing its water resources sustainably. Climate change is intensifying the extremes: wetter winters that strain flood defences and drainage infrastructure, combined with hotter, drier summers that deplete reservoirs, reduce river flows, and increase demand for irrigation in agriculture. Water companies have faced sustained public outrage over the state of the UK waterways, with sewage discharges from combined storm overflows into rivers and coastal waters becoming a symbol of the failure of environmental regulation.","questions":[{"q":"What percentage of global freshwater withdrawal is used for agriculture?","options":["About 30 percent","About 50 percent","About 70 percent"],"answer":2},{"q":"By 2025, how many people could be living under absolute water scarcity?","options":["800 million","1.8 billion","3.5 billion"],"answer":1},{"q":"Which diet typically requires more water to produce?","options":["Plant-based diet","Meat and dairy rich diet","Grain-based diet"],"answer":1},{"q":"Which sector uses the most freshwater globally?","options":["Industry","Agriculture","Domestic household use"],"answer":1}]},"writing":{"type":"task1","title":"表格 - 住房类型","task":"The table gives information about the types of housing occupied by people in a particular city in 2018 and 2023. Summarise the information.","sample":"The table illustrates changes in housing types in a city between 2018 and 2023.\n\nOverall, the city saw growth across all housing categories, with apartments and social housing showing the most significant increases.\n\nApartments experienced the largest expansion, rising from 35% to 45% of housing. This reflects increasing urbanization and preference for compact living, particularly among young professionals and smaller households.\n\nSocial housing also grew substantially from 20% to 28%, indicating government investment in affordable accommodation. This expansion addresses growing housing affordability concerns.\n\nOwner-occupied housing showed modest growth from 30% to 32%, while private renting remained stable at around 18-20%. These relatively static figures suggest these sectors matured within existing markets.\n\nIn conclusion, the five-year period witnessed notable shifts toward apartments and social housing, reflecting changing preferences and policy priorities."},"speaking":{"topic":"工作","part1":["你现在工作还是学生？","你理想的工作是什么？","你为什么选择现在的工作/专业？","你工作压力大吗？"],"part2":"Describe your ideal job. You should say: what job it is, what qualities it requires, whether it is realistic to achieve, and explain why it would be your ideal.","part3":["人们为什么工作？","工作满意度重要吗？","人们应该为了兴趣还是钱工作？"]}},{"day":35,"phase":"phase2","listening":{"title":"环保政策研讨","transcript":"Moderator: Why carbon pricing?\nProfessor: Makes polluters pay, creates incentives for cleaner tech.\nIndustry: Concern is competitiveness - carbon leakage.\nGovernment: Border adjustment mechanisms level the playing field.\nEconomist: Revenue use matters - returning as dividends increases support from 40% to over 70%.","questions":[{"q":"碳定价基本原理？","options":["补贴污染者","让污染者付费","禁止排放"],"answer":1},{"q":"行业担心什么？","options":["技术不足","碳泄漏和竞争力","成本高"],"answer":1},{"q":"如果返还收入支持率可达？","options":["50%","60%","70%+"],"answer":2},{"q":"欧盟实施什么机制？","options":["碳税","碳边境调整","碳补贴"],"answer":1}]},"reading":{"title":"The Renewable Energy Revolution","passage":"Renewable energy has undergone a revolution over the past two decades that has fundamentally transformed the global electricity landscape, with wind, solar, hydroelectric, and geothermal sources now generating an increasing share of the world's power and challenging the dominance of fossil fuels that has characterised energy systems since the Industrial Revolution. The driving forces behind this transformation include dramatic falls in the cost of renewable energy technologies, particularly solar photovoltaic panels, whose cost has declined by approximately 89 percent since 2010, and wind turbines, which have become increasingly efficient and economically competitive even without government subsidies in many parts of the world. The United Kingdom has emerged as a global leader in offshore wind energy, with the Hornsea Wind Farm off the coast of Yorkshire becoming the world's largest offshore wind installation upon its completion, and the government setting a target of 50 gigawatts of offshore wind capacity by 2030, enough to power every home in the country. However the integration of renewable energy sources into existing electricity grids presents significant technical challenges, as the inherent variability of wind and solar generation means that supply does not always match demand, requiring the development of sophisticated grid management systems, large-scale energy storage solutions, and flexible backup generation capacity. Battery storage technology is widely regarded as the most promising solution to the intermittency problem of renewable energy, with grid-scale battery installations growing rapidly in size and number. Critics of the renewable energy transition raise concerns about the land use implications of large solar and wind installations, the visual impact of wind turbines on landscapes, the deaths of birds and bats at wind farms, and the environmental impacts of mining rare earth minerals required for solar panels and wind turbine magnets. The United Kingdom has made remarkable progress in expanding renewable energy generation, with wind power in particular emerging as a flagship success story. Offshore wind farms now generate enough electricity to power the equivalent of millions of homes, and the UK ranks among the world leaders in installed offshore wind capacity. Solar power has also expanded rapidly, with the cost of photovoltaic panels falling by more than 80 percent over the past decade. However, the intermittent nature of wind and solar generation creates significant challenges for grid stability, and the development of large-scale electricity storage solutions remains technically and economically demanding.","questions":[{"q":"By approximately what percentage has solar panel cost declined since 2010?","options":["About 50 percent","About 70 percent","About 89 percent"],"answer":2},{"q":"What renewable energy sector has the UK become a global leader in?","options":["Solar photovoltaic","Offshore wind","Geothermal"],"answer":1},{"q":"What challenge does the variability of wind and solar generation create for grids?","options":["Excess electricity generation","Supply not always matching demand","Cooling system failures"],"answer":1},{"q":"How much offshore wind capacity has the UK government targeted for 2030?","options":["20 gigawatts","50 gigawatts","100 gigawatts"],"answer":1}]},"writing":{"type":"task2","title":"观点类 - 成功因素","task":"Some people say that the main environmental problem of our time is the loss of particular species of plants and animals. Others say that there are more important environmental problems. Discuss both these views and give your opinion.","sample":"Environmental challenges present multiple serious threats, with species extinction representing one among several critical concerns.\n\nThose emphasizing species loss argue that biodiversity provides ecosystem services essential for human survival: pollination, water purification, climate regulation. Each extinction potentially disrupts ecological relationships built over millions of years. Once lost, species cannot be recovered, making extinction particularly tragic.\n\nHowever, climate change presents arguably more immediate and widespread threats. Rising temperatures, sea-level rise, and extreme weather affect billions directly through food security, displacement, and economic disruption. Climate impacts potentially cascade into biodiversity loss through habitat destruction and altered ecosystems.\n\nIn my view, both perspectives hold merit, but climate change demands priority attention. While species loss represents permanent damage, climate change threatens existing life on multiple scales. Furthermore, addressing climate benefits biodiversity through reduced habitat destruction and ecosystem protection.\n\nThis is not to dismiss biodiversity concerns. Rather, strategic resource allocation requires addressing root causes benefiting multiple environmental dimensions. Climate action represents the most efficient investment for overall environmental health.\n\nIn conclusion, while species extinction constitutes serious concern, climate change warrants greater immediate attention given its comprehensive threats. Both issues interconnect, making integrated approaches essential."},"speaking":{"topic":"教育","part1":["你最喜欢的老师是谁？","你觉得学校教育有用吗？","你更喜欢理论还是实践？","你会选择继续读研究生吗？"],"part2":"Describe a subject you studied that you found useful. You should say: what it was, when and where you studied it, what you learned, and explain why it was useful.","part3":["学生应该学什么？","教育应该免费吗？","如何提高教育质量？"]}},{"day":36,"phase":"phase2","listening":{"title":"糖尿病诊断对话","transcript":"Doctor: Based on tests, you have Type 2 diabetes.\nPatient: My parents never had it. What does this mean?\nDoctor: Your body doesn't use insulin effectively. Manageable with diet, exercise, medication.\nPatient: Will I need medication?\nDoctor: Start with lifestyle changes, reassess in 3 months with HbA1c test.\nDoctor: Many patients do well with metformin as first-line treatment.\nPatient: What about diet?\nDoctor: Reduce refined carbs, increase fiber, control portions.","questions":[{"q":"诊断结果？","options":["1型糖尿病","2型糖尿病","糖尿病前期"],"answer":1},{"q":"多久后重新评估？","options":["1个月","2个月","3个月"],"answer":2},{"q":"HbA1c反映多久血糖？","options":["1个月","2个月","3个月"],"answer":2},{"q":"建议什么作为一线治疗？","options":["胰岛素","二甲双胍","饮食控制"],"answer":1}]},"reading":{"title":"The Future of Cities: Urban Planning","passage":"The future of urban planning in the 21st century is being shaped by a convergence of forces including rapid population growth in cities across the developing world, the climate crisis, technological innovation, changing patterns of work and mobility, and evolving social attitudes toward community, space, and quality of life that are fundamentally challenging assumptions inherited from the car-dependent, zoning-heavy urban planning philosophies of the mid-20th century. The United Nations projects that by 2050 approximately 68 percent of the world's population will live in urban areas, up from 55 percent today, adding approximately 2.5 billion urban residents over the next three decades, the vast majority of whom will live in cities in Asia and Africa. This unprecedented urban growth presents both a crisis and an opportunity, as cities that grow without adequate planning and investment in infrastructure, housing, and services risk becoming centres of congestion, pollution, inequality, and social unrest, while those that embrace smart, inclusive, and sustainable planning principles can become engines of economic growth, innovation, and environmental improvement. The concept of the 15-minute city, pioneered in Paris under Mayor Anne Hidalgo and subsequently adopted by urban planners in cities including Melbourne, Portland, and Barcelona, envisions neighbourhoods where residents can access all their daily needs including work, shopping, education, healthcare, and recreation within a 15-minute walk or cycle ride from their homes, reducing the need for car travel and fostering stronger community bonds. Green infrastructure, including urban parks, green corridors, living walls, and rooftop gardens, is increasingly recognised as essential to urban climate adaptation, providing cooling effects that reduce energy consumption, managing stormwater runoff, supporting urban biodiversity, and improving the mental health and wellbeing of city residents. Cities around the world are undergoing rapid transformation as urban planners, policymakers, and communities grapple with the competing demands of economic growth, environmental sustainability, and social equity. The concept of the 15-minute city, in which all essential services and amenities are accessible within a short walk or cycle from every resident home, has captured the imagination of urban planners seeking to reduce car dependency and improve quality of life. Yet the gap between ambitious planning rhetoric and on-the-ground reality remains wide in many cities, where car dominance, inadequate cycling infrastructure, and poor air quality continue to define daily life for millions of urban residents.","questions":[{"q":"What percentage of the world's population is projected to live in urban areas by 2050?","options":["About 50 percent","About 68 percent","About 80 percent"],"answer":1},{"q":"What concept envisions accessing all daily needs within 15 minutes from home?","options":["Smart city","15-minute city","Compact living"],"answer":1},{"q":"In which continent will most of the future urban population growth occur?","options":["Europe","North America","Asia and Africa"],"answer":2},{"q":"What type of infrastructure is recognised as essential for urban climate adaptation?","options":["Roads and highways","Green infrastructure","Underground tunnels"],"answer":1}]},"writing":{"type":"task1","title":"流程图 - 塑料回收","task":"The diagram shows how plastic bottles are recycled. Summarise the information by selecting and reporting the main features.","sample":"The flowchart illustrates the plastic bottle recycling process.\n\nOverall, recycling involves collection, sorting, cleaning, shredding, melting, and remolding into new products.\n\nThe process begins with consumer collection, where bottles are placed in recycling bins. Trucks collect these and transport them to sorting facilities. Here, workers or machines separate bottles by type and color, removing any non-plastic contaminants.\n\nCleaned bottles then enter shredding machines, breaking them into small flakes. These flakes are washed again to remove labels and adhesives. The clean flakes are melted at high temperatures, producing molten plastic.\n\nThis melted material is extruded through small holes, creating strands that are cooled and cut into pellets. These pellets represent raw material for manufacturing new products.\n\nFinally, the pellets are melted and molded into various items: new bottles, clothing fibers, furniture, or automotive parts. These products enter consumer markets, completing the recycling loop.\n\nIn conclusion, plastic bottle recycling transforms waste into useful products through systematic stages, conserving resources and reducing landfill."},"speaking":{"topic":"媒体","part1":["你经常看新闻吗？","你更喜欢看书还是看电影？","你用社交媒体吗？","你每天看多长时间电视？"],"part2":"Describe a movie or TV program that influenced you. You should say: what it was, when you watched it, what it was about, and explain how it influenced you.","part3":["暴力内容对青少年有什么影响？","新闻可信度如何判断？","人们应该付费获取高质量内容吗？"]}},{"day":37,"phase":"phase2","listening":{"title":"可持续发展报告","transcript":"CEO: Carbon emissions decreased 23% vs 2020 baseline, exceeding our 20% target.\nThree initiatives: First, 85% European operations use renewable energy - energy costs decreased 12%.\nSecond, redesigned packaging - eliminated 1,200 metric tons of plastic.\nThird, worked with 200+ suppliers on environmental practices.\nBy 2030, we commit to net-zero emissions.","questions":[{"q":"碳排放降低多少？","options":["18%","20%","23%"],"answer":2},{"q":"欧洲可再生能源比例？","options":["75%","80%","85%"],"answer":2},{"q":"减少多少塑料？","options":["1,000吨","1,200吨","1,500吨"],"answer":1},{"q":"净零目标年份？","options":["2028","2030","2035"],"answer":1}]},"reading":{"title":"Biodiversity Loss and Conservation","passage":"The ongoing loss of biodiversity represents one of the most serious environmental challenges facing the planet, with scientists warning that the Earth is experiencing its sixth mass extinction event, the first to be caused primarily by human activity, and that the collapse of ecosystems upon which all life depends is accelerating at a rate unprecedented in geological history. The Intergovernmental Science-Policy Platform on Biodiversity and Ecosystem Services reported in 2019 that approximately one million animal and plant species are now threatened with extinction, many within decades, as a direct result of human activities including habitat destruction, overexploitation of natural resources, pollution, invasive species, and climate change. The primary driver of biodiversity loss is habitat destruction, particularly the conversion of natural ecosystems including forests, wetlands, grasslands, and coral reefs into agricultural land, urban areas, and infrastructure, a process that has accelerated dramatically over the past 50 years as the global population has grown and consumption patterns have intensified. The UK, despite being one of the most nature-depleted countries in the world, has made some progress in conservation through the establishment of a network of national parks, nature reserves, and Sites of Special Scientific Interest, as well as through the reintroduction of species such as beavers, red kites, and ospreys that had been driven to extinction or near-extinction through historical persecution and habitat loss. However conservation organisations argue that these measures are insufficient to reverse the long-term decline in biodiversity, and are calling for fundamental changes to agricultural subsidies, planning policy, and economic priorities that currently incentivise the conversion and degradation of natural habitats. Community-led conservation initiatives, in which local residents take direct responsibility for managing and protecting nearby natural areas, have emerged as a promising complement to top-down government conservation strategies. The global biodiversity crisis, now widely regarded by scientists as being comparable in severity to climate change, has received growing political attention in recent years, though critics argue that policy responses remain inadequate to the scale of the emergency. In the United Kingdom, the State of Nature report documents a catastrophic decline in wildlife populations, with abundance of the most monitored species falling by an average of 19 percent since the 1970s. Habitat loss, intensive agriculture, pollution, and climate change are identified as the principal drivers of this decline. The rewilding movement, which advocates for the large-scale restoration of natural ecosystems, has gained traction in Britain.","questions":[{"q":"How many species did IPBES report are threatened with extinction?","options":["About 100,000","About 500,000","About one million"],"answer":2},{"q":"What is the primary driver of biodiversity loss?","options":["Climate change","Habitat destruction","Pollution"],"answer":1},{"q":"Which species has been reintroduced to the UK?","options":["Wolves","Beavers","Bears"],"answer":1},{"q":"What organisation reported that one million species are threatened with extinction?","options":["UNEP","IPBES","NASA"],"answer":1}]},"writing":{"type":"task2","title":"讨论类 - 广告影响","task":"Some people think that advertisements have positive economic effects. Others believe they have negative social effects. Discuss both views and give your opinion.","sample":"Advertising represents a controversial topic, with proponents highlighting economic benefits while critics emphasize social drawbacks.\n\nAdvertising's economic contributions are substantial. It enables markets to function efficiently by connecting buyers with sellers. Advertising revenue supports media industries, funding newspapers, television, and online content. Furthermore, advertising stimulates competition, driving innovation and potentially reducing prices through market expansion.\n\nHowever, negative social effects merit consideration. Advertising often promotes materialism and excessive consumption, particularly targeting vulnerable groups like children. The constant exposure to idealized lifestyles creates unrealistic expectations, potentially fostering dissatisfaction. Furthermore, some advertising employs manipulative psychological techniques rather than providing genuine information.\n\nI believe the net effect depends heavily on implementation. Ethical advertising providing useful information serves consumers and markets. However, regulation should address the most harmful practices, particularly those targeting children or employing deception.\n\nMoreover, consumers can develop critical awareness to resist manipulation. Media literacy education empowers individuals to evaluate advertising messages rather than passively accepting claims.\n\nIn conclusion, advertising offers both economic benefits and social risks. Appropriate regulation combined with consumer education can maximize advantages while minimizing harms."},"speaking":{"topic":"文化","part1":["你对什么文化感兴趣？","你了解中国的传统文化吗？","你参加过什么文化活动？","你觉得文化重要吗？"],"part2":"Describe a tradition in your culture. You should say: what it is, when it happens, what people do, and explain why it is important.","part3":["传统会消失吗？","人们应该保留传统还是接受新文化？","全球化会使文化同质化吗？"]}},{"day":38,"phase":"phase2","listening":{"title":"AI伦理讲座","transcript":"Professor: Algorithmic bias in AI systems is pressing. Facial recognition has higher error rates for darker skin tones - difference up to 34%.\nWhy? Biased training data. Systems trained on light-skinned images perform better on those faces.\nConsequences: wrongly identified as criminals, job discrimination.\nSolutions: diverse training data, algorithmic auditing, transparency.\nBroader lesson: AI reflects human decisions.","questions":[{"q":"错误率差异最高？","options":["24%","34%","44%"],"answer":1},{"q":"主要原因？","options":["技术限制","训练数据偏见","硬件问题"],"answer":1},{"q":"解决方案不包括？","options":["多样化数据","算法审查","禁止技术"],"answer":2},{"q":"文章核心观点？","options":["AI有偏见","AI中立","AI完美"],"answer":0}]},"reading":{"title":"The Digital Divide","passage":"The digital divide refers to the persistent gap between individuals, households, businesses, and geographic areas in terms of access to information and communication technologies and in their ability to use the internet effectively, creating and reinforcing social, economic, and educational inequalities in societies that are increasingly dependent on digital infrastructure and literacy for full civic and economic participation. The dimensions of the digital divide are multiple and interconnected, encompassing not only physical access to broadband internet infrastructure, which remains limited in many rural and remote areas, but also the availability of suitable devices such as computers and tablets, the development of digital skills necessary to navigate online services and content, and the motivation and cultural readiness to engage with digital technologies. In the United Kingdom, research has consistently shown that the digital divide maps closely onto existing patterns of social and economic inequality, with lower-income households, older people, people with disabilities, ethnic minorities, and residents of rural and coastal communities all experiencing significantly lower rates of internet access and digital engagement than the national average. The COVID-19 pandemic dramatically exposed and amplified the consequences of digital exclusion, as schools moved to online learning, workplaces shifted to remote arrangements, healthcare services expanded their digital offerings, and government support schemes required online applications, all of which placed those without adequate digital access and skills at a profound disadvantage. The government's response has included initiatives such as the Gigabit Broadband Voucher Scheme, which provides subsidies to help households and businesses upgrade to high-speed fibre connections, and the NHS Digital Skills programme, which aims to improve digital health literacy among underserved communities. The digital divide, once understood primarily in terms of access to internet connectivity, has evolved into a far more nuanced and multifaceted phenomenon that intersects with issues of age, income, education, geography, and disability. While broadband and mobile internet coverage have expanded significantly, millions of people in the United Kingdom remain digitally excluded, unable or unwilling to engage with online services that have become the default for banking, shopping, government interactions, and social connection. Beyond access, digital skills have emerged as an equally important dimension of the divide: being able to use a computer or smartphone is fundamentally different from being able to use it safely, critically, and effectively.","questions":
