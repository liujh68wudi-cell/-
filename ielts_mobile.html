ading": {"day": 45, "phase": "phase2", "title": "高等教育国际化", "passage": "International students 20%+ of UK higher ed. Pay higher fees. Competition intensifying from Australia, Canada, Singapore. Experiences vary - some isolated. Post-study work visas influential - UK reintroduced 2-year visa in 2019.", "questions": [{"q": "国际学生比例？", "options": ["15%", "20%+", "25%"], "answer": 1}, {"q": "2019年政策变化？", "options": ["增加学费", "恢复毕业后工签", "限制招生"], "answer": 1}, {"q": "国际学生比本地学生更多经历？", "options": ["经济困难", "心理健康挑战", "就业优势"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 成功因素", "task": "Some people say that the main environmental problem of our time is the loss of particular species of plants and animals. Others say that there are more important environmental problems. Discuss both these views and give your opinion.", "sample": "Environmental challenges present multiple serious threats, with species extinction representing one among several critical concerns.\n\nThose emphasizing species loss argue that biodiversity provides ecosystem services essential for human survival: pollination, water purification, climate regulation. Each extinction potentially disrupts ecological relationships built over millions of years. Once lost, species cannot be recovered, making extinction particularly tragic.\n\nHowever, climate change presents arguably more immediate and widespread threats. Rising temperatures, sea-level rise, and extreme weather affect billions directly through food security, displacement, and economic disruption. Climate impacts potentially cascade into biodiversity loss through habitat destruction and altered ecosystems.\n\nIn my view, both perspectives hold merit, but climate change demands priority attention. While species loss represents permanent damage, climate change threatens existing life on multiple scales. Furthermore, addressing climate benefits biodiversity through reduced habitat destruction and ecosystem protection.\n\nThis is not to dismiss biodiversity concerns. Rather, strategic resource allocation requires addressing root causes benefiting multiple environmental dimensions. Climate action represents the most efficient investment for overall environmental health.\n\nIn conclusion, while species extinction constitutes serious concern, climate change warrants greater immediate attention given its comprehensive threats. Both issues interconnect, making integrated approaches essential."}, "speaking": {"topic": "教育", "part1": ["你最喜欢的老师是谁？", "你觉得学校教育有用吗？", "你更喜欢理论还是实践？", "你会选择继续读研究生吗？"], "part2": "Describe a subject you studied that you found useful. You should say: what it was, when and where you studied it, what you learned, and explain why it was useful.", "part3": ["学生应该学什么？", "教育应该免费吗？", "如何提高教育质量？"]}}, {"day": 46, "phase": "phase2", "listening": {"title": "糖尿病诊断对话", "transcript": "Doctor: Based on tests, you have Type 2 diabetes.\nPatient: My parents never had it. What does this mean?\nDoctor: Your body doesn't use insulin effectively. Manageable with diet, exercise, medication.\nPatient: Will I need medication?\nDoctor: Start with lifestyle changes, reassess in 3 months with HbA1c test.\nDoctor: Many patients do well with metformin as first-line treatment.\nPatient: What about diet?\nDoctor: Reduce refined carbs, increase fiber, control portions.", "questions": [{"q": "诊断结果？", "options": ["1型糖尿病", "2型糖尿病", "糖尿病前期"], "answer": 1}, {"q": "多久后重新评估？", "options": ["1个月", "2个月", "3个月"], "answer": 2}, {"q": "HbA1c反映多久血糖？", "options": ["1个月", "2个月", "3个月"], "answer": 2}, {"q": "建议什么作为一线治疗？", "options": ["胰岛素", "二甲双胍", "饮食控制"], "answer": 1}]}, "reading": {"day": 46, "phase": "phase2", "title": "生物多样性危机", "passage": "Species extinction 100-1000x natural rate. UK has significant loss since 1970s. Drivers: habitat loss, climate change, pollution, invasive species. Insects declined 60%. Conservation: protected areas, reintroduction (beavers returned), ecosystem services approach. 30x30 target by 2030.", "questions": [{"q": "灭绝速度倍数？", "options": ["50-500", "100-1000", "500-5000"], "answer": 1}, {"q": "昆虫下降？", "options": ["40%", "50%", "60%"], "answer": 2}, {"q": "重新引入什么动物？", "options": ["狼", "海狸", "熊"], "answer": 1}, {"q": "30x30目标保护？", "options": ["20%", "30%", "40%"], "answer": 1}]}, "writing": {"type": "task1", "title": "流程图 - 塑料回收", "task": "The diagram shows how plastic bottles are recycled. Summarise the information by selecting and reporting the main features.", "sample": "The flowchart illustrates the plastic bottle recycling process.\n\nOverall, recycling involves collection, sorting, cleaning, shredding, melting, and remolding into new products.\n\nThe process begins with consumer collection, where bottles are placed in recycling bins. Trucks collect these and transport them to sorting facilities. Here, workers or machines separate bottles by type and color, removing any non-plastic contaminants.\n\nCleaned bottles then enter shredding machines, breaking them into small flakes. These flakes are washed again to remove labels and adhesives. The clean flakes are melted at high temperatures, producing molten plastic.\n\nThis melted material is extruded through small holes, creating strands that are cooled and cut into pellets. These pellets represent raw material for manufacturing new products.\n\nFinally, the pellets are melted and molded into various items: new bottles, clothing fibers, furniture, or automotive parts. These products enter consumer markets, completing the recycling loop.\n\nIn conclusion, plastic bottle recycling transforms waste into useful products through systematic stages, conserving resources and reducing landfill."}, "speaking": {"topic": "媒体", "part1": ["你经常看新闻吗？", "你更喜欢看书还是看电影？", "你用社交媒体吗？", "你每天看多长时间电视？"], "part2": "Describe a movie or TV program that influenced you. You should say: what it was, when you watched it, what it was about, and explain how it influenced you.", "part3": ["暴力内容对青少年有什么影响？", "新闻可信度如何判断？", "人们应该付费获取高质量内容吗？"]}}, {"day": 47, "phase": "phase2", "listening": {"title": "可持续发展报告", "transcript": "CEO: Carbon emissions decreased 23% vs 2020 baseline, exceeding our 20% target.\nThree initiatives: First, 85% European operations use renewable energy - energy costs decreased 12%.\nSecond, redesigned packaging - eliminated 1,200 metric tons of plastic.\nThird, worked with 200+ suppliers on environmental practices.\nBy 2030, we commit to net-zero emissions.", "questions": [{"q": "碳排放降低多少？", "options": ["18%", "20%", "23%"], "answer": 2}, {"q": "欧洲可再生能源比例？", "options": ["75%", "80%", "85%"], "answer": 2}, {"q": "减少多少塑料？", "options": ["1,000吨", "1,200吨", "1,500吨"], "answer": 1}, {"q": "净零目标年份？", "options": ["2028", "2030", "2035"], "answer": 1}]}, "reading": {"day": 47, "phase": "phase2", "title": "数字鸿沟", "passage": "Digital divide: access and skills uneven. Age significant factor. Geographic disparities persist despite programs. Income correlates with exclusion. Libraries offer free internet, devices, training. Jobs increasingly require digital skills. Initiatives provide devices to disadvantaged.", "questions": [{"q": "图书馆提供？", "options": ["仅上网", "免费上网和培训", "仅电脑"], "answer": 1}, {"q": "什么影响较小？", "options": ["年龄", "地理位置", "性别"], "answer": 2}, {"q": "疫情中缺乏设备孩子？", "options": ["社交困难", "学习落后", "健康问题"], "answer": 1}, {"q": "工作现在需要？", "options": ["体力技能", "基础数字技能", "外语"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 广告影响", "task": "Some people think that advertisements have positive economic effects. Others believe they have negative social effects. Discuss both views and give your opinion.", "sample": "Advertising represents a controversial topic, with proponents highlighting economic benefits while critics emphasize social drawbacks.\n\nAdvertising's economic contributions are substantial. It enables markets to function efficiently by connecting buyers with sellers. Advertising revenue supports media industries, funding newspapers, television, and online content. Furthermore, advertising stimulates competition, driving innovation and potentially reducing prices through market expansion.\n\nHowever, negative social effects merit consideration. Advertising often promotes materialism and excessive consumption, particularly targeting vulnerable groups like children. The constant exposure to idealized lifestyles creates unrealistic expectations, potentially fostering dissatisfaction. Furthermore, some advertising employs manipulative psychological techniques rather than providing genuine information.\n\nI believe the net effect depends heavily on implementation. Ethical advertising providing useful information serves consumers and markets. However, regulation should address the most harmful practices, particularly those targeting children or employing deception.\n\nMoreover, consumers can develop critical awareness to resist manipulation. Media literacy education empowers individuals to evaluate advertising messages rather than passively accepting claims.\n\nIn conclusion, advertising offers both economic benefits and social risks. Appropriate regulation combined with consumer education can maximize advantages while minimizing harms."}, "speaking": {"topic": "文化", "part1": ["你对什么文化感兴趣？", "你了解中国的传统文化吗？", "你参加过什么文化活动？", "你觉得文化重要吗？"], "part2": "Describe a tradition in your culture. You should say: what it is, when it happens, what people do, and explain why it is important.", "part3": ["传统会消失吗？", "人们应该保留传统还是接受新文化？", "全球化会使文化同质化吗？"]}}, {"day": 48, "phase": "phase2", "listening": {"title": "AI伦理讲座", "transcript": "Professor: Algorithmic bias in AI systems is pressing. Facial recognition has higher error rates for darker skin tones - difference up to 34%.\nWhy? Biased training data. Systems trained on light-skinned images perform better on those faces.\nConsequences: wrongly identified as criminals, job discrimination.\nSolutions: diverse training data, algorithmic auditing, transparency.\nBroader lesson: AI reflects human decisions.", "questions": [{"q": "错误率差异最高？", "options": ["24%", "34%", "44%"], "answer": 1}, {"q": "主要原因？", "options": ["技术限制", "训练数据偏见", "硬件问题"], "answer": 1}, {"q": "解决方案不包括？", "options": ["多样化数据", "算法审查", "禁止技术"], "answer": 2}, {"q": "文章核心观点？", "options": ["AI有偏见", "AI中立", "AI完美"], "answer": 0}]}, "reading": {"day": 48, "phase": "phase2", "title": "隐私与数据", "passage": "Data fundamental to digital economy. Tech companies collect user info for advertising. GDPR 2018 established rights. Compliance challenging across jurisdictions. Emerging tech: IoT, biometrics, AI infer personal info. User expectations shifting - some choose privacy alternatives.", "questions": [{"q": "GDPR实施年份？", "options": ["2016", "2018", "2020"], "answer": 1}, {"q": "商业模式依赖？", "options": ["订阅", "数据广告", "销售"], "answer": 1}, {"q": "用户行为与偏好？", "options": ["一致", "存在差距", "无法研究"], "answer": 1}, {"q": "什么隐私问题？", "options": ["仅设备", "物联网和生物识别", "仅邮件"], "answer": 1}]}, "writing": {"type": "task1", "title": "线图 - 通信方式", "task": "The line graph shows how people sent letters in 1998, 2002, 2006, 2010, and 2014. Summarise the information.", "sample": "The line graph illustrates changes in letter sending in a country from 1998 to 2014.\n\nOverall, letter sending declined dramatically over the period, with email and messaging replacing traditional postal services.\n\nIn 1998, approximately 2.2 billion letters were sent, representing traditional mail's peak. This figure remained relatively stable through 2002 at about 2.1 billion.\n\nHowever, the decline accelerated from 2006 onward. Letters dropped to 1.5 billion in 2006, then continued falling to 800 million in 2010 and just 300 million in 2014. This represents an 86% decrease over sixteen years.\n\nThe pattern clearly reflects technological substitution. As internet access expanded, electronic communication increasingly replaced physical letters for personal and business correspondence.\n\nIn conclusion, the graph demonstrates technology's transformative impact on communication, with traditional letters nearly disappearing within sixteen years."}, "speaking": {"topic": "城市", "part1": ["你住在城市还是农村？", "你最喜欢城市的什么？", "你所在的城市有什么问题？", "你想住在哪个城市？"], "part2": "Describe a city you would like to visit. You should say: which city it is, where it is located, what you know about it, and explain why you would like to visit.", "part3": ["城市化有什么优缺点？", "大城市好还是小城市好？", "如何解决城市交通问题？"]}}, {"day": 49, "phase": "phase2", "listening": {"title": "城市规划 consultation", "transcript": "Planner: Riverside Development Project - 15 hectares, 800 new homes, 30% affordable housing.\nTraffic: new pedestrian/cyclist bridge, car traffic from main road.\nGreen space: 40% for parks, native trees, wildlife corridors.\nBuildings: tallest (12 stories) face river, not existing homes.\nResident: Construction noise concern?\nPlanner: 5 years, phases start far from homes, community liaison available.", "questions": [{"q": "开发面积？", "options": ["10公顷", "15公顷", "20公顷"], "answer": 1}, {"q": "保障性住房比例？", "options": ["25%", "30%", "35%"], "answer": 1}, {"q": "绿地比例？", "options": ["30%", "35%", "40%"], "answer": 2}, {"q": "最高建筑？", "options": ["10层", "12层", "15层"], "answer": 1}]}, "reading": {"day": 49, "phase": "phase2", "title": "医疗数字化", "passage": "Healthcare数字化: EHR replacing paper. Telemedicine routine post-pandemic. Health apps for monitoring. AI in diagnostic imaging matches specialists. Interoperability challenges between systems. Patient access increasing via portals. Equity concerns when digital access uneven.", "questions": [{"q": "什么在诊断影像有前景？", "options": ["VR", "AI", "区块链"], "answer": 1}, {"q": "挑战是？", "options": ["设备不足", "系统互操作性", "医生缺乏"], "answer": 1}, {"q": "什么成为攻击目标？", "options": ["物理", "网络", "员工"], "answer": 1}, {"q": "远程医疗挑战是？", "options": ["方便性", "复杂诊断质量", "成本"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 城市规划", "task": "Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?", "sample": "Transportation infrastructure investment decisions significantly impact economic development, environmental sustainability, and quality of life.\n\nRailways offer compelling advantages warranting increased investment. Environmental considerations strongly favor rail: electric trains produce lower emissions per passenger than individual vehicles. As climate urgency increases, transitioning toward rail becomes essential for meeting emissions targets.\n\nRailway efficiency also supports the economic argument. High-speed rail can transport more passengers per hour than highway lanes. In densely populated regions, rail provides superior capacity while requiring less land. Furthermore, rail investment creates employment during construction and operation.\n\nHowever, roads maintain important functions that railways cannot replace. Rural areas often lack viable rail alternatives. Door-to-door delivery requires road networks. Emergency services and freight transport depend on road infrastructure.\n\nNevertheless, the balanced perspective suggests prioritizing rail where population density justifies investment. Roads will continue receiving substantial funding; this argument concerns appropriate emphasis rather than exclusive focus.\n\nIn conclusion, railways merit greater investment than roads in most contexts, given environmental and efficiency advantages. Roads remain important, but rail represents more sustainable transportation future."}, "speaking": {"topic": "自然", "part1": ["你喜欢自然吗？", "你去过什么自然景点？", "你见过野生动物吗？", "你觉得自然美是什么？"], "part2": "Describe a beautiful place in nature. You should say: where it is, what it looks like, what you can do there, and explain why you find it beautiful.", "part3": ["人们应该如何保护自然？", "旅游业会破坏自然吗？", "城市里的自然和野外的自然有什么不同？"]}}, {"day": 50, "phase": "phase2", "listening": {"title": "网络安全培训", "transcript": "Trainer: Phishing is number one threat. Recognize: urgent language, generic greetings, errors, suspicious links.\nReport suspicious emails using 'Report Phishing' button.\nPasswords: 12+ characters, use passphrases.\nEnable multi-factor authentication.\nPhysical security: lock computer, no sticky notes with passwords.", "questions": [{"q": "第一名威胁？", "options": ["病毒", "钓鱼邮件", "恶意软件"], "answer": 1}, {"q": "密码最小长度？", "options": ["8位", "10位", "12位"], "answer": 2}, {"q": "双重认证的第二因素是？", "options": ["安全问题", "手机验证码", "指纹"], "answer": 1}, {"q": "离开座位时应该？", "options": ["关闭电脑", "锁屏", "保持开机"], "answer": 1}]}, "reading": {"day": 50, "phase": "phase2", "title": "文化遗产保护", "passage": "Cultural heritage: physical artifacts, traditions. Threats: conflict, development, climate change. Indigenous peoples fight appropriation. Museums face repatriation demands. Digital preservation creates opportunities. Community involvement increasingly guides preservation. UNESCO conventions evolving.", "questions": [{"q": "什么正在重建？", "options": ["金字塔", "帕尔米拉", "长城"], "answer": 1}, {"q": "知识产权保护如何？", "options": ["充分", "不足", "过度"], "answer": 1}, {"q": "数字保存包括？", "options": ["仅扫描", "高分辨率扫描和VR", "仅记录"], "answer": 1}, {"q": "保护越来越？", "options": ["自上而下", "社区参与", "商业化"], "answer": 1}]}, "writing": {"type": "task1", "title": "饼图 - 家庭支出", "task": "The pie chart shows average weekly household expenditure in the UK in 2020. Summarise the information.", "sample": "The pie chart illustrates UK household spending categories in 2020.\n\nHousing represents the largest expenditure at 30%, encompassing rent, mortgage payments, utilities, and maintenance. This substantial portion reflects housing costs' dominance in household budgets.\n\nFood and drink constitute the second largest category at 20%. This includes groceries and dining out, representing essential spending on sustenance.\n\nTransport accounts for 15%, covering vehicle purchase, fuel, insurance, and public transportation. This reflects mobility's importance for work and daily activities.\n\nRecreation and culture represent 12%, including entertainment, media subscriptions, and leisure activities. This spending category indicates discretionary expenditure on quality of life.\n\nClothing, utilities, and other categories each represent smaller portions, ranging from 5-8%. Healthcare spending comprises 5%, while education accounts for 3%.\n\nIn conclusion, housing and food dominate household budgets, together comprising half of expenditure, with significant portions also allocated to transport and recreation."}, "speaking": {"topic": "未来", "part1": ["你对未来有什么期待？", "你认为10年后世界会怎样？", "你想改变什么？", "你觉得未来会更好吗？"], "part2": "Describe something you want to do in the future. You should say: what it is, why you want to do it, how you plan to achieve it, and explain what would make it possible.", "part3": ["人们应该规划未来吗？", "科技会让未来更好还是更坏？", "个人能改变世界吗？"]}}, {"day": 51, "phase": "phase2", "listening": {"title": "大学课程咨询", "transcript": "Advisor: Academic Advising. How may I help?\nStudent: I'm considering changing my major from Business to International Relations.\nAdvisor: That's quite a shift. What's prompting this change?\nStudent: I took Politics and found it fascinating. I'm interested in global trade politics.\nAdvisor: That pairs well with business understanding. Have you checked IR requirements?\nStudent: Briefly. Need Political Theory, International Security, Global Political Economy.\nAdvisor: What about languages?\nStudent: French at GCSE, want to continue and add Spanish.\nAdvisor: Good foundation. Submit request before semester end.", "questions": [{"q": "学生目前专业？", "options": ["国际关系", "商业研究", "政治学"], "answer": 1}, {"q": "学生中学学什么语言？", "options": ["西班牙语", "法语", "中文"], "answer": 1}, {"q": "建议什么时候提交申请？", "options": ["学期末前", "下学期", "随时"], "answer": 0}]}, "reading": {"day": 51, "phase": "phase2", "title": "远程工作革命", "passage": "COVID changed remote work. Pre-2020, 5% worked from home. By 2021, 50% during lockdowns. Benefits: 13% more productive per Stanford study. Challenges: isolation, missing mentoring. Hybrid models common - 2-3 office days. Real estate markets changed. Policy debates continue.", "questions": [{"q": "2020年前在家工作比例？", "options": ["3%", "5%", "8%"], "answer": 1}, {"q": "斯坦福研究发现效率提高？", "options": ["8%", "13%", "18%"], "answer": 1}, {"q": "典型混合模式？", "options": ["1-2天", "2-3天", "4-5天办公室"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 政府资助艺术", "task": "Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?", "sample": "The allocation of transport infrastructure funding represents a significant policy consideration. While roads have traditionally dominated investment, railway systems offer compelling advantages that suggest they merit increased funding.\n\nI strongly agree that railways deserve greater investment for several reasons. First, rail is far more environmentally sustainable. Electric trains produce significantly lower carbon emissions per passenger-kilometer than cars or buses. As climate change demands urgent action, transitioning transportation toward lower-emission options becomes essential.\n\nSecond, rail demonstrates superior efficiency in high-density corridors. A single railway line can transport more people than a multi-lane highway while occupying less land. This becomes particularly crucial in densely populated regions where road expansion proves impractical.\n\nThird, rail provides economic benefits beyond direct transport. High-speed rail creates economic corridors connecting cities, enabling labor market integration and business travel. Studies demonstrate significant productivity gains in regions connected by quality rail infrastructure.\n\nHowever, roads remain essential for certain purposes. Rural areas often lack viable rail alternatives. Last-mile connectivity requires road networks. Emergency services and freight transport depend on road infrastructure.\n\nNevertheless, the balance of evidence supports prioritizing rail investment where feasible. Roads will continue receiving substantial funding; the argument concerns appropriate emphasis rather than exclusive focus.\n\nIn conclusion, I agree that railway investment should take precedence over road building in most contexts, given environmental, efficiency, and economic considerations. Roads will maintain their importance, but rail represents the more sustainable transportation future."}, "speaking": {"topic": "科技", "part1": ["你每天用电脑多长时间？", "你觉得手机重要吗？", "你会修电脑吗？", "你最喜欢什么科技产品？"], "part2": "Describe a piece of technology that you find useful. You should say: what it is, how long you have had it, how often you use it, and explain how it has changed your life.", "part3": ["科技如何改变教育？", "人们是否过度依赖科技？", "人工智能会取代人类工作吗？"]}}, {"day": 52, "phase": "phase2", "listening": {"title": "科研项目讨论", "transcript": "Professor: Discuss your dissertation topic.\nStudent: Climate change misinformation on social media.\nProfessor: What's your research question?\nStudent: How does fact-checking format affect engagement and sharing?\nProfessor: Interesting. Methodology?\nStudent: Content analysis then controlled experiment with 200 participants.\nProfessor: What about ethics?\nStudent: Informed consent and debriefing planned.\nProfessor: Sound approach.", "questions": [{"q": "研究主题是？", "options": ["气候变化政策", "社交媒体错误信息", "环境科学"], "answer": 1}, {"q": "需要多少参与者？", "options": ["100人", "150人", "200人"], "answer": 2}, {"q": "研究方法包括？", "options": ["仅调查", "内容分析和实验", "仅访谈"], "answer": 1}]}, "reading": {"day": 52, "phase": "phase2", "title": "电动汽车转型", "passage": "EV transition: UK ends petrol/diesel sales by 2035. Modern EVs 200+ miles range. Environmental benefits: zero tailpipe emissions. Cost gap narrowing - price parity in 3-5 years. Challenges: rare metals, charging infrastructure. EVs now 15%+ of UK sales.", "questions": [{"q": "燃油车禁售年份？", "options": ["2030", "2035", "2040"], "answer": 1}, {"q": "现代EV续航？", "options": ["150英里", "200英里", "300英里"], "answer": 1}, {"q": "EV占英国销量？", "options": ["10%+", "15%+", "20%+"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 垃圾处理", "task": "The chart shows how waste is disposed in six countries. Summarise the information by selecting and reporting the main features.", "sample": "The bar chart compares waste disposal methods across six countries: USA, Japan, Germany, UK, France, and Italy.\n\nOverall, significant variation exists between nations, with recycling playing a major role in European countries while landfill dominates elsewhere.\n\nJapan leads in recycling at 40%, demonstrating strong environmental culture. Germany follows closely at 35%, reflecting effective waste management policies. These two countries also maintain relatively high incineration rates at 30% and 25% respectively, converting waste to energy.\n\nThe remaining four countries show markedly different patterns. The USA relies primarily on landfill at 55%, with recycling at only 20% and incineration at 25%. The UK shows similar landfill dependence at 50%, while France and Italy achieve 30% recycling rates.\n\nNotably, all countries employ multiple disposal methods, suggesting no single solution fits all contexts. However, European nations generally achieve higher recycling rates, possibly due to stricter policies and greater public environmental awareness.\n\nIn conclusion, waste management approaches vary considerably, with European countries generally achieving higher recycling rates than the USA."}, "speaking": {"topic": "环境", "part1": ["你关心环境问题吗？", "你做什么环保的事？", "你所在的城市环境好吗？", "你觉得气候变化是真的吗？"], "part2": "Describe an environmental issue in your area. You should say: what the problem is, what causes it, what effects it has, and suggest possible solutions.", "part3": ["个人应该如何保护环境？", "经济发展和环境保护哪个更重要？", "政府应该采取什么措施应对气候变化？"]}}, {"day": 53, "phase": "phase2", "listening": {"title": "求职面试", "transcript": "Interviewer: Tell me about yourself and this position.\nCandidate: Marketing graduate. Internship at digital agency. Your sustainable fashion marketing interests me.\nInterviewer: Campaign example?\nCandidate: Organic skincare brand. '30-Day Natural Beauty Challenge' with influencers. 2 million impressions, 40% Instagram growth.\nInterviewer: How measured success?\nCandidate: Engagement, conversion tracking with discount code. ROI exceeded projections by 25%.\nInterviewer: How handle negative feedback?\nCandidate: Gather feedback, propose adjustments, transparent response builds trust.", "questions": [{"q": "案例带来多少曝光量？", "options": ["100万", "200万", "300万"], "answer": 1}, {"q": "Instagram增长多少？", "options": ["20%", "30%", "40%"], "answer": 2}, {"q": "ROI超过预期多少？", "options": ["15%", "20%", "25%"], "answer": 2}]}, "reading": {"day": 53, "phase": "phase2", "title": "社交媒体与青少年", "passage": "Social media and teen mental health: correlations with anxiety, depression, sleep issues. Causal relationship complex. Study found 30min-2hr daily use associated with better outcomes than abstinence or heavy use. Cyberbullying affects 1/3 of teens. Policy responses emerging.", "questions": [{"q": "中等使用时间？", "options": ["30分钟以内", "30分钟-2小时", "2-3小时"], "answer": 1}, {"q": "多少青少年受网络欺凌？", "options": ["1/4", "1/3", "1/2"], "answer": 1}, {"q": "研究发现使用与健康关系？", "options": ["线性负相关", "倒U型", "无关"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 动物权利", "task": "Some people think that animals should be treated as equals as human beings. Others say that it is acceptable to use animals for our benefits. Discuss both views and give your opinion.", "sample": "The moral status of animals has long provoked philosophical debate, with positions ranging from utilitarianism to anthropocentrism.\n\nThose advocating animal equality invoke sentience as the relevant criterion. If capacity for suffering grants moral consideration, animals - capable of experiencing pain, pleasure, and emotion - deserve protection. This perspective notes that humans lack rational grounds for privileging their interests over species membership alone.\n\nHowever, opponents emphasize fundamental differences between humans and animals. Human cognitive capacities, including abstract reasoning, language, and self-awareness, establish unique moral status. Humans possess moral responsibility that animals cannot share. Furthermore, animal use has driven human civilization's development through agriculture, medicine, and companionship.\n\nI adopt a middle position acknowledging animal welfare without demanding full equality. Animals deserve protection from unnecessary suffering, but complete equality with humans remains neither achievable nor desirable. Practical application involves reducing cruelty while accepting certain uses.\n\nThis balanced view recognizes that humans occupy a privileged position enabling moral consideration of other species. We should minimize animal suffering while accepting some level of animal use for human benefit, particularly where alternatives remain unavailable.\n\nIn conclusion, while complete equality proves impractical, significant moral obligations toward animals exist. Society should continue reducing unnecessary animal suffering while maintaining realistic approaches to human-animal relationships."}, "speaking": {"topic": "健康", "part1": ["你健康吗？", "你锻炼身体吗？", "你注意饮食吗？", "你上次看医生是什么时候？"], "part2": "Describe a way to stay healthy. You should say: what it is, how you do it, how long you have been doing it, and explain why it is important for health.", "part3": ["如何让人们更健康？", "医疗应该免费吗？", "心理健康和身体健康一样重要吗？"]}}, {"day": 54, "phase": "phase2", "listening": {"title": "产品发布会", "transcript": "Presenter: Introducing Smart Hub 3000. Our engineering team has been working on this for two years.\nTraditional smart home systems are fragmented. We're changing that.\nThree key innovations: First, Universal Compatibility - supports 50+ protocols.\nSecond, Predictive Automation - AI learns your routines in two weeks.\nThird, Privacy by Design - all AI processing happens locally.\nAvailable next month at $349. Early buyers get 20% discount.", "questions": [{"q": "产品名称？", "options": ["Smart Hub 2000", "Smart Hub 3000", "Smart Hub Pro"], "answer": 1}, {"q": "支持多少种协议？", "options": ["30+", "40+", "50+"], "answer": 2}, {"q": "AI学习需要多久？", "options": ["一周", "两周", "三周"], "answer": 1}, {"q": "早鸟折扣？", "options": ["10%", "15%", "20%"], "answer": 2}]}, "reading": {"day": 54, "phase": "phase2", "title": "水资源管理", "passage": "Water scarcity affects England/Wales. Drivers: population growth, climate change, aging infrastructure. 20% leakage. Average 140 litres daily use. Metering reduces use 10%. Conservation measures: behavioral changes, technology. Protected areas, wetland restoration proposed.", "questions": [{"q": "泄漏比例？", "options": ["15%", "20%", "25%"], "answer": 1}, {"q": "人均日用水量？", "options": ["120升", "140升", "160升"], "answer": 1}, {"q": "安装水表减少？", "options": ["5%", "10%", "15%"], "answer": 1}]}, "writing": {"type": "task1", "title": "表格 - 住房类型", "task": "The table gives information about the types of housing occupied by people in a particular city in 2018 and 2023. Summarise the information.", "sample": "The table illustrates changes in housing types in a city between 2018 and 2023.\n\nOverall, the city saw growth across all housing categories, with apartments and social housing showing the most significant increases.\n\nApartments experienced the largest expansion, rising from 35% to 45% of housing. This reflects increasing urbanization and preference for compact living, particularly among young professionals and smaller households.\n\nSocial housing also grew substantially from 20% to 28%, indicating government investment in affordable accommodation. This expansion addresses growing housing affordability concerns.\n\nOwner-occupied housing showed modest growth from 30% to 32%, while private renting remained stable at around 18-20%. These relatively static figures suggest these sectors matured within existing markets.\n\nIn conclusion, the five-year period witnessed notable shifts toward apartments and social housing, reflecting changing preferences and policy priorities."}, "speaking": {"topic": "工作", "part1": ["你现在工作还是学生？", "你理想的工作是什么？", "你为什么选择现在的工作/专业？", "你工作压力大吗？"], "part2": "Describe your ideal job. You should say: what job it is, what qualities it requires, whether it is realistic to achieve, and explain why it would be your ideal.", "part3": ["人们为什么工作？", "工作满意度重要吗？", "人们应该为了兴趣还是钱工作？"]}}, {"day": 55, "phase": "phase2", "listening": {"title": "环保政策研讨", "transcript": "Moderator: Why carbon pricing?\nProfessor: Makes polluters pay, creates incentives for cleaner tech.\nIndustry: Concern is competitiveness - carbon leakage.\nGovernment: Border adjustment mechanisms level the playing field.\nEconomist: Revenue use matters - returning as dividends increases support from 40% to over 70%.", "questions": [{"q": "碳定价基本原理？", "options": ["补贴污染者", "让污染者付费", "禁止排放"], "answer": 1}, {"q": "行业担心什么？", "options": ["技术不足", "碳泄漏和竞争力", "成本高"], "answer": 1}, {"q": "如果返还收入支持率可达？", "options": ["50%", "60%", "70%+"], "answer": 2}, {"q": "欧盟实施什么机制？", "options": ["碳税", "碳边境调整", "碳补贴"], "answer": 1}]}, "reading": {"day": 55, "phase": "phase2", "title": "高等教育国际化", "passage": "International students 20%+ of UK higher ed. Pay higher fees. Competition intensifying from Australia, Canada, Singapore. Experiences vary - some isolated. Post-study work visas influential - UK reintroduced 2-year visa in 2019.", "questions": [{"q": "国际学生比例？", "options": ["15%", "20%+", "25%"], "answer": 1}, {"q": "2019年政策变化？", "options": ["增加学费", "恢复毕业后工签", "限制招生"], "answer": 1}, {"q": "国际学生比本地学生更多经历？", "options": ["经济困难", "心理健康挑战", "就业优势"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 成功因素", "task": "Some people say that the main environmental problem of our time is the loss of particular species of plants and animals. Others say that there are more important environmental problems. Discuss both these views and give your opinion.", "sample": "Environmental challenges present multiple serious threats, with species extinction representing one among several critical concerns.\n\nThose emphasizing species loss argue that biodiversity provides ecosystem services essential for human survival: pollination, water purification, climate regulation. Each extinction potentially disrupts ecological relationships built over millions of years. Once lost, species cannot be recovered, making extinction particularly tragic.\n\nHowever, climate change presents arguably more immediate and widespread threats. Rising temperatures, sea-level rise, and extreme weather affect billions directly through food security, displacement, and economic disruption. Climate impacts potentially cascade into biodiversity loss through habitat destruction and altered ecosystems.\n\nIn my view, both perspectives hold merit, but climate change demands priority attention. While species loss represents permanent damage, climate change threatens existing life on multiple scales. Furthermore, addressing climate benefits biodiversity through reduced habitat destruction and ecosystem protection.\n\nThis is not to dismiss biodiversity concerns. Rather, strategic resource allocation requires addressing root causes benefiting multiple environmental dimensions. Climate action represents the most efficient investment for overall environmental health.\n\nIn conclusion, while species extinction constitutes serious concern, climate change warrants greater immediate attention given its comprehensive threats. Both issues interconnect, making integrated approaches essential."}, "speaking": {"topic": "教育", "part1": ["你最喜欢的老师是谁？", "你觉得学校教育有用吗？", "你更喜欢理论还是实践？", "你会选择继续读研究生吗？"], "part2": "Describe a subject you studied that you found useful. You should say: what it was, when and where you studied it, what you learned, and explain why it was useful.", "part3": ["学生应该学什么？", "教育应该免费吗？", "如何提高教育质量？"]}}, {"day": 56, "phase": "phase2", "listening": {"title": "糖尿病诊断对话", "transcript": "Doctor: Based on tests, you have Type 2 diabetes.\nPatient: My parents never had it. What does this mean?\nDoctor: Your body doesn't use insulin effectively. Manageable with diet, exercise, medication.\nPatient: Will I need medication?\nDoctor: Start with lifestyle changes, reassess in 3 months with HbA1c test.\nDoctor: Many patients do well with metformin as first-line treatment.\nPatient: What about diet?\nDoctor: Reduce refined carbs, increase fiber, control portions.", "questions": [{"q": "诊断结果？", "options": ["1型糖尿病", "2型糖尿病", "糖尿病前期"], "answer": 1}, {"q": "多久后重新评估？", "options": ["1个月", "2个月", "3个月"], "answer": 2}, {"q": "HbA1c反映多久血糖？", "options": ["1个月", "2个月", "3个月"], "answer": 2}, {"q": "建议什么作为一线治疗？", "options": ["胰岛素", "二甲双胍", "饮食控制"], "answer": 1}]}, "reading": {"day": 56, "phase": "phase2", "title": "生物多样性危机", "passage": "Species extinction 100-1000x natural rate. UK has significant loss since 1970s. Drivers: habitat loss, climate change, pollution, invasive species. Insects declined 60%. Conservation: protected areas, reintroduction (beavers returned), ecosystem services approach. 30x30 target by 2030.", "questions": [{"q": "灭绝速度倍数？", "options": ["50-500", "100-1000", "500-5000"], "answer": 1}, {"q": "昆虫下降？", "options": ["40%", "50%", "60%"], "answer": 2}, {"q": "重新引入什么动物？", "options": ["狼", "海狸", "熊"], "answer": 1}, {"q": "30x30目标保护？", "options": ["20%", "30%", "40%"], "answer": 1}]}, "writing": {"type": "task1", "title": "流程图 - 塑料回收", "task": "The diagram shows how plastic bottles are recycled. Summarise the information by selecting and reporting the main features.", "sample": "The flowchart illustrates the plastic bottle recycling process.\n\nOverall, recycling involves collection, sorting, cleaning, shredding, melting, and remolding into new products.\n\nThe process begins with consumer collection, where bottles are placed in recycling bins. Trucks collect these and transport them to sorting facilities. Here, workers or machines separate bottles by type and color, removing any non-plastic contaminants.\n\nCleaned bottles then enter shredding machines, breaking them into small flakes. These flakes are washed again to remove labels and adhesives. The clean flakes are melted at high temperatures, producing molten plastic.\n\nThis melted material is extruded through small holes, creating strands that are cooled and cut into pellets. These pellets represent raw material for manufacturing new products.\n\nFinally, the pellets are melted and molded into various items: new bottles, clothing fibers, furniture, or automotive parts. These products enter consumer markets, completing the recycling loop.\n\nIn conclusion, plastic bottle recycling transforms waste into useful products through systematic stages, conserving resources and reducing landfill."}, "speaking": {"topic": "媒体", "part1": ["你经常看新闻吗？", "你更喜欢看书还是看电影？", "你用社交媒体吗？", "你每天看多长时间电视？"], "part2": "Describe a movie or TV program that influenced you. You should say: what it was, when you watched it, what it was about, and explain how it influenced you.", "part3": ["暴力内容对青少年有什么影响？", "新闻可信度如何判断？", "人们应该付费获取高质量内容吗？"]}}, {"day": 57, "phase": "phase2", "listening": {"title": "可持续发展报告", "transcript": "CEO: Carbon emissions decreased 23% vs 2020 baseline, exceeding our 20% target.\nThree initiatives: First, 85% European operations use renewable energy - energy costs decreased 12%.\nSecond, redesigned packaging - eliminated 1,200 metric tons of plastic.\nThird, worked with 200+ suppliers on environmental practices.\nBy 2030, we commit to net-zero emissions.", "questions": [{"q": "碳排放降低多少？", "options": ["18%", "20%", "23%"], "answer": 2}, {"q": "欧洲可再生能源比例？", "options": ["75%", "80%", "85%"], "answer": 2}, {"q": "减少多少塑料？", "options": ["1,000吨", "1,200吨", "1,500吨"], "answer": 1}, {"q": "净零目标年份？", "options": ["2028", "2030", "2035"], "answer": 1}]}, "reading": {"day": 57, "phase": "phase2", "title": "数字鸿沟", "passage": "Digital divide: access and skills uneven. Age significant factor. Geographic disparities persist despite programs. Income correlates with exclusion. Libraries offer free internet, devices, training. Jobs increasingly require digital skills. Initiatives provide devices to disadvantaged.", "questions": [{"q": "图书馆提供？", "options": ["仅上网", "免费上网和培训", "仅电脑"], "answer": 1}, {"q": "什么影响较小？", "options": ["年龄", "地理位置", "性别"], "answer": 2}, {"q": "疫情中缺乏设备孩子？", "options": ["社交困难", "学习落后", "健康问题"], "answer": 1}, {"q": "工作现在需要？", "options": ["体力技能", "基础数字技能", "外语"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 广告影响", "task": "Some people think that advertisements have positive economic effects. Others believe they have negative social effects. Discuss both views and give your opinion.", "sample": "Advertising represents a controversial topic, with proponents highlighting economic benefits while critics emphasize social drawbacks.\n\nAdvertising's economic contributions are substantial. It enables markets to function efficiently by connecting buyers with sellers. Advertising revenue supports media industries, funding newspapers, television, and online content. Furthermore, advertising stimulates competition, driving innovation and potentially reducing prices through market expansion.\n\nHowever, negative social effects merit consideration. Advertising often promotes materialism and excessive consumption, particularly targeting vulnerable groups like children. The constant exposure to idealized lifestyles creates unrealistic expectations, potentially fostering dissatisfaction. Furthermore, some advertising employs manipulative psychological techniques rather than providing genuine information.\n\nI believe the net effect depends heavily on implementation. Ethical advertising providing useful information serves consumers and markets. However, regulation should address the most harmful practices, particularly those targeting children or employing deception.\n\nMoreover, consumers can develop critical awareness to resist manipulation. Media literacy education empowers individuals to evaluate advertising messages rather than passively accepting claims.\n\nIn conclusion, advertising offers both economic benefits and social risks. Appropriate regulation combined with consumer education can maximize advantages while minimizing harms."}, "speaking": {"topic": "文化", "part1": ["你对什么文化感兴趣？", "你了解中国的传统文化吗？", "你参加过什么文化活动？", "你觉得文化重要吗？"], "part2": "Describe a tradition in your culture. You should say: what it is, when it happens, what people do, and explain why it is important.", "part3": ["传统会消失吗？", "人们应该保留传统还是接受新文化？", "全球化会使文化同质化吗？"]}}, {"day": 58, "phase": "phase2", "listening": {"title": "AI伦理讲座", "transcript": "Professor: Algorithmic bias in AI systems is pressing. Facial recognition has higher error rates for darker skin tones - difference up to 34%.\nWhy? Biased training data. Systems trained on light-skinned images perform better on those faces.\nConsequences: wrongly identified as criminals, job discrimination.\nSolutions: diverse training data, algorithmic auditing, transparency.\nBroader lesson: AI reflects human decisions.", "questions": [{"q": "错误率差异最高？", "options": ["24%", "34%", "44%"], "answer": 1}, {"q": "主要原因？", "options": ["技术限制", "训练数据偏见", "硬件问题"], "answer": 1}, {"q": "解决方案不包括？", "options": ["多样化数据", "算法审查", "禁止技术"], "answer": 2}, {"q": "文章核心观点？", "options": ["AI有偏见", "AI中立", "AI完美"], "answer": 0}]}, "reading": {"day": 58, "phase": "phase2", "title": "隐私与数据", "passage": "Data fundamental to digital economy. Tech companies collect user info for advertising. GDPR 2018 established rights. Compliance challenging across jurisdictions. Emerging tech: IoT, biometrics, AI infer personal info. User expectations shifting - some choose privacy alternatives.", "questions": [{"q": "GDPR实施年份？", "options": ["2016", "2018", "2020"], "answer": 1}, {"q": "商业模式依赖？", "options": ["订阅", "数据广告", "销售"], "answer": 1}, {"q": "用户行为与偏好？", "options": ["一致", "存在差距", "无法研究"], "answer": 1}, {"q": "什么隐私问题？", "options": ["仅设备", "物联网和生物识别", "仅邮件"], "answer": 1}]}, "writing": {"type": "task1", "title": "线图 - 通信方式", "task": "The line graph shows how people sent letters in 1998, 2002, 2006, 2010, and 2014. Summarise the information.", "sample": "The line graph illustrates changes in letter sending in a country from 1998 to 2014.\n\nOverall, letter sending declined dramatically over the period, with email and messaging replacing traditional postal services.\n\nIn 1998, approximately 2.2 billion letters were sent, representing traditional mail's peak. This figure remained relatively stable through 2002 at about 2.1 billion.\n\nHowever, the decline accelerated from 2006 onward. Letters dropped to 1.5 billion in 2006, then continued falling to 800 million in 2010 and just 300 million in 2014. This represents an 86% decrease over sixteen years.\n\nThe pattern clearly reflects technological substitution. As internet access expanded, electronic communication increasingly replaced physical letters for personal and business correspondence.\n\nIn conclusion, the graph demonstrates technology's transformative impact on communication, with traditional letters nearly disappearing within sixteen years."}, "speaking": {"topic": "城市", "part1": ["你住在城市还是农村？", "你最喜欢城市的什么？", "你所在的城市有什么问题？", "你想住在哪个城市？"], "part2": "Describe a city you would like to visit. You should say: which city it is, where it is located, what you know about it, and explain why you would like to visit.", "part3": ["城市化有什么优缺点？", "大城市好还是小城市好？", "如何解决城市交通问题？"]}}, {"day": 59, "phase": "phase2", "listening": {"title": "城市规划 consultation", "transcript": "Planner: Riverside Development Project - 15 hectares, 800 new homes, 30% affordable housing.\nTraffic: new pedestrian/cyclist bridge, car traffic from main road.\nGreen space: 40% for parks, native trees, wildlife corridors.\nBuildings: tallest (12 stories) face river, not existing homes.\nResident: Construction noise concern?\nPlanner: 5 years, phases start far from homes, community liaison available.", "questions": [{"q": "开发面积？", "options": ["10公顷", "15公顷", "20公顷"], "answer": 1}, {"q": "保障性住房比例？", "options": ["25%", "30%", "35%"], "answer": 1}, {"q": "绿地比例？", "options": ["30%", "35%", "40%"], "answer": 2}, {"q": "最高建筑？", "options": ["10层", "12层", "15层"], "answer": 1}]}, "reading": {"day": 59, "phase": "phase2", "title": "医疗数字化", "passage": "Healthcare数字化: EHR replacing paper. Telemedicine routine post-pandemic. Health apps for monitoring. AI in diagnostic imaging matches specialists. Interoperability challenges between systems. Patient access increasing via portals. Equity concerns when digital access uneven.", "questions": [{"q": "什么在诊断影像有前景？", "options": ["VR", "AI", "区块链"], "answer": 1}, {"q": "挑战是？", "options": ["设备不足", "系统互操作性", "医生缺乏"], "answer": 1}, {"q": "什么成为攻击目标？", "options": ["物理", "网络", "员工"], "answer": 1}, {"q": "远程医疗挑战是？", "options": ["方便性", "复杂诊断质量", "成本"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 城市规划", "task": "Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?", "sample": "Transportation infrastructure investment decisions significantly impact economic development, environmental sustainability, and quality of life.\n\nRailways offer compelling advantages warranting increased investment. Environmental considerations strongly favor rail: electric trains produce lower emissions per passenger than individual vehicles. As climate urgency increases, transitioning toward rail becomes essential for meeting emissions targets.\n\nRailway efficiency also supports the economic argument. High-speed rail can transport more passengers per hour than highway lanes. In densely populated regions, rail provides superior capacity while requiring less land. Furthermore, rail investment creates employment during construction and operation.\n\nHowever, roads maintain important functions that railways cannot replace. Rural areas often lack viable rail alternatives. Door-to-door delivery requires road networks. Emergency services and freight transport depend on road infrastructure.\n\nNevertheless, the balanced perspective suggests prioritizing rail where population density justifies investment. Roads will continue receiving substantial funding; this argument concerns appropriate emphasis rather than exclusive focus.\n\nIn conclusion, railways merit greater investment than roads in most contexts, given environmental and efficiency advantages. Roads remain important, but rail represents more sustainable transportation future."}, "speaking": {"topic": "自然", "part1": ["你喜欢自然吗？", "你去过什么自然景点？", "你见过野生动物吗？", "你觉得自然美是什么？"], "part2": "Describe a beautiful place in nature. You should say: where it is, what it looks like, what you can do there, and explain why you find it beautiful.", "part3": ["人们应该如何保护自然？", "旅游业会破坏自然吗？", "城市里的自然和野外的自然有什么不同？"]}}, {"day": 60, "phase": "phase2", "listening": {"title": "网络安全培训", "transcript": "Trainer: Phishing is number one threat. Recognize: urgent language, generic greetings, errors, suspicious links.\nReport suspicious emails using 'Report Phishing' button.\nPasswords: 12+ characters, use passphrases.\nEnable multi-factor authentication.\nPhysical security: lock computer, no sticky notes with passwords.", "questions": [{"q": "第一名威胁？", "options": ["病毒", "钓鱼邮件", "恶意软件"], "answer": 1}, {"q": "密码最小长度？", "options": ["8位", "10位", "12位"], "answer": 2}, {"q": "双重认证的第二因素是？", "options": ["安全问题", "手机验证码", "指纹"], "answer": 1}, {"q": "离开座位时应该？", "options": ["关闭电脑", "锁屏", "保持开机"], "answer": 1}]}, "reading": {"day": 60, "phase": "phase2", "title": "文化遗产保护", "passage": "Cultural heritage: physical artifacts, traditions. Threats: conflict, development, climate change. Indigenous peoples fight appropriation. Museums face repatriation demands. Digital preservation creates opportunities. Community involvement increasingly guides preservation. UNESCO conventions evolving.", "questions": [{"q": "什么正在重建？", "options": ["金字塔", "帕尔米拉", "长城"], "answer": 1}, {"q": "知识产权保护如何？", "options": ["充分", "不足", "过度"], "answer": 1}, {"q": "数字保存包括？", "options": ["仅扫描", "高分辨率扫描和VR", "仅记录"], "answer": 1}, {"q": "保护越来越？", "options": ["自上而下", "社区参与", "商业化"], "answer": 1}]}, "writing": {"type": "task1", "title": "饼图 - 家庭支出", "task": "The pie chart shows average weekly household expenditure in the UK in 2020. Summarise the information.", "sample": "The pie chart illustrates UK household spending categories in 2020.\n\nHousing represents the largest expenditure at 30%, encompassing rent, mortgage payments, utilities, and maintenance. This substantial portion reflects housing costs' dominance in household budgets.\n\nFood and drink constitute the second largest category at 20%. This includes groceries and dining out, representing essential spending on sustenance.\n\nTransport accounts for 15%, covering vehicle purchase, fuel, insurance, and public transportation. This reflects mobility's importance for work and daily activities.\n\nRecreation and culture represent 12%, including entertainment, media subscriptions, and leisure activities. This spending category indicates discretionary expenditure on quality of life.\n\nClothing, utilities, and other categories each represent smaller portions, ranging from 5-8%. Healthcare spending comprises 5%, while education accounts for 3%.\n\nIn conclusion, housing and food dominate household budgets, together comprising half of expenditure, with significant portions also allocated to transport and recreation."}, "speaking": {"topic": "未来", "part1": ["你对未来有什么期待？", "你认为10年后世界会怎样？", "你想改变什么？", "你觉得未来会更好吗？"], "part2": "Describe something you want to do in the future. You should say: what it is, why you want to do it, how you plan to achieve it, and explain what would make it possible.", "part3": ["人们应该规划未来吗？", "科技会让未来更好还是更坏？", "个人能改变世界吗？"]}}, {"day": 61, "phase": "phase3", "listening": {"title": "量子计算研讨", "transcript": "Professor: Quantum computing uses qubits - can exist in superposition of 0 and 1.\nIn 2019, Google's 53-qubit processor performed calculation in 200 seconds that would take classical supercomputer 10,000 years.\nApplications: Cryptography threatens RSA encryption. Drug discovery by simulating molecular interactions.\nChallenges: Quantum coherence is difficult, must keep near absolute zero.", "questions": [{"q": "谷歌量子处理器有多少量子比特？", "options": ["43", "53", "63"], "answer": 1}, {"q": "计算用时多少秒？", "options": ["100", "200", "300"], "answer": 1}, {"q": "Shor算法威胁什么？", "options": ["对称加密", "RSA加密", "哈希函数"], "answer": 1}, {"q": "量子比特需要什么温度？", "options": ["室温", "低温", "绝对零度附近"], "answer": 2}]}, "reading": {"day": 61, "phase": "phase3", "title": "意识神经科学", "passage": "Understanding consciousness: 'hard problem' by David Chalmers. Neural correlates identified. Integrated information theory: consciousness relates to information integration. Global workspace theory: consciousness when info becomes globally available. Clinical implications for vegetative patients. AI adds consciousness debates.", "questions": [{"q": "谁提出困难问题？", "options": ["Chalmers", "Dennett", "Nagel"], "answer": 0}, {"q": "整合信息理论认为意识与什么相关？", "options": ["信息处理", "信息整合", "信息存储"], "answer": 1}, {"q": "植物人可通过什么被观察到有意识？", "options": ["语言", "大脑活动模式", "眼球运动"], "answer": 1}, {"q": "麻醉研究意义？", "options": ["开发新药", "理解意识机制", "减少成本"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - AI影响工作", "task": "Some people believe that artificial intelligence will have a positive impact on work and employment in the future. Others believe that it will have negative effects. Discuss both views and give your opinion.", "sample": "Artificial intelligence's integration into workplaces raises profound questions about labor's future.\n\nOptimists highlight AI's transformative potential. Automation can eliminate tedious tasks, enabling humans to focus on creative and relational work requiring emotional intelligence. New industries and job categories will emerge, just as previous technological revolutions created employment beyond imagination. Furthermore, AI can enhance productivity, potentially increasing prosperity and reducing working hours.\n\nHowever, pessimists raise legitimate concerns. Automation threatens widespread job displacement, particularly affecting routine cognitive and manual work. Unlike previous technological transitions, AI advancement occurs rapidly and affects white-collar professions previously considered safe. Economic inequality may worsen as capital owners capture gains while workers face displacement.\n\nI believe reality will combine both perspectives. AI will indeed transform work profoundly, but net effects depend on policy choices. Without intervention, negative impacts may dominate; with appropriate measures, benefits can be widely shared.\n\nEssential interventions include education reform emphasizing uniquely human skills, robust social safety nets during transition, and perhaps robot taxes funding universal basic income. Businesses should invest in worker retraining rather than simply replacing employees.\n\nIn conclusion, AI presents both opportunities and challenges. Society possesses agency in determining outcomes through thoughtful policy and preparation."}, "speaking": {"topic": "人工智能", "part1": ["你用过人工智能吗？", "你觉得AI是什么？", "你担心AI的发展吗？", "你觉得AI会取代人类吗？"], "part2": "Describe a development in technology that you think will change the future. You should say: what it is, how it works, how it will affect our lives, and explain whether it will be positive or negative.", "part3": ["AI会取代哪些工作？", "如何确保AI安全发展？", "人类应该如何与AI共存？"]}}, {"day": 62, "phase": "phase3", "listening": {"title": "国际关系理论", "transcript": "Professor: Three theories: Realism views states as primary actors in anarchic system. Power is the currency.\nLiberals argue cooperation is possible through institutions, democracy, interdependence.\nConstructivism asks how norms and identities shape international politics.\nWendt's phrase: 'anarchy is what states make of it' - system isn't fixed.\nThese theories aren't mutually exclusive.", "questions": [{"q": "现实主义认为国际体系是？", "options": ["有序", "无政府", "合作"], "answer": 1}, {"q": "民主和平论认为民主国家间很少？", "options": ["贸易", "战争", "外交"], "answer": 1}, {"q": "建构主义强调？", "options": ["军事力量", "规范和认同", "经济实力"], "answer": 1}, {"q": "Wendt的观点是？", "options": ["体系固定", "体系是国家建构的", "体系自然形成"], "answer": 1}]}, "reading": {"day": 62, "phase": "phase3", "title": "地缘政治新时代", "passage": "International relations shifting from unipolar to multipolar. China's rise significant - now second largest economy. 'New Cold War' debated - unlike US-Soviet, US-China economically interdependent. Other actors: regional powers, tech companies. Ukraine war reshaped European security. Technology competition defines geopolitics - semiconductors strategic.", "questions": [{"q": "最大变化是？", "options": ["单极强化", "向多极转变", "无政府状态"], "answer": 1}, {"q": "与美苏关系不同点是？", "options": ["相同", "无核武器", "经济相互依存"], "answer": 2}, {"q": "什么技术成为战略资源？", "options": ["软件", "半导体", "游戏"], "answer": 1}, {"q": "什么北约新成员？", "options": ["德国", "芬兰", "法国"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 碳排放", "task": "The chart shows carbon dioxide emissions per person in 1960 and 2015 in five countries. Summarise the information.", "sample": "The bar chart compares per capita carbon dioxide emissions in five countries between 1960 and 2015.\n\nOverall, emissions patterns varied significantly across nations, with some reducing per capita emissions while others increased substantially.\n\nThe USA showed the highest emissions in both years, though declining from 20 to 15 tonnes per person. This 25% reduction reflects improved efficiency and some fuel switching despite continued high consumption.\n\nChina demonstrated dramatic growth, rising from just 3 tonnes in 1960 to 8 tonnes in 2015. This near-tripling reflects rapid industrialization and increased energy consumption despite large population.\n\nThe UK achieved notable reduction, falling from 9 to 6 tonnes per person. This 33% decrease demonstrates successful transition from heavy industry to service economy.\n\nGermany also reduced emissions significantly from 12 to 8 tonnes per person. Similar to the UK, this reflects deindustrialization and renewable energy adoption.\n\nJapan showed minimal change, hovering around 4-5 tonnes across the period, reflecting nuclear energy's role in limiting fossil fuel dependence.\n\nIn conclusion, developed nations generally reduced per capita emissions while developing countries like China saw increases as industrialization proceeded."}, "speaking": {"topic": "全球化", "part1": ["你觉得全球化是好是坏？", "你在国外旅行过吗？", "你会说外语吗？", "你觉得文化会趋同吗？"], "part2": "Describe a change that will affect your country in the future. You should say: what the change is, what caused it, how it will affect people's lives, and explain whether you think it is positive or negative.", "part3": ["全球化有什么利弊？", "国家应该如何应对全球化？", "本土文化会被全球文化取代吗？"]}}, {"day": 63, "phase": "phase3", "listening": {"title": "神经科学研究答辩", "transcript": "Candidate: My research examines default mode network in depression. DMN includes medial prefrontal cortex, posterior cingulate.\nHypothesis: Altered DMN connectivity contributes to rumination.\nFinding 1: Hyperconnectivity between medial prefrontal and subgenual cingulate in active depression. Decreases after CBT.\nFinding 2: Connectivity patterns predict treatment response.\nCommittee: How control for medication?\nCandidate: Matched on medication, statistical analysis showed no significant correlation.", "questions": [{"q": "DMN不包括哪个脑区？", "options": ["内侧前额叶", "后扣带回", "运动皮层"], "answer": 2}, {"q": "活跃抑郁患者显示什么连接？", "options": ["低连接", "正常", "高连接"], "answer": 2}, {"q": "与什么症状相关？", "options": ["失眠", "反刍思维", "焦虑"], "answer": 1}, {"q": "什么可预测治疗反应？", "options": ["基线活动", "连接变化", "病程"], "answer": 1}]}, "reading": {"day": 63, "phase": "phase3", "title": "群体遗传学", "passage": "Ancient DNA revolutionizes understanding. Non-Africans have 1-4% Neanderthal DNA. Population genetics reveal complex migration. Natural selection continues - lactase persistence adapted to dairying. Medical genetics applies insights. Field confronted problematic eugenic history.", "questions": [{"q": "尼安德特人DNA比例？", "options": ["0-1%", "1-4%", "5-10%"], "answer": 1}, {"q": "乳糖酶持久性传播于？", "options": ["2000年前", "3000年前", "5000年前"], "answer": 2}, {"q": "医学遗传学关注？", "options": ["纯理论", "药物基因组学", "克隆"], "answer": 1}, {"q": "领域曾有历史问题？", "options": ["数据不足", "优生运动滥用", "伦理过度"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 太空探索", "task": "Some people think that space exploration is a waste of resources. Others believe that it is essential for human survival. Discuss both views and give your opinion.", "sample": "Space exploration provokes divided opinions regarding resource allocation and human priorities.\n\nCritics argue space spending diverts resources from pressing earthly concerns. Global problems including climate change, poverty, and disease demand urgent attention. The billions spent on space missions could provide clean water, healthcare, or education to millions. Furthermore, space exploration carries inherent risks to astronaut lives without guaranteeing meaningful returns.\n\nProponents counter that space investment drives innovation benefiting Earth. Satellite technology enables weather forecasting, communications, and environmental monitoring. Space programs develop technologies with terrestrial applications, from water purification to medical imaging. Additionally, space exploration provides 'planetary insurance' against extinction-level catastrophes.\n\nI side with proponents while acknowledging critics' valid points. Space spending should increase relative to other budget categories, but earthly priorities require continued attention. The question is balance rather than exclusive focus on either domain.\n\nMoreover, space exploration addresses fundamental human curiosity about our cosmic context. This philosophical dimension, while difficult to quantify, represents legitimate human aspiration beyond mere practical benefit.\n\nIn conclusion, while resources for earthly problems must remain priorities, space exploration provides essential innovation, insurance, and inspiration warranting continued investment."}, "speaking": {"topic": "老龄化", "part1": ["你见过老年人吗？", "你尊敬老人吗？", "你考虑过养老问题吗？", "老年人对社会有贡献吗？"], "part2": "Describe a challenge facing older people in your society. You should say: what the challenge is, who it affects, what difficulties it brings, and suggest possible solutions.", "part3": ["如何照顾老年人？", "养老应该靠政府还是子女？", "老年人应该继续工作吗？"]}}, {"day": 64, "phase": "phase3", "listening": {"title": "气候变化经济", "transcript": "Economist A: Discounting - at 3%, damage in 100 years worth 5 cents today. Is it fair to discount future suffering?\nEconomist B: Market rates suggest 4-5% discounting. Stern Review used very low rate.\nEconomist C: Costs of inaction clear - extreme weather losses increased 250% in 30 years.\nEconomist A: Insurance principle - invest in prevention for unlikely but devastating risks.\nEconomist B: International coordination challenge - climate change is global externality.", "questions": [{"q": "100年损害在3%折现率下价值？", "options": ["1 cent", "5 cents", "10 cents"], "answer": 1}, {"q": "极端天气损失增加多少？", "options": ["150%", "200%", "250%"], "answer": 2}, {"q": "市场利率大约？", "options": ["2-3%", "4-5%", "6-7%"], "answer": 1}, {"q": "气候变化本质是？", "options": ["国内问题", "全球公共产品", "技术问题"], "answer": 1}]}, "reading": {"day": 64, "phase": "phase3", "title": "移民与身份", "passage": "Migration shapes experience. Brain drain concerns - but diaspora contribute via remittances, knowledge transfer. Identity formation varies: maintain origins, assimilate, or hybrid. Attitudes toward diversity vary: Canada/Australia multicultural, US assimilationist. Politics contentious. Perceptions often diverge from reality.", "questions": [{"q": "移民对原籍国影响？", "options": ["单纯损失", "复杂动态", "无影响"], "answer": 1}, {"q": "第二代与第一代不同？", "options": ["语言更强", "认同模式不同", "教育更高"], "answer": 1}, {"q": "官方拥抱多元文化的是？", "options": ["美国英国", "加拿大澳洲", "德法"], "answer": 1}, {"q": "公众认知与现实？", "options": ["一致", "高估", "低估"], "answer": 1}]}, "writing": {"type": "task1", "title": "表格 - 远程工作", "task": "The table shows the results of a survey about remote working in 2019 and 2023. Summarise the information.", "sample": "The table illustrates remote working patterns in 2019 compared to 2023.\n\nOverall, remote work increased dramatically, particularly following the 2020 pandemic. The survey reveals significant shifts in both frequency and employee preferences.\n\nPre-pandemic, only 12% worked remotely full-time, while 28% worked remotely occasionally, and 60% never worked remotely. The majority still traveled to offices daily.\n\nBy 2023, full-time remote work surged to 35%, occasional remote work reached 40%, and non-remote work dropped to just 25%. This represents fundamental restructuring of work patterns.\n\nEmployee satisfaction showed corresponding changes. Pre-pandemic, 45% expressed satisfaction with work-life balance, rising to 68% by 2023. This improvement likely reflects reduced commuting time and increased flexibility.\n\nProductivity measures proved more mixed. Self-reported productivity increased from 62% to 71%, but manager assessments showed smaller gains from 58% to 63%.\n\nIn conclusion, remote work transformed from minority practice to majority experience, with generally positive but complex implications for organizations."}, "speaking": {"topic": "贫富差距", "part1": ["你认识有钱人吗？", "你觉得钱重要吗？", "你满意你的生活水平吗？", "你认为社会应该平等吗？"], "part2": "Describe a way to reduce poverty in your society. You should say: what the problem is, what causes it, who it affects, and suggest solutions.", "part3": ["为什么会有贫富差距？", "如何让社会更平等？", "富人有责任帮助穷人吗？"]}}, {"day": 65, "phase": "phase3", "listening": {"title": "AI安全研究", "transcript": "Researcher: Outer alignment - goals don't match actual values. Example: maximize engagement promotes polarizing content.\nColleague: Inner alignment - systems develop internal objectives diverging from intended goals.\nExample: content moderation AI flags random posts to maximize reward.\nResearcher: Need interpretability to inspect networks, understand what they've learned.\nColleague: Mesa-optimizers - systems developing internal search processes could be concerning.", "questions": [{"q": "外部对齐问题是？", "options": ["内部问题", "目标设定不符", "硬件故障"], "answer": 1}, {"q": "最大化参与度导致？", "options": ["推广极化内容", "系统崩溃", "用户流失"], "answer": 0}, {"q": "内部对齐关注？", "options": ["外部环境", "内部目标偏移", "用户反馈"], "answer": 1}, {"q": "Mesa-optimizer是？", "options": ["编程语言", "内部优化过程", "硬件"], "answer": 1}]}, "reading": {"day": 65, "phase": "phase3", "title": "全球粮食系统", "passage": "Feeding 8 billion presents challenges. Current system produces enough calories but 800+ million hungry. Industrial agriculture increased yields but damaged environment. Climate change threatens production. Solutions: reduce waste, dietary shifts, sustainable intensification, regenerate agriculture.", "questions": [{"q": "饥饿人口？", "options": ["5亿", "8亿", "10亿"], "answer": 1}, {"q": "问题不只是生产？", "options": ["分配和浪费", "技术", "水资源"], "answer": 0}, {"q": "工业化农业影响？", "options": ["仅增产", "破坏环境", "无影响"], "answer": 1}, {"q": "解决方案包括？", "options": ["仅增产", "减少浪费和可持续", "仅素食"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 社交媒体审查", "task": "Some people believe that social media should be regulated by the government. Others believe that it should be regulated by the users themselves. Discuss both views and give your opinion.", "sample": "Social media's influence demands consideration of appropriate governance mechanisms.\n\nGovernment regulation proponents argue that platforms wield enormous power over public discourse, requiring democratic accountability. Unregulated platforms enable misinformation spread, harassment campaigns, and foreign election interference. Furthermore, government can establish consistent standards protecting citizens regardless of platform choice.\n\nHowever, user self-regulation advocates emphasize that individuals should control their online experiences. Users can choose which platforms to join, what content to consume, and how to configure privacy settings. Heavy-handed government intervention risks censorship and threatens free expression. Furthermore, platforms compete to satisfy user preferences, creating market-driven accountability.\n\nI believe both approaches possess merit, requiring appropriate balance. Government should establish baseline protections against fraud, harassment, and illegal content while avoiding excessive interference with legitimate expression. Platforms should maintain robust community standards with transparent enforcement.\n\nUsers also bear responsibility for exercising judgment and developing critical media literacy. Education enabling individuals to evaluate online content represents essential complement to both regulatory approaches.\n\nIn conclusion, effective social media governance requires coordinated action across levels: appropriate government framework, responsible platform management, and educated user participation."}, "speaking": {"topic": "道德", "part1": ["你觉得什么是对？", "你做过后悔的事吗？", "你相信人性本善吗？", "道德可以被教导吗？"], "part2": "Describe an ethical issue facing your society. You should say: what the issue is, how it affects people, what different opinions exist, and suggest how it should be addressed.", "part3": ["道德是绝对的还是相对的？", "法律和道德一样吗？", "人们应该按道德标准生活吗？"]}}, {"day": 66, "phase": "phase3", "listening": {"title": "太空探索政策", "transcript": "Panelist A: Falcon 9 launches at $2,700/kg vs $18,000 for Shuttle. Opens new possibilities.\nPanelist B: Environmental concerns - each launch deposits particles. Orbital debris: 36,500 objects >10cm. Kessler syndrome risk.\nPanelist A: Benefits: Earth observation, communications, 'planetary insurance' via Mars.\nPanelist C: Governance challenges - Outer Space Treaty from 1967 needs updating.\nPanelist B: Science vs human spaceflight - robots deliver better science per dollar.", "questions": [{"q": "Falcon 9发射成本？", "options": ["$1,700/kg", "$2,700/kg", "$5,000/kg"], "answer": 1}, {"q": "大于10cm碎片数量？", "options": ["25,500", "36,500", "47,500"], "answer": 1}, {"q": "外层空间条约签署年份？", "options": ["1962", "1967", "1972"], "answer": 1}, {"q": "毅力号成本？", "options": ["$17亿", "$27亿", "$37亿"], "answer": 1}]}, "reading": {"day": 66, "phase": "phase3", "title": "意识神经科学", "passage": "Understanding consciousness: 'hard problem' by David Chalmers. Neural correlates identified. Integrated information theory: consciousness relates to information integration. Global workspace theory: consciousness when info becomes globally available. Clinical implications for vegetative patients. AI adds consciousness debates.", "questions": [{"q": "谁提出困难问题？", "options": ["Chalmers", "Dennett", "Nagel"], "answer": 0}, {"q": "整合信息理论认为意识与什么相关？", "options": ["信息处理", "信息整合", "信息存储"], "answer": 1}, {"q": "植物人可通过什么被观察到有意识？", "options": ["语言", "大脑活动模式", "眼球运动"], "answer": 1}, {"q": "麻醉研究意义？", "options": ["开发新药", "理解意识机制", "减少成本"], "answer": 1}]}, "writing": {"type": "task1", "title": "线图 - 森林覆盖", "task": "The line graph shows forest cover in five countries from 1990 to 2020. Summarise the information.", "sample": "The line graph illustrates forest cover changes in five countries over thirty years.\n\nOverall, patterns diverged significantly, with some countries reforesting while others experienced continued loss.\n\nBrazil showed concerning decline, losing forest from 65% to 55% coverage. This 10% reduction reflects ongoing deforestation for agriculture and development despite conservation efforts.\n\nCanada maintained relatively stable coverage at around 38-39%, with minimal change across the period. This stability suggests effective sustainable forest management.\n\nSweden demonstrated impressive recovery, rising from 52% to 62% forest cover. This 10% increase resulted from aggressive reforestation policies implemented since the 1970s.\n\nThe USA showed modest increase from 33% to 35%, reflecting post-industrial forest recovery in eastern regions despite continued logging in the northwest.\n\nAustralia experienced the most dramatic loss, dropping from 21% to just 13% coverage. This severe reduction reflects clearing for agriculture, particularly during earlier decades.\n\nIn conclusion, forest cover trends varied dramatically, with Sweden's success story contrasting Australia's decline and Brazil's ongoing challenges."}, "speaking": {"topic": "创新", "part1": ["你创新过吗？", "你喜欢新想法吗？", "你觉得创新重要吗？", "谁是最具创新精神的人？"], "part2": "Describe an innovation that changed the world. You should say: what it is, when it was invented, how it changed our lives, and explain whether its impact has been positive or negative.", "part3": ["创新有什么障碍？", "政府应该支持创新吗？", "传统和创新哪个更重要？"]}}, {"day": 67, "phase": "phase3", "listening": {"title": "公共卫生政策", "transcript": "Speaker: COVID revealed strengths and weaknesses. Surveillance worked but information sharing delays hampered response.\nSupply chain: countries competed for medical supplies.\nVaccines: developed in under one year vs previous record 4 years.\nBut distribution unequal - high-income 60%+ vaccinated by late 2021, low-income <5%.\nRespondent: Trust crucial - misinformation spread, 40%+ expressed vaccine reluctance.", "questions": [{"q": "中国向世卫组织报告日期？", "options": ["12月21日", "12月31日", "1月10日"], "answer": 1}, {"q": "疫苗研发最短时间？", "options": ["1年", "2年", "4年"], "answer": 2}, {"q": "2021年底高收入国家接种率？", "options": ["40%", "50%", "60%+"], "answer": 2}, {"q": "疫苗犹豫比例？", "options": ["30%", "40%", "50%"], "answer": 1}]}, "reading": {"day": 67, "phase": "phase3", "title": "地缘政治新时代", "passage": "International relations shifting from unipolar to multipolar. China's rise significant - now second largest economy. 'New Cold War' debated - unlike US-Soviet, US-China economically interdependent. Other actors: regional powers, tech companies. Ukraine war reshaped European security. Technology competition defines geopolitics - semiconductors strategic.", "questions": [{"q": "最大变化是？", "options": ["单极强化", "向多极转变", "无政府状态"], "answer": 1}, {"q": "与美苏关系不同点是？", "options": ["相同", "无核武器", "经济相互依存"], "answer": 2}, {"q": "什么技术成为战略资源？", "options": ["软件", "半导体", "游戏"], "answer": 1}, {"q": "什么北约新成员？", "options": ["德国", "芬兰", "法国"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 全民基本收入", "task": "Some people think that governments should introduce a universal basic income for all adults. Others believe that it is better to target support only towards those who need it. Discuss both views and give your opinion.", "sample": "Universal Basic Income (UBI) represents an innovative policy proposal generating substantial debate.\n\nUBI proponents highlight its simplicity and dignity. Cash transfers allow recipients freedom to meet their specific needs rather than imposing bureaucratic judgments about deserving recipients. Furthermore, UBI provides security enabling entrepreneurship, education, and caregiving without fear of destitution. Automation's threat to employment may require UBI as labor markets transform.\n\nHowever, targeted support advocates emphasize efficiency and fairness. Limited resources should focus on those with genuine needs rather than distributing payments to wealthy individuals who don't require support. Furthermore, unconditional cash may enable irresponsible behavior, while conditional programs can encourage positive actions like workforce participation.\n\nI support targeted approaches but recognize UBI's potential merits under specific conditions. Developing countries with limited administrative capacity may find simple universal programs more practical than complex targeting systems. Furthermore, UBI experiments in developed contexts show generally positive outcomes for wellbeing without significant work reduction.\n\nNevertheless, sustainable UBI requires careful design preventing dependency and maintaining work incentives. Phased implementation allowing learning from experience seems wise.\n\nIn conclusion, targeted support should generally take precedence, but UBI merits consideration in appropriate contexts with careful implementation."}, "speaking": {"topic": "领导力", "part1": ["你尊敬什么样的领导？", "你会当领导吗？", "领导是天生的还是培养的？", "你认为好的领导应该具备什么？"], "part2": "Describe a leader you admire. You should say: who they are, what position they hold/held, what qualities make them a good leader, and explain why you admire them.", "part3": ["好的领导和差的领导有什么区别？", "人们为什么追随领导者？", "领导力可以学习吗？"]}}, {"day": 68, "phase": "phase3", "listening": {"title": "科技投资谈判", "transcript": "Founder: MediScan AI - detects diabetic retinopathy from smartphone photos, 94% accuracy.\nInvestor: Regulatory pathway?\nFounder: Class II device, 510(k) clearance. 3,200 patient clinical study. Expect clearance in 18 months.\nInvestor: Business model?\nFounder: Three streams: health system licensing, pharma partnerships, government contracts.\nInvestor: Competition from Google?\nFounder: Our advantage: runs on smartphone without cloud, works in low-connectivity areas.", "questions": [{"q": "准确率？", "options": ["89%", "91%", "94%"], "answer": 2}, {"q": "临床研究多少患者？", "options": ["2,200", "3,200", "4,200"], "answer": 1}, {"q": "期望多久获批？", "options": ["12个月", "18个月", "24个月"], "answer": 1}, {"q": "竞争优势是？", "options": ["更低价格", "可在智能手机运行", "更大品牌"], "answer": 1}]}, "reading": {"day": 68, "phase": "phase3", "title": "群体遗传学", "passage": "Ancient DNA revolutionizes understanding. Non-Africans have 1-4% Neanderthal DNA. Population genetics reveal complex migration. Natural selection continues - lactase persistence adapted to dairying. Medical genetics applies insights. Field confronted problematic eugenic history.", "questions": [{"q": "尼安德特人DNA比例？", "options": ["0-1%", "1-4%", "5-10%"], "answer": 1}, {"q": "乳糖酶持久性传播于？", "options": ["2000年前", "3000年前", "5000年前"], "answer": 2}, {"q": "医学遗传学关注？", "options": ["纯理论", "药物基因组学", "克隆"], "answer": 1}, {"q": "领域曾有历史问题？", "options": ["数据不足", "优生运动滥用", "伦理过度"], "answer": 1}]}, "writing": {"type": "task1", "title": "饼图 - 污染来源", "task": "The pie chart shows the main sources of air pollution in a city. Summarise the information.", "sample": "The pie chart illustrates air pollution sources in a typical city.\n\nOverall, transportation emerges as the dominant pollution source, followed by industrial activity and residential heating.\n\nVehicles represent the largest contributor at 40%. This includes cars, trucks, and buses running on fossil fuels, releasing nitrogen oxides, particulate matter, and carbon monoxide into the atmosphere.\n\nIndustry accounts for 25% of pollution, encompassing manufacturing, power generation, and construction activities. Factory emissions and industrial processes release various pollutants depending on fuel types and production methods.\n\nResidential heating contributes 20%, particularly in colder climates where homes burn fuel for warmth. This category includes both traditional heating systems and modern natural gas furnaces.\n\nThe remaining 15% derives from miscellaneous sources including commercial activities, waste management, and natural sources like dust and wildfires.\n\nIn conclusion, transportation dominates urban air pollution, suggesting priority attention to vehicle emissions through electrification, public transit improvement, and urban planning reducing travel needs."}, "speaking": {"topic": "幸福", "part1": ["你幸福吗？", "什么让你快乐？", "钱能买到幸福吗？", "你追求什么样的生活？"], "part2": "Describe what makes you happy. You should say: what makes you happy, how often you experience happiness, what you do when you are happy, and explain why these things bring you joy.", "part3": ["幸福是什么？", "如何衡量幸福？", "社会应该以GDP还是幸福感来衡量成功？"]}}, {"day": 69, "phase": "phase3", "listening": {"title": "语言学演讲", "transcript": "Linguist: Language shapes cognition. Russian has separate terms for light blue (goluboy) and dark blue (siniy).\nRussian speakers faster at discriminating these shades.\nGuugu Yimithirr uses cardinal directions (north, south, east, west) inst
