mination by prior causes and that could have been otherwise given identical circumstances, is one of the oldest and most contested in philosophy, and has acquired new urgency and dimensions as advances in neuroscience, psychology, and artificial intelligence reveal increasingly sophisticated causal mechanisms underlying what we experience as conscious deliberation and choice. The classical philosophical positions on free will are libertarianism, which holds that free will exists and is incompatible with determinism, the idea that every event including human thoughts and actions is determined by prior causes according to natural laws, and compatibilism, which holds that free will and determinism can coexist, redefining free will not as indeterminism but as the capacity to act in accordance with one's own desires and reasons without external coercion. Contemporary neuroscience has challenged the traditional understanding of free will through experiments demonstrating that brain activity associated with the intention to perform an action can be detected several seconds before the conscious awareness of the decision to act, suggesting that the subjective sense of freely willing an action may be a post-hoc construction rather than a genuine initiating cause. Benjamin Libet's famous experiments in the 1980s showed that the readiness potential preceding voluntary movements appears before the conscious decision to move, findings that have been widely debated and subsequently confirmed and extended by more sophisticated research. Legal and moral systems rely fundamentally on assumptions about free will, as the justification for holding people responsible for their actions and deserving of praise or blame presupposes that they could have acted otherwise, raising the question of how our legal and ethical frameworks should be adapted in light of neuroscientific discoveries that challenge this assumption. The question of whether human beings possess genuine free will, or whether our choices are determined by physical laws, biological drives, and environmental influences beyond our control, is among the most profound and enduring in philosophy. Neuroscientific research has increasingly challenged the intuitive sense that we are the authors of our own actions. Experiments by Benjamin Libet showed that brain activity associated with the intention to move begins several hundred milliseconds before the conscious decision to move is made, suggesting that the sense of voluntary agency may be a post-hoc construction rather than a genuine causal force. Yet critics have challenged the interpretation of these experiments, arguing that the readiness potential measures preparatory processes rather than decision-making.","questions":[{"q":"What does libertarianism hold about free will?","options":["It does not exist","It exists and is incompatible with determinism","It is the same as determinism"],"answer":1},{"q":"What did Benjamin Libet's experiments demonstrate?","options":["That consciousness causes all brain activity","Brain activity precedes conscious decision to act","Free will definitely does not exist"],"answer":1},{"q":"What do compatibilists believe?","options":["Free will cannot exist","Free will and determinism can coexist","Only libertarianism is correct"],"answer":1},{"q":"What systems rely fundamentally on assumptions about free will?","options":["Economic systems","Legal and moral systems","Educational systems"],"answer":1}]},"writing":{"type":"task1","title":"柱状图 - 旅游业影响","task":"The chart shows the economic impact of tourism in three countries in 2023. Summarise the information.","sample":"The bar chart compares tourism's economic contribution across three countries in 2023.\n\nOverall, tourism generates substantial revenue and employment in all three nations, with notable variation in scale and composition.\n\nFrance led in total tourism revenue at €65 billion, followed by Spain at €55 billion and Italy at €45 billion. This reflects France's attractions including Paris, the Louvre, and numerous UNESCO sites.\n\nEmployment figures showed similar patterns: France employed 2.2 million in tourism, Spain 1.8 million, and Italy 1.5 million. These represent significant portions of total workforce in each nation.\n\nTourism's contribution to GDP varied: Spain led at 12%, reflecting greater reliance on tourism as economic driver. France and Italy showed similar contributions at 8% and 7% respectively.\n\nSpending patterns also differed. French tourists spent more on culture and entertainment, while Spanish visitors concentrated on beach resorts. Italian tourism centered on historical sites and cuisine.\n\nIn conclusion, tourism provides substantial economic benefits across all three countries, with scale and characteristics reflecting each nation's unique attractions and development strategies."},"speaking":{"topic":"隐私","part1":["你重视隐私吗？","你会在网上分享什么？","你担心信息泄露吗？","隐私应该被保护吗？"],"part2":"Describe a concern about privacy in modern society. You should say: what the concern is, why it exists, how it affects people's lives, and suggest how it should be addressed.","part3":["隐私有多重要？","政府应该监控公民吗？","个人应该放弃多少隐私来换取安全？"]}}];
const PhaseColors = {phase1:'#3b82f6',phase2:'#10b981',phase3:'#8b5cf6'};
const PhaseNames  = {phase1:'Phase 1 基础',phase2:'Phase 2 强化',phase3:'Phase 3 冲刺'};

let state = {tab:'listen',day:1,history:{},streak:0,totalScore:0,totalQuestions:0};
let synth = window.speechSynthesis;
let recognition = null;
let currentUTT = null;
let isSpeaking = false;
let isRecording = false;
let recTimeout = null;
let volumeCheck = null;
let silenceTimer = null;

// ---------- Storage ----------
function loadState(){
  try{const s=JSON.parse(localStorage.getItem('ielts_mobile_state')||'{}');Object.assign(state,s)}catch(e){}
}
function saveState(){
  localStorage.setItem('ielts_mobile_state',JSON.stringify({day:state.day,history:state.history,streak:state.streak,totalScore:state.totalScore,totalQuestions:state.totalQuestions}));
}
function completeDay(day,correct,total){
  const prev=state.history[day]||{done:false,correct:0,total:0};
  state.history[day]={done:true,correct:Math.max(prev.correct,correct),total:Math.max(prev.total,total)};
  state.totalScore=Object.values(state.history).reduce((a,v)=>a+(v.correct||0),0);
  state.totalQuestions=Object.values(state.history).reduce((a,v)=>a+(v.total||0),0);
  // advance day
  if(state.day<=day)state.day=Math.min(day+1,90);
  saveState();
  updateHome();
}

// ---------- Home ----------
function updateHome(){
  const done=Object.values(state.history).filter(v=>v.done).length;
  const pct=done/90*100;
  document.getElementById('stat-days').textContent=done;
  document.getElementById('stat-streak').textContent=state.streak;
  document.getElementById('stat-score').textContent=state.totalScore;
  const acc=state.totalQuestions>0?Math.round(state.totalScore/state.totalQuestions*100):0;
  document.getElementById('stat-accuracy').textContent=acc+'%';
  document.getElementById('progress-text').textContent=done+'/90';
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('next-day').textContent=state.day;
}

// ---------- Tabs ----------
function switchTab(tab){
  state.tab=tab;
  document.querySelectorAll('.tab-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderDay();
}
function showApp(){
  document.getElementById('home-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  renderDay();
}
function startPractice(){
  showApp();
  switchTab(state.tab||'listen');
}

// ---------- Day Navigator ----------
var contentArea = document.getElementById("content-area");
function renderDay(){
  const d=DAYS[state.day-1];
  if(!d){contentArea.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af">无数据</div>';return;}
  const phaseColor=PhaseColors[d.phase]||'#667eea';
  const phaseName=PhaseNames[d.phase]||d.phase;
  const done=state.history[state.day]&&state.history[state.day].done;
  let navHTML='<div class="day-nav">';
  navHTML+=`<span class="phase-label" style="background:${phaseColor}20;color:${phaseColor}">${phaseName}</span>`;
  navHTML+=`<span style="font-weight:700;color:#1f2937;font-size:15px">Day ${state.day}</span>`;
  navHTML+=`<div style="flex:1"></div>`;
  if(state.day>1)navHTML+=`<button class="btn-secondary" onclick="prevDay()" style="padding:6px 12px;font-size:13px"><i class="fas fa-chevron-left"></i></button>`;
  navHTML+=`<button class="btn-secondary" onclick="nextDay()" style="padding:6px 12px;font-size:13px"><i class="fas fa-chevron-right"></i></button>`;
  navHTML+='</div>';
  navHTML+=`<div style="padding:0 16px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">`;
  // day dots
  const daysArr=[...Array(90).keys()].map(i=>i+1);
  daysArr.forEach(dn=>{
    const h=state.history[dn];
    let cls='day-badge locked';
    if(dn===state.day)cls='day-badge active';
    else if(h&&h.done)cls='day-badge done';
    navHTML+=`<span class="${cls}" style="cursor:pointer;font-size:11px;padding:0 4px;min-width:24px;height:24px" onclick="gotoDay(${dn})">${dn}</span>`;
  });
  navHTML+='</div>';
  contentArea.innerHTML=navHTML+'<div id="day-content"></div>';
  if(state.tab==='listen')renderListening(d);
  else if(state.tab==='read')renderReading(d);
  else if(state.tab==='write')renderWriting(d);
  else if(state.tab==='speak')renderSpeaking(d);
}

function prevDay(){if(state.day>1){state.day--;renderDay();saveState();}}
function nextDay(){if(state.day<90){state.day++;renderDay();saveState();}}
function gotoDay(d){state.day=d;renderDay();saveState();}

// ---------- TTS ----------
function speak(text,lang='en-US',rate=.9){
  stopTTS();
  if(!synth)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;u.rate=rate;
  u.onend=()=>{isSpeaking=false;updateTTSBtn(null)};
  u.onerror=()=>{isSpeaking=false;updateTTSBtn(null)};
  isSpeaking=true;
  synth.speak(u);
  currentUTT=u;
}

function initSpeechRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  if(recognition)recognition.abort();
  recognition=new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang='en-US';
  let accumulatedTranscript='';
  recognition.onresult=function(e){
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        accumulatedTranscript+=e.results[i][0].transcript+' ';
      }else{
        interim+=e.results[i][0].transcript;
      }
    }
    if(currentTranscriptId){
      const el=document.getElementById(currentTranscriptId);
      const display=accumulatedTranscript+interim;
      if(el)el.textContent=display.trim()||'🎙️ 正在识别...';
    }
    // Reset silence timer on each speech detected
    clearTimeout(silenceTimer);
    silenceTimer=setTimeout(()=>{
      if(isRecording){
        console.log('Silence after speech, auto-stopping...');
        stopRecording();
      }
    },5000);
  };
  recognition.onerror=function(e){
    console.error('speech error',e);
    const el=document.getElementById(currentTranscriptId);
    if(e.error==='not-allowed'){
      // 可能是临时允许后又失效，尝试重新请求
      if(el)el.textContent='⚠️ 权限被拒绝，尝试重新请求...';
      setTimeout(()=>{
        try{recognition.start();}catch(e2){
          if(el)el.textContent='❌ 麦克风权限被拒绝，请检查浏览器设置';
          stopRecording();
        }
      },500);
      return;
    } else if(e.error==='no-speech'){
      if(el)el.textContent='🎙️ 未检测到语音，请对着麦克风说话';
      return;
    } else if(e.error==='aborted'){
      // 用户主动停止，不显示错误
      return;
    }
    if(el)el.textContent='❌ 识别出错: '+e.error;
    stopRecording();
  };
  recognition.onend=function(){
    // If still recording, restart recognition (continuous can still end on some browsers)
    if(isRecording){
      try{recognition.start();}catch(e){stopRecording();}
    }
  };
  // Store accumulator reset function
  recognition._resetAccumulator=function(){accumulatedTranscript='';};
}

// 变量声明
let mediaRecorder = null;
let mediaStream = null;
let mediaChunks = [];

// 开始录音
function startMediaRecording(stream) {
  mediaStream = stream;
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg'];
  let mimeType = '';
  for (const t of types) { try { if (MediaRecorder.isTypeSupported(t)) { mimeType = t; break; } } catch(e){} }
  if (!mimeType) mimeType = '';
  mediaChunks = [];
  try {
    var recOptions = mimeType ? { mimeType: mimeType } : {};
    // 尝试设置 128kbps 高码率以提升音质
    if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(mimeType || 'audio/webm')) {
      recOptions.audioBitsPerSecond = 128000;
    }
    mediaRecorder = new MediaRecorder(stream, recOptions);
  } catch(e) {
    mediaRecorder = new MediaRecorder(stream);
  }
  mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) mediaChunks.push(e.data); };
  mediaRecorder.start(100);
}

// 停止录音，返回原始 blob（由 blobToWav 做格式转换）
function stopMediaRecording() {
  return new Promise(resolve => {
    if (!mediaRecorder) { resolve(null); return; }
    const rec = mediaRecorder;
    const strm = mediaStream;
    rec.onstop = () => {
      if (strm) { try { strm.getTracks().forEach(t => t.stop()); } catch(e){} }
      if (mediaChunks.length === 0) { resolve(null); return; }
      const blob = new Blob(mediaChunks, { type: rec.mimeType || 'audio/webm' });
      resolve(blob);
    };
    try { rec.stop(); } catch(e) { resolve(null); }
  });
}

// blob 转 16kHz 16bit mono WAV（手动线性插值重采样，无 OfflineAudioContext）
function blobToWav(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function() {
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      ac.decodeAudioData(reader.result, function(ab) {
        var ch = ab.getChannelData(0);
        var srcRate = ab.sampleRate;
        var dstRate = 16000;
        var ratio = srcRate / dstRate;
        var newLen = Math.round(ch.length / ratio);
        var pcm = new Int16Array(newLen);
        for (var i = 0; i < newLen; i++) {
          var si = i * ratio;
          var lo = Math.floor(si);
          var hi = Math.min(lo + 1, ch.length - 1);
          var f = si - lo;
          var s = ch[lo] * (1 - f) + ch[hi] * f;
          pcm[i] = s < 0 ? Math.max(-1, s) * 0x8000 : Math.min(1, s) * 0x7FFF | 0;
        }
        var bufLen = 44 + newLen * 2;
        var buf = new ArrayBuffer(bufLen);
        var v = new DataView(buf);
        function ws(s, o) { for (var j = 0; j < s.length; j++) v.setUint8(o + j, s.charCodeAt(j)); }
        ws('RIFF', 0); v.setUint32(4, 36 + newLen * 2, true); ws('WAVE', 8);
        ws('fmt ', 12); v.setUint32(16, 16, true);
        v.setUint16(20, 1, true); v.setUint16(22, 1, true); // PCM mono
        v.setUint32(24, dstRate, true); v.setUint32(28, dstRate * 2, true);
        v.setUint16(32, 2, true); v.setUint16(34, 16, true);
        ws('data', 36); v.setUint32(40, newLen * 2, true);
        for (var i = 0; i < newLen; i++) v.setInt16(44 + i * 2, pcm[i], true);
        console.log('[ASR] WAV ready: ' + srcRate + '->' + dstRate + 'Hz, ' + newLen + ' samples, ' + bufLen + ' bytes');
        ac.close();
        resolve(new Blob([buf], { type: 'audio/wav' }));
      }, function(err) {
        console.error('[ASR] decodeAudioData failed:', err);
        ac.close();
        reject(err);
      });
    };
    reader.onerror = function(err) { reject(err); };
    reader.readAsArrayBuffer(blob);
  });
}

      btn.classList.add('recording');
      btn.innerHTML = '<i class="fas fa-stop"></i>';
      isRecording = true;
      currentTranscriptId = tid;
      recordStartTime = Date.now();
      el.textContent = '🎙️ 录音中... 说完后点■停止';
      silenceTimer = setTimeout(() => {
        if (isRecording) { el.textContent = '⚠️ 静默超时，自动停止'; stopRecording(); }
      }, 15000);
      startMediaRecording(stream);
    })
    .catch(err => {
      console.error('Microphone error:', err);
      el.textContent = '❌ 麦克风权限被拒绝，请在浏览器设置中允许麦克风并确保使用HTTPS访问';
    });
}


function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  clearTimeout(silenceTimer);
  const el = currentTranscriptId ? document.getElementById(currentTranscriptId) : null;
  if (el) el.textContent = '⏳ 识别中...';
  if (recBtn) { recBtn.classList.remove('recording'); recBtn.innerHTML = '<i class="fas fa-microphone"></i>'; recBtn = null; }
  stopMediaRecording().then(blob => {
    if (!blob || blob.size < 4000) { if (el) el.textContent = '⚠️ 录音太短，请重试'; return; }
    blobToWav(blob).then(wavBlob => {
      const kb = (wavBlob.size / 1024).toFixed(1);
      if (el) el.textContent = '⏳ 识别中...（音频 ' + kb + ' KB）';
      recognizeByBaidu(wavBlob).then(result => {
        if (result.err) {
          if (el) el.textContent = '❌ ' + result.err + ' [' + kb + ' KB]';
        } else {
          if (el) el.textContent = result.text || '（未识别到内容）';
        }
      });
    }).catch(err => {
      console.error('[ASR] blobToWav failed:', err);
      if (el) el.textContent = '❌ 音频转换失败，请重试';
    });
  });
}


function markSpeakingDone(){
  state.history[state.day]={...state.history[state.day],speakDone:true};
  saveState();
  alert('✅ 口语已标记完成！');
}

// ---------- Result ----------
function showResult(correct,total){
  const pct=Math.round(correct/total*100);
  document.getElementById('result-emoji').textContent=pct>=80?'🎉':pct>=60?'👍':'💪';
  document.getElementById('result-title').textContent=pct>=80?'太棒了！':pct>=60?'继续加油！':'别灰心！';
  document.getElementById('result-msg').textContent=`第 ${state.day} 天 ${['听力','阅读','写作','口语'][['listen','read','write','speak'].indexOf(state.tab)]} 完成！`;
  document.getElementById('r-correct').textContent=correct;
  document.getElementById('r-total').textContent=total;
  document.getElementById('result-modal').style.display='flex';
}
function nextOrFinish(){
  document.getElementById('result-modal').style.display='none';
  if(state.day<90){state.day++;renderDay();saveState();}
  else{alert('🎊 恭喜你完成全部90天学习！');}
}

// ---------- Boot ----------
loadState();
updateHome();
document.getElementById('loading').style.opacity='0';
setTimeout(()=>{
  document.getElementById('loading').style.display='none';
  document.getElementById('home-screen').style.display='block';
},400);
</script>
