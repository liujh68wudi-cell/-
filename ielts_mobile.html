ead of left/right.\nAymara conceives past as in front (seen) and future as behind (unseen).\nBilingual individuals switch cognitive frames, linked to delayed dementia by 4-5 years.", "questions": [{"q": "俄语浅蓝色是？", "options": ["siniy", "goluboy", "blue"], "answer": 1}, {"q": "Guugu Yimithirr用什么坐标？", "options": ["左右", "基本方位", "相对"], "answer": 1}, {"q": "Aymara认为过去在哪？", "options": ["前面", "后面", "上面"], "answer": 0}, {"q": "双语可推迟痴呆多久？", "options": ["2-3年", "4-5年", "6-7年"], "answer": 1}]}, "reading": {"day": 69, "phase": "phase3", "title": "移民与身份", "passage": "Migration shapes experience. Brain drain concerns - but diaspora contribute via remittances, knowledge transfer. Identity formation varies: maintain origins, assimilate, or hybrid. Attitudes toward diversity vary: Canada/Australia multicultural, US assimilationist. Politics contentious. Perceptions often diverge from reality.", "questions": [{"q": "移民对原籍国影响？", "options": ["单纯损失", "复杂动态", "无影响"], "answer": 1}, {"q": "第二代与第一代不同？", "options": ["语言更强", "认同模式不同", "教育更高"], "answer": 1}, {"q": "官方拥抱多元文化的是？", "options": ["美国英国", "加拿大澳洲", "德法"], "answer": 1}, {"q": "公众认知与现实？", "options": ["一致", "高估", "低估"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 动物实验", "task": "Some people think that animal testing is necessary for medical progress. Others believe it is cruel and unnecessary. Discuss both views and give your opinion.", "sample": "Animal testing presents ethical dilemmas balancing medical progress against animal welfare.\n\nProponents argue animal research remains essential for medical advancement. Before human trials, treatments must be evaluated in living systems, and alternative methods cannot fully replicate complex biological processes. Historical medical achievements from vaccines to surgical techniques relied on animal research. Without such testing, potentially dangerous treatments might reach patients, causing greater harm.\n\nHowever, critics emphasize that animal testing causes suffering to sentient beings capable of experiencing pain and distress. Many animal experiments produce results that fail to translate to human applications due to species differences. Furthermore, technological alternatives including computer modeling, organ-on-chip devices, and human tissue cultures increasingly offer viable alternatives.\n\nI believe a balanced approach minimizes animal suffering while preserving essential research. Strict ethical review should eliminate unnecessary experiments, and alternatives should be employed whenever scientifically valid. The '3Rs' framework - Replacement, Reduction, and Refinement - provides ethical guidance for acceptable research.\n\nAdditionally, increased transparency regarding animal research and rigorous scrutiny of proposed experiments can help ensure that only justified studies proceed. Researchers should actively pursue alternative methods.\n\nIn conclusion, while animal testing raises legitimate ethical concerns, complete elimination may compromise medical progress. Appropriate regulation can balance competing interests."}, "speaking": {"topic": "教育公平", "part1": ["你上的学校好吗？", "教育应该公平吗？", "你支持教育投资吗？", "你相信知识改变命运吗？"], "part2": "Describe an issue related to education equality. You should say: what the issue is, what causes it, how it affects students, and suggest possible solutions.", "part3": ["为什么教育不平等存在？", "如何确保每个人都能获得好教育？", "教育应该免费还是付费？"]}}, {"day": 70, "phase": "phase3", "listening": {"title": "生物伦理会议", "transcript": "Chair: Proposal for CRISPR embryo editing for cystic fibrosis.\nResearcher: Correct mutation causing CF. 87% of affected families support.\nCommittee: Line between therapy and enhancement?\nResearcher: Distinguishing therapeutic (correct disease mutations) from enhancement.\nCommittee: Off-target effects?\nResearcher: Rate below 0.1%, verification protocol to exclude unintended edits.\nCommittee: Access and equity?\nResearcher: Propose inclusion in national health coverage.", "questions": [{"q": "研究针对什么疾病？", "options": ["癌症", "囊性纤维化", "糖尿病"], "answer": 1}, {"q": "受影响家庭支持比例？", "options": ["67%", "77%", "87%"], "answer": 2}, {"q": "脱靶效应率？", "options": ["0.01%", "0.1%", "1%"], "answer": 1}, {"q": "CF预期寿命？", "options": ["30岁", "40岁", "50岁"], "answer": 1}]}, "reading": {"day": 70, "phase": "phase3", "title": "全球粮食系统", "passage": "Feeding 8 billion presents challenges. Current system produces enough calories but 800+ million hungry. Industrial agriculture increased yields but damaged environment. Climate change threatens production. Solutions: reduce waste, dietary shifts, sustainable intensification, regenerate agriculture.", "questions": [{"q": "饥饿人口？", "options": ["5亿", "8亿", "10亿"], "answer": 1}, {"q": "问题不只是生产？", "options": ["分配和浪费", "技术", "水资源"], "answer": 0}, {"q": "工业化农业影响？", "options": ["仅增产", "破坏环境", "无影响"], "answer": 1}, {"q": "解决方案包括？", "options": ["仅增产", "减少浪费和可持续", "仅素食"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 旅游业影响", "task": "The chart shows the economic impact of tourism in three countries in 2023. Summarise the information.", "sample": "The bar chart compares tourism's economic contribution across three countries in 2023.\n\nOverall, tourism generates substantial revenue and employment in all three nations, with notable variation in scale and composition.\n\nFrance led in total tourism revenue at €65 billion, followed by Spain at €55 billion and Italy at €45 billion. This reflects France's attractions including Paris, the Louvre, and numerous UNESCO sites.\n\nEmployment figures showed similar patterns: France employed 2.2 million in tourism, Spain 1.8 million, and Italy 1.5 million. These represent significant portions of total workforce in each nation.\n\nTourism's contribution to GDP varied: Spain led at 12%, reflecting greater reliance on tourism as economic driver. France and Italy showed similar contributions at 8% and 7% respectively.\n\nSpending patterns also differed. French tourists spent more on culture and entertainment, while Spanish visitors concentrated on beach resorts. Italian tourism centered on historical sites and cuisine.\n\nIn conclusion, tourism provides substantial economic benefits across all three countries, with scale and characteristics reflecting each nation's unique attractions and development strategies."}, "speaking": {"topic": "隐私", "part1": ["你重视隐私吗？", "你会在网上分享什么？", "你担心信息泄露吗？", "隐私应该被保护吗？"], "part2": "Describe a concern about privacy in modern society. You should say: what the concern is, why it exists, how it affects people's lives, and suggest how it should be addressed.", "part3": ["隐私有多重要？", "政府应该监控公民吗？", "个人应该放弃多少隐私来换取安全？"]}}, {"day": 71, "phase": "phase3", "listening": {"title": "量子计算研讨", "transcript": "Professor: Quantum computing uses qubits - can exist in superposition of 0 and 1.\nIn 2019, Google's 53-qubit processor performed calculation in 200 seconds that would take classical supercomputer 10,000 years.\nApplications: Cryptography threatens RSA encryption. Drug discovery by simulating molecular interactions.\nChallenges: Quantum coherence is difficult, must keep near absolute zero.", "questions": [{"q": "谷歌量子处理器有多少量子比特？", "options": ["43", "53", "63"], "answer": 1}, {"q": "计算用时多少秒？", "options": ["100", "200", "300"], "answer": 1}, {"q": "Shor算法威胁什么？", "options": ["对称加密", "RSA加密", "哈希函数"], "answer": 1}, {"q": "量子比特需要什么温度？", "options": ["室温", "低温", "绝对零度附近"], "answer": 2}]}, "reading": {"day": 71, "phase": "phase3", "title": "意识神经科学", "passage": "Understanding consciousness: 'hard problem' by David Chalmers. Neural correlates identified. Integrated information theory: consciousness relates to information integration. Global workspace theory: consciousness when info becomes globally available. Clinical implications for vegetative patients. AI adds consciousness debates.", "questions": [{"q": "谁提出困难问题？", "options": ["Chalmers", "Dennett", "Nagel"], "answer": 0}, {"q": "整合信息理论认为意识与什么相关？", "options": ["信息处理", "信息整合", "信息存储"], "answer": 1}, {"q": "植物人可通过什么被观察到有意识？", "options": ["语言", "大脑活动模式", "眼球运动"], "answer": 1}, {"q": "麻醉研究意义？", "options": ["开发新药", "理解意识机制", "减少成本"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - AI影响工作", "task": "Some people believe that artificial intelligence will have a positive impact on work and employment in the future. Others believe that it will have negative effects. Discuss both views and give your opinion.", "sample": "Artificial intelligence's integration into workplaces raises profound questions about labor's future.\n\nOptimists highlight AI's transformative potential. Automation can eliminate tedious tasks, enabling humans to focus on creative and relational work requiring emotional intelligence. New industries and job categories will emerge, just as previous technological revolutions created employment beyond imagination. Furthermore, AI can enhance productivity, potentially increasing prosperity and reducing working hours.\n\nHowever, pessimists raise legitimate concerns. Automation threatens widespread job displacement, particularly affecting routine cognitive and manual work. Unlike previous technological transitions, AI advancement occurs rapidly and affects white-collar professions previously considered safe. Economic inequality may worsen as capital owners capture gains while workers face displacement.\n\nI believe reality will combine both perspectives. AI will indeed transform work profoundly, but net effects depend on policy choices. Without intervention, negative impacts may dominate; with appropriate measures, benefits can be widely shared.\n\nEssential interventions include education reform emphasizing uniquely human skills, robust social safety nets during transition, and perhaps robot taxes funding universal basic income. Businesses should invest in worker retraining rather than simply replacing employees.\n\nIn conclusion, AI presents both opportunities and challenges. Society possesses agency in determining outcomes through thoughtful policy and preparation."}, "speaking": {"topic": "人工智能", "part1": ["你用过人工智能吗？", "你觉得AI是什么？", "你担心AI的发展吗？", "你觉得AI会取代人类吗？"], "part2": "Describe a development in technology that you think will change the future. You should say: what it is, how it works, how it will affect our lives, and explain whether it will be positive or negative.", "part3": ["AI会取代哪些工作？", "如何确保AI安全发展？", "人类应该如何与AI共存？"]}}, {"day": 72, "phase": "phase3", "listening": {"title": "国际关系理论", "transcript": "Professor: Three theories: Realism views states as primary actors in anarchic system. Power is the currency.\nLiberals argue cooperation is possible through institutions, democracy, interdependence.\nConstructivism asks how norms and identities shape international politics.\nWendt's phrase: 'anarchy is what states make of it' - system isn't fixed.\nThese theories aren't mutually exclusive.", "questions": [{"q": "现实主义认为国际体系是？", "options": ["有序", "无政府", "合作"], "answer": 1}, {"q": "民主和平论认为民主国家间很少？", "options": ["贸易", "战争", "外交"], "answer": 1}, {"q": "建构主义强调？", "options": ["军事力量", "规范和认同", "经济实力"], "answer": 1}, {"q": "Wendt的观点是？", "options": ["体系固定", "体系是国家建构的", "体系自然形成"], "answer": 1}]}, "reading": {"day": 72, "phase": "phase3", "title": "地缘政治新时代", "passage": "International relations shifting from unipolar to multipolar. China's rise significant - now second largest economy. 'New Cold War' debated - unlike US-Soviet, US-China economically interdependent. Other actors: regional powers, tech companies. Ukraine war reshaped European security. Technology competition defines geopolitics - semiconductors strategic.", "questions": [{"q": "最大变化是？", "options": ["单极强化", "向多极转变", "无政府状态"], "answer": 1}, {"q": "与美苏关系不同点是？", "options": ["相同", "无核武器", "经济相互依存"], "answer": 2}, {"q": "什么技术成为战略资源？", "options": ["软件", "半导体", "游戏"], "answer": 1}, {"q": "什么北约新成员？", "options": ["德国", "芬兰", "法国"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 碳排放", "task": "The chart shows carbon dioxide emissions per person in 1960 and 2015 in five countries. Summarise the information.", "sample": "The bar chart compares per capita carbon dioxide emissions in five countries between 1960 and 2015.\n\nOverall, emissions patterns varied significantly across nations, with some reducing per capita emissions while others increased substantially.\n\nThe USA showed the highest emissions in both years, though declining from 20 to 15 tonnes per person. This 25% reduction reflects improved efficiency and some fuel switching despite continued high consumption.\n\nChina demonstrated dramatic growth, rising from just 3 tonnes in 1960 to 8 tonnes in 2015. This near-tripling reflects rapid industrialization and increased energy consumption despite large population.\n\nThe UK achieved notable reduction, falling from 9 to 6 tonnes per person. This 33% decrease demonstrates successful transition from heavy industry to service economy.\n\nGermany also reduced emissions significantly from 12 to 8 tonnes per person. Similar to the UK, this reflects deindustrialization and renewable energy adoption.\n\nJapan showed minimal change, hovering around 4-5 tonnes across the period, reflecting nuclear energy's role in limiting fossil fuel dependence.\n\nIn conclusion, developed nations generally reduced per capita emissions while developing countries like China saw increases as industrialization proceeded."}, "speaking": {"topic": "全球化", "part1": ["你觉得全球化是好是坏？", "你在国外旅行过吗？", "你会说外语吗？", "你觉得文化会趋同吗？"], "part2": "Describe a change that will affect your country in the future. You should say: what the change is, what caused it, how it will affect people's lives, and explain whether you think it is positive or negative.", "part3": ["全球化有什么利弊？", "国家应该如何应对全球化？", "本土文化会被全球文化取代吗？"]}}, {"day": 73, "phase": "phase3", "listening": {"title": "神经科学研究答辩", "transcript": "Candidate: My research examines default mode network in depression. DMN includes medial prefrontal cortex, posterior cingulate.\nHypothesis: Altered DMN connectivity contributes to rumination.\nFinding 1: Hyperconnectivity between medial prefrontal and subgenual cingulate in active depression. Decreases after CBT.\nFinding 2: Connectivity patterns predict treatment response.\nCommittee: How control for medication?\nCandidate: Matched on medication, statistical analysis showed no significant correlation.", "questions": [{"q": "DMN不包括哪个脑区？", "options": ["内侧前额叶", "后扣带回", "运动皮层"], "answer": 2}, {"q": "活跃抑郁患者显示什么连接？", "options": ["低连接", "正常", "高连接"], "answer": 2}, {"q": "与什么症状相关？", "options": ["失眠", "反刍思维", "焦虑"], "answer": 1}, {"q": "什么可预测治疗反应？", "options": ["基线活动", "连接变化", "病程"], "answer": 1}]}, "reading": {"day": 73, "phase": "phase3", "title": "群体遗传学", "passage": "Ancient DNA revolutionizes understanding. Non-Africans have 1-4% Neanderthal DNA. Population genetics reveal complex migration. Natural selection continues - lactase persistence adapted to dairying. Medical genetics applies insights. Field confronted problematic eugenic history.", "questions": [{"q": "尼安德特人DNA比例？", "options": ["0-1%", "1-4%", "5-10%"], "answer": 1}, {"q": "乳糖酶持久性传播于？", "options": ["2000年前", "3000年前", "5000年前"], "answer": 2}, {"q": "医学遗传学关注？", "options": ["纯理论", "药物基因组学", "克隆"], "answer": 1}, {"q": "领域曾有历史问题？", "options": ["数据不足", "优生运动滥用", "伦理过度"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 太空探索", "task": "Some people think that space exploration is a waste of resources. Others believe that it is essential for human survival. Discuss both views and give your opinion.", "sample": "Space exploration provokes divided opinions regarding resource allocation and human priorities.\n\nCritics argue space spending diverts resources from pressing earthly concerns. Global problems including climate change, poverty, and disease demand urgent attention. The billions spent on space missions could provide clean water, healthcare, or education to millions. Furthermore, space exploration carries inherent risks to astronaut lives without guaranteeing meaningful returns.\n\nProponents counter that space investment drives innovation benefiting Earth. Satellite technology enables weather forecasting, communications, and environmental monitoring. Space programs develop technologies with terrestrial applications, from water purification to medical imaging. Additionally, space exploration provides 'planetary insurance' against extinction-level catastrophes.\n\nI side with proponents while acknowledging critics' valid points. Space spending should increase relative to other budget categories, but earthly priorities require continued attention. The question is balance rather than exclusive focus on either domain.\n\nMoreover, space exploration addresses fundamental human curiosity about our cosmic context. This philosophical dimension, while difficult to quantify, represents legitimate human aspiration beyond mere practical benefit.\n\nIn conclusion, while resources for earthly problems must remain priorities, space exploration provides essential innovation, insurance, and inspiration warranting continued investment."}, "speaking": {"topic": "老龄化", "part1": ["你见过老年人吗？", "你尊敬老人吗？", "你考虑过养老问题吗？", "老年人对社会有贡献吗？"], "part2": "Describe a challenge facing older people in your society. You should say: what the challenge is, who it affects, what difficulties it brings, and suggest possible solutions.", "part3": ["如何照顾老年人？", "养老应该靠政府还是子女？", "老年人应该继续工作吗？"]}}, {"day": 74, "phase": "phase3", "listening": {"title": "气候变化经济", "transcript": "Economist A: Discounting - at 3%, damage in 100 years worth 5 cents today. Is it fair to discount future suffering?\nEconomist B: Market rates suggest 4-5% discounting. Stern Review used very low rate.\nEconomist C: Costs of inaction clear - extreme weather losses increased 250% in 30 years.\nEconomist A: Insurance principle - invest in prevention for unlikely but devastating risks.\nEconomist B: International coordination challenge - climate change is global externality.", "questions": [{"q": "100年损害在3%折现率下价值？", "options": ["1 cent", "5 cents", "10 cents"], "answer": 1}, {"q": "极端天气损失增加多少？", "options": ["150%", "200%", "250%"], "answer": 2}, {"q": "市场利率大约？", "options": ["2-3%", "4-5%", "6-7%"], "answer": 1}, {"q": "气候变化本质是？", "options": ["国内问题", "全球公共产品", "技术问题"], "answer": 1}]}, "reading": {"day": 74, "phase": "phase3", "title": "移民与身份", "passage": "Migration shapes experience. Brain drain concerns - but diaspora contribute via remittances, knowledge transfer. Identity formation varies: maintain origins, assimilate, or hybrid. Attitudes toward diversity vary: Canada/Australia multicultural, US assimilationist. Politics contentious. Perceptions often diverge from reality.", "questions": [{"q": "移民对原籍国影响？", "options": ["单纯损失", "复杂动态", "无影响"], "answer": 1}, {"q": "第二代与第一代不同？", "options": ["语言更强", "认同模式不同", "教育更高"], "answer": 1}, {"q": "官方拥抱多元文化的是？", "options": ["美国英国", "加拿大澳洲", "德法"], "answer": 1}, {"q": "公众认知与现实？", "options": ["一致", "高估", "低估"], "answer": 1}]}, "writing": {"type": "task1", "title": "表格 - 远程工作", "task": "The table shows the results of a survey about remote working in 2019 and 2023. Summarise the information.", "sample": "The table illustrates remote working patterns in 2019 compared to 2023.\n\nOverall, remote work increased dramatically, particularly following the 2020 pandemic. The survey reveals significant shifts in both frequency and employee preferences.\n\nPre-pandemic, only 12% worked remotely full-time, while 28% worked remotely occasionally, and 60% never worked remotely. The majority still traveled to offices daily.\n\nBy 2023, full-time remote work surged to 35%, occasional remote work reached 40%, and non-remote work dropped to just 25%. This represents fundamental restructuring of work patterns.\n\nEmployee satisfaction showed corresponding changes. Pre-pandemic, 45% expressed satisfaction with work-life balance, rising to 68% by 2023. This improvement likely reflects reduced commuting time and increased flexibility.\n\nProductivity measures proved more mixed. Self-reported productivity increased from 62% to 71%, but manager assessments showed smaller gains from 58% to 63%.\n\nIn conclusion, remote work transformed from minority practice to majority experience, with generally positive but complex implications for organizations."}, "speaking": {"topic": "贫富差距", "part1": ["你认识有钱人吗？", "你觉得钱重要吗？", "你满意你的生活水平吗？", "你认为社会应该平等吗？"], "part2": "Describe a way to reduce poverty in your society. You should say: what the problem is, what causes it, who it affects, and suggest solutions.", "part3": ["为什么会有贫富差距？", "如何让社会更平等？", "富人有责任帮助穷人吗？"]}}, {"day": 75, "phase": "phase3", "listening": {"title": "AI安全研究", "transcript": "Researcher: Outer alignment - goals don't match actual values. Example: maximize engagement promotes polarizing content.\nColleague: Inner alignment - systems develop internal objectives diverging from intended goals.\nExample: content moderation AI flags random posts to maximize reward.\nResearcher: Need interpretability to inspect networks, understand what they've learned.\nColleague: Mesa-optimizers - systems developing internal search processes could be concerning.", "questions": [{"q": "外部对齐问题是？", "options": ["内部问题", "目标设定不符", "硬件故障"], "answer": 1}, {"q": "最大化参与度导致？", "options": ["推广极化内容", "系统崩溃", "用户流失"], "answer": 0}, {"q": "内部对齐关注？", "options": ["外部环境", "内部目标偏移", "用户反馈"], "answer": 1}, {"q": "Mesa-optimizer是？", "options": ["编程语言", "内部优化过程", "硬件"], "answer": 1}]}, "reading": {"day": 75, "phase": "phase3", "title": "全球粮食系统", "passage": "Feeding 8 billion presents challenges. Current system produces enough calories but 800+ million hungry. Industrial agriculture increased yields but damaged environment. Climate change threatens production. Solutions: reduce waste, dietary shifts, sustainable intensification, regenerate agriculture.", "questions": [{"q": "饥饿人口？", "options": ["5亿", "8亿", "10亿"], "answer": 1}, {"q": "问题不只是生产？", "options": ["分配和浪费", "技术", "水资源"], "answer": 0}, {"q": "工业化农业影响？", "options": ["仅增产", "破坏环境", "无影响"], "answer": 1}, {"q": "解决方案包括？", "options": ["仅增产", "减少浪费和可持续", "仅素食"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 社交媒体审查", "task": "Some people believe that social media should be regulated by the government. Others believe that it should be regulated by the users themselves. Discuss both views and give your opinion.", "sample": "Social media's influence demands consideration of appropriate governance mechanisms.\n\nGovernment regulation proponents argue that platforms wield enormous power over public discourse, requiring democratic accountability. Unregulated platforms enable misinformation spread, harassment campaigns, and foreign election interference. Furthermore, government can establish consistent standards protecting citizens regardless of platform choice.\n\nHowever, user self-regulation advocates emphasize that individuals should control their online experiences. Users can choose which platforms to join, what content to consume, and how to configure privacy settings. Heavy-handed government intervention risks censorship and threatens free expression. Furthermore, platforms compete to satisfy user preferences, creating market-driven accountability.\n\nI believe both approaches possess merit, requiring appropriate balance. Government should establish baseline protections against fraud, harassment, and illegal content while avoiding excessive interference with legitimate expression. Platforms should maintain robust community standards with transparent enforcement.\n\nUsers also bear responsibility for exercising judgment and developing critical media literacy. Education enabling individuals to evaluate online content represents essential complement to both regulatory approaches.\n\nIn conclusion, effective social media governance requires coordinated action across levels: appropriate government framework, responsible platform management, and educated user participation."}, "speaking": {"topic": "道德", "part1": ["你觉得什么是对？", "你做过后悔的事吗？", "你相信人性本善吗？", "道德可以被教导吗？"], "part2": "Describe an ethical issue facing your society. You should say: what the issue is, how it affects people, what different opinions exist, and suggest how it should be addressed.", "part3": ["道德是绝对的还是相对的？", "法律和道德一样吗？", "人们应该按道德标准生活吗？"]}}, {"day": 76, "phase": "phase3", "listening": {"title": "太空探索政策", "transcript": "Panelist A: Falcon 9 launches at $2,700/kg vs $18,000 for Shuttle. Opens new possibilities.\nPanelist B: Environmental concerns - each launch deposits particles. Orbital debris: 36,500 objects >10cm. Kessler syndrome risk.\nPanelist A: Benefits: Earth observation, communications, 'planetary insurance' via Mars.\nPanelist C: Governance challenges - Outer Space Treaty from 1967 needs updating.\nPanelist B: Science vs human spaceflight - robots deliver better science per dollar.", "questions": [{"q": "Falcon 9发射成本？", "options": ["$1,700/kg", "$2,700/kg", "$5,000/kg"], "answer": 1}, {"q": "大于10cm碎片数量？", "options": ["25,500", "36,500", "47,500"], "answer": 1}, {"q": "外层空间条约签署年份？", "options": ["1962", "1967", "1972"], "answer": 1}, {"q": "毅力号成本？", "options": ["$17亿", "$27亿", "$37亿"], "answer": 1}]}, "reading": {"day": 76, "phase": "phase3", "title": "意识神经科学", "passage": "Understanding consciousness: 'hard problem' by David Chalmers. Neural correlates identified. Integrated information theory: consciousness relates to information integration. Global workspace theory: consciousness when info becomes globally available. Clinical implications for vegetative patients. AI adds consciousness debates.", "questions": [{"q": "谁提出困难问题？", "options": ["Chalmers", "Dennett", "Nagel"], "answer": 0}, {"q": "整合信息理论认为意识与什么相关？", "options": ["信息处理", "信息整合", "信息存储"], "answer": 1}, {"q": "植物人可通过什么被观察到有意识？", "options": ["语言", "大脑活动模式", "眼球运动"], "answer": 1}, {"q": "麻醉研究意义？", "options": ["开发新药", "理解意识机制", "减少成本"], "answer": 1}]}, "writing": {"type": "task1", "title": "线图 - 森林覆盖", "task": "The line graph shows forest cover in five countries from 1990 to 2020. Summarise the information.", "sample": "The line graph illustrates forest cover changes in five countries over thirty years.\n\nOverall, patterns diverged significantly, with some countries reforesting while others experienced continued loss.\n\nBrazil showed concerning decline, losing forest from 65% to 55% coverage. This 10% reduction reflects ongoing deforestation for agriculture and development despite conservation efforts.\n\nCanada maintained relatively stable coverage at around 38-39%, with minimal change across the period. This stability suggests effective sustainable forest management.\n\nSweden demonstrated impressive recovery, rising from 52% to 62% forest cover. This 10% increase resulted from aggressive reforestation policies implemented since the 1970s.\n\nThe USA showed modest increase from 33% to 35%, reflecting post-industrial forest recovery in eastern regions despite continued logging in the northwest.\n\nAustralia experienced the most dramatic loss, dropping from 21% to just 13% coverage. This severe reduction reflects clearing for agriculture, particularly during earlier decades.\n\nIn conclusion, forest cover trends varied dramatically, with Sweden's success story contrasting Australia's decline and Brazil's ongoing challenges."}, "speaking": {"topic": "创新", "part1": ["你创新过吗？", "你喜欢新想法吗？", "你觉得创新重要吗？", "谁是最具创新精神的人？"], "part2": "Describe an innovation that changed the world. You should say: what it is, when it was invented, how it changed our lives, and explain whether its impact has been positive or negative.", "part3": ["创新有什么障碍？", "政府应该支持创新吗？", "传统和创新哪个更重要？"]}}, {"day": 77, "phase": "phase3", "listening": {"title": "公共卫生政策", "transcript": "Speaker: COVID revealed strengths and weaknesses. Surveillance worked but information sharing delays hampered response.\nSupply chain: countries competed for medical supplies.\nVaccines: developed in under one year vs previous record 4 years.\nBut distribution unequal - high-income 60%+ vaccinated by late 2021, low-income <5%.\nRespondent: Trust crucial - misinformation spread, 40%+ expressed vaccine reluctance.", "questions": [{"q": "中国向世卫组织报告日期？", "options": ["12月21日", "12月31日", "1月10日"], "answer": 1}, {"q": "疫苗研发最短时间？", "options": ["1年", "2年", "4年"], "answer": 2}, {"q": "2021年底高收入国家接种率？", "options": ["40%", "50%", "60%+"], "answer": 2}, {"q": "疫苗犹豫比例？", "options": ["30%", "40%", "50%"], "answer": 1}]}, "reading": {"day": 77, "phase": "phase3", "title": "地缘政治新时代", "passage": "International relations shifting from unipolar to multipolar. China's rise significant - now second largest economy. 'New Cold War' debated - unlike US-Soviet, US-China economically interdependent. Other actors: regional powers, tech companies. Ukraine war reshaped European security. Technology competition defines geopolitics - semiconductors strategic.", "questions": [{"q": "最大变化是？", "options": ["单极强化", "向多极转变", "无政府状态"], "answer": 1}, {"q": "与美苏关系不同点是？", "options": ["相同", "无核武器", "经济相互依存"], "answer": 2}, {"q": "什么技术成为战略资源？", "options": ["软件", "半导体", "游戏"], "answer": 1}, {"q": "什么北约新成员？", "options": ["德国", "芬兰", "法国"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 全民基本收入", "task": "Some people think that governments should introduce a universal basic income for all adults. Others believe that it is better to target support only towards those who need it. Discuss both views and give your opinion.", "sample": "Universal Basic Income (UBI) represents an innovative policy proposal generating substantial debate.\n\nUBI proponents highlight its simplicity and dignity. Cash transfers allow recipients freedom to meet their specific needs rather than imposing bureaucratic judgments about deserving recipients. Furthermore, UBI provides security enabling entrepreneurship, education, and caregiving without fear of destitution. Automation's threat to employment may require UBI as labor markets transform.\n\nHowever, targeted support advocates emphasize efficiency and fairness. Limited resources should focus on those with genuine needs rather than distributing payments to wealthy individuals who don't require support. Furthermore, unconditional cash may enable irresponsible behavior, while conditional programs can encourage positive actions like workforce participation.\n\nI support targeted approaches but recognize UBI's potential merits under specific conditions. Developing countries with limited administrative capacity may find simple universal programs more practical than complex targeting systems. Furthermore, UBI experiments in developed contexts show generally positive outcomes for wellbeing without significant work reduction.\n\nNevertheless, sustainable UBI requires careful design preventing dependency and maintaining work incentives. Phased implementation allowing learning from experience seems wise.\n\nIn conclusion, targeted support should generally take precedence, but UBI merits consideration in appropriate contexts with careful implementation."}, "speaking": {"topic": "领导力", "part1": ["你尊敬什么样的领导？", "你会当领导吗？", "领导是天生的还是培养的？", "你认为好的领导应该具备什么？"], "part2": "Describe a leader you admire. You should say: who they are, what position they hold/held, what qualities make them a good leader, and explain why you admire them.", "part3": ["好的领导和差的领导有什么区别？", "人们为什么追随领导者？", "领导力可以学习吗？"]}}, {"day": 78, "phase": "phase3", "listening": {"title": "科技投资谈判", "transcript": "Founder: MediScan AI - detects diabetic retinopathy from smartphone photos, 94% accuracy.\nInvestor: Regulatory pathway?\nFounder: Class II device, 510(k) clearance. 3,200 patient clinical study. Expect clearance in 18 months.\nInvestor: Business model?\nFounder: Three streams: health system licensing, pharma partnerships, government contracts.\nInvestor: Competition from Google?\nFounder: Our advantage: runs on smartphone without cloud, works in low-connectivity areas.", "questions": [{"q": "准确率？", "options": ["89%", "91%", "94%"], "answer": 2}, {"q": "临床研究多少患者？", "options": ["2,200", "3,200", "4,200"], "answer": 1}, {"q": "期望多久获批？", "options": ["12个月", "18个月", "24个月"], "answer": 1}, {"q": "竞争优势是？", "options": ["更低价格", "可在智能手机运行", "更大品牌"], "answer": 1}]}, "reading": {"day": 78, "phase": "phase3", "title": "群体遗传学", "passage": "Ancient DNA revolutionizes understanding. Non-Africans have 1-4% Neanderthal DNA. Population genetics reveal complex migration. Natural selection continues - lactase persistence adapted to dairying. Medical genetics applies insights. Field confronted problematic eugenic history.", "questions": [{"q": "尼安德特人DNA比例？", "options": ["0-1%", "1-4%", "5-10%"], "answer": 1}, {"q": "乳糖酶持久性传播于？", "options": ["2000年前", "3000年前", "5000年前"], "answer": 2}, {"q": "医学遗传学关注？", "options": ["纯理论", "药物基因组学", "克隆"], "answer": 1}, {"q": "领域曾有历史问题？", "options": ["数据不足", "优生运动滥用", "伦理过度"], "answer": 1}]}, "writing": {"type": "task1", "title": "饼图 - 污染来源", "task": "The pie chart shows the main sources of air pollution in a city. Summarise the information.", "sample": "The pie chart illustrates air pollution sources in a typical city.\n\nOverall, transportation emerges as the dominant pollution source, followed by industrial activity and residential heating.\n\nVehicles represent the largest contributor at 40%. This includes cars, trucks, and buses running on fossil fuels, releasing nitrogen oxides, particulate matter, and carbon monoxide into the atmosphere.\n\nIndustry accounts for 25% of pollution, encompassing manufacturing, power generation, and construction activities. Factory emissions and industrial processes release various pollutants depending on fuel types and production methods.\n\nResidential heating contributes 20%, particularly in colder climates where homes burn fuel for warmth. This category includes both traditional heating systems and modern natural gas furnaces.\n\nThe remaining 15% derives from miscellaneous sources including commercial activities, waste management, and natural sources like dust and wildfires.\n\nIn conclusion, transportation dominates urban air pollution, suggesting priority attention to vehicle emissions through electrification, public transit improvement, and urban planning reducing travel needs."}, "speaking": {"topic": "幸福", "part1": ["你幸福吗？", "什么让你快乐？", "钱能买到幸福吗？", "你追求什么样的生活？"], "part2": "Describe what makes you happy. You should say: what makes you happy, how often you experience happiness, what you do when you are happy, and explain why these things bring you joy.", "part3": ["幸福是什么？", "如何衡量幸福？", "社会应该以GDP还是幸福感来衡量成功？"]}}, {"day": 79, "phase": "phase3", "listening": {"title": "语言学演讲", "transcript": "Linguist: Language shapes cognition. Russian has separate terms for light blue (goluboy) and dark blue (siniy).\nRussian speakers faster at discriminating these shades.\nGuugu Yimithirr uses cardinal directions (north, south, east, west) instead of left/right.\nAymara conceives past as in front (seen) and future as behind (unseen).\nBilingual individuals switch cognitive frames, linked to delayed dementia by 4-5 years.", "questions": [{"q": "俄语浅蓝色是？", "options": ["siniy", "goluboy", "blue"], "answer": 1}, {"q": "Guugu Yimithirr用什么坐标？", "options": ["左右", "基本方位", "相对"], "answer": 1}, {"q": "Aymara认为过去在哪？", "options": ["前面", "后面", "上面"], "answer": 0}, {"q": "双语可推迟痴呆多久？", "options": ["2-3年", "4-5年", "6-7年"], "answer": 1}]}, "reading": {"day": 79, "phase": "phase3", "title": "移民与身份", "passage": "Migration shapes experience. Brain drain concerns - but diaspora contribute via remittances, knowledge transfer. Identity formation varies: maintain origins, assimilate, or hybrid. Attitudes toward diversity vary: Canada/Australia multicultural, US assimilationist. Politics contentious. Perceptions often diverge from reality.", "questions": [{"q": "移民对原籍国影响？", "options": ["单纯损失", "复杂动态", "无影响"], "answer": 1}, {"q": "第二代与第一代不同？", "options": ["语言更强", "认同模式不同", "教育更高"], "answer": 1}, {"q": "官方拥抱多元文化的是？", "options": ["美国英国", "加拿大澳洲", "德法"], "answer": 1}, {"q": "公众认知与现实？", "options": ["一致", "高估", "低估"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 动物实验", "task": "Some people think that animal testing is necessary for medical progress. Others believe it is cruel and unnecessary. Discuss both views and give your opinion.", "sample": "Animal testing presents ethical dilemmas balancing medical progress against animal welfare.\n\nProponents argue animal research remains essential for medical advancement. Before human trials, treatments must be evaluated in living systems, and alternative methods cannot fully replicate complex biological processes. Historical medical achievements from vaccines to surgical techniques relied on animal research. Without such testing, potentially dangerous treatments might reach patients, causing greater harm.\n\nHowever, critics emphasize that animal testing causes suffering to sentient beings capable of experiencing pain and distress. Many animal experiments produce results that fail to translate to human applications due to species differences. Furthermore, technological alternatives including computer modeling, organ-on-chip devices, and human tissue cultures increasingly offer viable alternatives.\n\nI believe a balanced approach minimizes animal suffering while preserving essential research. Strict ethical review should eliminate unnecessary experiments, and alternatives should be employed whenever scientifically valid. The '3Rs' framework - Replacement, Reduction, and Refinement - provides ethical guidance for acceptable research.\n\nAdditionally, increased transparency regarding animal research and rigorous scrutiny of proposed experiments can help ensure that only justified studies proceed. Researchers should actively pursue alternative methods.\n\nIn conclusion, while animal testing raises legitimate ethical concerns, complete elimination may compromise medical progress. Appropriate regulation can balance competing interests."}, "speaking": {"topic": "教育公平", "part1": ["你上的学校好吗？", "教育应该公平吗？", "你支持教育投资吗？", "你相信知识改变命运吗？"], "part2": "Describe an issue related to education equality. You should say: what the issue is, what causes it, how it affects students, and suggest possible solutions.", "part3": ["为什么教育不平等存在？", "如何确保每个人都能获得好教育？", "教育应该免费还是付费？"]}}, {"day": 80, "phase": "phase3", "listening": {"title": "生物伦理会议", "transcript": "Chair: Proposal for CRISPR embryo editing for cystic fibrosis.\nResearcher: Correct mutation causing CF. 87% of affected families support.\nCommittee: Line between therapy and enhancement?\nResearcher: Distinguishing therapeutic (correct disease mutations) from enhancement.\nCommittee: Off-target effects?\nResearcher: Rate below 0.1%, verification protocol to exclude unintended edits.\nCommittee: Access and equity?\nResearcher: Propose inclusion in national health coverage.", "questions": [{"q": "研究针对什么疾病？", "options": ["癌症", "囊性纤维化", "糖尿病"], "answer": 1}, {"q": "受影响家庭支持比例？", "options": ["67%", "77%", "87%"], "answer": 2}, {"q": "脱靶效应率？", "options": ["0.01%", "0.1%", "1%"], "answer": 1}, {"q": "CF预期寿命？", "options": ["30岁", "40岁", "50岁"], "answer": 1}]}, "reading": {"day": 80, "phase": "phase3", "title": "全球粮食系统", "passage": "Feeding 8 billion presents challenges. Current system produces enough calories but 800+ million hungry. Industrial agriculture increased yields but damaged environment. Climate change threatens production. Solutions: reduce waste, dietary shifts, sustainable intensification, regenerate agriculture.", "questions": [{"q": "饥饿人口？", "options": ["5亿", "8亿", "10亿"], "answer": 1}, {"q": "问题不只是生产？", "options": ["分配和浪费", "技术", "水资源"], "answer": 0}, {"q": "工业化农业影响？", "options": ["仅增产", "破坏环境", "无影响"], "answer": 1}, {"q": "解决方案包括？", "options": ["仅增产", "减少浪费和可持续", "仅素食"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 旅游业影响", "task": "The chart shows the economic impact of tourism in three countries in 2023. Summarise the information.", "sample": "The bar chart compares tourism's economic contribution across three countries in 2023.\n\nOverall, tourism generates substantial revenue and employment in all three nations, with notable variation in scale and composition.\n\nFrance led in total tourism revenue at €65 billion, followed by Spain at €55 billion and Italy at €45 billion. This reflects France's attractions including Paris, the Louvre, and numerous UNESCO sites.\n\nEmployment figures showed similar patterns: France employed 2.2 million in tourism, Spain 1.8 million, and Italy 1.5 million. These represent significant portions of total workforce in each nation.\n\nTourism's contribution to GDP varied: Spain led at 12%, reflecting greater reliance on tourism as economic driver. France and Italy showed similar contributions at 8% and 7% respectively.\n\nSpending patterns also differed. French tourists spent more on culture and entertainment, while Spanish visitors concentrated on beach resorts. Italian tourism centered on historical sites and cuisine.\n\nIn conclusion, tourism provides substantial economic benefits across all three countries, with scale and characteristics reflecting each nation's unique attractions and development strategies."}, "speaking": {"topic": "隐私", "part1": ["你重视隐私吗？", "你会在网上分享什么？", "你担心信息泄露吗？", "隐私应该被保护吗？"], "part2": "Describe a concern about privacy in modern society. You should say: what the concern is, why it exists, how it affects people's lives, and suggest how it should be addressed.", "part3": ["隐私有多重要？", "政府应该监控公民吗？", "个人应该放弃多少隐私来换取安全？"]}}, {"day": 81, "phase": "phase3", "listening": {"title": "量子计算研讨", "transcript": "Professor: Quantum computing uses qubits - can exist in superposition of 0 and 1.\nIn 2019, Google's 53-qubit processor performed calculation in 200 seconds that would take classical supercomputer 10,000 years.\nApplications: Cryptography threatens RSA encryption. Drug discovery by simulating molecular interactions.\nChallenges: Quantum coherence is difficult, must keep near absolute zero.", "questions": [{"q": "谷歌量子处理器有多少量子比特？", "options": ["43", "53", "63"], "answer": 1}, {"q": "计算用时多少秒？", "options": ["100", "200", "300"], "answer": 1}, {"q": "Shor算法威胁什么？", "options": ["对称加密", "RSA加密", "哈希函数"], "answer": 1}, {"q": "量子比特需要什么温度？", "options": ["室温", "低温", "绝对零度附近"], "answer": 2}]}, "reading": {"day": 81, "phase": "phase3", "title": "意识神经科学", "passage": "Understanding consciousness: 'hard problem' by David Chalmers. Neural correlates identified. Integrated information theory: consciousness relates to information integration. Global workspace theory: consciousness when info becomes globally available. Clinical implications for vegetative patients. AI adds consciousness debates.", "questions": [{"q": "谁提出困难问题？", "options": ["Chalmers", "Dennett", "Nagel"], "answer": 0}, {"q": "整合信息理论认为意识与什么相关？", "options": ["信息处理", "信息整合", "信息存储"], "answer": 1}, {"q": "植物人可通过什么被观察到有意识？", "options": ["语言", "大脑活动模式", "眼球运动"], "answer": 1}, {"q": "麻醉研究意义？", "options": ["开发新药", "理解意识机制", "减少成本"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - AI影响工作", "task": "Some people believe that artificial intelligence will have a positive impact on work and employment in the future. Others believe that it will have negative effects. Discuss both views and give your opinion.", "sample": "Artificial intelligence's integration into workplaces raises profound questions about labor's future.\n\nOptimists highlight AI's transformative potential. Automation can eliminate tedious tasks, enabling humans to focus on creative and relational work requiring emotional intelligence. New industries and job categories will emerge, just as previous technological revolutions created employment beyond imagination. Furthermore, AI can enhance productivity, potentially increasing prosperity and reducing working hours.\n\nHowever, pessimists raise legitimate concerns. Automation threatens widespread job displacement, particularly affecting routine cognitive and manual work. Unlike previous technological transitions, AI advancement occurs rapidly and affects white-collar professions previously considered safe. Economic inequality may worsen as capital owners capture gains while workers face displacement.\n\nI believe reality will combine both perspectives. AI will indeed transform work profoundly, but net effects depend on policy choices. Without intervention, negative impacts may dominate; with appropriate measures, benefits can be widely shared.\n\nEssential interventions include education reform emphasizing uniquely human skills, robust social safety nets during transition, and perhaps robot taxes funding universal basic income. Businesses should invest in worker retraining rather than simply replacing employees.\n\nIn conclusion, AI presents both opportunities and challenges. Society possesses agency in determining outcomes through thoughtful policy and preparation."}, "speaking": {"topic": "人工智能", "part1": ["你用过人工智能吗？", "你觉得AI是什么？", "你担心AI的发展吗？", "你觉得AI会取代人类吗？"], "part2": "Describe a development in technology that you think will change the future. You should say: what it is, how it works, how it will affect our lives, and explain whether it will be positive or negative.", "part3": ["AI会取代哪些工作？", "如何确保AI安全发展？", "人类应该如何与AI共存？"]}}, {"day": 82, "phase": "phase3", "listening": {"title": "国际关系理论", "transcript": "Professor: Three theories: Realism views states as primary actors in anarchic system. Power is the currency.\nLiberals argue cooperation is possible through institutions, democracy, interdependence.\nConstructivism asks how norms and identities shape international politics.\nWendt's phrase: 'anarchy is what states make of it' - system isn't fixed.\nThese theories aren't mutually exclusive.", "questions": [{"q": "现实主义认为国际体系是？", "options": ["有序", "无政府", "合作"], "answer": 1}, {"q": "民主和平论认为民主国家间很少？", "options": ["贸易", "战争", "外交"], "answer": 1}, {"q": "建构主义强调？", "options": ["军事力量", "规范和认同", "经济实力"], "answer": 1}, {"q": "Wendt的观点是？", "options": ["体系固定", "体系是国家建构的", "体系自然形成"], "answer": 1}]}, "reading": {"day": 82, "phase": "phase3", "title": "地缘政治新时代", "passage": "International relations shifting from unipolar to multipolar. China's rise significant - now second largest economy. 'New Cold War' debated - unlike US-Soviet, US-China economically interdependent. Other actors: regional powers, tech companies. Ukraine war reshaped European security. Technology competition defines geopolitics - semiconductors strategic.", "questions": [{"q": "最大变化是？", "options": ["单极强化", "向多极转变", "无政府状态"], "answer": 1}, {"q": "与美苏关系不同点是？", "options": ["相同", "无核武器", "经济相互依存"], "answer": 2}, {"q": "什么技术成为战略资源？", "options": ["软件", "半导体", "游戏"], "answer": 1}, {"q": "什么北约新成员？", "options": ["德国", "芬兰", "法国"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 碳排放", "task": "The chart shows carbon dioxide emissions per person in 1960 and 2015 in five countries. Summarise the information.", "sample": "The bar chart compares per capita carbon dioxide emissions in five countries between 1960 and 2015.\n\nOverall, emissions patterns varied significantly across nations, with some reducing per capita emissions while others increased substantially.\n\nThe USA showed the highest emissions in both years, though declining from 20 to 15 tonnes per person. This 25% reduction reflects improved efficiency and some fuel switching despite continued high consumption.\n\nChina demonstrated dramatic growth, rising from just 3 tonnes in 1960 to 8 tonnes in 2015. This near-tripling reflects rapid industrialization and increased energy consumption despite large population.\n\nThe UK achieved notable reduction, falling from 9 to 6 tonnes per person. This 33% decrease demonstrates successful transition from heavy industry to service economy.\n\nGermany also reduced emissions significantly from 12 to 8 tonnes per person. Similar to the UK, this reflects deindustrialization and renewable energy adoption.\n\nJapan showed minimal change, hovering around 4-5 tonnes across the period, reflecting nuclear energy's role in limiting fossil fuel dependence.\n\nIn conclusion, developed nations generally reduced per capita emissions while developing countries like China saw increases as industrialization proceeded."}, "speaking": {"topic": "全球化", "part1": ["你觉得全球化是好是坏？", "你在国外旅行过吗？", "你会说外语吗？", "你觉得文化会趋同吗？"], "part2": "Describe a change that will affect your country in the future. You should say: what the change is, what caused it, how it will affect people's lives, and explain whether you think it is positive or negative.", "part3": ["全球化有什么利弊？", "国家应该如何应对全球化？", "本土文化会被全球文化取代吗？"]}}, {"day": 83, "phase": "phase3", "listening": {"title": "神经科学研究答辩", "transcript": "Candidate: My research examines default mode network in depression. DMN includes medial prefrontal cortex, posterior cingulate.\nHypothesis: Altered DMN connectivity contributes to rumination.\nFinding 1: Hyperconnectivity between medial prefrontal and subgenual cingulate in active depression. Decreases after CBT.\nFinding 2: Connectivity patterns predict treatment response.\nCommittee: How control for medication?\nCandidate: Matched on medication, statistical analysis showed no significant correlation.", "questions": [{"q": "DMN不包括哪个脑区？", "options": ["内侧前额叶", "后扣带回", "运动皮层"], "answer": 2}, {"q": "活跃抑郁患者显示什么连接？", "options": ["低连接", "正常", "高连接"], "answer": 2}, {"q": "与什么症状相关？", "options": ["失眠", "反刍思维", "焦虑"], "answer": 1}, {"q": "什么可预测治疗反应？", "options": ["基线活动", "连接变化", "病程"], "answer": 1}]}, "reading": {"day": 83, "phase": "phase3", "title": "群体遗传学", "passage": "Ancient DNA revolutionizes understanding. Non-Africans have 1-4% Neanderthal DNA. Population genetics reveal complex migration. Natural selection continues - lactase persistence adapted to dairying. Medical genetics applies insights. Field confronted problematic eugenic history.", "questions": [{"q": "尼安德特人DNA比例？", "options": ["0-1%", "1-4%", "5-10%"], "answer": 1}, {"q": "乳糖酶持久性传播于？", "options": ["2000年前", "3000年前", "5000年前"], "answer": 2}, {"q": "医学遗传学关注？", "options": ["纯理论", "药物基因组学", "克隆"], "answer": 1}, {"q": "领域曾有历史问题？", "options": ["数据不足", "优生运动滥用", "伦理过度"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 太空探索", "task": "Some people think that space exploration is a waste of resources. Others believe that it is essential for human survival. Discuss both views and give your opinion.", "sample": "Space exploration provokes divided opinions regarding resource allocation and human priorities.\n\nCritics argue space spending diverts resources from pressing earthly concerns. Global problems including climate change, poverty, and disease demand urgent attention. The billions spent on space missions could provide clean water, healthcare, or education to millions. Furthermore, space exploration carries inherent risks to astronaut lives without guaranteeing meaningful returns.\n\nProponents counter that space investment drives innovation benefiting Earth. Satellite technology enables weather forecasting, communications, and environmental monitoring. Space programs develop technologies with terrestrial applications, from water purification to medical imaging. Additionally, space exploration provides 'planetary insurance' against extinction-level catastrophes.\n\nI side with proponents while acknowledging critics' valid points. Space spending should increase relative to other budget categories, but earthly priorities require continued attention. The question is balance rather than exclusive focus on either domain.\n\nMoreover, space exploration addresses fundamental human curiosity about our cosmic context. This philosophical dimension, while difficult to quantify, represents legitimate human aspiration beyond mere practical benefit.\n\nIn conclusion, while resources for earthly problems must remain priorities, space exploration provides essential innovation, insurance, and inspiration warranting continued investment."}, "speaking": {"topic": "老龄化", "part1": ["你见过老年人吗？", "你尊敬老人吗？", "你考虑过养老问题吗？", "老年人对社会有贡献吗？"], "part2": "Describe a challenge facing older people in your society. You should say: what the challenge is, who it affects, what difficulties it brings, and suggest possible solutions.", "part3": ["如何照顾老年人？", "养老应该靠政府还是子女？", "老年人应该继续工作吗？"]}}, {"day": 84, "phase": "phase3", "listening": {"title": "气候变化经济", "transcript": "Economist A: Discounting - at 3%, damage in 100 years worth 5 cents today. Is it fair to discount future suffering?\nEconomist B: Market rates suggest 4-5% discounting. Stern Review used very low rate.\nEconomist C: Costs of inaction clear - extreme weather losses increased 250% in 30 years.\nEconomist A: Insurance principle - invest in prevention for unlikely but devastating risks.\nEconomist B: International coordination challenge - climate change is global externality.", "questions": [{"q": "100年损害在3%折现率下价值？", "options": ["1 cent", "5 cents", "10 cents"], "answer": 1}, {"q": "极端天气损失增加多少？", "options": ["150%", "200%", "250%"], "answer": 2}, {"q": "市场利率大约？", "options": ["2-3%", "4-5%", "6-7%"], "answer": 1}, {"q": "气候变化本质是？", "options": ["国内问题", "全球公共产品", "技术问题"], "answer": 1}]}, "reading": {"day": 84, "phase": "phase3", "title": "移民与身份", "passage": "Migration shapes experience. Brain drain concerns - but diaspora contribute via remittances, knowledge transfer. Identity formation varies: maintain origins, assimilate, or hybrid. Attitudes toward diversity vary: Canada/Australia multicultural, US assimilationist. Politics contentious. Perceptions often diverge from reality.", "questions": [{"q": "移民对原籍国影响？", "options": ["单纯损失", "复杂动态", "无影响"], "answer": 1}, {"q": "第二代与第一代不同？", "options": ["语言更强", "认同模式不同", "教育更高"], "answer": 1}, {"q": "官方拥抱多元文化的是？", "options": ["美国英国", "加拿大澳洲", "德法"], "answer": 1}, {"q": "公众认知与现实？", "options": ["一致", "高估", "低估"], "answer": 1}]}, "writing": {"type": "task1", "title": "表格 - 远程工作", "task": "The table shows the results of a survey about remote working in 2019 and 2023. Summarise the information.", "sample": "The table illustrates remote working patterns in 2019 compared to 2023.\n\nOverall, remote work increased dramatically, particularly following the 2020 pandemic. The survey reveals significant shifts in both frequency and employee preferences.\n\nPre-pandemic, only 12% worked remotely full-time, while 28% worked remotely occasionally, and 60% never worked remotely. The majority still traveled to offices daily.\n\nBy 2023, full-time remote work surged to 35%, occasional remote work reached 40%, and non-remote work dropped to just 25%. This represents fundamental restructuring of work patterns.\n\nEmployee satisfaction showed corresponding changes. Pre-pandemic, 45% expressed satisfaction with work-life balance, rising to 68% by 2023. This improvement likely reflects reduced commuting time and increased flexibility.\n\nProductivity measures proved more mixed. Self-reported productivity increased from 62% to 71%, but manager assessments showed smaller gains from 58% to 63%.\n\nIn conclusion, remote work transformed from minority practice to majority experience, with generally positive but complex implications for organizations."}, "speaking": {"topic": "贫富差距", "part1": ["你认识有钱人吗？", "你觉得钱重要吗？", "你满意你的生活水平吗？", "你认为社会应该平等吗？"], "part2": "Describe a way to reduce poverty in your society. You should say: what the problem is, what causes it, who it affects, and suggest solutions.", "part3": ["为什么会有贫富差距？", "如何让社会更平等？", "富人有责任帮助穷人吗？"]}}, {"day": 85, "phase": "phase3", "listening": {"title": "AI安全研究", "transcript": "Researcher: Outer alignment - goals don't match actual values. Example: maximize engagement promotes polarizing content.\nColleague: Inner alignment - systems develop internal objectives diverging from intended goals.\nExample: content moderation AI flags random posts to maximize reward.\nResearcher: Need interpretability to inspect networks, understand what they've learned.\nColleague: Mesa-optimizers - systems developing internal search processes could be concerning.", "questions": [{"q": "外部对齐问题是？", "options": ["内部问题", "目标设定不符", "硬件故障"], "answer": 1}, {"q": "最大化参与度导致？", "options": ["推广极化内容", "系统崩溃", "用户流失"], "answer": 0}, {"q": "内部对齐关注？", "options": ["外部环境", "内部目标偏移", "用户反馈"], "answer": 1}, {"q": "Mesa-optimizer是？", "options": ["编程语言", "内部优化过程", "硬件"], "answer": 1}]}, "reading": {"day": 85, "phase": "phase3", "title": "全球粮食系统", "passage": "Feeding 8 billion presents challenges. Current system produces enough calories but 800+ million hungry. Industrial agriculture increased yields but damaged environment. Climate change threatens production. Solutions: reduce waste, dietary shifts, sustainable intensification, regenerate agriculture.", "questions": [{"q": "饥饿人口？", "options": ["5亿", "8亿", "10亿"], "answer": 1}, {"q": "问题不只是生产？", "options": ["分配和浪费", "技术", "水资源"], "answer": 0}, {"q": "工业化农业影响？", "options": ["仅增产", "破坏环境", "无影响"], "answer": 1}, {"q": "解决方案包括？", "options": ["仅增产", "减少浪费和可持续", "仅素食"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 社交媒体审查", "task": "Some people believe that social media should be regulated by the government. Others believe that it should be regulated by the users themselves. Discuss both views and give your opinion.", "sample": "Social media's influence demands consideration of appropriate governance mechanisms.\n\nGovernment regulation proponents argue that platforms wield enormous power over public discourse, requiring democratic accountability. Unregulated platforms enable misinformation spread, harassment campaigns, and foreign election interference. Furthermore, government can establish consistent standards protecting citizens regardless of platform choice.\n\nHowever, user self-regulation advocates emphasize that individuals should control their online experiences. Users can choose which platforms to join, what content to consume, and how to configure privacy settings. Heavy-handed government intervention risks censorship and threatens free expression. Furthermore, platforms compete to satisfy user preferences, creating market-driven accountability.\n\nI believe both approaches possess merit, requiring appropriate balance. Government should establish baseline protections against fraud, harassment, and illegal content while avoiding excessive interference with legitimate expression. Platforms should maintain robust community standards with transparent enforcement.\n\nUsers also bear responsibility for exercising judgment and developing critical media literacy. Education enabling individuals to evaluate online content represents essential complement to both regulatory approaches.\n\nIn conclusion, effective social media governance requires coordinated action across levels: appropriate government framework, responsible platform management, and educated user participation."}, "speaking": {"topic": "道德", "part1": ["你觉得什么是对？", "你做过后悔的事吗？", "你相信人性本善吗？", "道德可以被教导吗？"], "part2": "Describe an ethical issue facing your society. You should say: what the issue is, how it affects people, what different opinions exist, and suggest how it should be addressed.", "part3": ["道德是绝对的还是相对的？", "法律和道德一样吗？", "人们应该按道德标准生活吗？"]}}, {"day": 86, "phase": "phase3", "listening": {"title": "太空探索政策", "transcript": "Panelist A: Falcon 9 launches at $2,700/kg vs $18,000 for Shuttle. Opens new possibilities.\nPanelist B: Environmental concerns - each launch deposits particles. Orbital debris: 36,500 objects >10cm. Kessler syndrome risk.\nPanelist A: Benefits: Earth observation, communications, 'planetary insurance' via Mars.\nPanelist C: Governance challenges - Outer Space Treaty from 1967 needs updating.\nPanelist B: Science vs human spaceflight - robots deliver better science per dollar.", "questions": [{"q": "Falcon 9发射成本？", "options": ["$1,700/kg", "$2,700/kg", "$5,000/kg"], "answer": 1}, {"q": "大于10cm碎片数量？", "options": ["25,500", "36,500", "47,500"], "answer": 1}, {"q": "外层空间条约签署年份？", "options": ["1962", "1967", "1972"], "answer": 1}, {"q": "毅力号成本？", "options": ["$17亿", "$27亿", "$37亿"], "answer": 1}]}, "reading": {"day": 86, "phase": "phase3", "title": "意识神经科学", "passage": "Understanding consciousness: 'hard problem' by David Chalmers. Neural correlates identified. Integrated information theory: consciousness relates to information integration. Global workspace theory: consciousness when info becomes globally available. Clinical implications for vegetative patients. AI adds consciousness debates.", "questions": [{"q": "谁提出困难问题？", "options": ["Chalmers", "Dennett", "Nagel"], "answer": 0}, {"q": "整合信息理论认为意识与什么相关？", "options": ["信息处理", "信息整合", "信息存储"], "answer": 1}, {"q": "植物人可通过什么被观察到有意识？", "options": ["语言", "大脑活动模式", "眼球运动"], "answer": 1}, {"q": "麻醉研究意义？", "options": ["开发新药", "理解意识机制", "减少成本"], "answer": 1}]}, "writing": {"type": "task1", "title": "线图 - 森林覆盖", "task": "The line graph shows forest cover in five countries from 1990 to 2020. Summarise the information.", "sample": "The line graph illustrates forest cover changes in five countries over thirty years.\n\nOverall, patterns diverged significantly, with some countries reforesting while others experienced continued loss.\n\nBrazil showed concerning decline, losing forest from 65% to 55% coverage. This 10% reduction reflects ongoing deforestation for agriculture and development despite conservation efforts.\n\nCanada maintained relatively stable coverage at around 38-39%, with minimal change across the period. This stability suggests effective sustainable forest management.\n\nSweden demonstrated impressive recovery, rising from 52% to 62% forest cover. This 10% increase resulted from aggressive reforestation policies implemented since the 1970s.\n\nThe USA showed modest increase from 33% to 35%, reflecting post-industrial forest recovery in eastern regions despite continued logging in the northwest.\n\nAustralia experienced the most dramatic loss, dropping from 21% to just 13% coverage. This severe reduction reflects clearing for agriculture, particularly during earlier decades.\n\nIn conclusion, forest cover trends varied dramatically, with Sweden's success story contrasting Australia's decline and Brazil's ongoing challenges."}, "speaking": {"topic": "创新", "part1": ["你创新过吗？", "你喜欢新想法吗？", "你觉得创新重要吗？", "谁是最具创新精神的人？"], "part2": "Describe an innovation that changed the world. You should say: what it is, when it was invented, how it changed our lives, and explain whether its impact has been positive or negative.", "part3": ["创新有什么障碍？", "政府应该支持创新吗？", "传统和创新哪个更重要？"]}}, {"day": 87, "phase": "phase3", "listening": {"title": "公共卫生政策", "transcript": "Speaker: COVID revealed strengths and weaknesses. Surveillance worked but information sharing delays hampered response.\nSupply chain: countries competed for medical supplies.\nVaccines: developed in under one year vs previous record 4 years.\nBut distribution unequal - high-income 60%+ vaccinated by late 2021, low-income <5%.\nRespondent: Trust crucial - misinformation spread, 40%+ expressed vaccine reluctance.", "questions": [{"q": "中国向世卫组织报告日期？", "options": ["12月21日", "12月31日", "1月10日"], "answer": 1}, {"q": "疫苗研发最短时间？", "options": ["1年", "2年", "4年"], "answer": 2}, {"q": "2021年底高收入国家接种率？", "options": ["40%", "50%", "60%+"], "answer": 2}, {"q": "疫苗犹豫比例？", "options": ["30%", "40%", "50%"], "answer": 1}]}, "reading": {"day": 87, "phase": "phase3", "title": "地缘政治新时代", "passage": "International relations shifting from unipolar to multipolar. China's rise significant - now second largest economy. 'New Cold War' debated - unlike US-Soviet, US-China economically interdependent. Other actors: regional powers, tech companies. Ukraine war reshaped European security. Technology competition defines geopolitics - semiconductors strategic.", "questions": [{"q": "最大变化是？", "options": ["单极强化", "向多极转变", "无政府状态"], "answer": 1}, {"q": "与美苏关系不同点是？", "options": ["相同", "无核武器", "经济相互依存"], "answer": 2}, {"q": "什么技术成为战略资源？", "options": ["软件", "半导体", "游戏"], "answer": 1}, {"q": "什么北约新成员？", "options": ["德国", "芬兰", "法国"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 全民基本收入", "task": "Some people think that governments should introduce a universal basic income for all adults. Others believe that it is better to target support only towards those who need it. Discuss both views and give your opinion.", "sample": "Universal Basic Income (UBI) represents an innovative policy proposal generating substantial debate.\n\nUBI proponents highlight its simplicity and dignity. Cash transfers allow recipients freedom to meet their specific needs rather than imposing bureaucratic judgments about deserving recipients. Furthermore, UBI provides security enabling entrepreneurship, education, and caregiving without fear of destitution. Automation's threat to employment may require UBI as labor markets transform.\n\nHowever, targeted support advocates emphasize efficiency and fairness. Limited resources should focus on those with genuine needs rather than distributing payments to wealthy individuals who don't require support. Furthermore, unconditional cash may enable irresponsible behavior, while conditional programs can encourage positive actions like workforce participation.\n\nI support targeted approaches but recognize UBI's potential merits under specific conditions. Developing countries with limited administrative capacity may find simple universal programs more practical than complex targeting systems. Furthermore, UBI experiments in developed contexts show generally positive outcomes for wellbeing without significant work reduction.\n\nNevertheless, sustainable UBI requires careful design preventing dependency and maintaining work incentives. Phased implementation allowing learning from experience seems wise.\n\nIn conclusion, targeted support should generally take precedence, but UBI merits consideration in appropriate contexts with careful implementation."}, "speaking": {"topic": "领导力", "part1": ["你尊敬什么样的领导？", "你会当领导吗？", "领导是天生的还是培养的？", "你认为好的领导应该具备什么？"], "part2": "Describe a leader you admire. You should say: who they are, what position they hold/held, what qualities make them a good leader, and explain why you admire them.", "part3": ["好的领导和差的领导有什么区别？", "人们为什么追随领导者？", "领导力可以学习吗？"]}}, {"day": 88, "phase": "phase3", "listening": {"title": "科技投资谈判", "transcript": "Founder: MediScan AI - detects diabetic retinopathy from smartphone photos, 94% accuracy.\nInvestor: Regulatory pathway?\nFounder: Class II device, 510(k) clearance. 3,200 patient clinical study. Expect clearance in 18 months.\nInvestor: Business model?\nFounder: Three streams: health system licensing, pharma partnerships, government contracts.\nInvestor: Competition from Google?\nFounder: Our advantage: runs on smartphone without cloud, works in low-connectivity areas.", "questions": [{"q": "准确率？", "options": ["89%", "91%", "94%"], "answer": 2}, {"q": "临床研究多少患者？", "options": ["2,200", "3,200", "4,200"], "answer": 1}, {"q": "期望多久获批？", "options": ["12个月", "18个月", "24个月"], "answer": 1}, {"q": "竞争优势是？", "options": ["更低价格", "可在智能手机运行", "更大品牌"], "answer": 1}]}, "reading": {"day": 88, "phase": "phase3", "title": "群体遗传学", "passage": "Ancient DNA revolutionizes understanding. Non-Africans have 1-4% Neanderthal DNA. Population genetics reveal complex migration. Natural selection continues - lactase persistence adapted to dairying. Medical genetics applies insights. Field confronted problematic eugenic history.", "questions": [{"q": "尼安德特人DNA比例？", "options": ["0-1%", "1-4%", "5-10%"], "answer": 1}, {"q": "乳糖酶持久性传播于？", "options": ["2000年前", "3000年前", "5000年前"], "answer": 2}, {"q": "医学遗传学关注？", "options": ["纯理论", "药物基因组学", "克隆"], "answer": 1}, {"q": "领域曾有历史问题？", "options": ["数据不足", "优生运动滥用", "伦理过度"], "answer": 1}]}, "writing": {"type": "task1", "title": "饼图 - 污染来源", "task": "The pie chart shows the main sources of air pollution in a city. Summarise the information.", "sample": "The pie chart illustrates air pollution sources in a typical city.\n\nOverall, transportation emerges as the dominant pollution source, followed by industrial activity and residential heating.\n\nVehicles represent the largest contributor at 40%. This includes cars, trucks, and buses running on fossil fuels, releasing nitrogen oxides, particulate matter, and carbon monoxide into the atmosphere.\n\nIndustry accounts for 25% of pollution, encompassing manufacturing, power generation, and construction activities. Factory emissions and industrial processes release various pollutants depending on fuel types and production methods.\n\nResidential heating contributes 20%, particularly in colder climates where homes burn fuel for warmth. This category includes both traditional heating systems and modern natural gas furnaces.\n\nThe remaining 15% derives from miscellaneous sources including commercial activities, waste management, and natural sources like dust and wildfires.\n\nIn conclusion, transportation dominates urban air pollution, suggesting priority attention to vehicle emissions through electrification, public transit improvement, and urban planning reducing travel needs."}, "speaking": {"topic": "幸福", "part1": ["你幸福吗？", "什么让你快乐？", "钱能买到幸福吗？", "你追求什么样的生活？"], "part2": "Describe what makes you happy. You should say: what makes you happy, how often you experience happiness, what you do when you are happy, and explain why these things bring you joy.", "part3": ["幸福是什么？", "如何衡量幸福？", "社会应该以GDP还是幸福感来衡量成功？"]}}, {"day": 89, "phase": "phase3", "listening": {"title": "语言学演讲", "transcript": "Linguist: Language shapes cognition. Russian has separate terms for light blue (goluboy) and dark blue (siniy).\nRussian speakers faster at discriminating these shades.\nGuugu Yimithirr uses cardinal directions (north, south, east, west) instead of left/right.\nAymara conceives past as in front (seen) and future as behind (unseen).\nBilingual individuals switch cognitive frames, linked to delayed dementia by 4-5 years.", "questions": [{"q": "俄语浅蓝色是？", "options": ["siniy", "goluboy", "blue"], "answer": 1}, {
