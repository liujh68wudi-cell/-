[{"q":"What has the COVID-19 pandemic done to the digital divide?","options":["Reduced it significantly","Exposed and amplified it","Eliminated it entirely"],"answer":1},{"q":"Which group was NOT mentioned as experiencing lower digital engagement?","options":["Children under 10","Older people","Lower-income households"],"answer":0},{"q":"What programme aims to improve digital health literacy?","options":["Digital NHS Skills","NHS Digital Skills programme","Health Tech Access"],"answer":1},{"q":"What government scheme helps households upgrade to fibre broadband?","options":["Superfast Britain","Gigabit Broadband Voucher Scheme","Fibre for All Initiative"],"answer":1}]},"writing":{"type":"task1","title":"线图 - 通信方式","task":"The line graph shows how people sent letters in 1998, 2002, 2006, 2010, and 2014. Summarise the information.","sample":"The line graph illustrates changes in letter sending in a country from 1998 to 2014.\n\nOverall, letter sending declined dramatically over the period, with email and messaging replacing traditional postal services.\n\nIn 1998, approximately 2.2 billion letters were sent, representing traditional mail's peak. This figure remained relatively stable through 2002 at about 2.1 billion.\n\nHowever, the decline accelerated from 2006 onward. Letters dropped to 1.5 billion in 2006, then continued falling to 800 million in 2010 and just 300 million in 2014. This represents an 86% decrease over sixteen years.\n\nThe pattern clearly reflects technological substitution. As internet access expanded, electronic communication increasingly replaced physical letters for personal and business correspondence.\n\nIn conclusion, the graph demonstrates technology's transformative impact on communication, with traditional letters nearly disappearing within sixteen years."},"speaking":{"topic":"城市","part1":["你住在城市还是农村？","你最喜欢城市的什么？","你所在的城市有什么问题？","你想住在哪个城市？"],"part2":"Describe a city you would like to visit. You should say: which city it is, where it is located, what you know about it, and explain why you would like to visit.","part3":["城市化有什么优缺点？","大城市好还是小城市好？","如何解决城市交通问题？"]}},{"day":39,"phase":"phase2","listening":{"title":"城市规划 consultation","transcript":"Planner: Riverside Development Project - 15 hectares, 800 new homes, 30% affordable housing.\nTraffic: new pedestrian/cyclist bridge, car traffic from main road.\nGreen space: 40% for parks, native trees, wildlife corridors.\nBuildings: tallest (12 stories) face river, not existing homes.\nResident: Construction noise concern?\nPlanner: 5 years, phases start far from homes, community liaison available.","questions":[{"q":"开发面积？","options":["10公顷","15公顷","20公顷"],"answer":1},{"q":"保障性住房比例？","options":["25%","30%","35%"],"answer":1},{"q":"绿地比例？","options":["30%","35%","40%"],"answer":2},{"q":"最高建筑？","options":["10层","12层","15层"],"answer":1}]},"reading":{"title":"Sustainable Agriculture","passage":"Sustainable agriculture encompasses a broad set of farming practices and food production systems designed to meet current societal needs for food and textile products while preserving the ecological systems and natural resources upon which future food production depends, recognising that agricultural activities are both a major driver of environmental degradation and a crucial component of any credible strategy for addressing climate change, biodiversity loss, and water scarcity. Conventional industrial agriculture, which emerged in the mid-20th century and now dominates food production in most developed and many developing countries, is characterised by specialisation, mechanisation, synthetic fertilisers and pesticides, monoculture cropping systems, and intensive livestock production, all of which have delivered dramatic increases in yields and reductions in the real cost of food but at significant environmental cost. The environmental impacts of conventional agriculture include soil degradation and erosion, with an estimated one-third of the world's arable land having been lost to degradation over the past 40 years; water pollution from nitrogen and phosphorus fertilisers and pesticide runoff; greenhouse gas emissions from fertiliser production, livestock methane, and land use change; and the simplification of agricultural landscapes and the collapse of insect and bird populations that depend on farmland habitats. Sustainable farming approaches, including agroecology, conservation agriculture, integrated pest management, organic farming, and regenerative agriculture, offer alternative paradigms that seek to work with natural processes rather than against them, building soil health, reducing inputs, enhancing biodiversity, and sequestering carbon in agricultural soils. The challenge of scaling sustainable agriculture is considerable, as sustainable farming methods typically require more labour, knowledge, and management skill than conventional approaches, and often produce somewhat lower yields in the short term, creating economic pressures on farmers who must compete with cheaper conventionally produced food. Agriculture occupies a paradoxical position in the sustainability debate: it is simultaneously a major source of environmental harm and a potential solution to some of the most pressing challenges of climate change and biodiversity loss. In the United Kingdom, the food system accounts for approximately 20 percent of greenhouse gas emissions, with livestock production, synthetic fertiliser use, and land use change among the most significant contributors. Yet farmers also manage the vast majority of the UK land area, giving them a central role in delivering nature recovery, carbon sequestration, and flood management objectives. The transition away from the Common Agricultural Policy following Brexit has created both opportunities and challenges.","questions":[{"q":"What percentage of the world's arable land has been lost to degradation over 40 years?","options":["About 10 percent","About one-third","About one-half"],"answer":1},{"q":"What type of agriculture emerged in the mid-20th century?","options":["Organic farming","Industrial agriculture","Subsistence farming"],"answer":1},{"q":"What farming approach seeks to work with natural processes?","options":["Monoculture farming","Agroecology","Chemical farming"],"answer":1},{"q":"What do sustainable farming methods typically require more of?","options":["Synthetic fertilisers","Labour and management skill","Water"],"answer":1}]},"writing":{"type":"task2","title":"观点类 - 城市规划","task":"Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?","sample":"Transportation infrastructure investment decisions significantly impact economic development, environmental sustainability, and quality of life.\n\nRailways offer compelling advantages warranting increased investment. Environmental considerations strongly favor rail: electric trains produce lower emissions per passenger than individual vehicles. As climate urgency increases, transitioning toward rail becomes essential for meeting emissions targets.\n\nRailway efficiency also supports the economic argument. High-speed rail can transport more passengers per hour than highway lanes. In densely populated regions, rail provides superior capacity while requiring less land. Furthermore, rail investment creates employment during construction and operation.\n\nHowever, roads maintain important functions that railways cannot replace. Rural areas often lack viable rail alternatives. Door-to-door delivery requires road networks. Emergency services and freight transport depend on road infrastructure.\n\nNevertheless, the balanced perspective suggests prioritizing rail where population density justifies investment. Roads will continue receiving substantial funding; this argument concerns appropriate emphasis rather than exclusive focus.\n\nIn conclusion, railways merit greater investment than roads in most contexts, given environmental and efficiency advantages. Roads remain important, but rail represents more sustainable transportation future."},"speaking":{"topic":"自然","part1":["你喜欢自然吗？","你去过什么自然景点？","你见过野生动物吗？","你觉得自然美是什么？"],"part2":"Describe a beautiful place in nature. You should say: where it is, what it looks like, what you can do there, and explain why you find it beautiful.","part3":["人们应该如何保护自然？","旅游业会破坏自然吗？","城市里的自然和野外的自然有什么不同？"]}},{"day":40,"phase":"phase2","listening":{"title":"网络安全培训","transcript":"Trainer: Phishing is number one threat. Recognize: urgent language, generic greetings, errors, suspicious links.\nReport suspicious emails using 'Report Phishing' button.\nPasswords: 12+ characters, use passphrases.\nEnable multi-factor authentication.\nPhysical security: lock computer, no sticky notes with passwords.","questions":[{"q":"第一名威胁？","options":["病毒","钓鱼邮件","恶意软件"],"answer":1},{"q":"密码最小长度？","options":["8位","10位","12位"],"answer":2},{"q":"双重认证的第二因素是？","options":["安全问题","手机验证码","指纹"],"answer":1},{"q":"离开座位时应该？","options":["关闭电脑","锁屏","保持开机"],"answer":1}]},"reading":{"title":"The New Space Age","passage":"The space sector has entered a new era characterised by private enterprise competing with and sometimes surpassing government space agencies, dramatic reductions in the cost of accessing space through reusable rocket technology pioneered by companies such as SpaceX and Blue Origin, and an expansion of the range of activities conducted in space that now includes not only scientific research and satellite deployment but also space tourism, manufacturing in microgravity, and ambitious plans for permanent human settlements on the Moon and Mars. The democratisation of access to space has been revolutionised by the development of small, low-cost satellites known as CubeSats and SmallSats, which can now be launched as secondary payloads at a fraction of the cost of traditional satellite missions, enabling universities, start-ups, and developing countries to participate in space activities that were previously accessible only to wealthy nations with large space budgets. The global space economy is now valued at approximately 470 billion dollars and is growing rapidly, driven by demand for satellite-based communications, Earth observation, navigation, and the emerging markets for space tourism and in-space manufacturing. The return of humans to the Moon, championed by NASA's Artemis programme with its goal of landing the first woman and next man on the lunar surface and establishing a sustainable human presence by the end of the decade, has catalysed a new international space race involving China, Russia, the European Space Agency, and a growing number of private companies, all seeking to establish a permanent human presence on the Moon and ultimately to use it as a stepping stone for missions to Mars. However the rapid growth of space activity has also created significant new challenges, including the proliferation of space debris, which now threatens the safety of operational satellites and the International Space Station, the lack of clear international governance frameworks for the exploitation of space resources, and concerns about the militarisation of space. The new space age, characterised by private launch providers, miniaturised satellite technology, and ambitious plans for lunar and Martian exploration, represents a fundamental departure from the government-dominated space programmes of the twentieth century. The United Kingdom has positioned itself as a significant player in this new landscape, with the Space Agency targeting significant market share in the global space economy. Satellite technology has become indispensable to modern civilisation, underpinning communications, navigation, weather forecasting, and earth observation. However, the proliferation of satellite constellations has raised serious concerns among astronomers about interference with ground-based observation.","questions":[{"q":"What has revolutionised access to space?","options":["Government programmes only","Reusable rocket technology","Military satellites"],"answer":1},{"q":"What is the current estimated value of the global space economy?","options":["About 100 billion dollars","About 470 billion dollars","About one trillion dollars"],"answer":1},{"q":"What is NASA's programme to return humans to the Moon called?","options":["Apollo","Artemis","Orion"],"answer":1},{"q":"What challenge has been created by the growth of space activity?","options":["Water scarcity","Proliferation of space debris","Atmospheric pollution"],"answer":1}]},"writing":{"type":"task1","title":"饼图 - 家庭支出","task":"The pie chart shows average weekly household expenditure in the UK in 2020. Summarise the information.","sample":"The pie chart illustrates UK household spending categories in 2020.\n\nHousing represents the largest expenditure at 30%, encompassing rent, mortgage payments, utilities, and maintenance. This substantial portion reflects housing costs' dominance in household budgets.\n\nFood and drink constitute the second largest category at 20%. This includes groceries and dining out, representing essential spending on sustenance.\n\nTransport accounts for 15%, covering vehicle purchase, fuel, insurance, and public transportation. This reflects mobility's importance for work and daily activities.\n\nRecreation and culture represent 12%, including entertainment, media subscriptions, and leisure activities. This spending category indicates discretionary expenditure on quality of life.\n\nClothing, utilities, and other categories each represent smaller portions, ranging from 5-8%. Healthcare spending comprises 5%, while education accounts for 3%.\n\nIn conclusion, housing and food dominate household budgets, together comprising half of expenditure, with significant portions also allocated to transport and recreation."},"speaking":{"topic":"未来","part1":["你对未来有什么期待？","你认为10年后世界会怎样？","你想改变什么？","你觉得未来会更好吗？"],"part2":"Describe something you want to do in the future. You should say: what it is, why you want to do it, how you plan to achieve it, and explain what would make it possible.","part3":["人们应该规划未来吗？","科技会让未来更好还是更坏？","个人能改变世界吗？"]}},{"day":41,"phase":"phase2","listening":{"title":"大学课程咨询","transcript":"Advisor: Academic Advising. How may I help?\nStudent: I'm considering changing my major from Business to International Relations.\nAdvisor: That's quite a shift. What's prompting this change?\nStudent: I took Politics and found it fascinating. I'm interested in global trade politics.\nAdvisor: That pairs well with business understanding. Have you checked IR requirements?\nStudent: Briefly. Need Political Theory, International Security, Global Political Economy.\nAdvisor: What about languages?\nStudent: French at GCSE, want to continue and add Spanish.\nAdvisor: Good foundation. Submit request before semester end.","questions":[{"q":"学生目前专业？","options":["国际关系","商业研究","政治学"],"answer":1},{"q":"学生中学学什么语言？","options":["西班牙语","法语","中文"],"answer":1},{"q":"建议什么时候提交申请？","options":["学期末前","下学期","随时"],"answer":0}]},"reading":{"title":"The Remote Work Revolution","passage":"The global shift toward remote working, dramatically accelerated by the COVID-19 pandemic that began in 2020, represents one of the most significant transformations in the world of work since the Industrial Revolution, fundamentally altering assumptions about how, where, and when productive labour can be conducted. Prior to 2020, remote work was a privilege enjoyed by a relatively small proportion of the global workforce, typically limited to freelancers, consultants, and knowledge workers in technology sectors who possessed both the digital skills and the employer flexibility needed to work outside traditional office environments. According to data from the Office for National Statistics, only around 5 percent of the UK workforce worked primarily from home before the pandemic, a figure that jumped to over 46 percent during the initial lockdown periods of 2020, with surveys indicating that a significant majority of these workers wanted to maintain some form of remote working arrangement permanently after restrictions were lifted. This transformation has been made possible by the rapid maturation of digital collaboration tools such as Zoom, Microsoft Teams, Slack, and Google Workspace, which enable teams to conduct meetings, share documents, manage projects, and maintain constant communication entirely through cloud-based platforms without the need for physical proximity. However the remote work revolution has also exposed significant inequalities in the workforce, as employees without adequate home office space, reliable broadband access, or suitable childcare arrangements have found remote work considerably more challenging than those with greater resources. Mental health concerns have also emerged as a significant issue, with many remote workers reporting feelings of isolation, burnout from the constant pressure of video calls and instant messaging, and difficulty establishing boundaries between professional and personal life when the workplace is also the home. The shift towards remote and hybrid working models represents one of the most significant labour market transformations in modern history. What began as an emergency public health response to the COVID-19 pandemic rapidly became a permanent feature of the employment landscape, prompting fundamental reassessments of how work is organised, measured, and compensated. Proponents argue that remote working offers substantial benefits, including reduced commuting time, greater flexibility for workers with caring responsibilities, and lower overhead costs for employers. Research suggests that many employees now consider flexible working arrangements non-negotiable, and are willing to change jobs to obtain them.","questions":[{"q":"What percentage of UK workers worked from home before the pandemic?","options":["About 5 percent","About 15 percent","About 25 percent"],"answer":0},{"q":"Which tool has enabled teams to collaborate through cloud platforms?","options":["Adobe Creative Cloud","Microsoft Teams and Slack","WhatsApp"],"answer":1},{"q":"What mental health concerns have emerged among remote workers?","options":["Depression only","Feelings of isolation and burnout","Memory loss"],"answer":1},{"q":"When did the COVID-19 pandemic begin?","options":["2018","2019","2020"],"answer":2}]},"writing":{"type":"task2","title":"观点类 - 政府资助艺术","task":"Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?","sample":"The allocation of transport infrastructure funding represents a significant policy consideration. While roads have traditionally dominated investment, railway systems offer compelling advantages that suggest they merit increased funding.\n\nI strongly agree that railways deserve greater investment for several reasons. First, rail is far more environmentally sustainable. Electric trains produce significantly lower carbon emissions per passenger-kilometer than cars or buses. As climate change demands urgent action, transitioning transportation toward lower-emission options becomes essential.\n\nSecond, rail demonstrates superior efficiency in high-density corridors. A single railway line can transport more people than a multi-lane highway while occupying less land. This becomes particularly crucial in densely populated regions where road expansion proves impractical.\n\nThird, rail provides economic benefits beyond direct transport. High-speed rail creates economic corridors connecting cities, enabling labor market integration and business travel. Studies demonstrate significant productivity gains in regions connected by quality rail infrastructure.\n\nHowever, roads remain essential for certain purposes. Rural areas often lack viable rail alternatives. Last-mile connectivity requires road networks. Emergency services and freight transport depend on road infrastructure.\n\nNevertheless, the balance of evidence supports prioritizing rail investment where feasible. Roads will continue receiving substantial funding; the argument concerns appropriate emphasis rather than exclusive focus.\n\nIn conclusion, I agree that railway investment should take precedence over road building in most contexts, given environmental, efficiency, and economic considerations. Roads will maintain their importance, but rail represents the more sustainable transportation future."},"speaking":{"topic":"科技","part1":["你每天用电脑多长时间？","你觉得手机重要吗？","你会修电脑吗？","你最喜欢什么科技产品？"],"part2":"Describe a piece of technology that you find useful. You should say: what it is, how long you have had it, how often you use it, and explain how it has changed your life.","part3":["科技如何改变教育？","人们是否过度依赖科技？","人工智能会取代人类工作吗？"]}},{"day":42,"phase":"phase2","listening":{"title":"科研项目讨论","transcript":"Professor: Discuss your dissertation topic.\nStudent: Climate change misinformation on social media.\nProfessor: What's your research question?\nStudent: How does fact-checking format affect engagement and sharing?\nProfessor: Interesting. Methodology?\nStudent: Content analysis then controlled experiment with 200 participants.\nProfessor: What about ethics?\nStudent: Informed consent and debriefing planned.\nProfessor: Sound approach.","questions":[{"q":"研究主题是？","options":["气候变化政策","社交媒体错误信息","环境科学"],"answer":1},{"q":"需要多少参与者？","options":["100人","150人","200人"],"answer":2},{"q":"研究方法包括？","options":["仅调查","内容分析和实验","仅访谈"],"answer":1}]},"reading":{"title":"Electric Vehicles and the Transport Transition","passage":"The transition from internal combustion engine vehicles to electric vehicles represents a fundamental restructuring of the global automotive industry and has profound implications for energy infrastructure, environmental sustainability, employment patterns, and the geopolitics of energy production and consumption. The UK government announced in 2020 that the sale of new petrol and diesel cars would be banned from 2030, with hybrid vehicles following in 2035, representing one of the most ambitious timelines for automotive electrification in the world and sending a clear signal to manufacturers, consumers, and investors about the direction of future transport policy. This transition is driven primarily by the urgent need to reduce greenhouse gas emissions from the transport sector, which accounts for approximately 27 percent of the UK's total carbon emissions, with road transport being the single largest contributor. Electric vehicles produce zero tailpipe emissions during operation, meaning that a full transition to EVs could virtually eliminate the direct carbon footprint of private car travel, though the overall environmental benefit depends significantly on the carbon intensity of the electricity used to charge them. The infrastructure challenge of supporting a mass electric vehicle fleet is considerable, as the UK currently has approximately 30,000 public electric vehicle charging points, a figure that industry experts estimate would need to increase to at least 500,000 to support the projected 2030 electric vehicle population. The battery technology that powers electric vehicles has advanced rapidly over the past decade, with the cost of lithium-ion battery packs falling by approximately 85 percent since 2010, making electric vehicles increasingly competitive with conventional cars on a purchase price basis, though concerns remain about the environmental and social impacts of mining lithium, cobalt, and other materials required for battery production. The transition to electric vehicles is widely regarded as essential for meeting climate change commitments, yet the pathway to mass adoption is proving far more complex than early optimistic projections suggested. While electric car sales have grown substantially in recent years, they still represent a minority of total vehicle sales, and the rate of adoption varies dramatically across income groups and regions. The infrastructure challenge is considerable: the United Kingdom currently has approximately 30,000 public charging points, but research suggests that more than three times that number may be needed to support a fully electric vehicle fleet by 2035.","questions":[{"q":"From what year will the sale of new petrol and diesel cars be banned in the UK?","options":["2025","2030","2035"],"answer":1},{"q":"What percentage of the UK's total carbon emissions comes from transport?","options":["About 10 percent","About 27 percent","About 40 percent"],"answer":1},{"q":"How many public EV charging points does the UK currently have?","options":["About 5,000","About 30,000","About 300,000"],"answer":1},{"q":"By approximately what percentage has battery cost fallen since 2010?","options":["50 percent","65 percent","85 percent"],"answer":2}]},"writing":{"type":"task1","title":"柱状图 - 垃圾处理","task":"The chart shows how waste is disposed in six countries. Summarise the information by selecting and reporting the main features.","sample":"The bar chart compares waste disposal methods across six countries: USA, Japan, Germany, UK, France, and Italy.\n\nOverall, significant variation exists between nations, with recycling playing a major role in European countries while landfill dominates elsewhere.\n\nJapan leads in recycling at 40%, demonstrating strong environmental culture. Germany follows closely at 35%, reflecting effective waste management policies. These two countries also maintain relatively high incineration rates at 30% and 25% respectively, converting waste to energy.\n\nThe remaining four countries show markedly different patterns. The USA relies primarily on landfill at 55%, with recycling at only 20% and incineration at 25%. The UK shows similar landfill dependence at 50%, while France and Italy achieve 30% recycling rates.\n\nNotably, all countries employ multiple disposal methods, suggesting no single solution fits all contexts. However, European nations generally achieve higher recycling rates, possibly due to stricter policies and greater public environmental awareness.\n\nIn conclusion, waste management approaches vary considerably, with European countries generally achieving higher recycling rates than the USA."},"speaking":{"topic":"环境","part1":["你关心环境问题吗？","你做什么环保的事？","你所在的城市环境好吗？","你觉得气候变化是真的吗？"],"part2":"Describe an environmental issue in your area. You should say: what the problem is, what causes it, what effects it has, and suggest possible solutions.","part3":["个人应该如何保护环境？","经济发展和环境保护哪个更重要？","政府应该采取什么措施应对气候变化？"]}},{"day":43,"phase":"phase2","listening":{"title":"求职面试","transcript":"Interviewer: Tell me about yourself and this position.\nCandidate: Marketing graduate. Internship at digital agency. Your sustainable fashion marketing interests me.\nInterviewer: Campaign example?\nCandidate: Organic skincare brand. '30-Day Natural Beauty Challenge' with influencers. 2 million impressions, 40% Instagram growth.\nInterviewer: How measured success?\nCandidate: Engagement, conversion tracking with discount code. ROI exceeded projections by 25%.\nInterviewer: How handle negative feedback?\nCandidate: Gather feedback, propose adjustments, transparent response builds trust.","questions":[{"q":"案例带来多少曝光量？","options":["100万","200万","300万"],"answer":1},{"q":"Instagram增长多少？","options":["20%","30%","40%"],"answer":2},{"q":"ROI超过预期多少？","options":["15%","20%","25%"],"answer":2}]},"reading":{"title":"Social Media and Adolescent Mental Health","passage":"The relationship between social media use and adolescent mental health has become one of the most intensely debated and researched topics in contemporary psychology, public health, and education policy, with competing studies producing seemingly contradictory findings that have made it difficult for parents, educators, and policymakers to determine the appropriate level of concern and intervention. Proponents of social media argue that platforms such as Instagram, TikTok, Snapchat, and YouTube provide invaluable opportunities for young people to develop and maintain friendships, access educational content, explore identity and interests, and engage with communities of peers who share their experiences, including those from marginalised groups who may find it easier to connect online than in person. However critics point to a substantial body of research suggesting that heavy and passive social media use, characterised by scrolling through curated highlight reels of other people's lives without actively engaging, is associated with increased rates of anxiety, depression, loneliness, and body image dissatisfaction among adolescents, particularly girls. The mechanisms through which social media may harm mental health are thought to include social comparison, where users measure their own worth against the seemingly perfect lives presented by peers and influencers; cyberbullying, which extends traditional bullying into the home and makes it impossible to escape; the displacement of sleep, physical activity, and face-to-face social interaction; and the addictive design features built into social media platforms that exploit psychological vulnerabilities to maximise engagement and advertising revenue. Several major studies have found that adolescents who spend more than three to four hours per day on social media are at significantly higher risk of reporting poor mental health, though researchers emphasise that the relationship is likely bidirectional and complex, with young people who are already struggling with mental health issues potentially turning to social media as a coping mechanism that then exacerbates their difficulties. The relationship between social media use and mental health, particularly among adolescents, has become one of the most contested areas of public health research and policy debate. A substantial body of evidence now links heavy social media use with increased rates of anxiety, depression, and body image concerns, particularly among teenage girls. The mechanisms through which social media might harm mental health are debated: some researchers point to the displacement of in-person social interaction, while others emphasise the role of social comparison, cyberbullying, and the addictive design features that platforms employ to maximise engagement.","questions":[{"q":"What type of social media use is particularly associated with poor mental health outcomes?","options":["Active posting and commenting","Passive scrolling through content","Video calling with friends"],"answer":1},{"q":"What psychological mechanism involves comparing oneself to others on social media?","options":["Identity exploration","Social comparison","Emotional bonding"],"answer":1},{"q":"How many hours of daily social media use is associated with higher mental health risk?","options":["More than one hour","More than three to four hours","More than eight hours"],"answer":1},{"q":"Which group may find it easier to connect online than in person?","options":["Athletes","Young people from marginalised groups","Academic high achievers"],"answer":1}]},"writing":{"type":"task2","title":"讨论类 - 动物权利","task":"Some people think that animals should be treated as equals as human beings. Others say that it is acceptable to use animals for our benefits. Discuss both views and give your opinion.","sample":"The moral status of animals has long provoked philosophical debate, with positions ranging from utilitarianism to anthropocentrism.\n\nThose advocating animal equality invoke sentience as the relevant criterion. If capacity for suffering grants moral consideration, animals - capable of experiencing pain, pleasure, and emotion - deserve protection. This perspective notes that humans lack rational grounds for privileging their interests over species membership alone.\n\nHowever, opponents emphasize fundamental differences between humans and animals. Human cognitive capacities, including abstract reasoning, language, and self-awareness, establish unique moral status. Humans possess moral responsibility that animals cannot share. Furthermore, animal use has driven human civilization's development through agriculture, medicine, and companionship.\n\nI adopt a middle position acknowledging animal welfare without demanding full equality. Animals deserve protection from unnecessary suffering, but complete equality with humans remains neither achievable nor desirable. Practical application involves reducing cruelty while accepting certain uses.\n\nThis balanced view recognizes that humans occupy a privileged position enabling moral consideration of other species. We should minimize animal suffering while accepting some level of animal use for human benefit, particularly where alternatives remain unavailable.\n\nIn conclusion, while complete equality proves impractical, significant moral obligations toward animals exist. Society should continue reducing unnecessary animal suffering while maintaining realistic approaches to human-animal relationships."},"speaking":{"topic":"健康","part1":["你健康吗？","你锻炼身体吗？","你注意饮食吗？","你上次看医生是什么时候？"],"part2":"Describe a way to stay healthy. You should say: what it is, how you do it, how long you have been doing it, and explain why it is important for health.","part3":["如何让人们更健康？","医疗应该免费吗？","心理健康和身体健康一样重要吗？"]}},{"day":44,"phase":"phase2","listening":{"title":"产品发布会","transcript":"Presenter: Introducing Smart Hub 3000. Our engineering team has been working on this for two years.\nTraditional smart home systems are fragmented. We're changing that.\nThree key innovations: First, Universal Compatibility - supports 50+ protocols.\nSecond, Predictive Automation - AI learns your routines in two weeks.\nThird, Privacy by Design - all AI processing happens locally.\nAvailable next month at $349. Early buyers get 20% discount.","questions":[{"q":"产品名称？","options":["Smart Hub 2000","Smart Hub 3000","Smart Hub Pro"],"answer":1},{"q":"支持多少种协议？","options":["30+","40+","50+"],"answer":2},{"q":"AI学习需要多久？","options":["一周","两周","三周"],"answer":1},{"q":"早鸟折扣？","options":["10%","15%","20%"],"answer":2}]},"reading":{"title":"Global Water Scarcity","passage":"Water scarcity has emerged as one of the defining challenges of the 21st century, threatening food security, political stability, public health, and economic development across vast swaths of the globe, with the United Nations warning that by 2025 as many as 1.8 billion people could be living under conditions of absolute water scarcity, and two-thirds of the world's population could face water-stressed conditions. The crisis stems from a combination of factors including population growth, urbanisation, agricultural expansion, industrial development, and the increasingly severe impacts of climate change on precipitation patterns and glacier meltwater supplies that feed major river systems. Agriculture is by far the largest consumer of freshwater resources, accounting for approximately 70 percent of global freshwater withdrawal, much of it used to irrigate crops in arid and semi-arid regions where rainfall is insufficient to support reliable harvests, including in countries such as India, Pakistan, China, the United States, and across the Middle East and North Africa. The over-extraction of groundwater for irrigation has led to rapidly falling water tables in many of the world's most important agricultural regions, threatening the long-term viability of food production systems upon which billions of people depend. In wealthy countries, per capita water consumption is often far higher than is necessary or sustainable, with water-intensive diets featuring large quantities of meat and dairy products driving indirect water consumption through the water required to grow animal feed. Technological solutions such as water recycling, desalination, and precision irrigation offer promising avenues for addressing water scarcity, though each comes with significant limitations and costs that make them unsuitable as universal solutions, particularly for the world's poorest communities who are often the most severely affected by water scarcity. Despite its reputation as a rainy country, the United Kingdom faces serious and growing challenges in managing its water resources sustainably. Climate change is intensifying the extremes: wetter winters that strain flood defences and drainage infrastructure, combined with hotter, drier summers that deplete reservoirs, reduce river flows, and increase demand for irrigation in agriculture. Water companies have faced sustained public outrage over the state of the UK waterways, with sewage discharges from combined storm overflows into rivers and coastal waters becoming a symbol of the failure of environmental regulation.","questions":[{"q":"What percentage of global freshwater withdrawal is used for agriculture?","options":["About 30 percent","About 50 percent","About 70 percent"],"answer":2},{"q":"By 2025, how many people could be living under absolute water scarcity?","options":["800 million","1.8 billion","3.5 billion"],"answer":1},{"q":"Which diet typically requires more water to produce?","options":["Plant-based diet","Meat and dairy rich diet","Grain-based diet"],"answer":1},{"q":"Which sector uses the most freshwater globally?","options":["Industry","Agriculture","Domestic household use"],"answer":1}]},"writing":{"type":"task1","title":"表格 - 住房类型","task":"The table gives information about the types of housing occupied by people in a particular city in 2018 and 2023. Summarise the information.","sample":"The table illustrates changes in housing types in a city between 2018 and 2023.\n\nOverall, the city saw growth across all housing categories, with apartments and social housing showing the most significant increases.\n\nApartments experienced the largest expansion, rising from 35% to 45% of housing. This reflects increasing urbanization and preference for compact living, particularly among young professionals and smaller households.\n\nSocial housing also grew substantially from 20% to 28%, indicating government investment in affordable accommodation. This expansion addresses growing housing affordability concerns.\n\nOwner-occupied housing showed modest growth from 30% to 32%, while private renting remained stable at around 18-20%. These relatively static figures suggest these sectors matured within existing markets.\n\nIn conclusion, the five-year period witnessed notable shifts toward apartments and social housing, reflecting changing preferences and policy priorities."},"speaking":{"topic":"工作","part1":["你现在工作还是学生？","你理想的工作是什么？","你为什么选择现在的工作/专业？","你工作压力大吗？"],"part2":"Describe your ideal job. You should say: what job it is, what qualities it requires, whether it is realistic to achieve, and explain why it would be your ideal.","part3":["人们为什么工作？","工作满意度重要吗？","人们应该为了兴趣还是钱工作？"]}},{"day":45,"phase":"phase2","listening":{"title":"环保政策研讨","transcript":"Moderator: Why carbon pricing?\nProfessor: Makes polluters pay, creates incentives for cleaner tech.\nIndustry: Concern is competitiveness - carbon leakage.\nGovernment: Border adjustment mechanisms level the playing field.\nEconomist: Revenue use matters - returning as dividends increases support from 40% to over 70%.","questions":[{"q":"碳定价基本原理？","options":["补贴污染者","让污染者付费","禁止排放"],"answer":1},{"q":"行业担心什么？","options":["技术不足","碳泄漏和竞争力","成本高"],"answer":1},{"q":"如果返还收入支持率可达？","options":["50%","60%","70%+"],"answer":2},{"q":"欧盟实施什么机制？","options":["碳税","碳边境调整","碳补贴"],"answer":1}]},"reading":{"title":"The Renewable Energy Revolution","passage":"Renewable energy has undergone a revolution over the past two decades that has fundamentally transformed the global electricity landscape, with wind, solar, hydroelectric, and geothermal sources now generating an increasing share of the world's power and challenging the dominance of fossil fuels that has characterised energy systems since the Industrial Revolution. The driving forces behind this transformation include dramatic falls in the cost of renewable energy technologies, particularly solar photovoltaic panels, whose cost has declined by approximately 89 percent since 2010, and wind turbines, which have become increasingly efficient and economically competitive even without government subsidies in many parts of the world. The United Kingdom has emerged as a global leader in offshore wind energy, with the Hornsea Wind Farm off the coast of Yorkshire becoming the world's largest offshore wind installation upon its completion, and the government setting a target of 50 gigawatts of offshore wind capacity by 2030, enough to power every home in the country. However the integration of renewable energy sources into existing electricity grids presents significant technical challenges, as the inherent variability of wind and solar generation means that supply does not always match demand, requiring the development of sophisticated grid management systems, large-scale energy storage solutions, and flexible backup generation capacity. Battery storage technology is widely regarded as the most promising solution to the intermittency problem of renewable energy, with grid-scale battery installations growing rapidly in size and number. Critics of the renewable energy transition raise concerns about the land use implications of large solar and wind installations, the visual impact of wind turbines on landscapes, the deaths of birds and bats at wind farms, and the environmental impacts of mining rare earth minerals required for solar panels and wind turbine magnets. The United Kingdom has made remarkable progress in expanding renewable energy generation, with wind power in particular emerging as a flagship success story. Offshore wind farms now generate enough electricity to power the equivalent of millions of homes, and the UK ranks among the world leaders in installed offshore wind capacity. Solar power has also expanded rapidly, with the cost of photovoltaic panels falling by more than 80 percent over the past decade. However, the intermittent nature of wind and solar generation creates significant challenges for grid stability, and the development of large-scale electricity storage solutions remains technically and economically demanding.","questions":[{"q":"By approximately what percentage has solar panel cost declined since 2010?","options":["About 50 percent","About 70 percent","About 89 percent"],"answer":2},{"q":"What renewable energy sector has the UK become a global leader in?","options":["Solar photovoltaic","Offshore wind","Geothermal"],"answer":1},{"q":"What challenge does the variability of wind and solar generation create for grids?","options":["Excess electricity generation","Supply not always matching demand","Cooling system failures"],"answer":1},{"q":"How much offshore wind capacity has the UK government targeted for 2030?","options":["20 gigawatts","50 gigawatts","100 gigawatts"],"answer":1}]},"writing":{"type":"task2","title":"观点类 - 成功因素","task":"Some people say that the main environmental problem of our time is the loss of particular species of plants and animals. Others say that there are more important environmental problems. Discuss both these views and give your opinion.","sample":"Environmental challenges present multiple serious threats, with species extinction representing one among several critical concerns.\n\nThose emphasizing species loss argue that biodiversity provides ecosystem services essential for human survival: pollination, water purification, climate regulation. Each extinction potentially disrupts ecological relationships built over millions of years. Once lost, species cannot be recovered, making extinction particularly tragic.\n\nHowever, climate change presents arguably more immediate and widespread threats. Rising temperatures, sea-level rise, and extreme weather affect billions directly through food security, displacement, and economic disruption. Climate impacts potentially cascade into biodiversity loss through habitat destruction and altered ecosystems.\n\nIn my view, both perspectives hold merit, but climate change demands priority attention. While species loss represents permanent damage, climate change threatens existing life on multiple scales. Furthermore, addressing climate benefits biodiversity through reduced habitat destruction and ecosystem protection.\n\nThis is not to dismiss biodiversity concerns. Rather, strategic resource allocation requires addressing root causes benefiting multiple environmental dimensions. Climate action represents the most efficient investment for overall environmental health.\n\nIn conclusion, while species extinction constitutes serious concern, climate change warrants greater immediate attention given its comprehensive threats. Both issues interconnect, making integrated approaches essential."},"speaking":{"topic":"教育","part1":["你最喜欢的老师是谁？","你觉得学校教育有用吗？","你更喜欢理论还是实践？","你会选择继续读研究生吗？"],"part2":"Describe a subject you studied that you found useful. You should say: what it was, when and where you studied it, what you learned, and explain why it was useful.","part3":["学生应该学什么？","教育应该免费吗？","如何提高教育质量？"]}},{"day":46,"phase":"phase2","listening":{"title":"糖尿病诊断对话","transcript":"Doctor: Based on tests, you have Type 2 diabetes.\nPatient: My parents never had it. What does this mean?\nDoctor: Your body doesn't use insulin effectively. Manageable with diet, exercise, medication.\nPatient: Will I need medication?\nDoctor: Start with lifestyle changes, reassess in 3 months with HbA1c test.\nDoctor: Many patients do well with metformin as first-line treatment.\nPatient: What about diet?\nDoctor: Reduce refined carbs, increase fiber, control portions.","questions":[{"q":"诊断结果？","options":["1型糖尿病","2型糖尿病","糖尿病前期"],"answer":1},{"q":"多久后重新评估？","options":["1个月","2个月","3个月"],"answer":2},{"q":"HbA1c反映多久血糖？","options":["1个月","2个月","3个月"],"answer":2},{"q":"建议什么作为一线治疗？","options":["胰岛素","二甲双胍","饮食控制"],"answer":1}]},"reading":{"title":"The Future of Cities: Urban Planning","passage":"The future of urban planning in the 21st century is being shaped by a convergence of forces including rapid population growth in cities across the developing world, the climate crisis, technological innovation, changing patterns of work and mobility, and evolving social attitudes toward community, space, and quality of life that are fundamentally challenging assumptions inherited from the car-dependent, zoning-heavy urban planning philosophies of the mid-20th century. The United Nations projects that by 2050 approximately 68 percent of the world's population will live in urban areas, up from 55 percent today, adding approximately 2.5 billion urban residents over the next three decades, the vast majority of whom will live in cities in Asia and Africa. This unprecedented urban growth presents both a crisis and an opportunity, as cities that grow without adequate planning and investment in infrastructure, housing, and services risk becoming centres of congestion, pollution, inequality, and social unrest, while those that embrace smart, inclusive, and sustainable planning principles can become engines of economic growth, innovation, and environmental improvement. The concept of the 15-minute city, pioneered in Paris under Mayor Anne Hidalgo and subsequently adopted by urban planners in cities including Melbourne, Portland, and Barcelona, envisions neighbourhoods where residents can access all their daily needs including work, shopping, education, healthcare, and recreation within a 15-minute walk or cycle ride from their homes, reducing the need for car travel and fostering stronger community bonds. Green infrastructure, including urban parks, green corridors, living walls, and rooftop gardens, is increasingly recognised as essential to urban climate adaptation, providing cooling effects that reduce energy consumption, managing stormwater runoff, supporting urban biodiversity, and improving the mental health and wellbeing of city residents. Cities around the world are undergoing rapid transformation as urban planners, policymakers, and communities grapple with the competing demands of economic growth, environmental sustainability, and social equity. The concept of the 15-minute city, in which all essential services and amenities are accessible within a short walk or cycle from every resident home, has captured the imagination of urban planners seeking to reduce car dependency and improve quality of life. Yet the gap between ambitious planning rhetoric and on-the-ground reality remains wide in many cities, where car dominance, inadequate cycling infrastructure, and poor air quality continue to define daily life for millions of urban residents.","questions":[{"q":"What percentage of the world's population is projected to live in urban areas by 2050?","options":["About 50 percent","About 68 percent","About 80 percent"],"answer":1},{"q":"What concept envisions accessing all daily needs within 15 minutes from home?","options":["Smart city","15-minute city","Compact living"],"answer":1},{"q":"In which continent will most of the future urban population growth occur?","options":["Europe","North America","Asia and Africa"],"answer":2},{"q":"What type of infrastructure is recognised as essential for urban climate adaptation?","options":["Roads and highways","Green infrastructure","Underground tunnels"],"answer":1}]},"writing":{"type":"task1","title":"流程图 - 塑料回收","task":"The diagram shows how plastic bottles are recycled. Summarise the information by selecting and reporting the main features.","sample":"The flowchart illustrates the plastic bottle recycling process.\n\nOverall, recycling involves collection, sorting, cleaning, shredding, melting, and remolding into new products.\n\nThe process begins with consumer collection, where bottles are placed in recycling bins. Trucks collect these and transport them to sorting facilities. Here, workers or machines separate bottles by type and color, removing any non-plastic contaminants.\n\nCleaned bottles then enter shredding machines, breaking them into small flakes. These flakes are washed again to remove labels and adhesives. The clean flakes are melted at high temperatures, producing molten plastic.\n\nThis melted material is extruded through small holes, creating strands that are cooled and cut into pellets. These pellets represent raw material for manufacturing new products.\n\nFinally, the pellets are melted and molded into various items: new bottles, clothing fibers, furniture, or automotive parts. These products enter consumer markets, completing the recycling loop.\n\nIn conclusion, plastic bottle recycling transforms waste into useful products through systematic stages, conserving resources and reducing landfill."},"speaking":{"topic":"媒体","part1":["你经常看新闻吗？","你更喜欢看书还是看电影？","你用社交媒体吗？","你每天看多长时间电视？"],"part2":"Describe a movie or TV program that influenced you. You should say: what it was, when you watched it, what it was about, and explain how it influenced you.","part3":["暴力内容对青少年有什么影响？","新闻可信度如何判断？","人们应该付费获取高质量内容吗？"]}},{"day":47,"phase":"phase2","listening":{"title":"可持续发展报告","transcript":"CEO: Carbon emissions decreased 23% vs 2020 baseline, exceeding our 20% target.\nThree initiatives: First, 85% European operations use renewable energy - energy costs decreased 12%.\nSecond, redesigned packaging - eliminated 1,200 metric tons of plastic.\nThird, worked with 200+ suppliers on environmental practices.\nBy 2030, we commit to net-zero emissions.","questions":[{"q":"碳排放降低多少？","options":["18%","20%","23%"],"answer":2},{"q":"欧洲可再生能源比例？","options":["75%","80%","85%"],"answer":2},{"q":"减少多少塑料？","options":["1,000吨","1,200吨","1,500吨"],"answer":1},{"q":"净零目标年份？","options":["2028","2030","2035"],"answer":1}]},"reading":{"title":"Biodiversity Loss and Conservation","passage":"The ongoing loss of biodiversity represents one of the most serious environmental challenges facing the planet, with scientists warning that the Earth is experiencing its sixth mass extinction event, the first to be caused primarily by human activity, and that the collapse of ecosystems upon which all life depends is accelerating at a rate unprecedented in geological history. The Intergovernmental Science-Policy Platform on Biodiversity and Ecosystem Services reported in 2019 that approximately one million animal and plant species are now threatened with extinction, many within decades, as a direct result of human activities including habitat destruction, overexploitation of natural resources, pollution, invasive species, and climate change. The primary driver of biodiversity loss is habitat destruction, particularly the conversion of natural ecosystems including forests, wetlands, grasslands, and coral reefs into agricultural land, urban areas, and infrastructure, a process that has accelerated dramatically over the past 50 years as the global population has grown and consumption patterns have intensified. The UK, despite being one of the most nature-depleted countries in the world, has made some progress in conservation through the establishment of a network of national parks, nature reserves, and Sites of Special Scientific Interest, as well as through the reintroduction of species such as beavers, red kites, and ospreys that had been driven to extinction or near-extinction through historical persecution and habitat loss. However conservation organisations argue that these measures are insufficient to reverse the long-term decline in biodiversity, and are calling for fundamental changes to agricultural subsidies, planning policy, and economic priorities that currently incentivise the conversion and degradation of natural habitats. Community-led conservation initiatives, in which local residents take direct responsibility for managing and protecting nearby natural areas, have emerged as a promising complement to top-down government conservation strategies. The global biodiversity crisis, now widely regarded by scientists as being comparable in severity to climate change, has received growing political attention in recent years, though critics argue that policy responses remain inadequate to the scale of the emergency. In the United Kingdom, the State of Nature report documents a catastrophic decline in wildlife populations, with abundance of the most monitored species falling by an average of 19 percent since the 1970s. Habitat loss, intensive agriculture, pollution, and climate change are identified as the principal drivers of this decline. The rewilding movement, which advocates for the large-scale restoration of natural ecosystems, has gained traction in Britain.","questions":[{"q":"How many species did IPBES report are threatened with extinction?","options":["About 100,000","About 500,000","About one million"],"answer":2},{"q":"What is the primary driver of biodiversity loss?","options":["Climate change","Habitat destruction","Pollution"],"answer":1},{"q":"Which species has been reintroduced to the UK?","options":["Wolves","Beavers","Bears"],"answer":1},{"q":"What organisation reported that one million species are threatened with extinction?","options":["UNEP","IPBES","NASA"],"answer":1}]},"writing":{"type":"task2","title":"讨论类 - 广告影响","task":"Some people think that advertisements have positive economic effects. Others believe they have negative social effects. Discuss both views and give your opinion.","sample":"Advertising represents a controversial topic, with proponents highlighting economic benefits while critics emphasize social drawbacks.\n\nAdvertising's economic contributions are substantial. It enables markets to function efficiently by connecting buyers with sellers. Advertising revenue supports media industries, funding newspapers, television, and online content. Furthermore, advertising stimulates competition, driving innovation and potentially reducing prices through market expansion.\n\nHowever, negative social effects merit consideration. Advertising often promotes materialism and excessive consumption, particularly targeting vulnerable groups like children. The constant exposure to idealized lifestyles creates unrealistic expectations, potentially fostering dissatisfaction. Furthermore, some advertising employs manipulative psychological techniques rather than providing genuine information.\n\nI believe the net effect depends heavily on implementation. Ethical advertising providing useful information serves consumers and markets. However, regulation should address the most harmful practices, particularly those targeting children or employing deception.\n\nMoreover, consumers can develop critical awareness to resist manipulation. Media literacy education empowers individuals to evaluate advertising messages rather than passively accepting claims.\n\nIn conclusion, advertising offers both economic benefits and social risks. Appropriate regulation combined with consumer education can maximize advantages while minimizing harms."},"speaking":{"topic":"文化","part1":["你对什么文化感兴趣？","你了解中国的传统文化吗？","你参加过什么文化活动？","你觉得文化重要吗？"],"part2":"Describe a tradition in your culture. You should say: what it is, when it happens, what people do, and explain why it is important.","part3":["传统会消失吗？","人们应该保留传统还是接受新文化？","全球化会使文化同质化吗？"]}},{"day":48,"phase":"phase2","listening":{"title":"AI伦理讲座","transcript":"Professor: Algorithmic bias in AI systems is pressing. Facial recognition has higher error rates for darker skin tones - difference up to 34%.\nWhy? Biased training data. Systems trained on light-skinned images perform better on those faces.\nConsequences: wrongly identified as criminals, job discrimination.\nSolutions: diverse training data, algorithmic auditing, transparency.\nBroader lesson: AI reflects human decisions.","questions":[{"q":"错误率差异最高？","options":["24%","34%","44%"],"answer":1},{"q":"主要原因？","options":["技术限制","训练数据偏见","硬件问题"],"answer":1},{"q":"解决方案不包括？","options":["多样化数据","算法审查","禁止技术"],"answer":2},{"q":"文章核心观点？","options":["AI有偏见","AI中立","AI完美"],"answer":0}]},"reading":{"title":"The Digital Divide","passage":"The digital divide refers to the persistent gap between individuals, households, businesses, and geographic areas in terms of access to information and communication technologies and in their ability to use the internet effectively, creating and reinforcing social, economic, and educational inequalities in societies that are increasingly dependent on digital infrastructure and literacy for full civic and economic participation. The dimensions of the digital divide are multiple and interconnected, encompassing not only physical access to broadband internet infrastructure, which remains limited in many rural and remote areas, but also the availability of suitable devices such as computers and tablets, the development of digital skills necessary to navigate online services and content, and the motivation and cultural readiness to engage with digital technologies. In the United Kingdom, research has consistently shown that the digital divide maps closely onto existing patterns of social and economic inequality, with lower-income households, older people, people with disabilities, ethnic minorities, and residents of rural and coastal communities all experiencing significantly lower rates of internet access and digital engagement than the national average. The COVID-19 pandemic dramatically exposed and amplified the consequences of digital exclusion, as schools moved to online learning, workplaces shifted to remote arrangements, healthcare services expanded their digital offerings, and government support schemes required online applications, all of which placed those without adequate digital access and skills at a profound disadvantage. The government's response has included initiatives such as the Gigabit Broadband Voucher Scheme, which provides subsidies to help households and businesses upgrade to high-speed fibre connections, and the NHS Digital Skills programme, which aims to improve digital health literacy among underserved communities. The digital divide, once understood primarily in terms of access to internet connectivity, has evolved into a far more nuanced and multifaceted phenomenon that intersects with issues of age, income, education, geography, and disability. While broadband and mobile internet coverage have expanded significantly, millions of people in the United Kingdom remain digitally excluded, unable or unwilling to engage with online services that have become the default for banking, shopping, government interactions, and social connection. Beyond access, digital skills have emerged as an equally important dimension of the divide: being able to use a computer or smartphone is fundamentally different from being able to use it safely, critically, and effectively.","questions":[{"q":"What has the COVID-19 pandemic done to the digital divide?","options":["Reduced it significantly","Exposed and amplified it","Eliminated it entirely"],"answer":1},{"q":"Which group was NOT mentioned as experiencing lower digital engagement?","options":["Children under 10","Older people","Lower-income households"],"answer":0},{"q":"What programme aims to improve digital health literacy?","options":["Digital NHS Skills","NHS Digital Skills programme","Health Tech Access"],"answer":1},{"q":"What government scheme helps households upgrade to fibre broadband?","options":["Superfast Britain","Gigabit Broadband Voucher Scheme","Fibre for All Initiative"],"answer":1}]},"writing":{"type":"task1","title":"线图 - 通信方式","task":"The line graph shows how people sent letters in 1998, 2002, 2006, 2010, and 2014. Summarise the information.","sample":"The line graph illustrates changes in letter sending in a country from 1998 to 2014.\n\nOverall, letter sending declined dramatically over the period, with email and messaging replacing traditional postal services.\n\nIn 1998, approximately 2.2 billion letters were sent, representing traditional mail's peak. This figure remained relatively stable through 2002 at about 2.1 billion.\n\nHowever, the decline accelerated from 2006 onward. Letters dropped to 1.5 billion in 2006, then continued falling to 800 million in 2010 and just 300 million in 2014. This represents an 86% decrease over sixteen years.\n\nThe pattern clearly reflects technological substitution. As internet access expanded, electronic communication increasingly replaced physical letters for personal and business correspondence.\n\nIn conclusion, the graph demonstrates technology's transformative impact on communication, with traditional letters nearly disappearing within sixteen years."},"speaking":{"topic":"城市","part1":["你住在城市还是农村？","你最喜欢城市的什么？","你所在的城市有什么问题？","你想住在哪个城市？"],"part2":"Describe a city you would like to visit. You should say: which city it is, where it is located, what you know about it, and explain why you would like to visit.","part3":["城市化有什么优缺点？","大城市好还是小城市好？","如何解决城市交通问题？"]}},{"day":49,"phase":"phase2","listening":{"title":"城市规划 consultation","transcript":"Planner: Riverside Development Project - 15 hectares, 800 new homes, 30% affordable housing.\nTraffic: new pedestrian/cyclist bridge, car traffic from main road.\nGreen space: 40% for parks, native trees, wildlife corridors.\nBuildings: tallest (12 stories) face river, not existing homes.\nResident: Construction noise concern?\nPlanner: 5 years, phases start far from homes, community liaison available.","questions":[{"q":"开发面积？","options":["10公顷","15公顷","20公顷"],"answer":1},{"q":"保障性住房比例？","options":["25%","30%","35%"],"answer":1},{"q":"绿地比例？","options":["30%","35%","40%"],"answer":2},{"q":"最高建筑？","options":["10层","12层","15层"],"answer":1}]},"reading":{"title":"Sustainable Agriculture","passage":"Sustainable agriculture encompasses a broad set of farming practices and food production systems designed to meet current societal needs for food and textile products while preserving the ecological systems and natural resources upon which future food production depends, recognising that agricultural activities are both a major driver of environmental degradation and a crucial component of any credible strategy for addressing climate change, biodiversity loss, and water scarcity. Conventional industrial agriculture, which emerged in the mid-20th century and now dominates food production in most developed and many developing countries, is characterised by specialisation, mechanisation, synthetic fertilisers and pesticides, monoculture cropping systems, and intensive livestock production, all of which have delivered dramatic increases in yields and reductions in the real cost of food but at significant environmental cost. The environmental impacts of conventional agriculture include soil degradation and erosion, with an estimated one-third of the world's arable land having been lost to degradation over the past 40 years; water pollution from nitrogen and phosphorus fertilisers and pesticide runoff; greenhouse gas emissions from fertiliser production, livestock methane, and land use change; and the simplification of agricultural landscapes and the collapse of insect and bird populations that depend on farmland habitats. Sustainable farming approaches, including agroecology, conservation agriculture, integrated pest management, organic farming, and regenerative agriculture, offer alternative paradigms that seek to work with natural processes rather than against them, building soil health, reducing inputs, enhancing biodiversity, and sequestering carbon in agricultural soils. The challenge of scaling sustainable agriculture is considerable, as sustainable farming methods typically require more labour, knowledge, and management skill than conventional approaches, and often produce somewhat lower yields in the short term, creating economic pressures on farmers who must compete with cheaper conventionally produced food. Agriculture occupies a paradoxical position in the sustainability debate: it is simultaneously a major source of environmental harm and a potential solution to some of the most pressing challenges of climate change and biodiversity loss. In the United Kingdom, the food system accounts for approximately 20 percent of greenhouse gas emissions, with livestock production, synthetic fertiliser use, and land use change among the most significant contributors. Yet farmers also manage the vast majority of the UK land area, giving them a central role in delivering nature recovery, carbon sequestration, and flood management objectives. The transition away from the Common Agricultural Policy following Brexit has created both opportunities and challenges.","questions":[{"q":"What percentage of the world's arable land has been lost to degradation over 40 years?","options":["About 10 percent","About one-third","About one-half"],"answer":1},{"q":"What type of agriculture emerged in the mid-20th century?","options":["Organic farming","Industrial agriculture","Subsistence farming"],"answer":1},{"q":"What farming approach seeks to work with natural processes?","options":["Monoculture farming","Agroecology","Chemical farming"],"answer":1},{"q":"What do sustainable farming methods typically require more of?","options":["Synthetic fertilisers","Labour and management skill","Water"],"answer":1}]},"writing":{"type":"task2","title":"观点类 - 城市规划","task":"Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?","sample":"Transportation infrastructure investment decisions significantly impact economic development, environmental sustainability, and quality of life.\n\nRailways offer compelling advantages warranting increased investment. Environmental considerations strongly favor rail: electric trains produce lower emissions per passenger than individual vehicles. As climate urgency increases, transitioning toward rail becomes essential for meeting emissions targets.\n\nRailway efficiency also supports the economic argument. High-speed rail can transport more passengers per hour than highway lanes. In densely populated regions, rail provides superior capacity while requiring less land. Furthermore, rail investment creates employment during construction and operation.\n\nHowever, roads maintain important functions that railways cannot replace. Rural areas often lack viable rail alternatives. Door-to-door delivery requires road networks. Emergency services and freight transport depend on road infrastructure.\n\nNevertheless, the balanced perspective suggests prioritizing rail where population density justifies investment. Roads will continue receiving substantial funding; this argument concerns appropriate emphasis rather than exclusive focus.\n\nIn conclusion, railways merit greater investment than roads in most contexts, given environmental and efficiency advantages. Roads remain important, but rail represents more sustainable transportation future."},"speaking":{"topic":"自然","part1":["你喜欢自然吗？","你去过什么自然景点？","你见过野生动物吗？","你觉得自然美是什么？"],"part2":"Describe a beautiful place in nature. You should say: where it is, what it looks like, what you can do there, and explain why you find it beautiful.","part3":["人们应该如何保护自然？","旅游业会破坏自然吗？","城市里的自然和野外的自然有什么不同？"]}},{"day":50,"phase":"phase2","listening":{"title":"网络安全培训","transcript":"Trainer: Phishing is number one threat. Recognize: urgent language, generic greetings, errors, suspicious links.\nReport suspicious emails using 'Report Phishing' button.\nPasswords: 12+ characters, use passphrases.\nEnable multi-factor authentication.\nPhysical security: lock computer, no sticky notes with passwords.","questions":[{"q":"第一名威胁？","options":["病毒","钓鱼邮件","恶意软件"],"answer":1},{"q":"密码最小长度？","options":["8位","10位","12位"],"answer":2},{"q":"双重认证的第二因素是？","options":["安全问题","手机验证码","指纹"],"answer":1},{"q":"离开座位时应该？","options":["关闭电脑","锁屏","保持开机"],"answer":1}]},"reading":{"title":"The New Space Age","passage":"The space sector has entered a new era characterised by private enterprise competing with and sometimes surpassing government space agencies, dramatic reductions in the cost of accessing space through reusable rocket technology pioneered by companies such as SpaceX and Blue Origin, and an expansion of the range of activities conducted in space that now includes not only scientific research and satellite deployment but also space tourism, manufacturing in microgravity, and ambitious plans for permanent human settlements on the Moon and Mars. The democratisation of access to space has been revolutionised by the development of small, low-cost satellites known as CubeSats and SmallSats, which can now be launched as secondary payloads at a fraction of the cost of traditional satellite missions, enabling universities, start-ups, and developing countries to participate in space activities that were previously accessible only to wealthy nations with large space budgets. The global space economy is now valued at approximately 470 billion dollars and is growing rapidly, driven by demand for satellite-based communications, Earth observation, navigation, and the emerging markets for space tourism and in-space manufacturing. The return of humans to the Moon, championed by NASA's Artemis programme with its goal of landing the first woman and next man on the lunar surface and establishing a sustainable human presence by the end of the decade, has catalysed a new international space race involving China, Russia, the European Space Agency, and a growing number of private companies, all seeking to establish a permanent human presence on the Moon and ultimately to use it as a stepping stone for missions to Mars. However the rapid growth of space activity has also created significant new challenges, including the proliferation of space debris, which now threatens the safety of operational satellites and the International Space Station, the lack of clear international governance frameworks for the exploitation of space resources, and concerns about the militarisation of space. The new space age, characterised by private launch providers, miniaturised satellite technology, and ambitious plans for lunar and Martian exploration, represents a fundamental departure from the government-dominated space programmes of the twentieth century. The United Kingdom has positioned itself as a significant player in this new landscape, with the Space Agency targeting significant market share in the global space economy. Satellite technology has become indispensable to modern civilisation, underpinning communications, navigation, weather forecasting, and earth observation. However, the proliferation of satellite constellations has raised serious concerns among astronomers about interference with ground-based observation.","questions":[{"q":"What has revolutionised access to space?","options":["Government programmes only","Reusable rocket technology","Military satellites"],"answer":1},{"q":"What is the current estimated value of the global space economy?","options":["About 100 billion dollars","About 470 billion dollars","About one trillion dollars"],"answer":1},{"q":"What is NASA's programme to return humans to the Moon called?","options":["Apollo","Artemis","Orion"],"answer":1},{"q":"What challenge has been created by the growth of space activity?","options":["Water scarcity","Proliferation of space debris","Atmospheric pollution"],"answer":1}]},"writing":{"type":"task1","title":"饼图 - 家庭支出","task":"The pie chart shows average weekly household expenditure in the UK in 2020. Summarise the information.","sample":"The pie chart illustrates UK household spending categories in 2020.\n\nHousing represents the largest expenditure at 30%, encompassing rent, mortgage payments, utilities, and maintenance. This substantial portion reflects housing costs' dominance in household budgets.\n\nFood and drink constitute the second largest category at 20%. This includes groceries and dining out, representing essential spending on sustenance.\n\nTransport accounts for 15%, covering vehicle purchase, fuel, insurance, and public transportation. This reflects mobility's importance for work and daily activities.\n\nRecreation and culture represent 12%, including entertainment, media subscriptions, and leisure activities. This spending category indicates discretionary expenditure on quality of life.\n\nClothing, utilities, and other categories each represent smaller portions, ranging from 5-8%. Healthcare spending comprises 5%, while education accounts for 3%.\n\nIn conclusion, housing and food dominate household budgets, together comprising half of expenditure, with significant portions also allocated to transport and recreation."},"speaking":{"topic":"未来","part1":["你对未来有什么期待？","你认为10年后世界会怎样？","你想改变什么？","你觉得未来会更好吗？"],"part2":"Describe something you want to do in the future. You should say: what it is, why you want to do it, how you plan to achieve it, and explain what would make it possible.","part3":["人们应该规划未来吗？","科技会让未来更好还是更坏？","个人能改变世界吗？"]}},{"day":51,"phase":"phase2","listening":{"title":"大学课程咨询","transcript":"Advisor: Academic Advising. How may I help?\nStudent: I'm considering changing my major from Business to International Relations.\nAdvisor: That's quite a shift. What's prompting this change?\nStudent: I took Politics and found it fascinating. I'm interested in global trade politics.\nAdvisor: That pairs well with business understanding. Have you checked IR requirements?\nStudent: Briefly. Need Political Theory, International Security, Global Political Economy.\nAdvisor: What about languages?\nStudent: French at GCSE, want to continue and add Spanish.\nAdvisor: Good foundation. Submit request before semester end.","questions":[{"q":"学生目前专业？","options":["国际关系","商业研究","政治学"],"answer":1},{"q":"学生中学学什么语言？","options":["西班牙语","法语","中文"],"answer":1},{"q":"建议什么时候提交申请？","options":["学期末前","下学期","随时"],"answer":0}]},"reading":{"title":"The Remote Work Revolution","passage":"The global shift toward remote working, dramatically accelerated by the COVID-19 pandemic that began in 2020, represents one of the most significant transformations in the world of work since the Industrial Revolution, fundamentally altering assumptions about how, where, and when productive labour can be conducted. Prior to 2020, remote work was a privilege enjoyed by a relatively small proportion of the global workforce, typically limited to freelancers, consultants, and knowledge workers in technology sectors who possessed both the digital skills and the employer flexibility needed to work outside traditional office environments. According to data from the Office for National Statistics, only around 5 percent of the UK workforce worked primarily from home before the pandemic, a figure that jumped to over 46 percent during the initial lockdown periods of 2020, with surveys indicating that a significant majority of these workers wanted to maintain some form of remote working arrangement permanently after restrictions were lifted. This transformation has been made possible by the rapid maturation of digital collaboration tools such as Zoom, Microsoft Teams, Slack, and Google Workspace, which enable teams to conduct meetings, share documents, manage projects, and maintain constant communication entirely through cloud-based platforms without the need for physical proximity. However the remote work revolution has also exposed significant inequalities in the workforce, as employees without adequate home office space, reliable broadband access, or suitable childcare arrangements have found remote work considerably more challenging than those with greater resources. Mental health concerns have also emerged as a significant issue, with many remote workers reporting feelings of isolation, burnout from the constant pressure of video calls and instant messaging, and difficulty establishing boundaries between professional and personal life when the workplace is also the home. The shift towards remote and hybrid working models represents one of the most significant labour market transformations in modern history. What began as an emergency public health response to the COVID-19 pandemic rapidly became a permanent feature of the employment landscape, prompting fundamental reassessments of how work is organised, measured, and compensated. Proponents argue that remote working offers substantial benefits, including reduced commuting time, greater flexibility for workers with caring responsibilities, and lower overhead costs for employers. Research suggests that many employees now consider flexible working arrangements non-negotiable, and are willing to change jobs to obtain them.","questions":[{"q":"What percentage of UK workers worked from home before the pandemic?","options":["About 5 percent","About 15 percent","About 25 percent"],"answer":0},{"q":"Which tool has enabled teams to collaborate through cloud platforms?","options":["Adobe Creative Cloud","Microsoft Teams and Slack","WhatsApp"],"answer":1},{"q":"What mental health concerns have emerged among remote workers?","options":["Depression only","Feelings of isolation and burnout","Memory loss"],"answer":1},{"q":"When did the COVID-19 pandemic begin?","options":["2018","2019","2020"],"answer":2}]},"writing":{"type":"task2","title":"观点类 - 政府资助艺术","task":"Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?","sample":"The allocation of transport infrastructure funding represents a significant policy consideration. While roads have traditionally dominated investment, railway systems offer compelling advantages that suggest they merit increased funding.\n\nI strongly agree that railways deserve greater investment for several reasons. First, rail is far more environmentally sustainable. Electric trains produce significantly lower carbon emissions per passenger-kilometer than cars or buses. As climate change demands urgent action, transitioning tra
