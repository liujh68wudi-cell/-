<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#667eea">
<title>雅思90天备考</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{margin:0;padding:0;font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:#f3f4f6}
.safe-bottom{padding-bottom:env(safe-area-inset-bottom,16px)}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-item{flex:1;text-align:center;padding:8px 0 6px;font-size:11px;color:#9ca3af;cursor:pointer;user-select:none;-webkit-user-select:none;transition:color .2s}
.tab-item.active{color:#667eea}
.tab-item i{font-size:22px;display:block;margin-bottom:2px}
.tab-content{position:fixed;top:0;left:0;right:0;bottom:60px;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.day-nav{display:flex;align-items:center;padding:12px 16px;background:#fff;border-bottom:1px solid #e5e7eb;gap:8px;position:sticky;top:0;z-index:10}
.day-badge{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border-radius:8px;font-size:13px;font-weight:700}
.day-badge.done{background:#d1fae5;color:#065f46}
.day-badge.active{background:#667eea;color:#fff}
.day-badge.locked{background:#e5e7eb;color:#9ca3af}
.phase-label{font-size:11px;color:#9ca3af;padding:2px 8px;background:#f3f4f6;border-radius:12px;white-space:nowrap}
.card{background:#fff;border-radius:16px;padding:20px;margin:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn-primary{background:#667eea;color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:background .2s}
.btn-primary:active{background:#5568d3}
.btn-secondary{background:#f3f4f6;color:#374151;border:none;border-radius:12px;padding:10px 20px;font-size:14px;cursor:pointer}
.btn-secondary:active{background:#e5e7eb}
.transcript{background:#f8fafc;border-radius:12px;padding:16px;font-size:13px;line-height:1.8;white-space:pre-wrap;color:#374151;font-family:'SF Mono',Menlo,monospace}
.passage-text{font-size:14px;line-height:2;color:#1f2937}
.question-item{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.option-btn{display:block;width:100%;text-align:left;padding:10px 14px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;font-size:14px;color:#374151;cursor:pointer;transition:all .2s}
.option-btn:active{background:#eef2ff;border-color:#667eea}
.option-btn.selected{background:#eef2ff;border-color:#667eea;color:#667eea;font-weight:600}
.option-btn.correct{background:#d1fae5;border-color:#059669;color:#065f46}
.option-btn.wrong{background:#fee2e2;border-color:#dc2626;color:#991b1b}
.tts-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer}
.tts-btn:active{background:#6d28d9}
.tts-btn.playing{background:#059669}
.speaking-section{margin-bottom:20px}
.part-label{display:inline-block;padding:3px 10px;background:#fef3c7;color:#92400e;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:10px}
.speaking-q{font-size:14px;color:#1f2937;margin-bottom:10px;padding:12px;background:#f9fafb;border-radius:10px;line-height:1.6}
.record-btn{width:60px;height:60px;border-radius:50%;background:#ef4444;border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all .2s;box-shadow:0 4px 12px rgba(239,68,68,.4)}
.record-btn:active{transform:scale(.95)}
.record-btn.recording{background:#dc2626;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 16px rgba(239,68,68,0)}}
.transcript-view{background:#fff;border-radius:12px;padding:14px;font-size:13px;line-height:1.8;min-height:60px;color:#374151;white-space:pre-wrap}
.writing-task{background:#f8fafc;border-radius:12px;padding:16px;font-size:14px;line-height:1.8;color:#1f2937}
.writing-sample{background:#fff;border:2px solid #667eea;border-radius:12px;padding:16px;font-size:13px;line-height:1.8;color:#374151;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.progress-ring{transform:rotate(-90deg)}
.progress-ring circle{transition:stroke-dashoffset .5s ease}
.stat-card{background:#fff;border-radius:12px;padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:800;color:#667eea}
.stat-label{font-size:12px;color:#9ca3af;margin-top:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:20px;padding:28px 24px;max-width:360px;width:100%;text-align:center}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.typing-cursor::after{content:'|';animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading" style="position:fixed;inset:0;background:#667eea;display:flex;align-items:center;justify-content:center;z-index:999">
  <div style="text-align:center;color:#fff">
    <div style="font-size:48px;margin-bottom:12px">📖</div>
    <div style="font-size:18px;font-weight:700">雅思90天备考</div>
    <div style="font-size:13px;opacity:.8;margin-top:6px">加载中...</div>
  </div>
</div>

<!-- Home -->
<div id="home-screen" style="display:none;height:100%">
  <div style="padding:40px 24px 80px;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100%;color:#fff">
    <div style="font-size:14px;opacity:.8;margin-bottom:8px">雅思备考</div>
    <div style="font-size:32px;font-weight:800;margin-bottom:4px">90天冲刺计划</div>
    <div style="font-size:14px;opacity:.8;margin-bottom:32px">听说读写全面覆盖</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px">
      <div class="stat-card">
        <div class="stat-num" id="stat-days">0</div>
        <div class="stat-label">已完成天数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-streak">0</div>
        <div class="stat-label">连续打卡</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-score">0</div>
        <div class="stat-label">正确题数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-accuracy">0%</div>
        <div class="stat-label">正确率</div>
      </div>
    </div>

    <div style="background:rgba(255,255,255,.15);border-radius:16px;padding:20px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-weight:600">学习进度</span>
        <span id="progress-text">0/90</span>
      </div>
      <div style="background:rgba(255,255,255,.2);border-radius:8px;height:8px">
        <div id="progress-bar" style="background:#fff;height:8px;border-radius:8px;width:0%;transition:width .5s"></div>
      </div>
    </div>

    <div class="card" style="margin:0;cursor:pointer" onclick="startPractice()">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:48px;height:48px;background:#667eea;border-radius:14px;display:flex;align-items:center;justify-content:center">
          <i class="fas fa-play" style="color:#fff;font-size:18px"></i>
        </div>
        <div>
          <div style="font-weight:700;font-size:16px;color:#1f2937">开始今日学习</div>
          <div style="font-size:12px;color:#9ca3af;margin-top:2px">第 <span id="next-day">1</span> 天 · 继续你的备考之旅</div>
        </div>
        <i class="fas fa-chevron-right" style="color:#d1d5db;margin-left:auto"></i>
      </div>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app-screen" style="display:none;height:100%">
  <div id="content-area" class="tab-content"></div>
  <div class="tab-bar safe-bottom">
    <div class="tab-item active" onclick="switchTab('listen')" id="tab-listen">
      <i class="fas fa-headphones"></i>听力
    </div>
    <div class="tab-item" onclick="switchTab('read')" id="tab-read">
      <i class="fas fa-book-open"></i>阅读
    </div>
    <div class="tab-item" onclick="switchTab('write')" id="tab-write">
      <i class="fas fa-pen"></i>写作
    </div>
    <div class="tab-item" onclick="switchTab('speak')" id="tab-speak">
      <i class="fas fa-microphone"></i>口语
    </div>
  </div>
</div>

<!-- Result Modal -->
<div id="result-modal" class="modal-overlay" style="display:none">
  <div class="modal-box fade-in">
    <div style="font-size:48px;margin-bottom:12px" id="result-emoji">🎉</div>
    <div style="font-size:20px;font-weight:800;color:#1f2937;margin-bottom:8px" id="result-title">完成！</div>
    <div style="font-size:14px;color:#6b7280;margin-bottom:20px" id="result-msg"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div class="stat-card"><div class="stat-num" id="r-correct">0</div><div class="stat-label">正确</div></div>
      <div class="stat-card"><div class="stat-num" id="r-total">0</div><div class="stat-label">总题</div></div>
    </div>
    <button class="btn-primary" onclick="nextOrFinish()" id="result-next-btn">继续</button>
  </div>
</div>

<script>
const DAYS = [{"day": 1, "phase": "phase1", "listening": {"title": "机场接机", "transcript": "Agent: Good afternoon, sir. Welcome to London Heathrow Airport. May I see your passport please?\nPassenger: Here you are. I'm visiting London for a holiday.\nAgent: Thank you. How long do you plan to stay in the UK?\nPassenger: About two weeks. I'll be leaving on the 15th of August.\nAgent: And where will you be staying?\nPassenger: I've booked The Royal Garden Hotel on Kensington High Street.\nAgent: Is this your first visit to the UK?\nPassenger: Yes, it is.\nAgent: Enjoy your stay. Here's your passport.", "questions": [{"q": "乘客计划停留多久？", "options": ["一周", "两周", "三周"], "answer": 1}, {"q": "酒店名称是？", "options": ["Hilton", "Royal Garden Hotel", "Marriott"], "answer": 1}, {"q": "这是第几次访问？", "options": ["第一次", "第二次", "第三次"], "answer": 0}]}, "reading": {"day": 1, "phase": "phase1", "title": "英国交通系统", "passage": "The UK has comprehensive public transport. Railway system is one of oldest, first steam passenger railway in 1825. London Underground, 'the Tube', began in 1863, carries over 1 billion passengers annually. Long-distance trains connect major cities efficiently. Buses serve areas without rail. Cycling has grown with dedicated lanes. Contactless payment simplifies transport use.", "questions": [{"q": "伦敦地铁始于哪年？", "options": ["1853", "1863", "1873"], "answer": 1}, {"q": "伦敦地铁年运量？", "options": ["5亿", "10亿", "15亿"], "answer": 1}, {"q": "共享单车计划始于？", "options": ["2008", "2010", "2012"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 咖啡店销售", "task": "The bar chart shows the monthly sales of three types of coffee in a London café in 2023. Summarise the information by selecting and reporting the main features, and make comparisons where relevant.", "sample": "The bar chart illustrates monthly sales of three coffee types at a London café in 2023: espresso, cappuccino, and latte.\n\nOverall, cappuccino was the most popular throughout the year, while espresso showed distinct seasonal patterns.\n\nCappuccino sales remained relatively stable, ranging from 450 to 520 cups per month, with peak sales in autumn months (October-November). This suggests cappuccino's consistent appeal regardless of season.\n\nLatte followed a similar but lower pattern, averaging 300-400 cups monthly. Sales peaked in winter (December-January) at around 420 cups, possibly due to customer preference for warmer drinks in colder weather.\n\nEspresso showed the most dramatic variation. Summer months (June-August) saw highest sales at 350-400 cups, while winter dropped to below 200 cups. This seasonal pattern likely reflects customer preference for iced espresso drinks in summer.\n\nIn conclusion, cappuccino dominated sales全年, with latte performing moderately. Espresso's seasonality distinguishes it from the other two varieties."}, "speaking": {"topic": "日常活动", "part1": ["你通常什么时候起床？", "你早餐一般吃什么？", "你每天花多长时间通勤？", "下班后你喜欢做什么？"], "part2": "Describe your daily routine. You should say: what time you wake up and go to bed, what you do during the day, how you usually spend your evenings, and explain whether you enjoy your daily routine.", "part3": ["你觉得一天中最重要的时间是什么？", "人们的工作时间应该更灵活吗？", "你更喜欢早晨还是夜晚工作？"]}}, {"day": 2, "phase": "phase1", "listening": {"title": "餐厅预订", "transcript": "Receptionist: Good evening, Bella Vista Restaurant.\nCustomer: Hello, I'd like to make a reservation for tomorrow evening.\nReceptionist: What time?\nCustomer: Around 7:30 PM. We're celebrating my wife's birthday.\nReceptionist: How many people?\nCustomer: Just the two of us.\nReceptionist: Any dietary requirements?\nCustomer: My wife is vegetarian.\nReceptionist: We have excellent vegetarian options.\nCustomer: Perfect. Also, can we order a birthday cake?\nReceptionist: Absolutely.", "questions": [{"q": "预订时间是？", "options": ["7:00", "7:30", "8:00"], "answer": 1}, {"q": "几个人用餐？", "options": ["一位", "两位", "三位"], "answer": 1}, {"q": "饮食要求是？", "options": ["素食", "海鲜过敏", "无麸质"], "answer": 0}]}, "reading": {"day": 2, "phase": "phase1", "title": "健康饮食指南", "passage": "Balanced diet is essential. NHS recommends 5 portions of fruit and vegetables daily. Portion sizes have increased, contributing to obesity. The Eatwell Guide divides foods into 5 groups. Reducing sugar is important - adults should have no more than 30g free sugars daily. 6-8 glasses of water recommended. Sustainable approaches work best for weight loss.", "questions": [{"q": "NHS建议每日果蔬量？", "options": ["3份", "4份", "5份"], "answer": 2}, {"q": "成人每日糖上限？", "options": ["20g", "30g", "40g"], "answer": 1}, {"q": "每日推荐饮水？", "options": ["4-6杯", "6-8杯", "8-10杯"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 科技对语言", "task": "Some people believe that technology has made our lives easier, while others believe that technology has made our lives more difficult. Discuss both views and give your own opinion.", "sample": "Technology has fundamentally transformed how we communicate, leading to debate about whether this represents progress or regression.\n\nThose who argue technology has made life easier point to unprecedented global connectivity. People can instantly communicate with anyone worldwide, breaking down geographical barriers. Language translation apps help overcome linguistic obstacles, enabling cross-cultural exchanges previously impossible. Additionally, digital communication allows businesses to operate internationally and families separated by distance to maintain close relationships.\n\nHowever, critics argue technology has complicated human interaction. The abundance of communication platforms has paradoxically reduced meaningful connection. Many people report feeling isolated despite constant digital contact. Furthermore, the permanence of digital communication creates anxiety, as casual remarks can be permanently recorded and potentially judged.\n\nIn my opinion, technology is neither wholly positive nor negative. Its impact depends on how individuals choose to use it. When used thoughtfully as a tool to enhance rather than replace face-to-face interaction, technology enriches our communicative abilities. The key lies in maintaining balance and prioritizing genuine human connection alongside digital convenience.\n\nIn conclusion, while technology presents challenges to natural communication, its benefits in connectivity and accessibility cannot be overlooked. Users bear responsibility for using these tools wisely."}, "speaking": {"topic": "家庭", "part1": ["你家里有几口人？", "你和你家人关系好吗？", "你小时候住在哪里？", "你经常和家人一起吃饭吗？"], "part2": "Describe your family. You should say: who are the members of your family, what do you usually do together, how close you are to your family members, and how your family has changed over time.", "part3": ["大家庭好还是小家庭好？", "人们应该花更多时间陪伴家人吗？", "照顾老人是政府的责任还是子女的责任？"]}}, {"day": 3, "phase": "phase1", "listening": {"title": "酒店入住", "transcript": "Receptionist: Good afternoon, welcome to Riverside Hotel.\nGuest: Yes, I have a reservation under Sarah Chen.\nReceptionist: Double room with river view, today until Friday, correct?\nGuest: That's right.\nReceptionist: Does the room have a bathtub?\nGuest: I'd prefer a bathtub.\nReceptionist: Yes, all river view rooms have both bathtub and shower.\nGuest: Is there a gym?\nReceptionist: Yes, on the third floor, open 24 hours.", "questions": [{"q": "预订了几晚？", "options": ["两晚", "三晚", "四晚"], "answer": 1}, {"q": "健身房在哪里？", "options": ["二层", "三层", "四层"], "answer": 1}, {"q": "房间类型是？", "options": ["城景房", "河景房", "园景房"], "answer": 1}]}, "reading": {"day": 3, "phase": "phase1", "title": "英国天气", "passage": "UK has changeable weather, temperate maritime climate. Rainfall occurs year-round, 600mm-3000mm annually. Rainy approximately 150 days in south, 200+ in Scotland. Weather unpredictable - 'four seasons in one day'. Summer 18-25°C, winter 2-7°C. Climate change brings more extreme events.", "questions": [{"q": "英国气候类型？", "options": ["地中海", "温带海洋", "大陆性"], "answer": 1}, {"q": "夏季平均气温？", "options": ["12-18°C", "18-25°C", "25-32°C"], "answer": 1}, {"q": "首次超40°C是？", "options": ["2018", "2020", "2022"], "answer": 2}]}, "writing": {"type": "task1", "title": "表格 - 大学科目", "task": "The table shows the percentage of students choosing different subjects at a UK university in 2020 and 2023. Summarise the information by selecting and reporting the main features.", "sample": "The table illustrates changes in subject preferences at a UK university between 2020 and 2023.\n\nOverall, there was a notable shift toward science and technology subjects, while arts and humanities experienced declining enrollment.\n\nComputer Science showed the most dramatic growth, rising from 15% to 28% - nearly doubling. This reflects increasing student interest in technology careers and the growing importance of digital skills in the job market.\n\nEngineering also saw significant growth, increasing from 12% to 19%. Similarly, Mathematics rose from 8% to 12%. These increases suggest students are gravitating toward subjects with strong employment prospects.\n\nIn contrast, English Literature declined significantly from 18% to 10%. History also decreased from 14% to 9%. Philosophy dropped from 7% to 4%. These reductions indicate declining interest in traditional humanities subjects.\n\nBusiness Studies remained relatively stable, showing slight growth from 18% to 19%. This consistency suggests practical subjects maintain steady appeal despite changing trends.\n\nIn conclusion, the data reveals a clear trend toward STEM subjects, reflecting changing career priorities and employment market demands."}, "speaking": {"topic": "食物", "part1": ["你最喜欢什么食物？", "你会做饭吗？", "你多久下一次馆子？", "你早餐通常吃什么？"], "part2": "Describe a meal you enjoyed. You should say: when and where you had this meal, who you were with, what you ate, and explain why you enjoyed it.", "part3": ["快餐对你的健康有影响吗？", "人们应该花更多时间做饭吗？", "不同国家的饮食习惯有何不同？"]}}, {"day": 4, "phase": "phase1", "listening": {"title": "火车票购买", "transcript": "Ticket Agent: Good morning. How can I help?\nPassenger: I'd like a train ticket to Edinburgh.\nAgent: Traveling today?\nPassenger: Yes, the 10:15 train.\nAgent: Standard or first class?\nPassenger: Standard, please.\nAgent: Journey is 4 hours 30 minutes. Arriving at 2:45 PM.\nPassenger: Window seat please.\nAgent: Single ticket is 65 pounds. Return is only 89.\nPassenger: I'll take a return then.\nAgent: What time return?\nPassenger: Earliest Saturday morning.", "questions": [{"q": "火车几点出发？", "options": ["9:15", "10:15", "11:15"], "answer": 1}, {"q": "单程票价？", "options": ["55磅", "65磅", "75磅"], "answer": 1}, {"q": "返程是周几？", "options": ["周五", "周六", "周日"], "answer": 1}]}, "reading": {"day": 4, "phase": "phase1", "title": "英国教育体系", "passage": "UK education: primary (5-11), secondary (11-16), further (16-18), higher (18+). Compulsory 5-18. At 11, students take GCSEs. After GCSEs, A-levels or vocational qualifications. UK has 160+ universities. Tuition up to £9,250/year since fees introduced in 1998.", "questions": [{"q": "义务教育年龄？", "options": ["5-16", "5-18", "6-18"], "answer": 1}, {"q": "本科学制？", "options": ["2年", "3年", "4年"], "answer": 1}, {"q": "年学费上限？", "options": ["£7,250", "£8,250", "£9,250"], "answer": 2}]}, "writing": {"type": "task2", "title": "观点类 - 旅行年龄", "task": "Some people think that young people should travel and work in different countries before they settle down. To what extent do you agree or disagree?", "sample": "In an increasingly globalized world, the question of whether young people should gain international experience before establishing permanent residence has become significant.\n\nI strongly agree with this proposition for several compelling reasons. First, working abroad exposes young people to diverse perspectives and problem-solving approaches. This multicultural experience enhances adaptability and cultural sensitivity, qualities increasingly valued by employers. Second, navigating unfamiliar environments builds independence and resilience. Facing challenges in foreign settings forces young people to develop self-reliance and cross-cultural communication skills that prove invaluable throughout life.\n\nFurthermore, international travel broadens horizons in ways that cannot be achieved through classroom learning. Experiencing different cultures firsthand provides deeper understanding of global issues and one's place in the international community. This expanded worldview fosters open-mindedness and intellectual curiosity.\n\nHowever, practical considerations exist. Financial constraints may limit opportunities for some young people. Additionally, excessive delay in establishing careers could create disadvantages in competitive job markets. Nevertheless, these obstacles can often be overcome through careful planning and resourcefulness.\n\nIn conclusion, despite potential challenges, the benefits of international experience before settling down substantially outweigh the drawbacks. Young people who embrace such opportunities develop skills, perspectives, and experiences that enrich both their personal lives and professional careers."}, "speaking": {"topic": "交通", "part1": ["你通常怎么上班/上学？", "你学过开车吗？", "你喜欢乘公交还是地铁？", "你最喜欢的交通方式是什么？"], "part2": "Describe a journey you frequently make. You should say: what transportation you usually take, how long it takes, what you do during the journey, and explain how you feel about this journey.", "part3": ["城市交通问题如何解决？", "人们应该更多使用公共交通吗？", "你认为是修建更多道路还是发展公共交通更好？"]}}, {"day": 5, "phase": "phase1", "listening": {"title": "看医生", "transcript": "Receptionist: Dr. Williams' surgery. How can I help?\nPatient: I'd like to see Dr. Williams.\nReceptionist: What symptoms?\nPatient: Terrible cough, sore throat, maybe fever.\nReceptionist: We have 3:30 PM today. Does that work?\nReceptionist: May I have your name?\nPatient: Michael Brown, born July 15, 1985.\nReceptionist: Bring your NHS card and any medications.\nPatient: I'm not on regular medications.\nReceptionist: Come early to fill out a form.", "questions": [{"q": "预约时间？", "options": ["2:30", "3:30", "4:30"], "answer": 1}, {"q": "出生日期？", "options": ["6月15日", "7月15日", "8月15日"], "answer": 1}, {"q": "症状包括？", "options": ["头痛", "咳嗽和喉咙痛", "胃痛"], "answer": 1}]}, "reading": {"day": 5, "phase": "phase1", "title": "英国餐饮文化", "passage": "British cuisine evolved from criticized to celebrated. Full English includes eggs, bacon, sausages, beans. Fish and chips, 'national dish', originated 1860s, 10,500 shops today. Afternoon tea from 1840s. Pub culture central. Indian restaurants since 1950s-60s, chicken tikka masala called national dish.", "questions": [{"q": "炸鱼薯条店数量？", "options": ["7,500", "10,500", "15,500"], "answer": 1}, {"q": "下午茶起源？", "options": ["1820s", "1840s", "1860s"], "answer": 1}, {"q": "印度餐厅引入时期？", "options": ["1940-50s", "1950-60s", "1960-70s"], "answer": 1}]}, "writing": {"type": "task1", "title": "流程图 - 茶叶加工", "task": "The diagram shows how tea is processed. Summarise the information by selecting and reporting the main features, and make comparisons where relevant.", "sample": "The flow chart illustrates the tea processing method, from harvest to packaging.\n\nOverall, the process consists of four main stages: withering, rolling, oxidation, and drying, each transforming the leaf progressively.\n\nThe process begins with fresh tea leaves being harvested manually. These leaves are first spread out for withering, where they lose moisture over 10-18 hours depending on conditions.\n\nNext, the withered leaves undergo rolling. This mechanical process breaks down cell structures and shapes the leaves. Rolled leaves are then spread for oxidation, also called fermentation, where they turn darker through chemical reactions lasting 2-4 hours.\n\nFinally, the oxidized leaves enter the drying stage. This stops oxidation and reduces moisture content to around 3%. Drying can use different methods including pan-firing, tumble-drying, or sun-drying. Once dried, the tea is sorted by grade and packaged for distribution.\n\nIn conclusion, tea processing involves sequential stages transforming fresh leaves into the familiar brown or black tea product through controlled moisture removal and oxidation."}, "speaking": {"topic": "天气", "part1": ["你喜欢什么天气？", "你所在的城市天气怎么样？", "你最喜欢哪个季节？", "天气会影响你的心情吗？"], "part2": "Describe the weather in your city. You should say: what the weather is usually like, how the weather changes throughout the year, what activities you do in different weather, and explain how the weather affects your daily life.", "part3": ["气候变化会导致什么问题？", "人们应该因为天气改变生活方式吗？", "你喜欢住在天气稳定还是多变的地区？"]}}, {"day": 6, "phase": "phase1", "listening": {"title": "图书馆办证", "transcript": "Librarian: Welcome to Central City Library.\nVisitor: I'd like to become a member.\nLibrarian: Bring proof of address and photo ID.\nVisitor: I have utility bill and driver's license.\nLibrarian: Perfect. Study spaces on second floor, group rooms on third.\nVisitor: What are opening hours?\nLibrarian: 9 AM to 9 PM weekdays, 10 AM to 6 PM Saturday.\nVisitor: How many books can I borrow?\nLibrarian: Up to 15 items for three weeks.", "questions": [{"q": "个人学习区在哪层？", "options": ["一层", "二层", "三层"], "answer": 1}, {"q": "工作日闭馆时间？", "options": ["7点", "8点", "9点"], "answer": 2}, {"q": "最多可借几本？", "options": ["10本", "15本", "20本"], "answer": 1}]}, "reading": {"day": 6, "phase": "phase1", "title": "英国购物", "passage": "UK shopping: high streets with familiar names. Oxford Street, Europe's busiest, 1.5 miles, 300+ shops. Harrods has 330 departments. Markets popular: Borough for food, Camden for fashion. Outlet shopping at Bicester Village. Consumer Rights Act 2015 provides 30-day return for faulty goods.", "questions": [{"q": "牛津街长度？", "options": ["1英里", "1.5英里", "2英里"], "answer": 1}, {"q": "哈罗德部门数？", "options": ["280", "330", "380"], "answer": 1}, {"q": "退货期限？", "options": ["14天", "21天", "30天"], "answer": 2}]}, "writing": {"type": "task2", "title": "讨论类 - 金钱奖励", "task": "Some people believe that money is the most important factor in achieving happiness. To what extent do you agree or disagree?", "sample": "The relationship between wealth and wellbeing has long been debated, with some arguing money is essential for happiness while others maintain money cannot buy happiness.\n\nI partially agree that financial security contributes significantly to happiness, but I disagree that it is the most important factor. Basic financial stability provides comfort and reduces stress associated with meeting essential needs. Without sufficient income, individuals struggle to access adequate housing, nutrition, and healthcare - all fundamental to wellbeing. Research consistently shows that money does buy happiness up to a certain income threshold, beyond which additional wealth provides diminishing returns.\n\nHowever, happiness ultimately derives from multiple dimensions that money cannot purchase. Meaningful relationships, personal achievement, health, and sense of purpose contribute substantially to life satisfaction. Many incredibly wealthy individuals report profound unhappiness, while others with modest means experience deep fulfillment. This suggests that psychological and social factors often outweigh material circumstances.\n\nFurthermore, the pursuit of wealth can actually undermine happiness. Excessive focus on accumulation creates stress, damages relationships, and may lead to ethical compromises. The hedonic adaptation phenomenon demonstrates that lifestyle improvements quickly become normalized, requiring ever-greater achievements to maintain satisfaction.\n\nIn conclusion, while financial resources certainly facilitate happiness by providing security and options, they represent merely one component of wellbeing. True happiness emerges from balanced attention to multiple life dimensions including relationships, personal growth, and meaningful contribution."}, "speaking": {"topic": "购物", "part1": ["你喜欢购物吗？", "你通常在哪里购物？", "你更喜欢线上还是线下购物？", "你买过最贵的东西是什么？"], "part2": "Describe something you bought recently. You should say: what you bought, where you bought it, why you bought it, and explain how satisfied you were with it.", "part3": ["购物对你来说意味着什么？", "人们购物太多会有什么后果？", "线上购物会取代实体店吗？"]}}, {"day": 7, "phase": "phase1", "listening": {"title": "租房咨询", "transcript": "Agent: City Rentals. How can I help?\nTenant: Apartment on Maple Street available?\nAgent: Yes, one-bedroom on second floor. 1,200 pounds monthly.\nTenant: What's included?\nAgent: Water and internet. Electricity separate.\nTenant: What about deposit?\nAgent: One month's rent = 1,200 pounds.\nTenant: Minimum rental period?\nAgent: 12 months initially, then month-to-month.\nTenant: I'd like to view it.\nAgent: Can meet there in 20 minutes.", "questions": [{"q": "月租金？", "options": ["1000磅", "1100磅", "1200磅"], "answer": 2}, {"q": "租约最短多久？", "options": ["6个月", "9个月", "12个月"], "answer": 2}, {"q": "看房需要带什么？", "options": ["简历", "身份证", "工资单"], "answer": 1}]}, "reading": {"day": 7, "phase": "phase1", "title": "英国银行", "passage": "Bank accounts essential in UK. Current accounts for everyday use, savings for higher interest. Need proof of ID and address within 3 months. Online banking standard. Contactless payment up to £100. Bank of England, established 1694, sets interest rates. Services like Wise offer better international rates.", "questions": [{"q": "无接触支付上限？", "options": ["£50", "£75", "£100"], "answer": 2}, {"q": "英格兰银行成立？", "options": ["1664", "1694", "1724"], "answer": 1}, {"q": "地址证明需要？", "options": ["1个月", "2个月", "3个月"], "answer": 2}]}, "writing": {"type": "task1", "title": "饼图 - 能源使用", "task": "The pie charts show UK energy consumption in 1980 and 2020. Summarise the information by selecting and reporting the main features.", "sample": "The pie charts illustrate changes in UK energy sources between 1980 and 2020, revealing significant shifts in the energy landscape.\n\nOverall, fossil fuel consumption decreased substantially while renewable energy emerged as a significant source.\n\nIn 1980, coal dominated at 45%, followed by oil at 40%, natural gas at 10%, and nuclear at 5%. Renewables were negligible at under 1%.\n\nBy 2020, the picture transformed dramatically. Natural gas became the largest source at 35%, overtaking coal which dropped to just 8%. Oil decreased to 28%. Nuclear remained stable at 15%. Most notably, renewables surged to 14%, representing a remarkable increase from virtually nothing.\n\nThis transformation reflects multiple factors: environmental concerns drove coal's decline, natural gas provided cleaner transition, nuclear maintained steady contribution, and policy support accelerated renewable adoption.\n\nIn conclusion, UK energy consumption shifted dramatically toward cleaner sources over four decades, with renewables showing the most significant growth despite still representing a minority of supply."}, "speaking": {"topic": "朋友", "part1": ["你有多少好朋友？", "你通常怎么认识新朋友？", "你更喜欢和熟人还是陌生人相处？", "你认为友情中最重要的品质是什么？"], "part2": "Describe a friend who has influenced you. You should say: who this friend is, how you met, what qualities make them special, and explain how they have influenced your life.", "part3": ["真正的友谊有哪些特征？", "人们应该和观点不同的人交朋友吗？", "社交媒体如何影响友谊？"]}}, {"day": 8, "phase": "phase1", "listening": {"title": "健身房会员", "transcript": "Staff: Welcome to FitLife Gym.\nCustomer: What's the membership options?\nStaff: Basic 25/month, Standard 40 with classes, Premium 60 with pool.\nCustomer: Premium sounds good.\nStaff: Joining fee waived with 12-month contract.\nCustomer: Can I freeze membership?\nStaff: Up to 3 months per year.\nCustomer: Opening hours?\nStaff: 6 AM to 10 PM weekdays, 8 AM to 8 PM weekends.\nCustomer: Can I bring a guest?\nStaff: One guest free per month for Premium.", "questions": [{"q": "Premium月费？", "options": ["40磅", "50磅", "60磅"], "answer": 2}, {"q": "可暂停几个月？", "options": ["2个月", "3个月", "4个月"], "answer": 1}, {"q": "周末开门到几点？", "options": ["6点", "8点", "10点"], "answer": 1}]}, "reading": {"day": 8, "phase": "phase1", "title": "英国医疗NHS", "passage": "NHS, founded 1948, provides publicly funded healthcare. Most services free at point of use. Prescription £9.65 in England. Register with GP, gatekeeper to specialists. A&E for emergencies. Private healthcare alternative. Visitors should have travel insurance.", "questions": [{"q": "NHS成立年份？", "options": ["1938", "1948", "1958"], "answer": 1}, {"q": "英格兰处方费？", "options": ["£8.65", "£9.65", "£10.65"], "answer": 1}, {"q": "NHS 111提供？", "options": ["紧急救护", "24小时建议", "预约"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 环保责任", "task": "Some people believe that environmental problems should be solved at an international level. Others believe it is better to deal with them at the national level. Discuss both views and give your opinion.", "sample": "Environmental challenges transcend borders, raising questions about appropriate scales for effective action.\n\nInternational cooperation offers compelling advantages. Climate change and biodiversity loss are inherently global problems requiring coordinated responses. No single nation can solve these challenges independently. International agreements enable knowledge sharing, resource pooling, and consistent standards. The Paris Agreement demonstrates how collective commitment can drive global progress.\n\nHowever, national approaches also possess merit. Countries face different environmental challenges and possess varying capacities for action. National governments can implement policies suited to local conditions and priorities. Furthermore, national policies can inspire international momentum through example and success.\n\nIn my view, effective environmental strategy requires both levels working in harmony. National action provides the foundation, while international coordination amplifies impact. Neither approach alone suffices for problems of global scope.\n\nPractical examples support this integrated perspective. The European Union's supranational environmental framework enables consistent standards across member states while negotiating as a bloc internationally. Similarly, national climate policies often inform international negotiations, which then encourage further national ambition.\n\nIn conclusion, environmental challenges demand solutions at multiple scales. The most effective approach combines ambitious national action with robust international cooperation, recognizing that both levels possess unique strengths and limitations."}, "speaking": {"topic": "学习", "part1": ["你现在在做什么？", "你为什么选择这个专业？", "你觉得学习难吗？", "你更喜欢自学还是课堂上学习？"], "part2": "Describe something you learned recently. You should say: what you learned, where or how you learned it, why you decided to learn it, and explain whether it has been useful.", "part3": ["学校应该教学生什么技能？", "人们应该终身学习吗？", "传统教育与在线教育哪个更好？"]}}, {"day": 9, "phase": "phase1", "listening": {"title": "快递查询", "transcript": "Customer: Package tracking says delivered but I didn't receive it.\nAgent: Let me check. Tracking number?\nCustomer: TD-7348291658-UK.\nAgent: Left in green recycling bin according to driver.\nCustomer: But no card left!\nAgent: Sometimes drivers run out of cards.\nCustomer: It was on top of recycling bag.\nAgent: I'll file a report about this delivery method.\nCustomer: Package found, just dirty but intact.\nAgent: Sorry for the worry. Anything else?", "questions": [{"q": "包裹放在哪里？", "options": ["门口", "绿色回收箱", "邻居家"], "answer": 1}, {"q": "包裹状态？", "options": ["丢失", "完好但脏了", "损坏"], "answer": 1}, {"q": "客户希望如何处理？", "options": ["投诉", "记录反馈", "赔偿"], "answer": 1}]}, "reading": {"day": 9, "phase": "phase1", "title": "英国住宿", "passage": "Accommodation: hotels, B&Bs, holiday cottages. For permanent residence, rent or buy. Rental needs deposit, references. Assured shorthold tenancy most common, 6-12 months initially. Buy requires solicitor, surveys. Utility bills £150-250 monthly. Council tax bands A-H.", "questions": [{"q": "最常见租约？", "options": ["短期", "保证短期", "长期"], "answer": 1}, {"q": "公用事业费？", "options": ["£50-100", "£100-150", "£150-250"], "answer": 2}, {"q": "市政税等级？", "options": ["6", "7", "8"], "answer": 2}]}, "writing": {"type": "task1", "title": "线图 - 人口增长", "task": "The line graph shows population trends in three countries from 1950 to 2050. Summarise the information by selecting and reporting the main features.", "sample": "The line graph illustrates population changes in India, China, and the USA over 100 years from 1950 to projected 2050.\n\nOverall, India shows the most dramatic growth, overtaking China around 2025, while the USA demonstrates steady moderate increase.\n\nChina experienced rapid growth from 1950 to 1980, rising from approximately 550 million to nearly 1 billion. Following the one-child policy, growth slowed significantly, with the curve flattening. Projections suggest gradual decline after 2025 as India surpasses China.\n\nIndia's trajectory shows consistent acceleration, growing from 400 million in 1950 to over 1.4 billion by 2025. Unlike China, India's growth rate remained high throughout, with projections indicating continued increase to 1.6 billion by 2050.\n\nThe USA displayed the most modest growth, starting at 160 million in 1950 and reaching approximately 340 million by 2025. Projections suggest continued gradual increase to around 380 million by 2050.\n\nIn conclusion, the graph reveals divergent population futures: India rising rapidly, China peaking and declining, and the USA growing steadily."}, "speaking": {"topic": "运动", "part1": ["你喜欢运动吗？", "你经常锻炼吗？", "你最喜欢什么运动？", "运动对你来说意味着什么？"], "part2": "Describe a sport you enjoy playing or watching. You should say: what sport it is, how often you play or watch it, how you first became interested in it, and explain why you enjoy it.", "part3": ["运动应该如何融入学校教育？", "人们应该把运动作为日常生活的一部分吗？", "竞技体育的问题是什么？"]}}, {"day": 10, "phase": "phase1", "listening": {"title": "银行开户", "transcript": "Bank Staff: High Street Bank. How can I help?\nCustomer: Open a current account.\nStaff: Basic with no fees or Premium with benefits?\nCustomer: Basic is fine.\nStaff: Includes debit card, online banking, free ATM use.\nCustomer: What documents needed?\nStaff: Passport, proof of address, proof of income.\nCustomer: I have passport and employment letter.\nStaff: Need initial deposit of 1 pound. Card arrives in 5-7 days.\nCustomer: Can I come this afternoon?\nStaff: 9 to 4 weekdays, no appointment needed.", "questions": [{"q": "基本账户月费？", "options": ["免费", "5磅", "10磅"], "answer": 0}, {"q": "激活账户最低存款？", "options": ["1磅", "10磅", "50磅"], "answer": 0}, {"q": "银行卡多久到？", "options": ["3-5天", "5-7天", "7-10天"], "answer": 1}]}, "reading": {"day": 10, "phase": "phase1", "title": "英国节日", "passage": "UK holidays: Christmas December 25, major celebration. New Year, Hogmanay in Scotland. Easter follows Christian calendar, Good Friday and Monday public holidays. Bank holidays throughout year. Remembrance Day November 11, two-minute silence. Bonfire Night November 5.", "questions": [{"q": "复活节在？", "options": ["3-4月", "4-5月", "5-6月"], "answer": 0}, {"q": "纪念日日期？", "options": ["11月10日", "11月11日", "11月12日"], "answer": 1}, {"q": "篝火之夜日期？", "options": ["11月4日", "11月5日", "11月6日"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 远程学习", "task": "Some people believe that university students should study whatever they like. Others think that they should only be allowed to study subjects that will be useful in the future, such as those related to science and technology. Discuss both views and give your opinion.", "sample": "The debate between utilitarian and liberal approaches to education continues to generate discussion.\n\nThose favoring practical subjects argue that national competitiveness depends on technical expertise. Science and technology drive economic growth and innovation. Students pursuing these fields enjoy better employment prospects and higher starting salaries. Furthermore, society requires professionals in healthcare, engineering, and computing to address pressing challenges.\n\nHowever, the alternative perspective emphasizes that education should develop well-rounded individuals capable of independent thought. Literature, philosophy, and arts cultivate critical thinking and cultural understanding. These subjects develop creativity and analytical abilities applicable across numerous careers. Moreover, human civilization's richness derives from diverse intellectual pursuits beyond immediate utility.\n\nIn my view, a balanced approach serves students and society best. While practical skills provide career foundations, humanities develop essential cognitive capabilities. The most successful individuals typically combine technical competence with broad intellectual perspective.\n\nFurthermore, the job market continues evolving unpredictably. Specific technical skills may become obsolete, while adaptable thinking and learning capacity remain valuable. Education should prepare students for change rather than narrow training.\n\nIn conclusion, although practical subjects offer clear career advantages, exclusively restricting university study to such fields would impoverish both individuals and society. A rounded education combining utility with breadth produces the most fulfilled and productive citizens."}, "speaking": {"topic": "节假日", "part1": ["你最喜欢什么节日？", "你通常怎么庆祝节日？", "你最喜欢和谁一起过节？", "节日期间你做什么特别的事？"], "part2": "Describe a holiday you enjoyed. You should say: where you went, when you went, who you were with, what you did, and explain why you enjoyed this holiday.", "part3": ["人们应该保留传统节日吗？", "度假对你的身心健康重要吗？", "旅游业对当地文化有什么影响？"]}}, {"day": 11, "phase": "phase1", "listening": {"title": "机场接机", "transcript": "Agent: Good afternoon, sir. Welcome to London Heathrow Airport. May I see your passport please?\nPassenger: Here you are. I'm visiting London for a holiday.\nAgent: Thank you. How long do you plan to stay in the UK?\nPassenger: About two weeks. I'll be leaving on the 15th of August.\nAgent: And where will you be staying?\nPassenger: I've booked The Royal Garden Hotel on Kensington High Street.\nAgent: Is this your first visit to the UK?\nPassenger: Yes, it is.\nAgent: Enjoy your stay. Here's your passport.", "questions": [{"q": "乘客计划停留多久？", "options": ["一周", "两周", "三周"], "answer": 1}, {"q": "酒店名称是？", "options": ["Hilton", "Royal Garden Hotel", "Marriott"], "answer": 1}, {"q": "这是第几次访问？", "options": ["第一次", "第二次", "第三次"], "answer": 0}]}, "reading": {"day": 11, "phase": "phase1", "title": "英国交通系统", "passage": "The UK has comprehensive public transport. Railway system is one of oldest, first steam passenger railway in 1825. London Underground, 'the Tube', began in 1863, carries over 1 billion passengers annually. Long-distance trains connect major cities efficiently. Buses serve areas without rail. Cycling has grown with dedicated lanes. Contactless payment simplifies transport use.", "questions": [{"q": "伦敦地铁始于哪年？", "options": ["1853", "1863", "1873"], "answer": 1}, {"q": "伦敦地铁年运量？", "options": ["5亿", "10亿", "15亿"], "answer": 1}, {"q": "共享单车计划始于？", "options": ["2008", "2010", "2012"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 咖啡店销售", "task": "The bar chart shows the monthly sales of three types of coffee in a London café in 2023. Summarise the information by selecting and reporting the main features, and make comparisons where relevant.", "sample": "The bar chart illustrates monthly sales of three coffee types at a London café in 2023: espresso, cappuccino, and latte.\n\nOverall, cappuccino was the most popular throughout the year, while espresso showed distinct seasonal patterns.\n\nCappuccino sales remained relatively stable, ranging from 450 to 520 cups per month, with peak sales in autumn months (October-November). This suggests cappuccino's consistent appeal regardless of season.\n\nLatte followed a similar but lower pattern, averaging 300-400 cups monthly. Sales peaked in winter (December-January) at around 420 cups, possibly due to customer preference for warmer drinks in colder weather.\n\nEspresso showed the most dramatic variation. Summer months (June-August) saw highest sales at 350-400 cups, while winter dropped to below 200 cups. This seasonal pattern likely reflects customer preference for iced espresso drinks in summer.\n\nIn conclusion, cappuccino dominated sales全年, with latte performing moderately. Espresso's seasonality distinguishes it from the other two varieties."}, "speaking": {"topic": "日常活动", "part1": ["你通常什么时候起床？", "你早餐一般吃什么？", "你每天花多长时间通勤？", "下班后你喜欢做什么？"], "part2": "Describe your daily routine. You should say: what time you wake up and go to bed, what you do during the day, how you usually spend your evenings, and explain whether you enjoy your daily routine.", "part3": ["你觉得一天中最重要的时间是什么？", "人们的工作时间应该更灵活吗？", "你更喜欢早晨还是夜晚工作？"]}}, {"day": 12, "phase": "phase1", "listening": {"title": "餐厅预订", "transcript": "Receptionist: Good evening, Bella Vista Restaurant.\nCustomer: Hello, I'd like to make a reservation for tomorrow evening.\nReceptionist: What time?\nCustomer: Around 7:30 PM. We're celebrating my wife's birthday.\nReceptionist: How many people?\nCustomer: Just the two of us.\nReceptionist: Any dietary requirements?\nCustomer: My wife is vegetarian.\nReceptionist: We have excellent vegetarian options.\nCustomer: Perfect. Also, can we order a birthday cake?\nReceptionist: Absolutely.", "questions": [{"q": "预订时间是？", "options": ["7:00", "7:30", "8:00"], "answer": 1}, {"q": "几个人用餐？", "options": ["一位", "两位", "三位"], "answer": 1}, {"q": "饮食要求是？", "options": ["素食", "海鲜过敏", "无麸质"], "answer": 0}]}, "reading": {"day": 12, "phase": "phase1", "title": "健康饮食指南", "passage": "Balanced diet is essential. NHS recommends 5 portions of fruit and vegetables daily. Portion sizes have increased, contributing to obesity. The Eatwell Guide divides foods into 5 groups. Reducing sugar is important - adults should have no more than 30g free sugars daily. 6-8 glasses of water recommended. Sustainable approaches work best for weight loss.", "questions": [{"q": "NHS建议每日果蔬量？", "options": ["3份", "4份", "5份"], "answer": 2}, {"q": "成人每日糖上限？", "options": ["20g", "30g", "40g"], "answer": 1}, {"q": "每日推荐饮水？", "options": ["4-6杯", "6-8杯", "8-10杯"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 科技对语言", "task": "Some people believe that technology has made our lives easier, while others believe that technology has made our lives more difficult. Discuss both views and give your own opinion.", "sample": "Technology has fundamentally transformed how we communicate, leading to debate about whether this represents progress or regression.\n\nThose who argue technology has made life easier point to unprecedented global connectivity. People can instantly communicate with anyone worldwide, breaking down geographical barriers. Language translation apps help overcome linguistic obstacles, enabling cross-cultural exchanges previously impossible. Additionally, digital communication allows businesses to operate internationally and families separated by distance to maintain close relationships.\n\nHowever, critics argue technology has complicated human interaction. The abundance of communication platforms has paradoxically reduced meaningful connection. Many people report feeling isolated despite constant digital contact. Furthermore, the permanence of digital communication creates anxiety, as casual remarks can be permanently recorded and potentially judged.\n\nIn my opinion, technology is neither wholly positive nor negative. Its impact depends on how individuals choose to use it. When used thoughtfully as a tool to enhance rather than replace face-to-face interaction, technology enriches our communicative abilities. The key lies in maintaining balance and prioritizing genuine human connection alongside digital convenience.\n\nIn conclusion, while technology presents challenges to natural communication, its benefits in connectivity and accessibility cannot be overlooked. Users bear responsibility for using these tools wisely."}, "speaking": {"topic": "家庭", "part1": ["你家里有几口人？", "你和你家人关系好吗？", "你小时候住在哪里？", "你经常和家人一起吃饭吗？"], "part2": "Describe your family. You should say: who are the members of your family, what do you usually do together, how close you are to your family members, and how your family has changed over time.", "part3": ["大家庭好还是小家庭好？", "人们应该花更多时间陪伴家人吗？", "照顾老人是政府的责任还是子女的责任？"]}}, {"day": 13, "phase": "phase1", "listening": {"title": "酒店入住", "transcript": "Receptionist: Good afternoon, welcome to Riverside Hotel.\nGuest: Yes, I have a reservation under Sarah Chen.\nReceptionist: Double room with river view, today until Friday, correct?\nGuest: That's right.\nReceptionist: Does the room have a bathtub?\nGuest: I'd prefer a bathtub.\nReceptionist: Yes, all river view rooms have both bathtub and shower.\nGuest: Is there a gym?\nReceptionist: Yes, on the third floor, open 24 hours.", "questions": [{"q": "预订了几晚？", "options": ["两晚", "三晚", "四晚"], "answer": 1}, {"q": "健身房在哪里？", "options": ["二层", "三层", "四层"], "answer": 1}, {"q": "房间类型是？", "options": ["城景房", "河景房", "园景房"], "answer": 1}]}, "reading": {"day": 13, "phase": "phase1", "title": "英国天气", "passage": "UK has changeable weather, temperate maritime climate. Rainfall occurs year-round, 600mm-3000mm annually. Rainy approximately 150 days in south, 200+ in Scotland. Weather unpredictable - 'four seasons in one day'. Summer 18-25°C, winter 2-7°C. Climate change brings more extreme events.", "questions": [{"q": "英国气候类型？", "options": ["地中海", "温带海洋", "大陆性"], "answer": 1}, {"q": "夏季平均气温？", "options": ["12-18°C", "18-25°C", "25-32°C"], "answer": 1}, {"q": "首次超40°C是？", "options": ["2018", "2020", "2022"], "answer": 2}]}, "writing": {"type": "task1", "title": "表格 - 大学科目", "task": "The table shows the percentage of students choosing different subjects at a UK university in 2020 and 2023. Summarise the information by selecting and reporting the main features.", "sample": "The table illustrates changes in subject preferences at a UK university between 2020 and 2023.\n\nOverall, there was a notable shift toward science and technology subjects, while arts and humanities experienced declining enrollment.\n\nComputer Science showed the most dramatic growth, rising from 15% to 28% - nearly doubling. This reflects increasing student interest in technology careers and the growing importance of digital skills in the job market.\n\nEngineering also saw significant growth, increasing from 12% to 19%. Similarly, Mathematics rose from 8% to 12%. These increases suggest students are gravitating toward subjects with strong employment prospects.\n\nIn contrast, English Literature declined significantly from 18% to 10%. History also decreased from 14% to 9%. Philosophy dropped from 7% to 4%. These reductions indicate declining interest in traditional humanities subjects.\n\nBusiness Studies remained relatively stable, showing slight growth from 18% to 19%. This consistency suggests practical subjects maintain steady appeal despite changing trends.\n\nIn conclusion, the data reveals a clear trend toward STEM subjects, reflecting changing career priorities and employment market demands."}, "speaking": {"topic": "食物", "part1": ["你最喜欢什么食物？", "你会做饭吗？", "你多久下一次馆子？", "你早餐通常吃什么？"], "part2": "Describe a meal you enjoyed. You should say: when and where you had this meal, who you were with, what you ate, and explain why you enjoyed it.", "part3": ["快餐对你的健康有影响吗？", "人们应该花更多时间做饭吗？", "不同国家的饮食习惯有何不同？"]}}, {"day": 14, "phase": "phase1", "listening": {"title": "火车票购买", "transcript": "Ticket Agent: Good morning. How can I help?\nPassenger: I'd like a train ticket to Edinburgh.\nAgent: Traveling today?\nPassenger: Yes, the 10:15 train.\nAgent: Standard or first class?\nPassenger: Standard, please.\nAgent: Journey is 4 hours 30 minutes. Arriving at 2:45 PM.\nPassenger: Window seat please.\nAgent: Single ticket is 65 pounds. Return is only 89.\nPassenger: I'll take a return then.\nAgent: What time return?\nPassenger: Earliest Saturday morning.", "questions": [{"q": "火车几点出发？", "options": ["9:15", "10:15", "11:15"], "answer": 1}, {"q": "单程票价？", "options": ["55磅", "65磅", "75磅"], "answer": 1}, {"q": "返程是周几？", "options": ["周五", "周六", "周日"], "answer": 1}]}, "reading": {"day": 14, "phase": "phase1", "title": "英国教育体系", "passage": "UK education: primary (5-11), secondary (11-16), further (16-18), higher (18+). Compulsory 5-18. At 11, students take GCSEs. After GCSEs, A-levels or vocational qualifications. UK has 160+ universities. Tuition up to £9,250/year since fees introduced in 1998.", "questions": [{"q": "义务教育年龄？", "options": ["5-16", "5-18", "6-18"], "answer": 1}, {"q": "本科学制？", "options": ["2年", "3年", "4年"], "answer": 1}, {"q": "年学费上限？", "options": ["£7,250", "£8,250", "£9,250"], "answer": 2}]}, "writing": {"type": "task2", "title": "观点类 - 旅行年龄", "task": "Some people think that young people should travel and work in different countries before they settle down. To what extent do you agree or disagree?", "sample": "In an increasingly globalized world, the question of whether young people should gain international experience before establishing permanent residence has become significant.\n\nI strongly agree with this proposition for several compelling reasons. First, working abroad exposes young people to diverse perspectives and problem-solving approaches. This multicultural experience enhances adaptability and cultural sensitivity, qualities increasingly valued by employers. Second, navigating unfamiliar environments builds independence and resilience. Facing challenges in foreign settings forces young people to develop self-reliance and cross-cultural communication skills that prove invaluable throughout life.\n\nFurthermore, international travel broadens horizons in ways that cannot be achieved through classroom learning. Experiencing different cultures firsthand provides deeper understanding of global issues and one's place in the international community. This expanded worldview fosters open-mindedness and intellectual curiosity.\n\nHowever, practical considerations exist. Financial constraints may limit opportunities for some young people. Additionally, excessive delay in establishing careers could create disadvantages in competitive job markets. Nevertheless, these obstacles can often be overcome through careful planning and resourcefulness.\n\nIn conclusion, despite potential challenges, the benefits of international experience before settling down substantially outweigh the drawbacks. Young people who embrace such opportunities develop skills, perspectives, and experiences that enrich both their personal lives and professional careers."}, "speaking": {"topic": "交通", "part1": ["你通常怎么上班/上学？", "你学过开车吗？", "你喜欢乘公交还是地铁？", "你最喜欢的交通方式是什么？"], "part2": "Describe a journey you frequently make. You should say: what transportation you usually take, how long it takes, what you do during the journey, and explain how you feel about this journey.", "part3": ["城市交通问题如何解决？", "人们应该更多使用公共交通吗？", "你认为是修建更多道路还是发展公共交通更好？"]}}, {"day": 15, "phase": "phase1", "listening": {"title": "看医生", "transcript": "Receptionist: Dr. Williams' surgery. How can I help?\nPatient: I'd like to see Dr. Williams.\nReceptionist: What symptoms?\nPatient: Terrible cough, sore throat, maybe fever.\nReceptionist: We have 3:30 PM today. Does that work?\nReceptionist: May I have your name?\nPatient: Michael Brown, born July 15, 1985.\nReceptionist: Bring your NHS card and any medications.\nPatient: I'm not on regular medications.\nReceptionist: Come early to fill out a form.", "questions": [{"q": "预约时间？", "options": ["2:30", "3:30", "4:30"], "answer": 1}, {"q": "出生日期？", "options": ["6月15日", "7月15日", "8月15日"], "answer": 1}, {"q": "症状包括？", "options": ["头痛", "咳嗽和喉咙痛", "胃痛"], "answer": 1}]}, "reading": {"day": 15, "phase": "phase1", "title": "英国餐饮文化", "passage": "British cuisine evolved from criticized to celebrated. Full English includes eggs, bacon, sausages, beans. Fish and chips, 'national dish', originated 1860s, 10,500 shops today. Afternoon tea from 1840s. Pub culture central. Indian restaurants since 1950s-60s, chicken tikka masala called national dish.", "questions": [{"q": "炸鱼薯条店数量？", "options": ["7,500", "10,500", "15,500"], "answer": 1}, {"q": "下午茶起源？", "options": ["1820s", "1840s", "1860s"], "answer": 1}, {"q": "印度餐厅引入时期？", "options": ["1940-50s", "1950-60s", "1960-70s"], "answer": 1}]}, "writing": {"type": "task1", "title": "流程图 - 茶叶加工", "task": "The diagram shows how tea is processed. Summarise the information by selecting and reporting the main features, and make comparisons where relevant.", "sample": "The flow chart illustrates the tea processing method, from harvest to packaging.\n\nOverall, the process consists of four main stages: withering, rolling, oxidation, and drying, each transforming the leaf progressively.\n\nThe process begins with fresh tea leaves being harvested manually. These leaves are first spread out for withering, where they lose moisture over 10-18 hours depending on conditions.\n\nNext, the withered leaves undergo rolling. This mechanical process breaks down cell structures and shapes the leaves. Rolled leaves are then spread for oxidation, also called fermentation, where they turn darker through chemical reactions lasting 2-4 hours.\n\nFinally, the oxidized leaves enter the drying stage. This stops oxidation and reduces moisture content to around 3%. Drying can use different methods including pan-firing, tumble-drying, or sun-drying. Once dried, the tea is sorted by grade and packaged for distribution.\n\nIn conclusion, tea processing involves sequential stages transforming fresh leaves into the familiar brown or black tea product through controlled moisture removal and oxidation."}, "speaking": {"topic": "天气", "part1": ["你喜欢什么天气？", "你所在的城市天气怎么样？", "你最喜欢哪个季节？", "天气会影响你的心情吗？"], "part2": "Describe the weather in your city. You should say: what the weather is usually like, how the weather changes throughout the year, what activities you do in different weather, and explain how the weather affects your daily life.", "part3": ["气候变化会导致什么问题？", "人们应该因为天气改变生活方式吗？", "你喜欢住在天气稳定还是多变的地区？"]}}, {"day": 16, "phase": "phase1", "listening": {"title": "图书馆办证", "transcript": "Librarian: Welcome to Central City Library.\nVisitor: I'd like to become a member.\nLibrarian: Bring proof of address and photo ID.\nVisitor: I have utility bill and driver's license.\nLibrarian: Perfect. Study spaces on second floor, group rooms on third.\nVisitor: What are opening hours?\nLibrarian: 9 AM to 9 PM weekdays, 10 AM to 6 PM Saturday.\nVisitor: How many books can I borrow?\nLibrarian: Up to 15 items for three weeks.", "questions": [{"q": "个人学习区在哪层？", "options": ["一层", "二层", "三层"], "answer": 1}, {"q": "工作日闭馆时间？", "options": ["7点", "8点", "9点"], "answer": 2}, {"q": "最多可借几本？", "options": ["10本", "15本", "20本"], "answer": 1}]}, "reading": {"day": 16, "phase": "phase1", "title": "英国购物", "passage": "UK shopping: high streets with familiar names. Oxford Street, Europe's busiest, 1.5 miles, 300+ shops. Harrods has 330 departments. Markets popular: Borough for food, Camden for fashion. Outlet shopping at Bicester Village. Consumer Rights Act 2015 provides 30-day return for faulty goods.", "questions": [{"q": "牛津街长度？", "options": ["1英里", "1.5英里", "2英里"], "answer": 1}, {"q": "哈罗德部门数？", "options": ["280", "330", "380"], "answer": 1}, {"q": "退货期限？", "options": ["14天", "21天", "30天"], "answer": 2}]}, "writing": {"type": "task2", "title": "讨论类 - 金钱奖励", "task": "Some people believe that money is the most important factor in achieving happiness. To what extent do you agree or disagree?", "sample": "The relationship between wealth and wellbeing has long been debated, with some arguing money is essential for happiness while others maintain money cannot buy happiness.\n\nI partially agree that financial security contributes significantly to happiness, but I disagree that it is the most important factor. Basic financial stability provides comfort and reduces stress associated with meeting essential needs. Without sufficient income, individuals struggle to access adequate housing, nutrition, and healthcare - all fundamental to wellbeing. Research consistently shows that money does buy happiness up to a certain income threshold, beyond which additional wealth provides diminishing returns.\n\nHowever, happiness ultimately derives from multiple dimensions that money cannot purchase. Meaningful relationships, personal achievement, health, and sense of purpose contribute substantially to life satisfaction. Many incredibly wealthy individuals report profound unhappiness, while others with modest means experience deep fulfillment. This suggests that psychological and social factors often outweigh material circumstances.\n\nFurthermore, the pursuit of wealth can actually undermine happiness. Excessive focus on accumulation creates stress, damages relationships, and may lead to ethical compromises. The hedonic adaptation phenomenon demonstrates that lifestyle improvements quickly become normalized, requiring ever-greater achievements to maintain satisfaction.\n\nIn conclusion, while financial resources certainly facilitate happiness by providing security and options, they represent merely one component of wellbeing. True happiness emerges from balanced attention to multiple life dimensions including relationships, personal growth, and meaningful contribution."}, "speaking": {"topic": "购物", "part1": ["你喜欢购物吗？", "你通常在哪里购物？", "你更喜欢线上还是线下购物？", "你买过最贵的东西是什么？"], "part2": "Describe something you bought recently. You should say: what you bought, where you bought it, why you bought it, and explain how satisfied you were with it.", "part3": ["购物对你来说意味着什么？", "人们购物太多会有什么后果？", "线上购物会取代实体店吗？"]}}, {"day": 17, "phase": "phase1", "listening": {"title": "租房咨询", "transcript": "Agent: City Rentals. How can I help?\nTenant: Apartment on Maple Street available?\nAgent: Yes, one-bedroom on second floor. 1,200 pounds monthly.\nTenant: What's included?\nAgent: Water and internet. Electricity separate.\nTenant: What about deposit?\nAgent: One month's rent = 1,200 pounds.\nTenant: Minimum rental period?\nAgent: 12 months initially, then month-to-month.\nTenant: I'd like to view it.\nAgent: Can meet there in 20 minutes.", "questions": [{"q": "月租金？", "options": ["1000磅", "1100磅", "1200磅"], "answer": 2}, {"q": "租约最短多久？", "options": ["6个月", "9个月", "12个月"], "answer": 2}, {"q": "看房需要带什么？", "options": ["简历", "身份证", "工资单"], "answer": 1}]}, "reading": {"day": 17, "phase": "phase1", "title": "英国银行", "passage": "Bank accounts essential in UK. Current accounts for everyday use, savings for higher interest. Need proof of ID and address within 3 months. Online banking standard. Contactless payment up to £100. Bank of England, established 1694, sets interest rates. Services like Wise offer better international rates.", "questions": [{"q": "无接触支付上限？", "options": ["£50", "£75", "£100"], "answer": 2}, {"q": "英格兰银行成立？", "options": ["1664", "1694", "1724"], "answer": 1}, {"q": "地址证明需要？", "options": ["1个月", "2个月", "3个月"], "answer": 2}]}, "writing": {"type": "task1", "title": "饼图 - 能源使用", "task": "The pie charts show UK energy consumption in 1980 and 2020. Summarise the information by selecting and reporting the main features.", "sample": "The pie charts illustrate changes in UK energy sources between 1980 and 2020, revealing significant shifts in the energy landscape.\n\nOverall, fossil fuel consumption decreased substantially while renewable energy emerged as a significant source.\n\nIn 1980, coal dominated at 45%, followed by oil at 40%, natural gas at 10%, and nuclear at 5%. Renewables were negligible at under 1%.\n\nBy 2020, the picture transformed dramatically. Natural gas became the largest source at 35%, overtaking coal which dropped to just 8%. Oil decreased to 28%. Nuclear remained stable at 15%. Most notably, renewables surged to 14%, representing a remarkable increase from virtually nothing.\n\nThis transformation reflects multiple factors: environmental concerns drove coal's decline, natural gas provided cleaner transition, nuclear maintained steady contribution, and policy support accelerated renewable adoption.\n\nIn conclusion, UK energy consumption shifted dramatically toward cleaner sources over four decades, with renewables showing the most significant growth despite still representing a minority of supply."}, "speaking": {"topic": "朋友", "part1": ["你有多少好朋友？", "你通常怎么认识新朋友？", "你更喜欢和熟人还是陌生人相处？", "你认为友情中最重要的品质是什么？"], "part2": "Describe a friend who has influenced you. You should say: who this friend is, how you met, what qualities make them special, and explain how they have influenced your life.", "part3": ["真正的友谊有哪些特征？", "人们应该和观点不同的人交朋友吗？", "社交媒体如何影响友谊？"]}}, {"day": 18, "phase": "phase1", "listening": {"title": "健身房会员", "transcript": "Staff: Welcome to FitLife Gym.\nCustomer: What's the membership options?\nStaff: Basic 25/month, Standard 40 with classes, Premium 60 with pool.\nCustomer: Premium sounds good.\nStaff: Joining fee waived with 12-month contract.\nCustomer: Can I freeze membership?\nStaff: Up to 3 months per year.\nCustomer: Opening hours?\nStaff: 6 AM to 10 PM weekdays, 8 AM to 8 PM weekends.\nCustomer: Can I bring a guest?\nStaff: One guest free per month for Premium.", "questions": [{"q": "Premium月费？", "options": ["40磅", "50磅", "60磅"], "answer": 2}, {"q": "可暂停几个月？", "options": ["2个月", "3个月", "4个月"], "answer": 1}, {"q": "周末开门到几点？", "options": ["6点", "8点", "10点"], "answer": 1}]}, "reading": {"day": 18, "phase": "phase1", "title": "英国医疗NHS", "passage": "NHS, founded 1948, provides publicly funded healthcare. Most services free at point of use. Prescription £9.65 in England. Register with GP, gatekeeper to specialists. A&E for emergencies. Private healthcare alternative. Visitors should have travel insurance.", "questions": [{"q": "NHS成立年份？", "options": ["1938", "1948", "1958"], "answer": 1}, {"q": "英格兰处方费？", "options": ["£8.65", "£9.65", "£10.65"], "answer": 1}, {"q": "NHS 111提供？", "options": ["紧急救护", "24小时建议", "预约"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 环保责任", "task": "Some people believe that environmental problems should be solved at an international level. Others believe it is better to deal with them at the national level. Discuss both views and give your opinion.", "sample": "Environmental challenges transcend borders, raising questions about appropriate scales for effective action.\n\nInternational cooperation offers compelling advantages. Climate change and biodiversity loss are inherently global problems requiring coordinated responses. No single nation can solve these challenges independently. International agreements enable knowledge sharing, resource pooling, and consistent standards. The Paris Agreement demonstrates how collective commitment can drive global progress.\n\nHowever, national approaches also possess merit. Countries face different environmental challenges and possess varying capacities for action. National governments can implement policies suited to local conditions and priorities. Furthermore, national policies can inspire international momentum through example and success.\n\nIn my view, effective environmental strategy requires both levels working in harmony. National action provides the foundation, while international coordination amplifies impact. Neither approach alone suffices for problems of global scope.\n\nPractical examples support this integrated perspective. The European Union's supranational environmental framework enables consistent standards across member states while negotiating as a bloc internationally. Similarly, national climate policies often inform international negotiations, which then encourage further national ambition.\n\nIn conclusion, environmental challenges demand solutions at multiple scales. The most effective approach combines ambitious national action with robust international cooperation, recognizing that both levels possess unique strengths and limitations."}, "speaking": {"topic": "学习", "part1": ["你现在在做什么？", "你为什么选择这个专业？", "你觉得学习难吗？", "你更喜欢自学还是课堂上学习？"], "part2": "Describe something you learned recently. You should say: what you learned, where or how you learned it, why you decided to learn it, and explain whether it has been useful.", "part3": ["学校应该教学生什么技能？", "人们应该终身学习吗？", "传统教育与在线教育哪个更好？"]}}, {"day": 19, "phase": "phase1", "listening": {"title": "快递查询", "transcript": "Customer: Package tracking says delivered but I didn't receive it.\nAgent: Let me check. Tracking number?\nCustomer: TD-7348291658-UK.\nAgent: Left in green recycling bin according to driver.\nCustomer: But no card left!\nAgent: Sometimes drivers run out of cards.\nCustomer: It was on top of recycling bag.\nAgent: I'll file a report about this delivery method.\nCustomer: Package found, just dirty but intact.\nAgent: Sorry for the worry. Anything else?", "questions": [{"q": "包裹放在哪里？", "options": ["门口", "绿色回收箱", "邻居家"], "answer": 1}, {"q": "包裹状态？", "options": ["丢失", "完好但脏了", "损坏"], "answer": 1}, {"q": "客户希望如何处理？", "options": ["投诉", "记录反馈", "赔偿"], "answer": 1}]}, "reading": {"day": 19, "phase": "phase1", "title": "英国住宿", "passage": "Accommodation: hotels, B&Bs, holiday cottages. For permanent residence, rent or buy. Rental needs deposit, references. Assured shorthold tenancy most common, 6-12 months initially. Buy requires solicitor, surveys. Utility bills £150-250 monthly. Council tax bands A-H.", "questions": [{"q": "最常见租约？", "options": ["短期", "保证短期", "长期"], "answer": 1}, {"q": "公用事业费？", "options": ["£50-100", "£100-150", "£150-250"], "answer": 2}, {"q": "市政税等级？", "options": ["6", "7", "8"], "answer": 2}]}, "writing": {"type": "task1", "title": "线图 - 人口增长", "task": "The line graph shows population trends in three countries from 1950 to 2050. Summarise the information by selecting and reporting the main features.", "sample": "The line graph illustrates population changes in India, China, and the USA over 100 years from 1950 to projected 2050.\n\nOverall, India shows the most dramatic growth, overtaking China around 2025, while the USA demonstrates steady moderate increase.\n\nChina experienced rapid growth from 1950 to 1980, rising from approximately 550 million to nearly 1 billion. Following the one-child policy, growth slowed significantly, with the curve flattening. Projections suggest gradual decline after 2025 as India surpasses China.\n\nIndia's trajectory shows consistent acceleration, growing from 400 million in 1950 to over 1.4 billion by 2025. Unlike China, India's growth rate remained high throughout, with projections indicating continued increase to 1.6 billion by 2050.\n\nThe USA displayed the most modest growth, starting at 160 million in 1950 and reaching approximately 340 million by 2025. Projections suggest continued gradual increase to around 380 million by 2050.\n\nIn conclusion, the graph reveals divergent population futures: India rising rapidly, China peaking and declining, and the USA growing steadily."}, "speaking": {"topic": "运动", "part1": ["你喜欢运动吗？", "你经常锻炼吗？", "你最喜欢什么运动？", "运动对你来说意味着什么？"], "part2": "Describe a sport you enjoy playing or watching. You should say: what sport it is, how often you play or watch it, how you first became interested in it, and explain why you enjoy it.", "part3": ["运动应该如何融入学校教育？", "人们应该把运动作为日常生活的一部分吗？", "竞技体育的问题是什么？"]}}, {"day": 20, "phase": "phase1", "listening": {"title": "银行开户", "transcript": "Bank Staff: High Street Bank. How can I help?\nCustomer: Open a current account.\nStaff: Basic with no fees or Premium with benefits?\nCustomer: Basic is fine.\nStaff: Includes debit card, online banking, free ATM use.\nCustomer: What documents needed?\nStaff: Passport, proof of address, proof of income.\nCustomer: I have passport and employment letter.\nStaff: Need initial deposit of 1 pound. Card arrives in 5-7 days.\nCustomer: Can I come this afternoon?\nStaff: 9 to 4 weekdays, no appointment needed.", "questions": [{"q": "基本账户月费？", "options": ["免费", "5磅", "10磅"], "answer": 0}, {"q": "激活账户最低存款？", "options": ["1磅", "10磅", "50磅"], "answer": 0}, {"q": "银行卡多久到？", "options": ["3-5天", "5-7天", "7-10天"], "answer": 1}]}, "reading": {"day": 20, "phase": "phase1", "title": "英国节日", "passage": "UK holidays: Christmas December 25, major celebration. New Year, Hogmanay in Scotland. Easter follows Christian calendar, Good Friday and Monday public holidays. Bank holidays throughout year. Remembrance Day November 11, two-minute silence. Bonfire Night November 5.", "questions": [{"q": "复活节在？", "options": ["3-4月", "4-5月", "5-6月"], "answer": 0}, {"q": "纪念日日期？", "options": ["11月10日", "11月11日", "11月12日"], "answer": 1}, {"q": "篝火之夜日期？", "options": ["11月4日", "11月5日", "11月6日"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 远程学习", "task": "Some people believe that university students should study whatever they like. Others think that they should only be allowed to study subjects that will be useful in the future, such as those related to science and technology. Discuss both views and give your opinion.", "sample": "The debate between utilitarian and liberal approaches to education continues to generate discussion.\n\nThose favoring practical subjects argue that national competitiveness depends on technical expertise. Science and technology drive economic growth and innovation. Students pursuing these fields enjoy better employment prospects and higher starting salaries. Furthermore, society requires professionals in healthcare, engineering, and computing to address pressing challenges.\n\nHowever, the alternative perspective emphasizes that education should develop well-rounded individuals capable of independent thought. Literature, philosophy, and arts cultivate critical thinking and cultural understanding. These subjects develop creativity and analytical abilities applicable across numerous careers. Moreover, human civilization's richness derives from diverse intellectual pursuits beyond immediate utility.\n\nIn my view, a balanced approach serves students and society best. While practical skills provide career foundations, humanities develop essential cognitive capabilities. The most successful individuals typically combine technical competence with broad intellectual perspective.\n\nFurthermore, the job market continues evolving unpredictably. Specific technical skills may become obsolete, while adaptable thinking and learning capacity remain valuable. Education should prepare students for change rather than narrow training.\n\nIn conclusion, although practical subjects offer clear career advantages, exclusively restricting university study to such fields would impoverish both individuals and society. A rounded education combining utility with breadth produces the most fulfilled and productive citizens."}, "speaking": {"topic": "节假日", "part1": ["你最喜欢什么节日？", "你通常怎么庆祝节日？", "你最喜欢和谁一起过节？", "节日期间你做什么特别的事？"], "part2": "Describe a holiday you enjoyed. You should say: where you went, when you went, who you were with, what you did, and explain why you enjoyed this holiday.", "part3": ["人们应该保留传统节日吗？", "度假对你的身心健康重要吗？", "旅游业对当地文化有什么影响？"]}}, {"day": 21, "phase": "phase1", "listening": {"title": "机场接机", "transcript": "Agent: Good afternoon, sir. Welcome to London Heathrow Airport. May I see your passport please?\nPassenger: Here you are. I'm visiting London for a holiday.\nAgent: Thank you. How long do you plan to stay in the UK?\nPassenger: About two weeks. I'll be leaving on the 15th of August.\nAgent: And where will you be staying?\nPassenger: I've booked The Royal Garden Hotel on Kensington High Street.\nAgent: Is this your first visit to the UK?\nPassenger: Yes, it is.\nAgent: Enjoy your stay. Here's your passport.", "questions": [{"q": "乘客计划停留多久？", "options": ["一周", "两周", "三周"], "answer": 1}, {"q": "酒店名称是？", "options": ["Hilton", "Royal Garden Hotel", "Marriott"], "answer": 1}, {"q": "这是第几次访问？", "options": ["第一次", "第二次", "第三次"], "answer": 0}]}, "reading": {"day": 21, "phase": "phase1", "title": "英国交通系统", "passage": "The U
