 and development strategies."}, "speaking": {"topic": "隐私", "part1": ["你重视隐私吗？", "你会在网上分享什么？", "你担心信息泄露吗？", "隐私应该被保护吗？"], "part2": "Describe a concern about privacy in modern society. You should say: what the concern is, why it exists, how it affects people's lives, and suggest how it should be addressed.", "part3": ["隐私有多重要？", "政府应该监控公民吗？", "个人应该放弃多少隐私来换取安全？"]}}];
const PhaseColors = {phase1:'#3b82f6',phase2:'#10b981',phase3:'#8b5cf6'};
const PhaseNames  = {phase1:'Phase 1 基础',phase2:'Phase 2 强化',phase3:'Phase 3 冲刺'};

let state = {tab:'listen',day:1,history:{},streak:0,totalScore:0,totalQuestions:0};
let synth = window.speechSynthesis;
let recognition = null;
let currentUTT = null;
let isSpeaking = false;
let isRecording = false;
let recTimeout = null;
let volumeCheck = null;
let silenceTimer = null;

// ---------- Storage ----------
function loadState(){
  try{const s=JSON.parse(localStorage.getItem('ielts_mobile_state')||'{}');Object.assign(state,s)}catch(e){}
}
function saveState(){
  localStorage.setItem('ielts_mobile_state',JSON.stringify({day:state.day,history:state.history,streak:state.streak,totalScore:state.totalScore,totalQuestions:state.totalQuestions}));
}
function completeDay(day,correct,total){
  const prev=state.history[day]||{done:false,correct:0,total:0};
  state.history[day]={done:true,correct:Math.max(prev.correct,correct),total:Math.max(prev.total,total)};
  state.totalScore=Object.values(state.history).reduce((a,v)=>a+(v.correct||0),0);
  state.totalQuestions=Object.values(state.history).reduce((a,v)=>a+(v.total||0),0);
  // advance day
  if(state.day<=day)state.day=Math.min(day+1,90);
  saveState();
  updateHome();
}

// ---------- Home ----------
function updateHome(){
  const done=Object.values(state.history).filter(v=>v.done).length;
  const pct=done/90*100;
  document.getElementById('stat-days').textContent=done;
  document.getElementById('stat-streak').textContent=state.streak;
  document.getElementById('stat-score').textContent=state.totalScore;
  const acc=state.totalQuestions>0?Math.round(state.totalScore/state.totalQuestions*100):0;
  document.getElementById('stat-accuracy').textContent=acc+'%';
  document.getElementById('progress-text').textContent=done+'/90';
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('next-day').textContent=state.day;
}

// ---------- Tabs ----------
function switchTab(tab){
  state.tab=tab;
  document.querySelectorAll('.tab-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderDay();
}
function showApp(){
  document.getElementById('home-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  renderDay();
}
function startPractice(){
  showApp();
  switchTab(state.tab||'listen');
}

// ---------- Day Navigator ----------
var contentArea = document.getElementById("content-area");
function renderDay(){
  const d=DAYS[state.day-1];
  if(!d){contentArea.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af">无数据</div>';return;}
  const phaseColor=PhaseColors[d.phase]||'#667eea';
  const phaseName=PhaseNames[d.phase]||d.phase;
  const done=state.history[state.day]&&state.history[state.day].done;
  let navHTML='<div class="day-nav">';
  navHTML+=`<span class="phase-label" style="background:${phaseColor}20;color:${phaseColor}">${phaseName}</span>`;
  navHTML+=`<span style="font-weight:700;color:#1f2937;font-size:15px">Day ${state.day}</span>`;
  navHTML+=`<div style="flex:1"></div>`;
  if(state.day>1)navHTML+=`<button class="btn-secondary" onclick="prevDay()" style="padding:6px 12px;font-size:13px"><i class="fas fa-chevron-left"></i></button>`;
  navHTML+=`<button class="btn-secondary" onclick="nextDay()" style="padding:6px 12px;font-size:13px"><i class="fas fa-chevron-right"></i></button>`;
  navHTML+='</div>';
  navHTML+=`<div style="padding:0 16px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">`;
  // day dots
  const daysArr=[...Array(90).keys()].map(i=>i+1);
  daysArr.forEach(dn=>{
    const h=state.history[dn];
    let cls='day-badge locked';
    if(dn===state.day)cls='day-badge active';
    else if(h&&h.done)cls='day-badge done';
    navHTML+=`<span class="${cls}" style="cursor:pointer;font-size:11px;padding:0 4px;min-width:24px;height:24px" onclick="gotoDay(${dn})">${dn}</span>`;
  });
  navHTML+='</div>';
  contentArea.innerHTML=navHTML+'<div id="day-content"></div>';
  if(state.tab==='listen')renderListening(d);
  else if(state.tab==='read')renderReading(d);
  else if(state.tab==='write')renderWriting(d);
  else if(state.tab==='speak')renderSpeaking(d);
}

function prevDay(){if(state.day>1){state.day--;renderDay();saveState();}}
function nextDay(){if(state.day<90){state.day++;renderDay();saveState();}}
function gotoDay(d){state.day=d;renderDay();saveState();}

// ---------- TTS ----------
function speak(text,lang='en-US',rate=.9){
  stopTTS();
  if(!synth)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;u.rate=rate;
  u.onend=()=>{isSpeaking=false;updateTTSBtn(null)};
  u.onerror=()=>{isSpeaking=false;updateTTSBtn(null)};
  isSpeaking=true;
  synth.speak(u);
  currentUTT=u;
}
function stopTTS(){if(synth){synth.cancel();isSpeaking=false;updateTTSBtn(null)}}
function updateTTSBtn(btn){if(btn)btn.innerHTML=isSpeaking?'<i class="fas fa-stop"></i> 停止':'<i class="fas fa-volume-up"></i> 朗读';}

// ---------- LISTENING ----------
function renderListening(d){
  const l=d.listening;
  const h=state.history[state.day]||{};
  const qHTML=l.questions.map((q,i)=>`
    <div class="question-item">
      <div style="font-size:14px;font-weight:600;color:#1f2937;margin-bottom:12px">Q${i+1} ${q.q}</div>
      <div class="options-list" data-q="${i}" data-ans="${q.answer}">
        ${q.options.map((o,oi)=>`
          <button class="option-btn${h.done&&h.answers&&h.answers[i]===oi?(oi===q.answer?' correct':(h.answers[i]===oi?' wrong':'')):''}" onclick="selectOpt(this,${i},${oi})">${String.fromCharCode(65+oi)}. ${o}</button>`).join('')}
      </div>
    </div>`).join('');

  contentArea.innerHTML+=`
    <div class="card" style="margin-top:0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div>
          <div style="font-size:12px;color:#9ca3af;margin-bottom:2px">📻 听力练习</div>
          <div style="font-size:16px;font-weight:700;color:#1f2937">${l.title||'第'+state.day+'天听力'}</div>
        </div>
        <button class="tts-btn" id="tts-btn" onclick="toggleListenTTS()"><i class="fas fa-volume-up"></i> 朗读</button>
      </div>
      <div class="transcript" id="transcript-text">${l.transcript||''}</div>
    </div>
    <div style="padding:0 16px">
      <div style="font-size:14px;font-weight:700;color:#1f2937;margin-bottom:12px;padding-top:8px">📝 听力题目</div>
      <div id="questions-list">${h.done?qHTML.replace(/onclick="selectOpt/g,'onclick="(function(){}())//selectOpt'):qHTML}</div>
      ${h.done?'<div style="text-align:center;margin-top:16px"><span style="color:#059669;font-weight:700"><i class="fas fa-check-circle"></i> 已完成 '+h.correct+'/'+l.questions.length+'</span></div>':`<button class="btn-primary" onclick="submitListening('${l.phase}')" style="margin-top:16px">提交答案</button>`}
    </div>`;
}

function toggleListenTTS(){
  const btn=document.getElementById('tts-btn');
  if(!btn)return;
  if(isSpeaking){stopTTS();}
  else{speak(document.getElementById('transcript-text').textContent);}
}

function selectOpt(btn,qIdx,optionIdx){
  const list=btn.closest('.options-list');
  if(list.dataset.submitted)return;
  list.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  list.dataset.selected=optionIdx;
}

function submitListening(phase){
  const d=DAYS[state.day-1];
  const qs=d.listening.questions;
  const answers=[];
  let correct=0;
  document.querySelectorAll('.options-list').forEach((list,i)=>{
    const sel=parseInt(list.dataset.selected);
    const ans=parseInt(list.dataset.ans);
    answers.push(sel);
    list.querySelectorAll('.option-btn').forEach((b,oi)=>{
      if(oi===ans)b.classList.add('correct');
      else if(oi===sel&&sel!==ans)b.classList.add('wrong');
    });
    if(sel===ans)correct++;
  });
  state.history[state.day]={...state.history[state.day],done:true,correct,total:qs.length,answers};
  completeDay(state.day,correct,qs.length);
  showResult(correct,qs.length);
}

// ---------- READING ----------
function renderReading(d){
  const r=d.reading;
  const h=state.history[state.day]||{};
  const qHTML=r.questions.map((q,i)=>`
    <div class="question-item">
      <div style="font-size:14px;font-weight:600;color:#1f2937;margin-bottom:12px">Q${i+1} ${q.q}</div>
      <div class="options-list" data-q="${i}" data-ans="${q.answer}">
        ${q.options.map((o,oi)=>`
          <button class="option-btn" onclick="selectOpt(this,${i},${oi})">${String.fromCharCode(65+oi)}. ${o}</button>`).join('')}
      </div>
    </div>`).join('');

  contentArea.innerHTML+=`
    <div class="card" style="margin-top:0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div>
          <div style="font-size:12px;color:#9ca3af;margin-bottom:2px">📖 阅读练习</div>
          <div style="font-size:16px;font-weight:700;color:#1f2937">${r.title||'第'+state.day+'天阅读'}</div>
        </div>
        <button class="tts-btn" id="tts-btn" onclick="toggleReadTTS()"><i class="fas fa-volume-up"></i> 朗读</button>
      </div>
      <div style="display:none" id="passage-full">${r.passage||''}</div>
      <div class="passage-text" id="passage-short">${(r.passage||'').substring(0,300)}${(r.passage||'').length>300?'...':''}</div>
      ${(r.passage||'').length>300?'<button class="btn-secondary" onclick="togglePassage()" id="passage-toggle" style="margin-top:10px;font-size:12px"><i class="fas fa-expand-alt"></i> 展开全文</button>':''}
    </div>
    <div style="padding:0 16px">
      <div style="font-size:14px;font-weight:700;color:#1f2937;margin-bottom:12px;padding-top:8px">📝 阅读题目</div>
      <div>${qHTML}</div>
      ${h.done&&h.readCorrect!==undefined?`<div style="text-align:center;margin-top:16px"><span style="color:#059669;font-weight:700"><i class="fas fa-check-circle"></i> 已完成 ${h.readCorrect}/${r.questions.length}</span></div>`:`<button class="btn-primary" onclick="submitReading()" style="margin-top:16px">提交答案</button>`}
    </div>`;
}

function togglePassage(){
  const full=document.getElementById('passage-full');
  const short=document.getElementById('passage-short');
  const btn=document.getElementById('passage-toggle');
  if(full.style.display==='none'){
    full.style.display='block';short.style.display='none';
    btn.innerHTML='<i class="fas fa-compress-alt"></i> 收起';
  }else{
    full.style.display='none';short.style.display='block';
    btn.innerHTML='<i class="fas fa-expand-alt"></i> 展开全文';
  }
}

function toggleReadTTS(){
  const btn=document.getElementById('tts-btn');
  if(!btn)return;
  if(isSpeaking){stopTTS();}
  else{
    const full=document.getElementById('passage-full');
    const text=full.style.display!=='none'?full.textContent:document.getElementById('passage-short').textContent;
    speak(text);
  }
}

function submitReading(){
  const d=DAYS[state.day-1];
  const qs=d.reading.questions;
  let correct=0;
  document.querySelectorAll('.options-list').forEach((list,i)=>{
    const sel=parseInt(list.dataset.selected);
    const ans=parseInt(list.dataset.ans);
    list.querySelectorAll('.option-btn').forEach((b,oi)=>{
      if(oi===ans)b.classList.add('correct');
      else if(oi===sel&&sel!==ans)b.classList.add('wrong');
    });
    if(sel===ans)correct++;
  });
  state.history[state.day]={...state.history[state.day],readDone:true,readCorrect:correct,readTotal:qs.length};
  state.totalScore=Object.values(state.history).reduce((a,v)=>a+(v.correct||0)+(v.readCorrect||0),0);
  state.totalQuestions=Object.values(state.history).reduce((a,v)=>a+(v.total||0)+(v.readTotal||0),0);
  saveState();updateHome();
  showResult(correct,qs.length);
}

// ---------- WRITING ----------
function renderWriting(d){
  const w=d.writing;
  contentArea.innerHTML+=`
    <div class="card" style="margin-top:0">
      <div style="font-size:12px;color:#9ca3af;margin-bottom:2px">✍️ 写作练习</div>
      <div style="font-size:17px;font-weight:700;color:#1f2937;margin-bottom:8px">${w.title||w.type||'写作任务'}</div>
      <div style="font-size:12px;color:#667eea;font-weight:600;margin-bottom:12px"><i class="fas fa-tag"></i> ${w.type||''}</div>
      <div class="writing-task">${w.task||''}</div>
    </div>
    <div style="padding:0 16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 12px">

      </div>
      <div class="writing-sample" id="writing-sample" style="display:none">${w.sample||'暂无范文'}</div>
      <button class="btn-secondary" onclick="toggleSample()" id="sample-btn" style="width:100%;margin-bottom:16px"><i class="fas fa-eye"></i> 显示范文</button>
      <div id="writing-note" style="background:#fef3c7;border-radius:12px;padding:14px;font-size:13px;color:#92400e;line-height:1.7">
        <b>💡 写作建议：</b>先自己写一遍，再对照范文。注意范文的结构：开头回应题目 → 主体段落（观点+论据+例子）→ 结尾总结。计时练习，Task 1建议20分钟，Task 2建议40分钟。
      </div>
      <button class="btn-primary" onclick="markWritingDone()" style="margin-top:16px"><i class="fas fa-check"></i> 标记完成</button>
    </div>`;
}

function toggleSample(){
  const el=document.getElementById('writing-sample');
  const btn=document.getElementById('sample-btn');
  if(el.style.display==='none'){el.style.display='block';btn.innerHTML='<i class="fas fa-eye-slash"></i> 隐藏范文';}
  else{el.style.display='none';btn.innerHTML='<i class="fas fa-eye"></i> 显示范文';}
}
function speakWriting(){
  const text=document.getElementById('writing-sample').textContent;
  if(isSpeaking){stopTTS();}else{speak(text);}
}
function markWritingDone(){
  state.history[state.day]={...state.history[state.day],writeDone:true};
  saveState();
  alert('✅ 写作已标记完成！');
}

// ---------- SPEAKING ----------
function renderSpeaking(d){
  const s=d.speaking;
  initSpeechRecognition();
  contentArea.innerHTML+=`
    <div class="card" style="margin-top:0">
      <div style="font-size:12px;color:#9ca3af;margin-bottom:4px">🎤 口语练习</div>
      <div style="font-size:17px;font-weight:700;color:#1f2937;margin-bottom:16px">${s.topic||'口语话题'}</div>

      <!-- Part 1 -->
      <div class="speaking-section">
        <div class="part-label" style="background:#dbeafe;color:#1e40af"><i class="fas fa-comments"></i> Part 1 · 简介</div>
        ${(s.part1||[]).map((q,i)=>`
          <div style="margin-bottom:14px">
            <div class="speaking-q">${i+1}. ${q}</div>
            <div style="display:flex;gap:8px;align-items:center">
              <button class="tts-btn" onclick="speak('${q.replace(/'/g,"\'")}')"><i class="fas fa-volume-up"></i></button>
              <button class="record-btn" id="rec-p1-${i}" onclick="startRecord(this,'p1-${i}','${q.replace(/'/g,"\'")}')"><i class="fas fa-microphone"></i></button>
            </div>
            <div class="transcript-view" id="trans-p1-${i}" style="margin-top:8px;font-style:italic;color:#9ca3af">点击麦克风开始录音...</div>
          </div>`).join('')}
      </div>

      <!-- Part 2 -->
      <div class="speaking-section">
        <div class="part-label" style="background:#fef3c7;color:#92400e"><i class="fas fa-clipboard-list"></i> Part 2 · 个人陈述</div>
        <div class="speaking-q" style="background:#fffbeb;margin-bottom:14px">${s.part2||''}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="tts-btn" onclick="speak('${(s.part2||'').replace(/'/g,"\'")}')"><i class="fas fa-volume-up"></i></button>
          <button class="record-btn" id="rec-p2" onclick="startRecord(this,'p2','')"><i class="fas fa-microphone"></i></button>
        </div>
        <div class="transcript-view" id="trans-p2" style="margin-top:8px;font-style:italic;color:#9ca3af">点击麦克风开始录音...（1-2分钟自由陈述）</div>
      </div>

      <!-- Part 3 -->
      <div class="speaking-section">
        <div class="part-label" style="background:#ede9fe;color:#5b21b6"><i class="fas fa-users"></i> Part 3 · 双向讨论</div>
        ${(s.part3||[]).map((q,i)=>`
          <div style="margin-bottom:14px">
            <div class="speaking-q">${i+1}. ${q}</div>
            <div style="display:flex;gap:8px;align-items:center">
              <button class="tts-btn" onclick="speak('${q.replace(/'/g,"\'")}')"><i class="fas fa-volume-up"></i></button>
              <button class="record-btn" id="rec-p3-${i}" onclick="startRecord(this,'p3-${i}','${q.replace(/'/g,"\'")}')"><i class="fas fa-microphone"></i></button>
            </div>
            <div class="transcript-view" id="trans-p3-${i}" style="margin-top:8px;font-style:italic;color:#9ca3af">点击麦克风开始录音...</div>
          </div>`).join('')}
      </div>

      <button class="btn-primary" onclick="markSpeakingDone()" style="margin-top:8px"><i class="fas fa-check"></i> 标记口语完成</button>
    </div>`;
}

function initSpeechRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  if(recognition)recognition.abort();
  recognition=new SR();
  recognition.continuous=false;
  recognition.interimResults=true;
  recognition.lang='en-US';
  recognition.onresult=function(e){
    let final='',interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(currentTranscriptId){
      const el=document.getElementById(currentTranscriptId);
      if(el)el.textContent=(final||interim)||'正在识别...';
    }
    if(final){
      clearTimeout(silenceTimer);
      stopRecording();
    }
  };
  recognition.onerror=function(e){console.error('speech error',e);stopRecording();};
  recognition.onend=function(){if(isRecording)stopRecording();};
}

let currentTranscriptId=null;
let recBtn=null;
let recordStartTime=0;

function startRecord(btn,id,text){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    // Fallback: show manual input
    const tid='trans-'+id;
    const el=document.getElementById(tid);
    if(el){
      const inp=prompt('您的浏览器不支持语音识别，请手动输入您的回答：');
      if(inp&&inp.trim())el.textContent=inp.trim();
    }
    return;
  }
  if(isRecording){stopRecording();return;}

  // Stop any ongoing TTS first
  stopTTS();

  recBtn=btn;
  currentTranscriptId='trans-'+id;
  btn.classList.add('recording');
  btn.innerHTML='<i class="fas fa-stop"></i>';
  isRecording=true;
  recordStartTime=Date.now();

  // Show recording status
  const tid='trans-'+id;
  const el=document.getElementById(tid);
  if(el)el.textContent='🎙️ 正在录音...（请说话）';

  // TTS question first, then start recognition
  const doStartRecognition=()=>{
    if(!isRecording)return;
    try{
      recognition.start();
      // Mobile-friendly silence timeout (10s)
      clearTimeout(silenceTimer);
      silenceTimer=setTimeout(()=>{
        if(isRecording){
          const elapsed=((Date.now()-recordStartTime)/1000).toFixed(0);
          console.log('Silence timeout after '+elapsed+'s, stopping...');
          // If no transcript yet, show hint
          if(el&&el.textContent.includes('正在录音')){
            el.textContent='⚠️ 未检测到语音，请检查麦克风权限后重试';
          }
          stopRecording();
        }
      },10000);
    }catch(e){
      console.error('Recognition start failed:',e);
      if(el)el.textContent='❌ 启动失败，请刷新页面重试';
      stopRecording();
    }
  };

  if(text){
    speak(text);
    // Wait for TTS to finish (up to 4s), then start recognition
    setTimeout(doStartRecognition,3000);
  } else {
    doStartRecognition();
  }
}

function stopRecording(){
  if(!isRecording)return;
  isRecording=false;
  clearTimeout(silenceTimer);
  if(recognition){
    try{recognition.stop();}catch(e){}
  }
  if(recBtn){
    recBtn.classList.remove('recording');
    recBtn.innerHTML='<i class="fas fa-microphone"></i>';
  }
  recBtn=null;
}

function markSpeakingDone(){
  state.history[state.day]={...state.history[state.day],speakDone:true};
  saveState();
  alert('✅ 口语已标记完成！');
}

// ---------- Result ----------
function showResult(correct,total){
  const pct=Math.round(correct/total*100);
  document.getElementById('result-emoji').textContent=pct>=80?'🎉':pct>=60?'👍':'💪';
  document.getElementById('result-title').textContent=pct>=80?'太棒了！':pct>=60?'继续加油！':'别灰心！';
  document.getElementById('result-msg').textContent=`第 ${state.day} 天 ${['听力','阅读','写作','口语'][['listen','read','write','speak'].indexOf(state.tab)]} 完成！`;
  document.getElementById('r-correct').textContent=correct;
  document.getElementById('r-total').textContent=total;
  document.getElementById('result-modal').style.display='flex';
}
function nextOrFinish(){
  document.getElementById('result-modal').style.display='none';
  if(state.day<90){state.day++;renderDay();saveState();}
  else{alert('🎊 恭喜你完成全部90天学习！');}
}

// ---------- Boot ----------
loadState();
updateHome();
document.getElementById('loading').style.opacity='0';
setTimeout(()=>{
  document.getElementById('loading').style.display='none';
  document.getElementById('home-screen').style.display='block';
},400);
</script>
