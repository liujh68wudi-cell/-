K has comprehensive public transport. Railway system is one of oldest, first steam passenger railway in 1825. London Underground, 'the Tube', began in 1863, carries over 1 billion passengers annually. Long-distance trains connect major cities efficiently. Buses serve areas without rail. Cycling has grown with dedicated lanes. Contactless payment simplifies transport use.", "questions": [{"q": "伦敦地铁始于哪年？", "options": ["1853", "1863", "1873"], "answer": 1}, {"q": "伦敦地铁年运量？", "options": ["5亿", "10亿", "15亿"], "answer": 1}, {"q": "共享单车计划始于？", "options": ["2008", "2010", "2012"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 咖啡店销售", "task": "The bar chart shows the monthly sales of three types of coffee in a London café in 2023. Summarise the information by selecting and reporting the main features, and make comparisons where relevant.", "sample": "The bar chart illustrates monthly sales of three coffee types at a London café in 2023: espresso, cappuccino, and latte.\n\nOverall, cappuccino was the most popular throughout the year, while espresso showed distinct seasonal patterns.\n\nCappuccino sales remained relatively stable, ranging from 450 to 520 cups per month, with peak sales in autumn months (October-November). This suggests cappuccino's consistent appeal regardless of season.\n\nLatte followed a similar but lower pattern, averaging 300-400 cups monthly. Sales peaked in winter (December-January) at around 420 cups, possibly due to customer preference for warmer drinks in colder weather.\n\nEspresso showed the most dramatic variation. Summer months (June-August) saw highest sales at 350-400 cups, while winter dropped to below 200 cups. This seasonal pattern likely reflects customer preference for iced espresso drinks in summer.\n\nIn conclusion, cappuccino dominated sales全年, with latte performing moderately. Espresso's seasonality distinguishes it from the other two varieties."}, "speaking": {"topic": "日常活动", "part1": ["你通常什么时候起床？", "你早餐一般吃什么？", "你每天花多长时间通勤？", "下班后你喜欢做什么？"], "part2": "Describe your daily routine. You should say: what time you wake up and go to bed, what you do during the day, how you usually spend your evenings, and explain whether you enjoy your daily routine.", "part3": ["你觉得一天中最重要的时间是什么？", "人们的工作时间应该更灵活吗？", "你更喜欢早晨还是夜晚工作？"]}}, {"day": 22, "phase": "phase1", "listening": {"title": "餐厅预订", "transcript": "Receptionist: Good evening, Bella Vista Restaurant.\nCustomer: Hello, I'd like to make a reservation for tomorrow evening.\nReceptionist: What time?\nCustomer: Around 7:30 PM. We're celebrating my wife's birthday.\nReceptionist: How many people?\nCustomer: Just the two of us.\nReceptionist: Any dietary requirements?\nCustomer: My wife is vegetarian.\nReceptionist: We have excellent vegetarian options.\nCustomer: Perfect. Also, can we order a birthday cake?\nReceptionist: Absolutely.", "questions": [{"q": "预订时间是？", "options": ["7:00", "7:30", "8:00"], "answer": 1}, {"q": "几个人用餐？", "options": ["一位", "两位", "三位"], "answer": 1}, {"q": "饮食要求是？", "options": ["素食", "海鲜过敏", "无麸质"], "answer": 0}]}, "reading": {"day": 22, "phase": "phase1", "title": "健康饮食指南", "passage": "Balanced diet is essential. NHS recommends 5 portions of fruit and vegetables daily. Portion sizes have increased, contributing to obesity. The Eatwell Guide divides foods into 5 groups. Reducing sugar is important - adults should have no more than 30g free sugars daily. 6-8 glasses of water recommended. Sustainable approaches work best for weight loss.", "questions": [{"q": "NHS建议每日果蔬量？", "options": ["3份", "4份", "5份"], "answer": 2}, {"q": "成人每日糖上限？", "options": ["20g", "30g", "40g"], "answer": 1}, {"q": "每日推荐饮水？", "options": ["4-6杯", "6-8杯", "8-10杯"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 科技对语言", "task": "Some people believe that technology has made our lives easier, while others believe that technology has made our lives more difficult. Discuss both views and give your own opinion.", "sample": "Technology has fundamentally transformed how we communicate, leading to debate about whether this represents progress or regression.\n\nThose who argue technology has made life easier point to unprecedented global connectivity. People can instantly communicate with anyone worldwide, breaking down geographical barriers. Language translation apps help overcome linguistic obstacles, enabling cross-cultural exchanges previously impossible. Additionally, digital communication allows businesses to operate internationally and families separated by distance to maintain close relationships.\n\nHowever, critics argue technology has complicated human interaction. The abundance of communication platforms has paradoxically reduced meaningful connection. Many people report feeling isolated despite constant digital contact. Furthermore, the permanence of digital communication creates anxiety, as casual remarks can be permanently recorded and potentially judged.\n\nIn my opinion, technology is neither wholly positive nor negative. Its impact depends on how individuals choose to use it. When used thoughtfully as a tool to enhance rather than replace face-to-face interaction, technology enriches our communicative abilities. The key lies in maintaining balance and prioritizing genuine human connection alongside digital convenience.\n\nIn conclusion, while technology presents challenges to natural communication, its benefits in connectivity and accessibility cannot be overlooked. Users bear responsibility for using these tools wisely."}, "speaking": {"topic": "家庭", "part1": ["你家里有几口人？", "你和你家人关系好吗？", "你小时候住在哪里？", "你经常和家人一起吃饭吗？"], "part2": "Describe your family. You should say: who are the members of your family, what do you usually do together, how close you are to your family members, and how your family has changed over time.", "part3": ["大家庭好还是小家庭好？", "人们应该花更多时间陪伴家人吗？", "照顾老人是政府的责任还是子女的责任？"]}}, {"day": 23, "phase": "phase1", "listening": {"title": "酒店入住", "transcript": "Receptionist: Good afternoon, welcome to Riverside Hotel.\nGuest: Yes, I have a reservation under Sarah Chen.\nReceptionist: Double room with river view, today until Friday, correct?\nGuest: That's right.\nReceptionist: Does the room have a bathtub?\nGuest: I'd prefer a bathtub.\nReceptionist: Yes, all river view rooms have both bathtub and shower.\nGuest: Is there a gym?\nReceptionist: Yes, on the third floor, open 24 hours.", "questions": [{"q": "预订了几晚？", "options": ["两晚", "三晚", "四晚"], "answer": 1}, {"q": "健身房在哪里？", "options": ["二层", "三层", "四层"], "answer": 1}, {"q": "房间类型是？", "options": ["城景房", "河景房", "园景房"], "answer": 1}]}, "reading": {"day": 23, "phase": "phase1", "title": "英国天气", "passage": "UK has changeable weather, temperate maritime climate. Rainfall occurs year-round, 600mm-3000mm annually. Rainy approximately 150 days in south, 200+ in Scotland. Weather unpredictable - 'four seasons in one day'. Summer 18-25°C, winter 2-7°C. Climate change brings more extreme events.", "questions": [{"q": "英国气候类型？", "options": ["地中海", "温带海洋", "大陆性"], "answer": 1}, {"q": "夏季平均气温？", "options": ["12-18°C", "18-25°C", "25-32°C"], "answer": 1}, {"q": "首次超40°C是？", "options": ["2018", "2020", "2022"], "answer": 2}]}, "writing": {"type": "task1", "title": "表格 - 大学科目", "task": "The table shows the percentage of students choosing different subjects at a UK university in 2020 and 2023. Summarise the information by selecting and reporting the main features.", "sample": "The table illustrates changes in subject preferences at a UK university between 2020 and 2023.\n\nOverall, there was a notable shift toward science and technology subjects, while arts and humanities experienced declining enrollment.\n\nComputer Science showed the most dramatic growth, rising from 15% to 28% - nearly doubling. This reflects increasing student interest in technology careers and the growing importance of digital skills in the job market.\n\nEngineering also saw significant growth, increasing from 12% to 19%. Similarly, Mathematics rose from 8% to 12%. These increases suggest students are gravitating toward subjects with strong employment prospects.\n\nIn contrast, English Literature declined significantly from 18% to 10%. History also decreased from 14% to 9%. Philosophy dropped from 7% to 4%. These reductions indicate declining interest in traditional humanities subjects.\n\nBusiness Studies remained relatively stable, showing slight growth from 18% to 19%. This consistency suggests practical subjects maintain steady appeal despite changing trends.\n\nIn conclusion, the data reveals a clear trend toward STEM subjects, reflecting changing career priorities and employment market demands."}, "speaking": {"topic": "食物", "part1": ["你最喜欢什么食物？", "你会做饭吗？", "你多久下一次馆子？", "你早餐通常吃什么？"], "part2": "Describe a meal you enjoyed. You should say: when and where you had this meal, who you were with, what you ate, and explain why you enjoyed it.", "part3": ["快餐对你的健康有影响吗？", "人们应该花更多时间做饭吗？", "不同国家的饮食习惯有何不同？"]}}, {"day": 24, "phase": "phase1", "listening": {"title": "火车票购买", "transcript": "Ticket Agent: Good morning. How can I help?\nPassenger: I'd like a train ticket to Edinburgh.\nAgent: Traveling today?\nPassenger: Yes, the 10:15 train.\nAgent: Standard or first class?\nPassenger: Standard, please.\nAgent: Journey is 4 hours 30 minutes. Arriving at 2:45 PM.\nPassenger: Window seat please.\nAgent: Single ticket is 65 pounds. Return is only 89.\nPassenger: I'll take a return then.\nAgent: What time return?\nPassenger: Earliest Saturday morning.", "questions": [{"q": "火车几点出发？", "options": ["9:15", "10:15", "11:15"], "answer": 1}, {"q": "单程票价？", "options": ["55磅", "65磅", "75磅"], "answer": 1}, {"q": "返程是周几？", "options": ["周五", "周六", "周日"], "answer": 1}]}, "reading": {"day": 24, "phase": "phase1", "title": "英国教育体系", "passage": "UK education: primary (5-11), secondary (11-16), further (16-18), higher (18+). Compulsory 5-18. At 11, students take GCSEs. After GCSEs, A-levels or vocational qualifications. UK has 160+ universities. Tuition up to £9,250/year since fees introduced in 1998.", "questions": [{"q": "义务教育年龄？", "options": ["5-16", "5-18", "6-18"], "answer": 1}, {"q": "本科学制？", "options": ["2年", "3年", "4年"], "answer": 1}, {"q": "年学费上限？", "options": ["£7,250", "£8,250", "£9,250"], "answer": 2}]}, "writing": {"type": "task2", "title": "观点类 - 旅行年龄", "task": "Some people think that young people should travel and work in different countries before they settle down. To what extent do you agree or disagree?", "sample": "In an increasingly globalized world, the question of whether young people should gain international experience before establishing permanent residence has become significant.\n\nI strongly agree with this proposition for several compelling reasons. First, working abroad exposes young people to diverse perspectives and problem-solving approaches. This multicultural experience enhances adaptability and cultural sensitivity, qualities increasingly valued by employers. Second, navigating unfamiliar environments builds independence and resilience. Facing challenges in foreign settings forces young people to develop self-reliance and cross-cultural communication skills that prove invaluable throughout life.\n\nFurthermore, international travel broadens horizons in ways that cannot be achieved through classroom learning. Experiencing different cultures firsthand provides deeper understanding of global issues and one's place in the international community. This expanded worldview fosters open-mindedness and intellectual curiosity.\n\nHowever, practical considerations exist. Financial constraints may limit opportunities for some young people. Additionally, excessive delay in establishing careers could create disadvantages in competitive job markets. Nevertheless, these obstacles can often be overcome through careful planning and resourcefulness.\n\nIn conclusion, despite potential challenges, the benefits of international experience before settling down substantially outweigh the drawbacks. Young people who embrace such opportunities develop skills, perspectives, and experiences that enrich both their personal lives and professional careers."}, "speaking": {"topic": "交通", "part1": ["你通常怎么上班/上学？", "你学过开车吗？", "你喜欢乘公交还是地铁？", "你最喜欢的交通方式是什么？"], "part2": "Describe a journey you frequently make. You should say: what transportation you usually take, how long it takes, what you do during the journey, and explain how you feel about this journey.", "part3": ["城市交通问题如何解决？", "人们应该更多使用公共交通吗？", "你认为是修建更多道路还是发展公共交通更好？"]}}, {"day": 25, "phase": "phase1", "listening": {"title": "看医生", "transcript": "Receptionist: Dr. Williams' surgery. How can I help?\nPatient: I'd like to see Dr. Williams.\nReceptionist: What symptoms?\nPatient: Terrible cough, sore throat, maybe fever.\nReceptionist: We have 3:30 PM today. Does that work?\nReceptionist: May I have your name?\nPatient: Michael Brown, born July 15, 1985.\nReceptionist: Bring your NHS card and any medications.\nPatient: I'm not on regular medications.\nReceptionist: Come early to fill out a form.", "questions": [{"q": "预约时间？", "options": ["2:30", "3:30", "4:30"], "answer": 1}, {"q": "出生日期？", "options": ["6月15日", "7月15日", "8月15日"], "answer": 1}, {"q": "症状包括？", "options": ["头痛", "咳嗽和喉咙痛", "胃痛"], "answer": 1}]}, "reading": {"day": 25, "phase": "phase1", "title": "英国餐饮文化", "passage": "British cuisine evolved from criticized to celebrated. Full English includes eggs, bacon, sausages, beans. Fish and chips, 'national dish', originated 1860s, 10,500 shops today. Afternoon tea from 1840s. Pub culture central. Indian restaurants since 1950s-60s, chicken tikka masala called national dish.", "questions": [{"q": "炸鱼薯条店数量？", "options": ["7,500", "10,500", "15,500"], "answer": 1}, {"q": "下午茶起源？", "options": ["1820s", "1840s", "1860s"], "answer": 1}, {"q": "印度餐厅引入时期？", "options": ["1940-50s", "1950-60s", "1960-70s"], "answer": 1}]}, "writing": {"type": "task1", "title": "流程图 - 茶叶加工", "task": "The diagram shows how tea is processed. Summarise the information by selecting and reporting the main features, and make comparisons where relevant.", "sample": "The flow chart illustrates the tea processing method, from harvest to packaging.\n\nOverall, the process consists of four main stages: withering, rolling, oxidation, and drying, each transforming the leaf progressively.\n\nThe process begins with fresh tea leaves being harvested manually. These leaves are first spread out for withering, where they lose moisture over 10-18 hours depending on conditions.\n\nNext, the withered leaves undergo rolling. This mechanical process breaks down cell structures and shapes the leaves. Rolled leaves are then spread for oxidation, also called fermentation, where they turn darker through chemical reactions lasting 2-4 hours.\n\nFinally, the oxidized leaves enter the drying stage. This stops oxidation and reduces moisture content to around 3%. Drying can use different methods including pan-firing, tumble-drying, or sun-drying. Once dried, the tea is sorted by grade and packaged for distribution.\n\nIn conclusion, tea processing involves sequential stages transforming fresh leaves into the familiar brown or black tea product through controlled moisture removal and oxidation."}, "speaking": {"topic": "天气", "part1": ["你喜欢什么天气？", "你所在的城市天气怎么样？", "你最喜欢哪个季节？", "天气会影响你的心情吗？"], "part2": "Describe the weather in your city. You should say: what the weather is usually like, how the weather changes throughout the year, what activities you do in different weather, and explain how the weather affects your daily life.", "part3": ["气候变化会导致什么问题？", "人们应该因为天气改变生活方式吗？", "你喜欢住在天气稳定还是多变的地区？"]}}, {"day": 26, "phase": "phase1", "listening": {"title": "图书馆办证", "transcript": "Librarian: Welcome to Central City Library.\nVisitor: I'd like to become a member.\nLibrarian: Bring proof of address and photo ID.\nVisitor: I have utility bill and driver's license.\nLibrarian: Perfect. Study spaces on second floor, group rooms on third.\nVisitor: What are opening hours?\nLibrarian: 9 AM to 9 PM weekdays, 10 AM to 6 PM Saturday.\nVisitor: How many books can I borrow?\nLibrarian: Up to 15 items for three weeks.", "questions": [{"q": "个人学习区在哪层？", "options": ["一层", "二层", "三层"], "answer": 1}, {"q": "工作日闭馆时间？", "options": ["7点", "8点", "9点"], "answer": 2}, {"q": "最多可借几本？", "options": ["10本", "15本", "20本"], "answer": 1}]}, "reading": {"day": 26, "phase": "phase1", "title": "英国购物", "passage": "UK shopping: high streets with familiar names. Oxford Street, Europe's busiest, 1.5 miles, 300+ shops. Harrods has 330 departments. Markets popular: Borough for food, Camden for fashion. Outlet shopping at Bicester Village. Consumer Rights Act 2015 provides 30-day return for faulty goods.", "questions": [{"q": "牛津街长度？", "options": ["1英里", "1.5英里", "2英里"], "answer": 1}, {"q": "哈罗德部门数？", "options": ["280", "330", "380"], "answer": 1}, {"q": "退货期限？", "options": ["14天", "21天", "30天"], "answer": 2}]}, "writing": {"type": "task2", "title": "讨论类 - 金钱奖励", "task": "Some people believe that money is the most important factor in achieving happiness. To what extent do you agree or disagree?", "sample": "The relationship between wealth and wellbeing has long been debated, with some arguing money is essential for happiness while others maintain money cannot buy happiness.\n\nI partially agree that financial security contributes significantly to happiness, but I disagree that it is the most important factor. Basic financial stability provides comfort and reduces stress associated with meeting essential needs. Without sufficient income, individuals struggle to access adequate housing, nutrition, and healthcare - all fundamental to wellbeing. Research consistently shows that money does buy happiness up to a certain income threshold, beyond which additional wealth provides diminishing returns.\n\nHowever, happiness ultimately derives from multiple dimensions that money cannot purchase. Meaningful relationships, personal achievement, health, and sense of purpose contribute substantially to life satisfaction. Many incredibly wealthy individuals report profound unhappiness, while others with modest means experience deep fulfillment. This suggests that psychological and social factors often outweigh material circumstances.\n\nFurthermore, the pursuit of wealth can actually undermine happiness. Excessive focus on accumulation creates stress, damages relationships, and may lead to ethical compromises. The hedonic adaptation phenomenon demonstrates that lifestyle improvements quickly become normalized, requiring ever-greater achievements to maintain satisfaction.\n\nIn conclusion, while financial resources certainly facilitate happiness by providing security and options, they represent merely one component of wellbeing. True happiness emerges from balanced attention to multiple life dimensions including relationships, personal growth, and meaningful contribution."}, "speaking": {"topic": "购物", "part1": ["你喜欢购物吗？", "你通常在哪里购物？", "你更喜欢线上还是线下购物？", "你买过最贵的东西是什么？"], "part2": "Describe something you bought recently. You should say: what you bought, where you bought it, why you bought it, and explain how satisfied you were with it.", "part3": ["购物对你来说意味着什么？", "人们购物太多会有什么后果？", "线上购物会取代实体店吗？"]}}, {"day": 27, "phase": "phase1", "listening": {"title": "租房咨询", "transcript": "Agent: City Rentals. How can I help?\nTenant: Apartment on Maple Street available?\nAgent: Yes, one-bedroom on second floor. 1,200 pounds monthly.\nTenant: What's included?\nAgent: Water and internet. Electricity separate.\nTenant: What about deposit?\nAgent: One month's rent = 1,200 pounds.\nTenant: Minimum rental period?\nAgent: 12 months initially, then month-to-month.\nTenant: I'd like to view it.\nAgent: Can meet there in 20 minutes.", "questions": [{"q": "月租金？", "options": ["1000磅", "1100磅", "1200磅"], "answer": 2}, {"q": "租约最短多久？", "options": ["6个月", "9个月", "12个月"], "answer": 2}, {"q": "看房需要带什么？", "options": ["简历", "身份证", "工资单"], "answer": 1}]}, "reading": {"day": 27, "phase": "phase1", "title": "英国银行", "passage": "Bank accounts essential in UK. Current accounts for everyday use, savings for higher interest. Need proof of ID and address within 3 months. Online banking standard. Contactless payment up to £100. Bank of England, established 1694, sets interest rates. Services like Wise offer better international rates.", "questions": [{"q": "无接触支付上限？", "options": ["£50", "£75", "£100"], "answer": 2}, {"q": "英格兰银行成立？", "options": ["1664", "1694", "1724"], "answer": 1}, {"q": "地址证明需要？", "options": ["1个月", "2个月", "3个月"], "answer": 2}]}, "writing": {"type": "task1", "title": "饼图 - 能源使用", "task": "The pie charts show UK energy consumption in 1980 and 2020. Summarise the information by selecting and reporting the main features.", "sample": "The pie charts illustrate changes in UK energy sources between 1980 and 2020, revealing significant shifts in the energy landscape.\n\nOverall, fossil fuel consumption decreased substantially while renewable energy emerged as a significant source.\n\nIn 1980, coal dominated at 45%, followed by oil at 40%, natural gas at 10%, and nuclear at 5%. Renewables were negligible at under 1%.\n\nBy 2020, the picture transformed dramatically. Natural gas became the largest source at 35%, overtaking coal which dropped to just 8%. Oil decreased to 28%. Nuclear remained stable at 15%. Most notably, renewables surged to 14%, representing a remarkable increase from virtually nothing.\n\nThis transformation reflects multiple factors: environmental concerns drove coal's decline, natural gas provided cleaner transition, nuclear maintained steady contribution, and policy support accelerated renewable adoption.\n\nIn conclusion, UK energy consumption shifted dramatically toward cleaner sources over four decades, with renewables showing the most significant growth despite still representing a minority of supply."}, "speaking": {"topic": "朋友", "part1": ["你有多少好朋友？", "你通常怎么认识新朋友？", "你更喜欢和熟人还是陌生人相处？", "你认为友情中最重要的品质是什么？"], "part2": "Describe a friend who has influenced you. You should say: who this friend is, how you met, what qualities make them special, and explain how they have influenced your life.", "part3": ["真正的友谊有哪些特征？", "人们应该和观点不同的人交朋友吗？", "社交媒体如何影响友谊？"]}}, {"day": 28, "phase": "phase1", "listening": {"title": "健身房会员", "transcript": "Staff: Welcome to FitLife Gym.\nCustomer: What's the membership options?\nStaff: Basic 25/month, Standard 40 with classes, Premium 60 with pool.\nCustomer: Premium sounds good.\nStaff: Joining fee waived with 12-month contract.\nCustomer: Can I freeze membership?\nStaff: Up to 3 months per year.\nCustomer: Opening hours?\nStaff: 6 AM to 10 PM weekdays, 8 AM to 8 PM weekends.\nCustomer: Can I bring a guest?\nStaff: One guest free per month for Premium.", "questions": [{"q": "Premium月费？", "options": ["40磅", "50磅", "60磅"], "answer": 2}, {"q": "可暂停几个月？", "options": ["2个月", "3个月", "4个月"], "answer": 1}, {"q": "周末开门到几点？", "options": ["6点", "8点", "10点"], "answer": 1}]}, "reading": {"day": 28, "phase": "phase1", "title": "英国医疗NHS", "passage": "NHS, founded 1948, provides publicly funded healthcare. Most services free at point of use. Prescription £9.65 in England. Register with GP, gatekeeper to specialists. A&E for emergencies. Private healthcare alternative. Visitors should have travel insurance.", "questions": [{"q": "NHS成立年份？", "options": ["1938", "1948", "1958"], "answer": 1}, {"q": "英格兰处方费？", "options": ["£8.65", "£9.65", "£10.65"], "answer": 1}, {"q": "NHS 111提供？", "options": ["紧急救护", "24小时建议", "预约"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 环保责任", "task": "Some people believe that environmental problems should be solved at an international level. Others believe it is better to deal with them at the national level. Discuss both views and give your opinion.", "sample": "Environmental challenges transcend borders, raising questions about appropriate scales for effective action.\n\nInternational cooperation offers compelling advantages. Climate change and biodiversity loss are inherently global problems requiring coordinated responses. No single nation can solve these challenges independently. International agreements enable knowledge sharing, resource pooling, and consistent standards. The Paris Agreement demonstrates how collective commitment can drive global progress.\n\nHowever, national approaches also possess merit. Countries face different environmental challenges and possess varying capacities for action. National governments can implement policies suited to local conditions and priorities. Furthermore, national policies can inspire international momentum through example and success.\n\nIn my view, effective environmental strategy requires both levels working in harmony. National action provides the foundation, while international coordination amplifies impact. Neither approach alone suffices for problems of global scope.\n\nPractical examples support this integrated perspective. The European Union's supranational environmental framework enables consistent standards across member states while negotiating as a bloc internationally. Similarly, national climate policies often inform international negotiations, which then encourage further national ambition.\n\nIn conclusion, environmental challenges demand solutions at multiple scales. The most effective approach combines ambitious national action with robust international cooperation, recognizing that both levels possess unique strengths and limitations."}, "speaking": {"topic": "学习", "part1": ["你现在在做什么？", "你为什么选择这个专业？", "你觉得学习难吗？", "你更喜欢自学还是课堂上学习？"], "part2": "Describe something you learned recently. You should say: what you learned, where or how you learned it, why you decided to learn it, and explain whether it has been useful.", "part3": ["学校应该教学生什么技能？", "人们应该终身学习吗？", "传统教育与在线教育哪个更好？"]}}, {"day": 29, "phase": "phase1", "listening": {"title": "快递查询", "transcript": "Customer: Package tracking says delivered but I didn't receive it.\nAgent: Let me check. Tracking number?\nCustomer: TD-7348291658-UK.\nAgent: Left in green recycling bin according to driver.\nCustomer: But no card left!\nAgent: Sometimes drivers run out of cards.\nCustomer: It was on top of recycling bag.\nAgent: I'll file a report about this delivery method.\nCustomer: Package found, just dirty but intact.\nAgent: Sorry for the worry. Anything else?", "questions": [{"q": "包裹放在哪里？", "options": ["门口", "绿色回收箱", "邻居家"], "answer": 1}, {"q": "包裹状态？", "options": ["丢失", "完好但脏了", "损坏"], "answer": 1}, {"q": "客户希望如何处理？", "options": ["投诉", "记录反馈", "赔偿"], "answer": 1}]}, "reading": {"day": 29, "phase": "phase1", "title": "英国住宿", "passage": "Accommodation: hotels, B&Bs, holiday cottages. For permanent residence, rent or buy. Rental needs deposit, references. Assured shorthold tenancy most common, 6-12 months initially. Buy requires solicitor, surveys. Utility bills £150-250 monthly. Council tax bands A-H.", "questions": [{"q": "最常见租约？", "options": ["短期", "保证短期", "长期"], "answer": 1}, {"q": "公用事业费？", "options": ["£50-100", "£100-150", "£150-250"], "answer": 2}, {"q": "市政税等级？", "options": ["6", "7", "8"], "answer": 2}]}, "writing": {"type": "task1", "title": "线图 - 人口增长", "task": "The line graph shows population trends in three countries from 1950 to 2050. Summarise the information by selecting and reporting the main features.", "sample": "The line graph illustrates population changes in India, China, and the USA over 100 years from 1950 to projected 2050.\n\nOverall, India shows the most dramatic growth, overtaking China around 2025, while the USA demonstrates steady moderate increase.\n\nChina experienced rapid growth from 1950 to 1980, rising from approximately 550 million to nearly 1 billion. Following the one-child policy, growth slowed significantly, with the curve flattening. Projections suggest gradual decline after 2025 as India surpasses China.\n\nIndia's trajectory shows consistent acceleration, growing from 400 million in 1950 to over 1.4 billion by 2025. Unlike China, India's growth rate remained high throughout, with projections indicating continued increase to 1.6 billion by 2050.\n\nThe USA displayed the most modest growth, starting at 160 million in 1950 and reaching approximately 340 million by 2025. Projections suggest continued gradual increase to around 380 million by 2050.\n\nIn conclusion, the graph reveals divergent population futures: India rising rapidly, China peaking and declining, and the USA growing steadily."}, "speaking": {"topic": "运动", "part1": ["你喜欢运动吗？", "你经常锻炼吗？", "你最喜欢什么运动？", "运动对你来说意味着什么？"], "part2": "Describe a sport you enjoy playing or watching. You should say: what sport it is, how often you play or watch it, how you first became interested in it, and explain why you enjoy it.", "part3": ["运动应该如何融入学校教育？", "人们应该把运动作为日常生活的一部分吗？", "竞技体育的问题是什么？"]}}, {"day": 30, "phase": "phase1", "listening": {"title": "银行开户", "transcript": "Bank Staff: High Street Bank. How can I help?\nCustomer: Open a current account.\nStaff: Basic with no fees or Premium with benefits?\nCustomer: Basic is fine.\nStaff: Includes debit card, online banking, free ATM use.\nCustomer: What documents needed?\nStaff: Passport, proof of address, proof of income.\nCustomer: I have passport and employment letter.\nStaff: Need initial deposit of 1 pound. Card arrives in 5-7 days.\nCustomer: Can I come this afternoon?\nStaff: 9 to 4 weekdays, no appointment needed.", "questions": [{"q": "基本账户月费？", "options": ["免费", "5磅", "10磅"], "answer": 0}, {"q": "激活账户最低存款？", "options": ["1磅", "10磅", "50磅"], "answer": 0}, {"q": "银行卡多久到？", "options": ["3-5天", "5-7天", "7-10天"], "answer": 1}]}, "reading": {"day": 30, "phase": "phase1", "title": "英国节日", "passage": "UK holidays: Christmas December 25, major celebration. New Year, Hogmanay in Scotland. Easter follows Christian calendar, Good Friday and Monday public holidays. Bank holidays throughout year. Remembrance Day November 11, two-minute silence. Bonfire Night November 5.", "questions": [{"q": "复活节在？", "options": ["3-4月", "4-5月", "5-6月"], "answer": 0}, {"q": "纪念日日期？", "options": ["11月10日", "11月11日", "11月12日"], "answer": 1}, {"q": "篝火之夜日期？", "options": ["11月4日", "11月5日", "11月6日"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 远程学习", "task": "Some people believe that university students should study whatever they like. Others think that they should only be allowed to study subjects that will be useful in the future, such as those related to science and technology. Discuss both views and give your opinion.", "sample": "The debate between utilitarian and liberal approaches to education continues to generate discussion.\n\nThose favoring practical subjects argue that national competitiveness depends on technical expertise. Science and technology drive economic growth and innovation. Students pursuing these fields enjoy better employment prospects and higher starting salaries. Furthermore, society requires professionals in healthcare, engineering, and computing to address pressing challenges.\n\nHowever, the alternative perspective emphasizes that education should develop well-rounded individuals capable of independent thought. Literature, philosophy, and arts cultivate critical thinking and cultural understanding. These subjects develop creativity and analytical abilities applicable across numerous careers. Moreover, human civilization's richness derives from diverse intellectual pursuits beyond immediate utility.\n\nIn my view, a balanced approach serves students and society best. While practical skills provide career foundations, humanities develop essential cognitive capabilities. The most successful individuals typically combine technical competence with broad intellectual perspective.\n\nFurthermore, the job market continues evolving unpredictably. Specific technical skills may become obsolete, while adaptable thinking and learning capacity remain valuable. Education should prepare students for change rather than narrow training.\n\nIn conclusion, although practical subjects offer clear career advantages, exclusively restricting university study to such fields would impoverish both individuals and society. A rounded education combining utility with breadth produces the most fulfilled and productive citizens."}, "speaking": {"topic": "节假日", "part1": ["你最喜欢什么节日？", "你通常怎么庆祝节日？", "你最喜欢和谁一起过节？", "节日期间你做什么特别的事？"], "part2": "Describe a holiday you enjoyed. You should say: where you went, when you went, who you were with, what you did, and explain why you enjoyed this holiday.", "part3": ["人们应该保留传统节日吗？", "度假对你的身心健康重要吗？", "旅游业对当地文化有什么影响？"]}}, {"day": 31, "phase": "phase2", "listening": {"title": "大学课程咨询", "transcript": "Advisor: Academic Advising. How may I help?\nStudent: I'm considering changing my major from Business to International Relations.\nAdvisor: That's quite a shift. What's prompting this change?\nStudent: I took Politics and found it fascinating. I'm interested in global trade politics.\nAdvisor: That pairs well with business understanding. Have you checked IR requirements?\nStudent: Briefly. Need Political Theory, International Security, Global Political Economy.\nAdvisor: What about languages?\nStudent: French at GCSE, want to continue and add Spanish.\nAdvisor: Good foundation. Submit request before semester end.", "questions": [{"q": "学生目前专业？", "options": ["国际关系", "商业研究", "政治学"], "answer": 1}, {"q": "学生中学学什么语言？", "options": ["西班牙语", "法语", "中文"], "answer": 1}, {"q": "建议什么时候提交申请？", "options": ["学期末前", "下学期", "随时"], "answer": 0}]}, "reading": {"day": 31, "phase": "phase2", "title": "远程工作革命", "passage": "COVID changed remote work. Pre-2020, 5% worked from home. By 2021, 50% during lockdowns. Benefits: 13% more productive per Stanford study. Challenges: isolation, missing mentoring. Hybrid models common - 2-3 office days. Real estate markets changed. Policy debates continue.", "questions": [{"q": "2020年前在家工作比例？", "options": ["3%", "5%", "8%"], "answer": 1}, {"q": "斯坦福研究发现效率提高？", "options": ["8%", "13%", "18%"], "answer": 1}, {"q": "典型混合模式？", "options": ["1-2天", "2-3天", "4-5天办公室"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 政府资助艺术", "task": "Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?", "sample": "The allocation of transport infrastructure funding represents a significant policy consideration. While roads have traditionally dominated investment, railway systems offer compelling advantages that suggest they merit increased funding.\n\nI strongly agree that railways deserve greater investment for several reasons. First, rail is far more environmentally sustainable. Electric trains produce significantly lower carbon emissions per passenger-kilometer than cars or buses. As climate change demands urgent action, transitioning transportation toward lower-emission options becomes essential.\n\nSecond, rail demonstrates superior efficiency in high-density corridors. A single railway line can transport more people than a multi-lane highway while occupying less land. This becomes particularly crucial in densely populated regions where road expansion proves impractical.\n\nThird, rail provides economic benefits beyond direct transport. High-speed rail creates economic corridors connecting cities, enabling labor market integration and business travel. Studies demonstrate significant productivity gains in regions connected by quality rail infrastructure.\n\nHowever, roads remain essential for certain purposes. Rural areas often lack viable rail alternatives. Last-mile connectivity requires road networks. Emergency services and freight transport depend on road infrastructure.\n\nNevertheless, the balance of evidence supports prioritizing rail investment where feasible. Roads will continue receiving substantial funding; the argument concerns appropriate emphasis rather than exclusive focus.\n\nIn conclusion, I agree that railway investment should take precedence over road building in most contexts, given environmental, efficiency, and economic considerations. Roads will maintain their importance, but rail represents the more sustainable transportation future."}, "speaking": {"topic": "科技", "part1": ["你每天用电脑多长时间？", "你觉得手机重要吗？", "你会修电脑吗？", "你最喜欢什么科技产品？"], "part2": "Describe a piece of technology that you find useful. You should say: what it is, how long you have had it, how often you use it, and explain how it has changed your life.", "part3": ["科技如何改变教育？", "人们是否过度依赖科技？", "人工智能会取代人类工作吗？"]}}, {"day": 32, "phase": "phase2", "listening": {"title": "科研项目讨论", "transcript": "Professor: Discuss your dissertation topic.\nStudent: Climate change misinformation on social media.\nProfessor: What's your research question?\nStudent: How does fact-checking format affect engagement and sharing?\nProfessor: Interesting. Methodology?\nStudent: Content analysis then controlled experiment with 200 participants.\nProfessor: What about ethics?\nStudent: Informed consent and debriefing planned.\nProfessor: Sound approach.", "questions": [{"q": "研究主题是？", "options": ["气候变化政策", "社交媒体错误信息", "环境科学"], "answer": 1}, {"q": "需要多少参与者？", "options": ["100人", "150人", "200人"], "answer": 2}, {"q": "研究方法包括？", "options": ["仅调查", "内容分析和实验", "仅访谈"], "answer": 1}]}, "reading": {"day": 32, "phase": "phase2", "title": "电动汽车转型", "passage": "EV transition: UK ends petrol/diesel sales by 2035. Modern EVs 200+ miles range. Environmental benefits: zero tailpipe emissions. Cost gap narrowing - price parity in 3-5 years. Challenges: rare metals, charging infrastructure. EVs now 15%+ of UK sales.", "questions": [{"q": "燃油车禁售年份？", "options": ["2030", "2035", "2040"], "answer": 1}, {"q": "现代EV续航？", "options": ["150英里", "200英里", "300英里"], "answer": 1}, {"q": "EV占英国销量？", "options": ["10%+", "15%+", "20%+"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 垃圾处理", "task": "The chart shows how waste is disposed in six countries. Summarise the information by selecting and reporting the main features.", "sample": "The bar chart compares waste disposal methods across six countries: USA, Japan, Germany, UK, France, and Italy.\n\nOverall, significant variation exists between nations, with recycling playing a major role in European countries while landfill dominates elsewhere.\n\nJapan leads in recycling at 40%, demonstrating strong environmental culture. Germany follows closely at 35%, reflecting effective waste management policies. These two countries also maintain relatively high incineration rates at 30% and 25% respectively, converting waste to energy.\n\nThe remaining four countries show markedly different patterns. The USA relies primarily on landfill at 55%, with recycling at only 20% and incineration at 25%. The UK shows similar landfill dependence at 50%, while France and Italy achieve 30% recycling rates.\n\nNotably, all countries employ multiple disposal methods, suggesting no single solution fits all contexts. However, European nations generally achieve higher recycling rates, possibly due to stricter policies and greater public environmental awareness.\n\nIn conclusion, waste management approaches vary considerably, with European countries generally achieving higher recycling rates than the USA."}, "speaking": {"topic": "环境", "part1": ["你关心环境问题吗？", "你做什么环保的事？", "你所在的城市环境好吗？", "你觉得气候变化是真的吗？"], "part2": "Describe an environmental issue in your area. You should say: what the problem is, what causes it, what effects it has, and suggest possible solutions.", "part3": ["个人应该如何保护环境？", "经济发展和环境保护哪个更重要？", "政府应该采取什么措施应对气候变化？"]}}, {"day": 33, "phase": "phase2", "listening": {"title": "求职面试", "transcript": "Interviewer: Tell me about yourself and this position.\nCandidate: Marketing graduate. Internship at digital agency. Your sustainable fashion marketing interests me.\nInterviewer: Campaign example?\nCandidate: Organic skincare brand. '30-Day Natural Beauty Challenge' with influencers. 2 million impressions, 40% Instagram growth.\nInterviewer: How measured success?\nCandidate: Engagement, conversion tracking with discount code. ROI exceeded projections by 25%.\nInterviewer: How handle negative feedback?\nCandidate: Gather feedback, propose adjustments, transparent response builds trust.", "questions": [{"q": "案例带来多少曝光量？", "options": ["100万", "200万", "300万"], "answer": 1}, {"q": "Instagram增长多少？", "options": ["20%", "30%", "40%"], "answer": 2}, {"q": "ROI超过预期多少？", "options": ["15%", "20%", "25%"], "answer": 2}]}, "reading": {"day": 33, "phase": "phase2", "title": "社交媒体与青少年", "passage": "Social media and teen mental health: correlations with anxiety, depression, sleep issues. Causal relationship complex. Study found 30min-2hr daily use associated with better outcomes than abstinence or heavy use. Cyberbullying affects 1/3 of teens. Policy responses emerging.", "questions": [{"q": "中等使用时间？", "options": ["30分钟以内", "30分钟-2小时", "2-3小时"], "answer": 1}, {"q": "多少青少年受网络欺凌？", "options": ["1/4", "1/3", "1/2"], "answer": 1}, {"q": "研究发现使用与健康关系？", "options": ["线性负相关", "倒U型", "无关"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 动物权利", "task": "Some people think that animals should be treated as equals as human beings. Others say that it is acceptable to use animals for our benefits. Discuss both views and give your opinion.", "sample": "The moral status of animals has long provoked philosophical debate, with positions ranging from utilitarianism to anthropocentrism.\n\nThose advocating animal equality invoke sentience as the relevant criterion. If capacity for suffering grants moral consideration, animals - capable of experiencing pain, pleasure, and emotion - deserve protection. This perspective notes that humans lack rational grounds for privileging their interests over species membership alone.\n\nHowever, opponents emphasize fundamental differences between humans and animals. Human cognitive capacities, including abstract reasoning, language, and self-awareness, establish unique moral status. Humans possess moral responsibility that animals cannot share. Furthermore, animal use has driven human civilization's development through agriculture, medicine, and companionship.\n\nI adopt a middle position acknowledging animal welfare without demanding full equality. Animals deserve protection from unnecessary suffering, but complete equality with humans remains neither achievable nor desirable. Practical application involves reducing cruelty while accepting certain uses.\n\nThis balanced view recognizes that humans occupy a privileged position enabling moral consideration of other species. We should minimize animal suffering while accepting some level of animal use for human benefit, particularly where alternatives remain unavailable.\n\nIn conclusion, while complete equality proves impractical, significant moral obligations toward animals exist. Society should continue reducing unnecessary animal suffering while maintaining realistic approaches to human-animal relationships."}, "speaking": {"topic": "健康", "part1": ["你健康吗？", "你锻炼身体吗？", "你注意饮食吗？", "你上次看医生是什么时候？"], "part2": "Describe a way to stay healthy. You should say: what it is, how you do it, how long you have been doing it, and explain why it is important for health.", "part3": ["如何让人们更健康？", "医疗应该免费吗？", "心理健康和身体健康一样重要吗？"]}}, {"day": 34, "phase": "phase2", "listening": {"title": "产品发布会", "transcript": "Presenter: Introducing Smart Hub 3000. Our engineering team has been working on this for two years.\nTraditional smart home systems are fragmented. We're changing that.\nThree key innovations: First, Universal Compatibility - supports 50+ protocols.\nSecond, Predictive Automation - AI learns your routines in two weeks.\nThird, Privacy by Design - all AI processing happens locally.\nAvailable next month at $349. Early buyers get 20% discount.", "questions": [{"q": "产品名称？", "options": ["Smart Hub 2000", "Smart Hub 3000", "Smart Hub Pro"], "answer": 1}, {"q": "支持多少种协议？", "options": ["30+", "40+", "50+"], "answer": 2}, {"q": "AI学习需要多久？", "options": ["一周", "两周", "三周"], "answer": 1}, {"q": "早鸟折扣？", "options": ["10%", "15%", "20%"], "answer": 2}]}, "reading": {"day": 34, "phase": "phase2", "title": "水资源管理", "passage": "Water scarcity affects England/Wales. Drivers: population growth, climate change, aging infrastructure. 20% leakage. Average 140 litres daily use. Metering reduces use 10%. Conservation measures: behavioral changes, technology. Protected areas, wetland restoration proposed.", "questions": [{"q": "泄漏比例？", "options": ["15%", "20%", "25%"], "answer": 1}, {"q": "人均日用水量？", "options": ["120升", "140升", "160升"], "answer": 1}, {"q": "安装水表减少？", "options": ["5%", "10%", "15%"], "answer": 1}]}, "writing": {"type": "task1", "title": "表格 - 住房类型", "task": "The table gives information about the types of housing occupied by people in a particular city in 2018 and 2023. Summarise the information.", "sample": "The table illustrates changes in housing types in a city between 2018 and 2023.\n\nOverall, the city saw growth across all housing categories, with apartments and social housing showing the most significant increases.\n\nApartments experienced the largest expansion, rising from 35% to 45% of housing. This reflects increasing urbanization and preference for compact living, particularly among young professionals and smaller households.\n\nSocial housing also grew substantially from 20% to 28%, indicating government investment in affordable accommodation. This expansion addresses growing housing affordability concerns.\n\nOwner-occupied housing showed modest growth from 30% to 32%, while private renting remained stable at around 18-20%. These relatively static figures suggest these sectors matured within existing markets.\n\nIn conclusion, the five-year period witnessed notable shifts toward apartments and social housing, reflecting changing preferences and policy priorities."}, "speaking": {"topic": "工作", "part1": ["你现在工作还是学生？", "你理想的工作是什么？", "你为什么选择现在的工作/专业？", "你工作压力大吗？"], "part2": "Describe your ideal job. You should say: what job it is, what qualities it requires, whether it is realistic to achieve, and explain why it would be your ideal.", "part3": ["人们为什么工作？", "工作满意度重要吗？", "人们应该为了兴趣还是钱工作？"]}}, {"day": 35, "phase": "phase2", "listening": {"title": "环保政策研讨", "transcript": "Moderator: Why carbon pricing?\nProfessor: Makes polluters pay, creates incentives for cleaner tech.\nIndustry: Concern is competitiveness - carbon leakage.\nGovernment: Border adjustment mechanisms level the playing field.\nEconomist: Revenue use matters - returning as dividends increases support from 40% to over 70%.", "questions": [{"q": "碳定价基本原理？", "options": ["补贴污染者", "让污染者付费", "禁止排放"], "answer": 1}, {"q": "行业担心什么？", "options": ["技术不足", "碳泄漏和竞争力", "成本高"], "answer": 1}, {"q": "如果返还收入支持率可达？", "options": ["50%", "60%", "70%+"], "answer": 2}, {"q": "欧盟实施什么机制？", "options": ["碳税", "碳边境调整", "碳补贴"], "answer": 1}]}, "reading": {"day": 35, "phase": "phase2", "title": "高等教育国际化", "passage": "International students 20%+ of UK higher ed. Pay higher fees. Competition intensifying from Australia, Canada, Singapore. Experiences vary - some isolated. Post-study work visas influential - UK reintroduced 2-year visa in 2019.", "questions": [{"q": "国际学生比例？", "options": ["15%", "20%+", "25%"], "answer": 1}, {"q": "2019年政策变化？", "options": ["增加学费", "恢复毕业后工签", "限制招生"], "answer": 1}, {"q": "国际学生比本地学生更多经历？", "options": ["经济困难", "心理健康挑战", "就业优势"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 成功因素", "task": "Some people say that the main environmental problem of our time is the loss of particular species of plants and animals. Others say that there are more important environmental problems. Discuss both these views and give your opinion.", "sample": "Environmental challenges present multiple serious threats, with species extinction representing one among several critical concerns.\n\nThose emphasizing species loss argue that biodiversity provides ecosystem services essential for human survival: pollination, water purification, climate regulation. Each extinction potentially disrupts ecological relationships built over millions of years. Once lost, species cannot be recovered, making extinction particularly tragic.\n\nHowever, climate change presents arguably more immediate and widespread threats. Rising temperatures, sea-level rise, and extreme weather affect billions directly through food security, displacement, and economic disruption. Climate impacts potentially cascade into biodiversity loss through habitat destruction and altered ecosystems.\n\nIn my view, both perspectives hold merit, but climate change demands priority attention. While species loss represents permanent damage, climate change threatens existing life on multiple scales. Furthermore, addressing climate benefits biodiversity through reduced habitat destruction and ecosystem protection.\n\nThis is not to dismiss biodiversity concerns. Rather, strategic resource allocation requires addressing root causes benefiting multiple environmental dimensions. Climate action represents the most efficient investment for overall environmental health.\n\nIn conclusion, while species extinction constitutes serious concern, climate change warrants greater immediate attention given its comprehensive threats. Both issues interconnect, making integrated approaches essential."}, "speaking": {"topic": "教育", "part1": ["你最喜欢的老师是谁？", "你觉得学校教育有用吗？", "你更喜欢理论还是实践？", "你会选择继续读研究生吗？"], "part2": "Describe a subject you studied that you found useful. You should say: what it was, when and where you studied it, what you learned, and explain why it was useful.", "part3": ["学生应该学什么？", "教育应该免费吗？", "如何提高教育质量？"]}}, {"day": 36, "phase": "phase2", "listening": {"title": "糖尿病诊断对话", "transcript": "Doctor: Based on tests, you have Type 2 diabetes.\nPatient: My parents never had it. What does this mean?\nDoctor: Your body doesn't use insulin effectively. Manageable with diet, exercise, medication.\nPatient: Will I need medication?\nDoctor: Start with lifestyle changes, reassess in 3 months with HbA1c test.\nDoctor: Many patients do well with metformin as first-line treatment.\nPatient: What about diet?\nDoctor: Reduce refined carbs, increase fiber, control portions.", "questions": [{"q": "诊断结果？", "options": ["1型糖尿病", "2型糖尿病", "糖尿病前期"], "answer": 1}, {"q": "多久后重新评估？", "options": ["1个月", "2个月", "3个月"], "answer": 2}, {"q": "HbA1c反映多久血糖？", "options": ["1个月", "2个月", "3个月"], "answer": 2}, {"q": "建议什么作为一线治疗？", "options": ["胰岛素", "二甲双胍", "饮食控制"], "answer": 1}]}, "reading": {"day": 36, "phase": "phase2", "title": "生物多样性危机", "passage": "Species extinction 100-1000x natural rate. UK has significant loss since 1970s. Drivers: habitat loss, climate change, pollution, invasive species. Insects declined 60%. Conservation: protected areas, reintroduction (beavers returned), ecosystem services approach. 30x30 target by 2030.", "questions": [{"q": "灭绝速度倍数？", "options": ["50-500", "100-1000", "500-5000"], "answer": 1}, {"q": "昆虫下降？", "options": ["40%", "50%", "60%"], "answer": 2}, {"q": "重新引入什么动物？", "options": ["狼", "海狸", "熊"], "answer": 1}, {"q": "30x30目标保护？", "options": ["20%", "30%", "40%"], "answer": 1}]}, "writing": {"type": "task1", "title": "流程图 - 塑料回收", "task": "The diagram shows how plastic bottles are recycled. Summarise the information by selecting and reporting the main features.", "sample": "The flowchart illustrates the plastic bottle recycling process.\n\nOverall, recycling involves collection, sorting, cleaning, shredding, melting, and remolding into new products.\n\nThe process begins with consumer collection, where bottles are placed in recycling bins. Trucks collect these and transport them to sorting facilities. Here, workers or machines separate bottles by type and color, removing any non-plastic contaminants.\n\nCleaned bottles then enter shredding machines, breaking them into small flakes. These flakes are washed again to remove labels and adhesives. The clean flakes are melted at high temperatures, producing molten plastic.\n\nThis melted material is extruded through small holes, creating strands that are cooled and cut into pellets. These pellets represent raw material for manufacturing new products.\n\nFinally, the pellets are melted and molded into various items: new bottles, clothing fibers, furniture, or automotive parts. These products enter consumer markets, completing the recycling loop.\n\nIn conclusion, plastic bottle recycling transforms waste into useful products through systematic stages, conserving resources and reducing landfill."}, "speaking": {"topic": "媒体", "part1": ["你经常看新闻吗？", "你更喜欢看书还是看电影？", "你用社交媒体吗？", "你每天看多长时间电视？"], "part2": "Describe a movie or TV program that influenced you. You should say: what it was, when you watched it, what it was about, and explain how it influenced you.", "part3": ["暴力内容对青少年有什么影响？", "新闻可信度如何判断？", "人们应该付费获取高质量内容吗？"]}}, {"day": 37, "phase": "phase2", "listening": {"title": "可持续发展报告", "transcript": "CEO: Carbon emissions decreased 23% vs 2020 baseline, exceeding our 20% target.\nThree initiatives: First, 85% European operations use renewable energy - energy costs decreased 12%.\nSecond, redesigned packaging - eliminated 1,200 metric tons of plastic.\nThird, worked with 200+ suppliers on environmental practices.\nBy 2030, we commit to net-zero emissions.", "questions": [{"q": "碳排放降低多少？", "options": ["18%", "20%", "23%"], "answer": 2}, {"q": "欧洲可再生能源比例？", "options": ["75%", "80%", "85%"], "answer": 2}, {"q": "减少多少塑料？", "options": ["1,000吨", "1,200吨", "1,500吨"], "answer": 1}, {"q": "净零目标年份？", "options": ["2028", "2030", "2035"], "answer": 1}]}, "reading": {"day": 37, "phase": "phase2", "title": "数字鸿沟", "passage": "Digital divide: access and skills uneven. Age significant factor. Geographic disparities persist despite programs. Income correlates with exclusion. Libraries offer free internet, devices, training. Jobs increasingly require digital skills. Initiatives provide devices to disadvantaged.", "questions": [{"q": "图书馆提供？", "options": ["仅上网", "免费上网和培训", "仅电脑"], "answer": 1}, {"q": "什么影响较小？", "options": ["年龄", "地理位置", "性别"], "answer": 2}, {"q": "疫情中缺乏设备孩子？", "options": ["社交困难", "学习落后", "健康问题"], "answer": 1}, {"q": "工作现在需要？", "options": ["体力技能", "基础数字技能", "外语"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 广告影响", "task": "Some people think that advertisements have positive economic effects. Others believe they have negative social effects. Discuss both views and give your opinion.", "sample": "Advertising represents a controversial topic, with proponents highlighting economic benefits while critics emphasize social drawbacks.\n\nAdvertising's economic contributions are substantial. It enables markets to function efficiently by connecting buyers with sellers. Advertising revenue supports media industries, funding newspapers, television, and online content. Furthermore, advertising stimulates competition, driving innovation and potentially reducing prices through market expansion.\n\nHowever, negative social effects merit consideration. Advertising often promotes materialism and excessive consumption, particularly targeting vulnerable groups like children. The constant exposure to idealized lifestyles creates unrealistic expectations, potentially fostering dissatisfaction. Furthermore, some advertising employs manipulative psychological techniques rather than providing genuine information.\n\nI believe the net effect depends heavily on implementation. Ethical advertising providing useful information serves consumers and markets. However, regulation should address the most harmful practices, particularly those targeting children or employing deception.\n\nMoreover, consumers can develop critical awareness to resist manipulation. Media literacy education empowers individuals to evaluate advertising messages rather than passively accepting claims.\n\nIn conclusion, advertising offers both economic benefits and social risks. Appropriate regulation combined with consumer education can maximize advantages while minimizing harms."}, "speaking": {"topic": "文化", "part1": ["你对什么文化感兴趣？", "你了解中国的传统文化吗？", "你参加过什么文化活动？", "你觉得文化重要吗？"], "part2": "Describe a tradition in your culture. You should say: what it is, when it happens, what people do, and explain why it is important.", "part3": ["传统会消失吗？", "人们应该保留传统还是接受新文化？", "全球化会使文化同质化吗？"]}}, {"day": 38, "phase": "phase2", "listening": {"title": "AI伦理讲座", "transcript": "Professor: Algorithmic bias in AI systems is pressing. Facial recognition has higher error rates for darker skin tones - difference up to 34%.\nWhy? Biased training data. Systems trained on light-skinned images perform better on those faces.\nConsequences: wrongly identified as criminals, job discrimination.\nSolutions: diverse training data, algorithmic auditing, transparency.\nBroader lesson: AI reflects human decisions.", "questions": [{"q": "错误率差异最高？", "options": ["24%", "34%", "44%"], "answer": 1}, {"q": "主要原因？", "options": ["技术限制", "训练数据偏见", "硬件问题"], "answer": 1}, {"q": "解决方案不包括？", "options": ["多样化数据", "算法审查", "禁止技术"], "answer": 2}, {"q": "文章核心观点？", "options": ["AI有偏见", "AI中立", "AI完美"], "answer": 0}]}, "reading": {"day": 38, "phase": "phase2", "title": "隐私与数据", "passage": "Data fundamental to digital economy. Tech companies collect user info for advertising. GDPR 2018 established rights. Compliance challenging across jurisdictions. Emerging tech: IoT, biometrics, AI infer personal info. User expectations shifting - some choose privacy alternatives.", "questions": [{"q": "GDPR实施年份？", "options": ["2016", "2018", "2020"], "answer": 1}, {"q": "商业模式依赖？", "options": ["订阅", "数据广告", "销售"], "answer": 1}, {"q": "用户行为与偏好？", "options": ["一致", "存在差距", "无法研究"], "answer": 1}, {"q": "什么隐私问题？", "options": ["仅设备", "物联网和生物识别", "仅邮件"], "answer": 1}]}, "writing": {"type": "task1", "title": "线图 - 通信方式", "task": "The line graph shows how people sent letters in 1998, 2002, 2006, 2010, and 2014. Summarise the information.", "sample": "The line graph illustrates changes in letter sending in a country from 1998 to 2014.\n\nOverall, letter sending declined dramatically over the period, with email and messaging replacing traditional postal services.\n\nIn 1998, approximately 2.2 billion letters were sent, representing traditional mail's peak. This figure remained relatively stable through 2002 at about 2.1 billion.\n\nHowever, the decline accelerated from 2006 onward. Letters dropped to 1.5 billion in 2006, then continued falling to 800 million in 2010 and just 300 million in 2014. This represents an 86% decrease over sixteen years.\n\nThe pattern clearly reflects technological substitution. As internet access expanded, electronic communication increasingly replaced physical letters for personal and business correspondence.\n\nIn conclusion, the graph demonstrates technology's transformative impact on communication, with traditional letters nearly disappearing within sixteen years."}, "speaking": {"topic": "城市", "part1": ["你住在城市还是农村？", "你最喜欢城市的什么？", "你所在的城市有什么问题？", "你想住在哪个城市？"], "part2": "Describe a city you would like to visit. You should say: which city it is, where it is located, what you know about it, and explain why you would like to visit.", "part3": ["城市化有什么优缺点？", "大城市好还是小城市好？", "如何解决城市交通问题？"]}}, {"day": 39, "phase": "phase2", "listening": {"title": "城市规划 consultation", "transcript": "Planner: Riverside Development Project - 15 hectares, 800 new homes, 30% affordable housing.\nTraffic: new pedestrian/cyclist bridge, car traffic from main road.\nGreen space: 40% for parks, native trees, wildlife corridors.\nBuildings: tallest (12 stories) face river, not existing homes.\nResident: Construction noise concern?\nPlanner: 5 years, phases start far from homes, community liaison available.", "questions": [{"q": "开发面积？", "options": ["10公顷", "15公顷", "20公顷"], "answer": 1}, {"q": "保障性住房比例？", "options": ["25%", "30%", "35%"], "answer": 1}, {"q": "绿地比例？", "options": ["30%", "35%", "40%"], "answer": 2}, {"q": "最高建筑？", "options": ["10层", "12层", "15层"], "answer": 1}]}, "reading": {"day": 39, "phase": "phase2", "title": "医疗数字化", "passage": "Healthcare数字化: EHR replacing paper. Telemedicine routine post-pandemic. Health apps for monitoring. AI in diagnostic imaging matches specialists. Interoperability challenges between systems. Patient access increasing via portals. Equity concerns when digital access uneven.", "questions": [{"q": "什么在诊断影像有前景？", "options": ["VR", "AI", "区块链"], "answer": 1}, {"q": "挑战是？", "options": ["设备不足", "系统互操作性", "医生缺乏"], "answer": 1}, {"q": "什么成为攻击目标？", "options": ["物理", "网络", "员工"], "answer": 1}, {"q": "远程医疗挑战是？", "options": ["方便性", "复杂诊断质量", "成本"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 城市规划", "task": "Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?", "sample": "Transportation infrastructure investment decisions significantly impact economic development, environmental sustainability, and quality of life.\n\nRailways offer compelling advantages warranting increased investment. Environmental considerations strongly favor rail: electric trains produce lower emissions per passenger than individual vehicles. As climate urgency increases, transitioning toward rail becomes essential for meeting emissions targets.\n\nRailway efficiency also supports the economic argument. High-speed rail can transport more passengers per hour than highway lanes. In densely populated regions, rail provides superior capacity while requiring less land. Furthermore, rail investment creates employment during construction and operation.\n\nHowever, roads maintain important functions that railways cannot replace. Rural areas often lack viable rail alternatives. Door-to-door delivery requires road networks. Emergency services and freight transport depend on road infrastructure.\n\nNevertheless, the balanced perspective suggests prioritizing rail where population density justifies investment. Roads will continue receiving substantial funding; this argument concerns appropriate emphasis rather than exclusive focus.\n\nIn conclusion, railways merit greater investment than roads in most contexts, given environmental and efficiency advantages. Roads remain important, but rail represents more sustainable transportation future."}, "speaking": {"topic": "自然", "part1": ["你喜欢自然吗？", "你去过什么自然景点？", "你见过野生动物吗？", "你觉得自然美是什么？"], "part2": "Describe a beautiful place in nature. You should say: where it is, what it looks like, what you can do there, and explain why you find it beautiful.", "part3": ["人们应该如何保护自然？", "旅游业会破坏自然吗？", "城市里的自然和野外的自然有什么不同？"]}}, {"day": 40, "phase": "phase2", "listening": {"title": "网络安全培训", "transcript": "Trainer: Phishing is number one threat. Recognize: urgent language, generic greetings, errors, suspicious links.\nReport suspicious emails using 'Report Phishing' button.\nPasswords: 12+ characters, use passphrases.\nEnable multi-factor authentication.\nPhysical security: lock computer, no sticky notes with passwords.", "questions": [{"q": "第一名威胁？", "options": ["病毒", "钓鱼邮件", "恶意软件"], "answer": 1}, {"q": "密码最小长度？", "options": ["8位", "10位", "12位"], "answer": 2}, {"q": "双重认证的第二因素是？", "options": ["安全问题", "手机验证码", "指纹"], "answer": 1}, {"q": "离开座位时应该？", "options": ["关闭电脑", "锁屏", "保持开机"], "answer": 1}]}, "reading": {"day": 40, "phase": "phase2", "title": "文化遗产保护", "passage": "Cultural heritage: physical artifacts, traditions. Threats: conflict, development, climate change. Indigenous peoples fight appropriation. Museums face repatriation demands. Digital preservation creates opportunities. Community involvement increasingly guides preservation. UNESCO conventions evolving.", "questions": [{"q": "什么正在重建？", "options": ["金字塔", "帕尔米拉", "长城"], "answer": 1}, {"q": "知识产权保护如何？", "options": ["充分", "不足", "过度"], "answer": 1}, {"q": "数字保存包括？", "options": ["仅扫描", "高分辨率扫描和VR", "仅记录"], "answer": 1}, {"q": "保护越来越？", "options": ["自上而下", "社区参与", "商业化"], "answer": 1}]}, "writing": {"type": "task1", "title": "饼图 - 家庭支出", "task": "The pie chart shows average weekly household expenditure in the UK in 2020. Summarise the information.", "sample": "The pie chart illustrates UK household spending categories in 2020.\n\nHousing represents the largest expenditure at 30%, encompassing rent, mortgage payments, utilities, and maintenance. This substantial portion reflects housing costs' dominance in household budgets.\n\nFood and drink constitute the second largest category at 20%. This includes groceries and dining out, representing essential spending on sustenance.\n\nTransport accounts for 15%, covering vehicle purchase, fuel, insurance, and public transportation. This reflects mobility's importance for work and daily activities.\n\nRecreation and culture represent 12%, including entertainment, media subscriptions, and leisure activities. This spending category indicates discretionary expenditure on quality of life.\n\nClothing, utilities, and other categories each represent smaller portions, ranging from 5-8%. Healthcare spending comprises 5%, while education accounts for 3%.\n\nIn conclusion, housing and food dominate household budgets, together comprising half of expenditure, with significant portions also allocated to transport and recreation."}, "speaking": {"topic": "未来", "part1": ["你对未来有什么期待？", "你认为10年后世界会怎样？", "你想改变什么？", "你觉得未来会更好吗？"], "part2": "Describe something you want to do in the future. You should say: what it is, why you want to do it, how you plan to achieve it, and explain what would make it possible.", "part3": ["人们应该规划未来吗？", "科技会让未来更好还是更坏？", "个人能改变世界吗？"]}}, {"day": 41, "phase": "phase2", "listening": {"title": "大学课程咨询", "transcript": "Advisor: Academic Advising. How may I help?\nStudent: I'm considering changing my major from Business to International Relations.\nAdvisor: That's quite a shift. What's prompting this change?\nStudent: I took Politics and found it fascinating. I'm interested in global trade politics.\nAdvisor: That pairs well with business understanding. Have you checked IR requirements?\nStudent: Briefly. Need Political Theory, International Security, Global Political Economy.\nAdvisor: What about languages?\nStudent: French at GCSE, want to continue and add Spanish.\nAdvisor: Good foundation. Submit request before semester end.", "questions": [{"q": "学生目前专业？", "options": ["国际关系", "商业研究", "政治学"], "answer": 1}, {"q": "学生中学学什么语言？", "options": ["西班牙语", "法语", "中文"], "answer": 1}, {"q": "建议什么时候提交申请？", "options": ["学期末前", "下学期", "随时"], "answer": 0}]}, "reading": {"day": 41, "phase": "phase2", "title": "远程工作革命", "passage": "COVID changed remote work. Pre-2020, 5% worked from home. By 2021, 50% during lockdowns. Benefits: 13% more productive per Stanford study. Challenges: isolation, missing mentoring. Hybrid models common - 2-3 office days. Real estate markets changed. Policy debates continue.", "questions": [{"q": "2020年前在家工作比例？", "options": ["3%", "5%", "8%"], "answer": 1}, {"q": "斯坦福研究发现效率提高？", "options": ["8%", "13%", "18%"], "answer": 1}, {"q": "典型混合模式？", "options": ["1-2天", "2-3天", "4-5天办公室"], "answer": 1}]}, "writing": {"type": "task2", "title": "观点类 - 政府资助艺术", "task": "Some people think that governments should spend money on railways rather than roads. To what extent do you agree or disagree?", "sample": "The allocation of transport infrastructure funding represents a significant policy consideration. While roads have traditionally dominated investment, railway systems offer compelling advantages that suggest they merit increased funding.\n\nI strongly agree that railways deserve greater investment for several reasons. First, rail is far more environmentally sustainable. Electric trains produce significantly lower carbon emissions per passenger-kilometer than cars or buses. As climate change demands urgent action, transitioning transportation toward lower-emission options becomes essential.\n\nSecond, rail demonstrates superior efficiency in high-density corridors. A single railway line can transport more people than a multi-lane highway while occupying less land. This becomes particularly crucial in densely populated regions where road expansion proves impractical.\n\nThird, rail provides economic benefits beyond direct transport. High-speed rail creates economic corridors connecting cities, enabling labor market integration and business travel. Studies demonstrate significant productivity gains in regions connected by quality rail infrastructure.\n\nHowever, roads remain essential for certain purposes. Rural areas often lack viable rail alternatives. Last-mile connectivity requires road networks. Emergency services and freight transport depend on road infrastructure.\n\nNevertheless, the balance of evidence supports prioritizing rail investment where feasible. Roads will continue receiving substantial funding; the argument concerns appropriate emphasis rather than exclusive focus.\n\nIn conclusion, I agree that railway investment should take precedence over road building in most contexts, given environmental, efficiency, and economic considerations. Roads will maintain their importance, but rail represents the more sustainable transportation future."}, "speaking": {"topic": "科技", "part1": ["你每天用电脑多长时间？", "你觉得手机重要吗？", "你会修电脑吗？", "你最喜欢什么科技产品？"], "part2": "Describe a piece of technology that you find useful. You should say: what it is, how long you have had it, how often you use it, and explain how it has changed your life.", "part3": ["科技如何改变教育？", "人们是否过度依赖科技？", "人工智能会取代人类工作吗？"]}}, {"day": 42, "phase": "phase2", "listening": {"title": "科研项目讨论", "transcript": "Professor: Discuss your dissertation topic.\nStudent: Climate change misinformation on social media.\nProfessor: What's your research question?\nStudent: How does fact-checking format affect engagement and sharing?\nProfessor: Interesting. Methodology?\nStudent: Content analysis then controlled experiment with 200 participants.\nProfessor: What about ethics?\nStudent: Informed consent and debriefing planned.\nProfessor: Sound approach.", "questions": [{"q": "研究主题是？", "options": ["气候变化政策", "社交媒体错误信息", "环境科学"], "answer": 1}, {"q": "需要多少参与者？", "options": ["100人", "150人", "200人"], "answer": 2}, {"q": "研究方法包括？", "options": ["仅调查", "内容分析和实验", "仅访谈"], "answer": 1}]}, "reading": {"day": 42, "phase": "phase2", "title": "电动汽车转型", "passage": "EV transition: UK ends petrol/diesel sales by 2035. Modern EVs 200+ miles range. Environmental benefits: zero tailpipe emissions. Cost gap narrowing - price parity in 3-5 years. Challenges: rare metals, charging infrastructure. EVs now 15%+ of UK sales.", "questions": [{"q": "燃油车禁售年份？", "options": ["2030", "2035", "2040"], "answer": 1}, {"q": "现代EV续航？", "options": ["150英里", "200英里", "300英里"], "answer": 1}, {"q": "EV占英国销量？", "options": ["10%+", "15%+", "20%+"], "answer": 1}]}, "writing": {"type": "task1", "title": "柱状图 - 垃圾处理", "task": "The chart shows how waste is disposed in six countries. Summarise the information by selecting and reporting the main features.", "sample": "The bar chart compares waste disposal methods across six countries: USA, Japan, Germany, UK, France, and Italy.\n\nOverall, significant variation exists between nations, with recycling playing a major role in European countries while landfill dominates elsewhere.\n\nJapan leads in recycling at 40%, demonstrating strong environmental culture. Germany follows closely at 35%, reflecting effective waste management policies. These two countries also maintain relatively high incineration rates at 30% and 25% respectively, converting waste to energy.\n\nThe remaining four countries show markedly different patterns. The USA relies primarily on landfill at 55%, with recycling at only 20% and incineration at 25%. The UK shows similar landfill dependence at 50%, while France and Italy achieve 30% recycling rates.\n\nNotably, all countries employ multiple disposal methods, suggesting no single solution fits all contexts. However, European nations generally achieve higher recycling rates, possibly due to stricter policies and greater public environmental awareness.\n\nIn conclusion, waste management approaches vary considerably, with European countries generally achieving higher recycling rates than the USA."}, "speaking": {"topic": "环境", "part1": ["你关心环境问题吗？", "你做什么环保的事？", "你所在的城市环境好吗？", "你觉得气候变化是真的吗？"], "part2": "Describe an environmental issue in your area. You should say: what the problem is, what causes it, what effects it has, and suggest possible solutions.", "part3": ["个人应该如何保护环境？", "经济发展和环境保护哪个更重要？", "政府应该采取什么措施应对气候变化？"]}}, {"day": 43, "phase": "phase2", "listening": {"title": "求职面试", "transcript": "Interviewer: Tell me about yourself and this position.\nCandidate: Marketing graduate. Internship at digital agency. Your sustainable fashion marketing interests me.\nInterviewer: Campaign example?\nCandidate: Organic skincare brand. '30-Day Natural Beauty Challenge' with influencers. 2 million impressions, 40% Instagram growth.\nInterviewer: How measured success?\nCandidate: Engagement, conversion tracking with discount code. ROI exceeded projections by 25%.\nInterviewer: How handle negative feedback?\nCandidate: Gather feedback, propose adjustments, transparent response builds trust.", "questions": [{"q": "案例带来多少曝光量？", "options": ["100万", "200万", "300万"], "answer": 1}, {"q": "Instagram增长多少？", "options": ["20%", "30%", "40%"], "answer": 2}, {"q": "ROI超过预期多少？", "options": ["15%", "20%", "25%"], "answer": 2}]}, "reading": {"day": 43, "phase": "phase2", "title": "社交媒体与青少年", "passage": "Social media and teen mental health: correlations with anxiety, depression, sleep issues. Causal relationship complex. Study found 30min-2hr daily use associated with better outcomes than abstinence or heavy use. Cyberbullying affects 1/3 of teens. Policy responses emerging.", "questions": [{"q": "中等使用时间？", "options": ["30分钟以内", "30分钟-2小时", "2-3小时"], "answer": 1}, {"q": "多少青少年受网络欺凌？", "options": ["1/4", "1/3", "1/2"], "answer": 1}, {"q": "研究发现使用与健康关系？", "options": ["线性负相关", "倒U型", "无关"], "answer": 1}]}, "writing": {"type": "task2", "title": "讨论类 - 动物权利", "task": "Some people think that animals should be treated as equals as human beings. Others say that it is acceptable to use animals for our benefits. Discuss both views and give your opinion.", "sample": "The moral status of animals has long provoked philosophical debate, with positions ranging from utilitarianism to anthropocentrism.\n\nThose advocating animal equality invoke sentience as the relevant criterion. If capacity for suffering grants moral consideration, animals - capable of experiencing pain, pleasure, and emotion - deserve protection. This perspective notes that humans lack rational grounds for privileging their interests over species membership alone.\n\nHowever, opponents emphasize fundamental differences between humans and animals. Human cognitive capacities, including abstract reasoning, language, and self-awareness, establish unique moral status. Humans possess moral responsibility that animals cannot share. Furthermore, animal use has driven human civilization's development through agriculture, medicine, and companionship.\n\nI adopt a middle position acknowledging animal welfare without demanding full equality. Animals deserve protection from unnecessary suffering, but complete equality with humans remains neither achievable nor desirable. Practical application involves reducing cruelty while accepting certain uses.\n\nThis balanced view recognizes that humans occupy a privileged position enabling moral consideration of other species. We should minimize animal suffering while accepting some level of animal use for human benefit, particularly where alternatives remain unavailable.\n\nIn conclusion, while complete equality proves impractical, significant moral obligations toward animals exist. Society should continue reducing unnecessary animal suffering while maintaining realistic approaches to human-animal relationships."}, "speaking": {"topic": "健康", "part1": ["你健康吗？", "你锻炼身体吗？", "你注意饮食吗？", "你上次看医生是什么时候？"], "part2": "Describe a way to stay healthy. You should say: what it is, how you do it, how long you have been doing it, and explain why it is important for health.", "part3": ["如何让人们更健康？", "医疗应该免费吗？", "心理健康和身体健康一样重要吗？"]}}, {"day": 44, "phase": "phase2", "listening": {"title": "产品发布会", "transcript": "Presenter: Introducing Smart Hub 3000. Our engineering team has been working on this for two years.\nTraditional smart home systems are fragmented. We're changing that.\nThree key innovations: First, Universal Compatibility - supports 50+ protocols.\nSecond, Predictive Automation - AI learns your routines in two weeks.\nThird, Privacy by Design - all AI processing happens locally.\nAvailable next month at $349. Early buyers get 20% discount.", "questions": [{"q": "产品名称？", "options": ["Smart Hub 2000", "Smart Hub 3000", "Smart Hub Pro"], "answer": 1}, {"q": "支持多少种协议？", "options": ["30+", "40+", "50+"], "answer": 2}, {"q": "AI学习需要多久？", "options": ["一周", "两周", "三周"], "answer": 1}, {"q": "早鸟折扣？", "options": ["10%", "15%", "20%"], "answer": 2}]}, "reading": {"day": 44, "phase": "phase2", "title": "水资源管理", "passage": "Water scarcity affects England/Wales. Drivers: population growth, climate change, aging infrastructure. 20% leakage. Average 140 litres daily use. Metering reduces use 10%. Conservation measures: behavioral changes, technology. Protected areas, wetland restoration proposed.", "questions": [{"q": "泄漏比例？", "options": ["15%", "20%", "25%"], "answer": 1}, {"q": "人均日用水量？", "options": ["120升", "140升", "160升"], "answer": 1}, {"q": "安装水表减少？", "options": ["5%", "10%", "15%"], "answer": 1}]}, "writing": {"type": "task1", "title": "表格 - 住房类型", "task": "The table gives information about the types of housing occupied by people in a particular city in 2018 and 2023. Summarise the information.", "sample": "The table illustrates changes in housing types in a city between 2018 and 2023.\n\nOverall, the city saw growth across all housing categories, with apartments and social housing showing the most significant increases.\n\nApartments experienced the largest expansion, rising from 35% to 45% of housing. This reflects increasing urbanization and preference for compact living, particularly among young professionals and smaller households.\n\nSocial housing also grew substantially from 20% to 28%, indicating government investment in affordable accommodation. This expansion addresses growing housing affordability concerns.\n\nOwner-occupied housing showed modest growth from 30% to 32%, while private renting remained stable at around 18-20%. These relatively static figures suggest these sectors matured within existing markets.\n\nIn conclusion, the five-year period witnessed notable shifts toward apartments and social housing, reflecting changing preferences and policy priorities."}, "speaking": {"topic": "工作", "part1": ["你现在工作还是学生？", "你理想的工作是什么？", "你为什么选择现在的工作/专业？", "你工作压力大吗？"], "part2": "Describe your ideal job. You should say: what job it is, what qualities it requires, whether it is realistic to achieve, and explain why it would be your ideal.", "part3": ["人们为什么工作？", "工作满意度重要吗？", "人们应该为了兴趣还是钱工作？"]}}, {"day": 45, "phase": "phase2", "listening": {"title": "环保政策研讨", "transcript": "Moderator: Why carbon pricing?\nProfessor: Makes polluters pay, creates incentives for cleaner tech.\nIndustry: Concern is competitiveness - carbon leakage.\nGovernment: Border adjustment mechanisms level the playing field.\nEconomist: Revenue use matters - returning as dividends increases support from 40% to over 70%.", "questions": [{"q": "碳定价基本原理？", "options": ["补贴污染者", "让污染者付费", "禁止排放"], "answer": 1}, {"q": "行业担心什么？", "options": ["技术不足", "碳泄漏和竞争力", "成本高"], "answer": 1}, {"q": "如果返还收入支持率可达？", "options": ["50%", "60%", "70%+"], "answer": 2}, {"q": "欧盟实施什么机制？", "options": ["碳税", "碳边境调整", "碳补贴"], "answer": 1}]}, "re
