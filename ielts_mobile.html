uring childhood and adolescence and thereafter unchangeable. The discovery that experience and learning continue to reshape the brain throughout life overturned this assumption and sparked a revolution in neuroscience and education alike. Researchers are now exploring how neuroplasticity can be harnessed therapeutically, using targeted electrical stimulation, pharmacological agents, and carefully designed cognitive training programmes.","questions":[{"q":"What is the brain's capacity to reorganise itself called?","options":["Neurogenesis","Neuroplasticity","Neural transmission"],"answer":1},{"q":"What part of the brain did London taxi drivers show as being enlarged?","options":["Prefrontal cortex","Posterior hippocampus","Temporal lobe"],"answer":1},{"q":"Which practice has been shown to promote recovery from stroke?","options":["Passive rest","Intensive, targeted practice","Medication only"],"answer":1},{"q":"In which century did scientists begin demonstrating adult brain plasticity?","options":["19th century","20th century","21st century"],"answer":1}]},"writing":{"type":"task2","title":"观点类 - 全民基本收入","task":"Some people think that governments should introduce a universal basic income for all adults. Others believe that it is better to target support only towards those who need it. Discuss both views and give your opinion.","sample":"Universal Basic Income (UBI) represents an innovative policy proposal generating substantial debate.\n\nUBI proponents highlight its simplicity and dignity. Cash transfers allow recipients freedom to meet their specific needs rather than imposing bureaucratic judgments about deserving recipients. Furthermore, UBI provides security enabling entrepreneurship, education, and caregiving without fear of destitution. Automation's threat to employment may require UBI as labor markets transform.\n\nHowever, targeted support advocates emphasize efficiency and fairness. Limited resources should focus on those with genuine needs rather than distributing payments to wealthy individuals who don't require support. Furthermore, unconditional cash may enable irresponsible behavior, while conditional programs can encourage positive actions like workforce participation.\n\nI support targeted approaches but recognize UBI's potential merits under specific conditions. Developing countries with limited administrative capacity may find simple universal programs more practical than complex targeting systems. Furthermore, UBI experiments in developed contexts show generally positive outcomes for wellbeing without significant work reduction.\n\nNevertheless, sustainable UBI requires careful design preventing dependency and maintaining work incentives. Phased implementation allowing learning from experience seems wise.\n\nIn conclusion, targeted support should generally take precedence, but UBI merits consideration in appropriate contexts with careful implementation."},"speaking":{"topic":"领导力","part1":["你尊敬什么样的领导？","你会当领导吗？","领导是天生的还是培养的？","你认为好的领导应该具备什么？"],"part2":"Describe a leader you admire. You should say: who they are, what position they hold/held, what qualities make them a good leader, and explain why you admire them.","part3":["好的领导和差的领导有什么区别？","人们为什么追随领导者？","领导力可以学习吗？"]}},{"day":78,"phase":"phase3","listening":{"title":"科技投资谈判","transcript":"Founder: MediScan AI - detects diabetic retinopathy from smartphone photos, 94% accuracy.\nInvestor: Regulatory pathway?\nFounder: Class II device, 510(k) clearance. 3,200 patient clinical study. Expect clearance in 18 months.\nInvestor: Business model?\nFounder: Three streams: health system licensing, pharma partnerships, government contracts.\nInvestor: Competition from Google?\nFounder: Our advantage: runs on smartphone without cloud, works in low-connectivity areas.","questions":[{"q":"准确率？","options":["89%","91%","94%"],"answer":2},{"q":"临床研究多少患者？","options":["2,200","3,200","4,200"],"answer":1},{"q":"期望多久获批？","options":["12个月","18个月","24个月"],"answer":1},{"q":"竞争优势是？","options":["更低价格","可在智能手机运行","更大品牌"],"answer":1}]},"reading":{"title":"Dark Matter and Dark Energy","passage":"Dark matter and dark energy are among the most profound mysteries in modern cosmology, together constituting approximately 95 percent of the total mass-energy content of the universe, yet remaining fundamentally invisible to direct observation and incompletely understood despite decades of intensive experimental and theoretical investigation. Dark matter, which accounts for approximately 27 percent of the universe's total mass-energy content, is inferred to exist from its gravitational effects on visible matter, radiation, and the large-scale structure of the universe, including the rotation curves of galaxies, which show that stars at the outer edges of galaxies rotate around the galactic centre at speeds that would cause them to fly off into space if only the visible mass of the galaxy were exerting gravitational force, and the gravitational lensing of light from distant galaxies by foreground mass concentrations, which is far stronger than can be explained by visible matter alone. Dark energy, which accounts for approximately 68 percent of the total mass-energy content of the universe, is the name given to whatever is causing the observed acceleration of the expansion of the universe, a phenomenon first detected in 1998 and recognised with the award of the Nobel Prize in Physics in 2011, which contradicts the expectation of most cosmological models that the expansion of the universe should be slowing due to the gravitational attraction of matter. Candidates for dark matter include weakly interacting massive particles, primordial black holes formed in the early universe, and more exotic theoretical constructs, while dark energy is most commonly associated with the cosmological constant, a term in Einstein's equations representing the energy of empty space. Numerous experiments around the world, including the Large Hadron Collider at CERN, underground detectors seeking to detect the rare collisions between dark matter particles and ordinary atoms, and astrophysical observations using telescopes and spacecraft, continue the search for evidence that will illuminate the nature of these mysterious components of the cosmos. Dark matter, the invisible substance that is believed to constitute approximately 27 percent of the universe mass-energy content, remains one of the most profound mysteries of modern physics. Its existence is inferred primarily from its gravitational effects: galaxies rotate in ways that cannot be explained by the gravity of their visible stars and gas alone, and the large-scale structure of the universe could not have formed without the gravitational scaffolding provided by dark matter. Yet despite decades of increasingly sophisticated experiments, dark matter has not been directly detected. Some physicists now wonder whether the failure to detect dark matter particles points not to the inadequacy of our experiments but to something more fundamental: that our understanding of gravity itself may need revision.","questions":[{"q":"What percentage of the universe is composed of dark matter and dark energy?","options":["About 25 percent","About 50 percent","About 95 percent"],"answer":2},{"q":"What phenomenon demonstrated the existence of dark energy?","options":["Rotation of galaxies slowing down","Acceleration of the universe's expansion","The big bang theory"],"answer":1},{"q":"When was dark energy first detected?","options":["1988","1998","2008"],"answer":1},{"q":"Which experiment searches for dark matter particle collisions?","options":["Hubble Space Telescope","Large Hadron Collider","James Webb Telescope"],"answer":1}]},"writing":{"type":"task1","title":"饼图 - 污染来源","task":"The pie chart shows the main sources of air pollution in a city. Summarise the information.","sample":"The pie chart illustrates air pollution sources in a typical city.\n\nOverall, transportation emerges as the dominant pollution source, followed by industrial activity and residential heating.\n\nVehicles represent the largest contributor at 40%. This includes cars, trucks, and buses running on fossil fuels, releasing nitrogen oxides, particulate matter, and carbon monoxide into the atmosphere.\n\nIndustry accounts for 25% of pollution, encompassing manufacturing, power generation, and construction activities. Factory emissions and industrial processes release various pollutants depending on fuel types and production methods.\n\nResidential heating contributes 20%, particularly in colder climates where homes burn fuel for warmth. This category includes both traditional heating systems and modern natural gas furnaces.\n\nThe remaining 15% derives from miscellaneous sources including commercial activities, waste management, and natural sources like dust and wildfires.\n\nIn conclusion, transportation dominates urban air pollution, suggesting priority attention to vehicle emissions through electrification, public transit improvement, and urban planning reducing travel needs."},"speaking":{"topic":"幸福","part1":["你幸福吗？","什么让你快乐？","钱能买到幸福吗？","你追求什么样的生活？"],"part2":"Describe what makes you happy. You should say: what makes you happy, how often you experience happiness, what you do when you are happy, and explain why these things bring you joy.","part3":["幸福是什么？","如何衡量幸福？","社会应该以GDP还是幸福感来衡量成功？"]}},{"day":79,"phase":"phase3","listening":{"title":"语言学演讲","transcript":"Linguist: Language shapes cognition. Russian has separate terms for light blue (goluboy) and dark blue (siniy).\nRussian speakers faster at discriminating these shades.\nGuugu Yimithirr uses cardinal directions (north, south, east, west) instead of left/right.\nAymara conceives past as in front (seen) and future as behind (unseen).\nBilingual individuals switch cognitive frames, linked to delayed dementia by 4-5 years.","questions":[{"q":"俄语浅蓝色是？","options":["siniy","goluboy","blue"],"answer":1},{"q":"Guugu Yimithirr用什么坐标？","options":["左右","基本方位","相对"],"answer":1},{"q":"Aymara认为过去在哪？","options":["前面","后面","上面"],"answer":0},{"q":"双语可推迟痴呆多久？","options":["2-3年","4-5年","6-7年"],"answer":1}]},"reading":{"title":"CRISPR and the Future of Medicine","passage":"CRISPR-Cas9, the revolutionary gene editing technology that allows scientists to make precise changes to DNA sequences with unprecedented accuracy and efficiency, is transforming medicine and biology, offering the prospect of treatments and potentially cures for thousands of genetic diseases that were previously considered incurable, and raising profound questions about the boundaries of human intervention in the biological world. The CRISPR system was originally discovered as a natural defence mechanism used by bacteria to recognise and destroy the DNA of invading viruses, a remarkable evolutionary adaptation that has been coopted by scientists as a tool for targeted gene editing, simplified and made accessible to laboratories around the world through the landmark 2012 paper by Jennifer Doudna and Emmanuelle Charpentier, who were awarded the Nobel Prize in Chemistry in 2020 for this discovery. The most advanced clinical applications of CRISPR are in the treatment of sickle cell disease and beta-thalassemia, blood disorders caused by mutations in the haemoglobin gene, where CRISPR-based therapies have shown extraordinary efficacy in early trials, with patients who previously required regular blood transfusions and suffered severe complications achieving functional cures following treatment. Cancer immunotherapy, in which CRISPR is used to engineer patients' own immune cells to better recognise and attack tumour cells, represents another promising avenue of clinical development, with several CAR-T cell therapies already approved for the treatment of certain blood cancers and trials underway for solid tumours. Beyond disease treatment, CRISPR raises the prospect of disease elimination, with proposals to use gene drives, genetic constructs that spread through populations much faster than Mendelian inheritance, to eliminate vector-borne diseases such as malaria by engineering mosquitoes that cannot transmit the parasite, though such applications raise enormous ecological and ethical concerns that remain intensely debated. The development of CRISPR-Cas9 gene editing technology has democratised genetic engineering by making it accessible, precise, and affordable in ways that were previously unimaginable. Beyond its medical applications, which include clinical trials for inherited blood disorders, cancers, and heart disease, CRISPR is transforming biological research, agriculture, and conservation. In 2023, the first CRISPR-based treatment received regulatory approval in the United Kingdom and United States, offering hope to patients with sickle cell disease and beta-thalassaemia. Yet the technology also raises complex ethical questions about the boundaries between therapy and enhancement, and the potential for its use in human germline editing that would create heritable genetic changes passed to future generations.","questions":[{"q":"What were the 2020 Nobel Prize in Chemistry winners known for?","options":["Cancer research","Discovery of CRISPR-Cas9","HIV treatment"],"answer":1},{"q":"For which conditions have CRISPR therapies shown extraordinary efficacy in trials?","options":["Heart disease","Sickle cell disease and beta-thalassemia","Common cold"],"answer":1},{"q":"What are CAR-T cell therapies used to treat?","options":["Diabetes","Certain blood cancers","Arthritis"],"answer":1},{"q":"What does CRISPR originally function as in nature?","options":["A digestive enzyme","A bacterial defence mechanism","A plant hormone"],"answer":1}]},"writing":{"type":"task2","title":"讨论类 - 动物实验","task":"Some people think that animal testing is necessary for medical progress. Others believe it is cruel and unnecessary. Discuss both views and give your opinion.","sample":"Animal testing presents ethical dilemmas balancing medical progress against animal welfare.\n\nProponents argue animal research remains essential for medical advancement. Before human trials, treatments must be evaluated in living systems, and alternative methods cannot fully replicate complex biological processes. Historical medical achievements from vaccines to surgical techniques relied on animal research. Without such testing, potentially dangerous treatments might reach patients, causing greater harm.\n\nHowever, critics emphasize that animal testing causes suffering to sentient beings capable of experiencing pain and distress. Many animal experiments produce results that fail to translate to human applications due to species differences. Furthermore, technological alternatives including computer modeling, organ-on-chip devices, and human tissue cultures increasingly offer viable alternatives.\n\nI believe a balanced approach minimizes animal suffering while preserving essential research. Strict ethical review should eliminate unnecessary experiments, and alternatives should be employed whenever scientifically valid. The '3Rs' framework - Replacement, Reduction, and Refinement - provides ethical guidance for acceptable research.\n\nAdditionally, increased transparency regarding animal research and rigorous scrutiny of proposed experiments can help ensure that only justified studies proceed. Researchers should actively pursue alternative methods.\n\nIn conclusion, while animal testing raises legitimate ethical concerns, complete elimination may compromise medical progress. Appropriate regulation can balance competing interests."},"speaking":{"topic":"教育公平","part1":["你上的学校好吗？","教育应该公平吗？","你支持教育投资吗？","你相信知识改变命运吗？"],"part2":"Describe an issue related to education equality. You should say: what the issue is, what causes it, how it affects students, and suggest possible solutions.","part3":["为什么教育不平等存在？","如何确保每个人都能获得好教育？","教育应该免费还是付费？"]}},{"day":80,"phase":"phase3","listening":{"title":"生物伦理会议","transcript":"Chair: Proposal for CRISPR embryo editing for cystic fibrosis.\nResearcher: Correct mutation causing CF. 87% of affected families support.\nCommittee: Line between therapy and enhancement?\nResearcher: Distinguishing therapeutic (correct disease mutations) from enhancement.\nCommittee: Off-target effects?\nResearcher: Rate below 0.1%, verification protocol to exclude unintended edits.\nCommittee: Access and equity?\nResearcher: Propose inclusion in national health coverage.","questions":[{"q":"研究针对什么疾病？","options":["癌症","囊性纤维化","糖尿病"],"answer":1},{"q":"受影响家庭支持比例？","options":["67%","77%","87%"],"answer":2},{"q":"脱靶效应率？","options":["0.01%","0.1%","1%"],"answer":1},{"q":"CF预期寿命？","options":["30岁","40岁","50岁"],"answer":1}]},"reading":{"title":"The Philosophy of Free Will","passage":"The question of whether human beings possess free will, the capacity to make choices that are genuinely free from determination by prior causes and that could have been otherwise given identical circumstances, is one of the oldest and most contested in philosophy, and has acquired new urgency and dimensions as advances in neuroscience, psychology, and artificial intelligence reveal increasingly sophisticated causal mechanisms underlying what we experience as conscious deliberation and choice. The classical philosophical positions on free will are libertarianism, which holds that free will exists and is incompatible with determinism, the idea that every event including human thoughts and actions is determined by prior causes according to natural laws, and compatibilism, which holds that free will and determinism can coexist, redefining free will not as indeterminism but as the capacity to act in accordance with one's own desires and reasons without external coercion. Contemporary neuroscience has challenged the traditional understanding of free will through experiments demonstrating that brain activity associated with the intention to perform an action can be detected several seconds before the conscious awareness of the decision to act, suggesting that the subjective sense of freely willing an action may be a post-hoc construction rather than a genuine initiating cause. Benjamin Libet's famous experiments in the 1980s showed that the readiness potential preceding voluntary movements appears before the conscious decision to move, findings that have been widely debated and subsequently confirmed and extended by more sophisticated research. Legal and moral systems rely fundamentally on assumptions about free will, as the justification for holding people responsible for their actions and deserving of praise or blame presupposes that they could have acted otherwise, raising the question of how our legal and ethical frameworks should be adapted in light of neuroscientific discoveries that challenge this assumption. The question of whether human beings possess genuine free will, or whether our choices are determined by physical laws, biological drives, and environmental influences beyond our control, is among the most profound and enduring in philosophy. Neuroscientific research has increasingly challenged the intuitive sense that we are the authors of our own actions. Experiments by Benjamin Libet showed that brain activity associated with the intention to move begins several hundred milliseconds before the conscious decision to move is made, suggesting that the sense of voluntary agency may be a post-hoc construction rather than a genuine causal force. Yet critics have challenged the interpretation of these experiments, arguing that the readiness potential measures preparatory processes rather than decision-making.","questions":[{"q":"What does libertarianism hold about free will?","options":["It does not exist","It exists and is incompatible with determinism","It is the same as determinism"],"answer":1},{"q":"What did Benjamin Libet's experiments demonstrate?","options":["That consciousness causes all brain activity","Brain activity precedes conscious decision to act","Free will definitely does not exist"],"answer":1},{"q":"What do compatibilists believe?","options":["Free will cannot exist","Free will and determinism can coexist","Only libertarianism is correct"],"answer":1},{"q":"What systems rely fundamentally on assumptions about free will?","options":["Economic systems","Legal and moral systems","Educational systems"],"answer":1}]},"writing":{"type":"task1","title":"柱状图 - 旅游业影响","task":"The chart shows the economic impact of tourism in three countries in 2023. Summarise the information.","sample":"The bar chart compares tourism's economic contribution across three countries in 2023.\n\nOverall, tourism generates substantial revenue and employment in all three nations, with notable variation in scale and composition.\n\nFrance led in total tourism revenue at €65 billion, followed by Spain at €55 billion and Italy at €45 billion. This reflects France's attractions including Paris, the Louvre, and numerous UNESCO sites.\n\nEmployment figures showed similar patterns: France employed 2.2 million in tourism, Spain 1.8 million, and Italy 1.5 million. These represent significant portions of total workforce in each nation.\n\nTourism's contribution to GDP varied: Spain led at 12%, reflecting greater reliance on tourism as economic driver. France and Italy showed similar contributions at 8% and 7% respectively.\n\nSpending patterns also differed. French tourists spent more on culture and entertainment, while Spanish visitors concentrated on beach resorts. Italian tourism centered on historical sites and cuisine.\n\nIn conclusion, tourism provides substantial economic benefits across all three countries, with scale and characteristics reflecting each nation's unique attractions and development strategies."},"speaking":{"topic":"隐私","part1":["你重视隐私吗？","你会在网上分享什么？","你担心信息泄露吗？","隐私应该被保护吗？"],"part2":"Describe a concern about privacy in modern society. You should say: what the concern is, why it exists, how it affects people's lives, and suggest how it should be addressed.","part3":["隐私有多重要？","政府应该监控公民吗？","个人应该放弃多少隐私来换取安全？"]}},{"day":81,"phase":"phase3","listening":{"title":"量子计算研讨","transcript":"Professor: Quantum computing uses qubits - can exist in superposition of 0 and 1.\nIn 2019, Google's 53-qubit processor performed calculation in 200 seconds that would take classical supercomputer 10,000 years.\nApplications: Cryptography threatens RSA encryption. Drug discovery by simulating molecular interactions.\nChallenges: Quantum coherence is difficult, must keep near absolute zero.","questions":[{"q":"谷歌量子处理器有多少量子比特？","options":["43","53","63"],"answer":1},{"q":"计算用时多少秒？","options":["100","200","300"],"answer":1},{"q":"Shor算法威胁什么？","options":["对称加密","RSA加密","哈希函数"],"answer":1},{"q":"量子比特需要什么温度？","options":["室温","低温","绝对零度附近"],"answer":2}]},"reading":{"title":"The Science of Consciousness","passage":"Consciousness, the subjective experience of being aware of oneself and the world, has perplexed philosophers for millennia and is now the subject of intense scientific investigation, as researchers from fields as diverse as neuroscience, psychology, computer science, and philosophy attempt to understand why and how physical processes in the brain give rise to subjective experience. The philosopher David Chalmers famously described this challenge as the hard problem of consciousness, distinguishing it from the easy problems of explaining how the brain processes sensory information, controls behaviour, and integrates data, all of which, while enormously complex, seem in principle amenable to explanation in terms of neural mechanisms and computational processes. The hard problem asks why any of these processes are accompanied by subjective experience at all, why there is something it is like to be you or me, rather than merely the automatic functioning of biological or computational machinery. Among the major theories of consciousness, Integrated Information Theory proposes that consciousness corresponds to the amount of integrated information in a physical system, measured by a mathematical quantity called phi, and that any system with phi greater than zero has some degree of consciousness, potentially including sophisticated AI systems and even simple thermostats, albeit with very minimal conscious experience. Global Workspace Theory proposes that consciousness arises when information is broadcast widely across the brain's neural networks, making it available to multiple cognitive processes simultaneously, much as a theatre spotlight illuminates different actors on a stage. Research into disorders of consciousness such as coma, vegetative state, and the minimally conscious state has provided important insights into the neural correlates of awareness, with sophisticated brain imaging techniques revealing that some patients previously assumed to be completely unaware may retain significant residual consciousness that can be detected through careful examination of brain activity patterns. The scientific study of consciousness has made remarkable progress in recent decades, yet the fundamental question of why and how subjective experience arises from physical processes in the brain remains as mysterious as ever. Neuroscientists have identified specific brain regions and neural correlates associated with conscious awareness, yet knowing which neurons fire provides no obvious explanation for why the experience of seeing the colour red feels the way it does. The philosopher David Chalmers famously termed this the hard problem of consciousness, distinguishing it from the more tractable problems of explaining how the brain integrates information and controls behaviour.","questions":[{"q":"What did David Chalmers call the fundamental challenge of consciousness?","options":["The easy problem","The hard problem","The theatre problem"],"answer":1},{"q":"What does Integrated Information Theory measure?","options":["Brain size","Phi","Neural firing rate"],"answer":1},{"q":"What does Global Workspace Theory propose about consciousness?","options":["It exists only in humans","Information is broadcast across neural networks","It requires quantum processes"],"answer":1},{"q":"What technique has revealed residual consciousness in some patients?","options":["X-ray imaging","Brain imaging techniques","Blood tests"],"answer":1}]},"writing":{"type":"task2","title":"讨论类 - AI影响工作","task":"Some people believe that artificial intelligence will have a positive impact on work and employment in the future. Others believe that it will have negative effects. Discuss both views and give your opinion.","sample":"Artificial intelligence's integration into workplaces raises profound questions about labor's future.\n\nOptimists highlight AI's transformative potential. Automation can eliminate tedious tasks, enabling humans to focus on creative and relational work requiring emotional intelligence. New industries and job categories will emerge, just as previous technological revolutions created employment beyond imagination. Furthermore, AI can enhance productivity, potentially increasing prosperity and reducing working hours.\n\nHowever, pessimists raise legitimate concerns. Automation threatens widespread job displacement, particularly affecting routine cognitive and manual work. Unlike previous technological transitions, AI advancement occurs rapidly and affects white-collar professions previously considered safe. Economic inequality may worsen as capital owners capture gains while workers face displacement.\n\nI believe reality will combine both perspectives. AI will indeed transform work profoundly, but net effects depend on policy choices. Without intervention, negative impacts may dominate; with appropriate measures, benefits can be widely shared.\n\nEssential interventions include education reform emphasizing uniquely human skills, robust social safety nets during transition, and perhaps robot taxes funding universal basic income. Businesses should invest in worker retraining rather than simply replacing employees.\n\nIn conclusion, AI presents both opportunities and challenges. Society possesses agency in determining outcomes through thoughtful policy and preparation."},"speaking":{"topic":"人工智能","part1":["你用过人工智能吗？","你觉得AI是什么？","你担心AI的发展吗？","你觉得AI会取代人类吗？"],"part2":"Describe a development in technology that you think will change the future. You should say: what it is, how it works, how it will affect our lives, and explain whether it will be positive or negative.","part3":["AI会取代哪些工作？","如何确保AI安全发展？","人类应该如何与AI共存？"]}},{"day":82,"phase":"phase3","listening":{"title":"国际关系理论","transcript":"Professor: Three theories: Realism views states as primary actors in anarchic system. Power is the currency.\nLiberals argue cooperation is possible through institutions, democracy, interdependence.\nConstructivism asks how norms and identities shape international politics.\nWendt's phrase: 'anarchy is what states make of it' - system isn't fixed.\nThese theories aren't mutually exclusive.","questions":[{"q":"现实主义认为国际体系是？","options":["有序","无政府","合作"],"answer":1},{"q":"民主和平论认为民主国家间很少？","options":["贸易","战争","外交"],"answer":1},{"q":"建构主义强调？","options":["军事力量","规范和认同","经济实力"],"answer":1},{"q":"Wendt的观点是？","options":["体系固定","体系是国家建构的","体系自然形成"],"answer":1}]},"reading":{"title":"Quantum Computing and Its Promise","passage":"Quantum computing represents one of the most exciting and potentially transformative areas of contemporary technology, exploiting the strange properties of quantum mechanics such as superposition, entanglement, and interference to perform calculations in fundamentally new ways that could eventually enable the solution of problems that are intractable for even the most powerful classical supercomputers. While conventional computers encode information as bits that can exist in one of two states, 0 or 1, quantum computers use quantum bits or qubits, which can exist in a superposition of both 0 and 1 simultaneously, enabling a quantum computer with just 50 qubits to represent more possible states than there are atoms in the observable universe. Quantum entanglement allows qubits to be correlated with one another in such a way that the state of one qubit instantaneously affects the state of its entangled partner, regardless of the distance between them, enabling new forms of quantum communication and distributed quantum computing. The potential applications of quantum computing span fields including cryptography, where quantum computers threaten to render current encryption methods obsolete; drug discovery and materials science, where quantum simulation could enable the design of new medicines and materials at the atomic level; financial modelling, where quantum algorithms could optimise complex portfolios and risk calculations; and artificial intelligence, where quantum machine learning algorithms may eventually outperform classical approaches on certain tasks. However significant challenges remain before quantum computers can fulfil their promise, as qubits are extremely fragile and susceptible to decoherence, the loss of quantum information through interaction with the environment, requiring sophisticated error correction codes and extremely low operating temperatures close to absolute zero. Current quantum computers are error-prone and limited in scale, with the largest systems today containing around 1,000 qubits, far fewer than the millions of qubits that researchers estimate would be required for many practically useful quantum computations. Quantum computing harnesses the counterintuitive principles of quantum mechanics, such as superposition and entanglement, to process information in fundamentally different ways from classical computers. While conventional computers represent information as bits that are either 0 or 1, quantum computers use quantum bits, or qubits, that can exist in a superposition of both states simultaneously, potentially enabling them to solve certain classes of problems exponentially faster than any classical supercomputer. The practical applications include drug discovery, materials science, cryptography, and artificial intelligence. However, the field faces formidable technical challenges: qubits are extraordinarily fragile, easily disrupted by the slightest environmental interference.","questions":[{"q":"What is the basic unit of information in a quantum computer?","options":["A bit","A qubit","A byte"],"answer":1},{"q":"What is the loss of quantum information through environmental interaction called?","options":["Superposition","Decoherence","Entanglement"],"answer":1},{"q":"What field of science could benefit from quantum simulation at the atomic level?","options":["Astronomy","Drug discovery and materials science","History"],"answer":1},{"q":"How many qubits do the largest current quantum computers contain?","options":["About 50","About 1,000","About 1 million"],"answer":1}]},"writing":{"type":"task1","title":"柱状图 - 碳排放","task":"The chart shows carbon dioxide emissions per person in 1960 and 2015 in five countries. Summarise the information.","sample":"The bar chart compares per capita carbon dioxide emissions in five countries between 1960 and 2015.\n\nOverall, emissions patterns varied significantly across nations, with some reducing per capita emissions while others increased substantially.\n\nThe USA showed the highest emissions in both years, though declining from 20 to 15 tonnes per person. This 25% reduction reflects improved efficiency and some fuel switching despite continued high consumption.\n\nChina demonstrated dramatic growth, rising from just 3 tonnes in 1960 to 8 tonnes in 2015. This near-tripling reflects rapid industrialization and increased energy consumption despite large population.\n\nThe UK achieved notable reduction, falling from 9 to 6 tonnes per person. This 33% decrease demonstrates successful transition from heavy industry to service economy.\n\nGermany also reduced emissions significantly from 12 to 8 tonnes per person. Similar to the UK, this reflects deindustrialization and renewable energy adoption.\n\nJapan showed minimal change, hovering around 4-5 tonnes across the period, reflecting nuclear energy's role in limiting fossil fuel dependence.\n\nIn conclusion, developed nations generally reduced per capita emissions while developing countries like China saw increases as industrialization proceeded."},"speaking":{"topic":"全球化","part1":["你觉得全球化是好是坏？","你在国外旅行过吗？","你会说外语吗？","你觉得文化会趋同吗？"],"part2":"Describe a change that will affect your country in the future. You should say: what the change is, what caused it, how it will affect people's lives, and explain whether you think it is positive or negative.","part3":["全球化有什么利弊？","国家应该如何应对全球化？","本土文化会被全球文化取代吗？"]}},{"day":83,"phase":"phase3","listening":{"title":"神经科学研究答辩","transcript":"Candidate: My research examines default mode network in depression. DMN includes medial prefrontal cortex, posterior cingulate.\nHypothesis: Altered DMN connectivity contributes to rumination.\nFinding 1: Hyperconnectivity between medial prefrontal and subgenual cingulate in active depression. Decreases after CBT.\nFinding 2: Connectivity patterns predict treatment response.\nCommittee: How control for medication?\nCandidate: Matched on medication, statistical analysis showed no significant correlation.","questions":[{"q":"DMN不包括哪个脑区？","options":["内侧前额叶","后扣带回","运动皮层"],"answer":2},{"q":"活跃抑郁患者显示什么连接？","options":["低连接","正常","高连接"],"answer":2},{"q":"与什么症状相关？","options":["失眠","反刍思维","焦虑"],"answer":1},{"q":"什么可预测治疗反应？","options":["基线活动","连接变化","病程"],"answer":1}]},"reading":{"title":"Gene Editing and Ethical Dilemmas","passage":"The development of CRISPR-Cas9 gene editing technology, which allows scientists to make precise changes to the DNA of living organisms with unprecedented accuracy, speed, and cost-effectiveness, has opened extraordinary possibilities for treating and preventing human diseases, improving agricultural productivity, and eliminating disease-carrying insects, but has also raised profound ethical questions that have divided scientists, ethicists, policymakers, and the public. In 2018 Chinese scientist He Jiankui shocked the world by announcing that he had created the first gene-edited babies, twin girls whose embryos had been modified using CRISPR technology to delete a gene called CCR5, with the stated goal of making them resistant to HIV infection. The announcement was met with widespread condemnation from the scientific community, with researchers arguing that the experiment was premature, medically unnecessary, ethically indefensible, and potentially dangerous, as the long-term consequences of the gene edit on the health of the children were entirely unknown. The He Jiankui affair prompted calls for a moratorium on the clinical use of heritable human gene editing, the modification of embryos that could be passed on to future generations, and led to the establishment of an international commission to develop governance frameworks for responsible use of the technology. However somatic gene therapy, which involves editing the cells of existing patients without affecting their germline, has advanced rapidly, with CRISPR-based therapies now being tested in clinical trials for the treatment of sickle cell disease, beta-thalassemia, certain cancers, and inherited forms of blindness, with some therapies showing remarkable efficacy in early trials. The prospect of using gene editing to enhance human capabilities beyond normal levels of function raises additional ethical concerns about fairness, identity, coercion, and the potential for creating a society in which access to genetic modification creates new forms of biological inequality. Gene editing technologies, particularly CRISPR-Cas9, have revolutionised molecular biology by enabling scientists to make precise modifications to the DNA of living organisms with unprecedented ease and accuracy. The implications for medicine are profound: CRISPR-based therapies have moved from laboratory research to clinical trials for a growing range of genetic diseases, including sickle cell disease, certain cancers, and hereditary blindness. In 2023, the UK became one of the first countries to approve a CRISPR-based therapy for routine clinical use. However, the technology also raises profound ethical questions, most dramatically illustrated by the case of He Jiankui, the Chinese scientist who secretly edited the genes of human embryos.","questions":[{"q":"What gene was modified in the world's first gene-edited babies?","options":["CCR5","BRCA1","HBA1"],"answer":0},{"q":"What type of gene editing raises concerns about passing changes to future generations?","options":["Somatic gene therapy","Heritable human gene editing","Bacterial gene editing"],"answer":1},{"q":"What disease was mentioned as being treated in CRISPR clinical trials?","options":["Common cold","Sickle cell disease","Alzheimer's"],"answer":1},{"q":"What did the He Jiankui affair prompt calls for?","options":["More research funding","A moratorium on clinical use","Patent protections"],"answer":1}]},"writing":{"type":"task2","title":"观点类 - 太空探索","task":"Some people think that space exploration is a waste of resources. Others believe that it is essential for human survival. Discuss both views and give your opinion.","sample":"Space exploration provokes divided opinions regarding resource allocation and human priorities.\n\nCritics argue space spending diverts resources from pressing earthly concerns. Global problems including climate change, poverty, and disease demand urgent attention. The billions spent on space missions could provide clean water, healthcare, or education to millions. Furthermore, space exploration carries inherent risks to astronaut lives without guaranteeing meaningful returns.\n\nProponents counter that space investment drives innovation benefiting Earth. Satellite technology enables weather forecasting, communications, and environmental monitoring. Space programs develop technologies with terrestrial applications, from water purification to medical imaging. Additionally, space exploration provides 'planetary insurance' against extinction-level catastrophes.\n\nI side with proponents while acknowledging critics' valid points. Space spending should increase relative to other budget categories, but earthly priorities require continued attention. The question is balance rather than exclusive focus on either domain.\n\nMoreover, space exploration addresses fundamental human curiosity about our cosmic context. This philosophical dimension, while difficult to quantify, represents legitimate human aspiration beyond mere practical benefit.\n\nIn conclusion, while resources for earthly problems must remain priorities, space exploration provides essential innovation, insurance, and inspiration warranting continued investment."},"speaking":{"topic":"老龄化","part1":["你见过老年人吗？","你尊敬老人吗？","你考虑过养老问题吗？","老年人对社会有贡献吗？"],"part2":"Describe a challenge facing older people in your society. You should say: what the challenge is, who it affects, what difficulties it brings, and suggest possible solutions.","part3":["如何照顾老年人？","养老应该靠政府还是子女？","老年人应该继续工作吗？"]}},{"day":84,"phase":"phase3","listening":{"title":"气候变化经济","transcript":"Economist A: Discounting - at 3%, damage in 100 years worth 5 cents today. Is it fair to discount future suffering?\nEconomist B: Market rates suggest 4-5% discounting. Stern Review used very low rate.\nEconomist C: Costs of inaction clear - extreme weather losses increased 250% in 30 years.\nEconomist A: Insurance principle - invest in prevention for unlikely but devastating risks.\nEconomist B: International coordination challenge - climate change is global externality.","questions":[{"q":"100年损害在3%折现率下价值？","options":["1 cent","5 cents","10 cents"],"answer":1},{"q":"极端天气损失增加多少？","options":["150%","200%","250%"],"answer":2},{"q":"市场利率大约？","options":["2-3%","4-5%","6-7%"],"answer":1},{"q":"气候变化本质是？","options":["国内问题","全球公共产品","技术问题"],"answer":1}]},"reading":{"title":"Global Governance in the 21st Century","passage":"The architecture of global governance, the system of institutions, rules, norms, and processes through which international collective action is coordinated, is under unprecedented strain as the scale and complexity of 21st-century challenges including climate change, pandemic disease, financial instability, weapons proliferation, and digital disruption have vastly outpaced the capacity of existing institutions built primarily in the aftermath of the Second World War to respond effectively. The United Nations, established in 1945 with a membership of 51 countries, now numbers 193 member states and has been the centrepiece of the international system, yet is frequently criticised as ineffective, bureaucratic, and unrepresentative of contemporary geopolitical realities, with the veto power wielded by the five permanent members of the Security Council often paralysing the body's ability to respond to crises involving their own interests or those of their allies. The G20, which brings together the world's twenty largest economies, has emerged as the primary forum for international economic cooperation since the 2008 financial crisis, and has periodically demonstrated its capacity for coordinated action, as seen in the collective response to the global financial crisis and the COVID-19 pandemic, but critics argue that the G20 is equally dominated by powerful states and lacks the legitimacy and institutional capacity to address broader global challenges. The rise of China as a global power, its increasingly assertive foreign policy, and its strategic competition with the United States have further complicated global governance, as the two largest economies and military powers increasingly view each other with suspicion and seek to build alternative institutions and coalitions that serve their respective interests, threatening to fragment the rules-based international order that has underpinned global peace and prosperity since 1945. The architecture of global governance, built primarily around the United Nations system established in the aftermath of the Second World War, is increasingly struggling to address the scale and complexity of contemporary challenges, from climate change and pandemic disease to digital governance and nuclear proliferation. The Security Council has been repeatedly paralysed by disagreements among its five permanent members. Meanwhile, powerful economic bodies such as the G7 and G20, dominated by wealthy nations, are increasingly challenged by the rising influence of China and other emerging economies. The question of whether the international system can be reformed to better reflect contemporary geopolitical realities remains deeply contested.","questions":[{"q":"When was the United Nations established?","options":["1935","1945","1955"],"answer":1},{"q":"How many member states does the UN now have?","options":["51","120","193"],"answer":2},{"q":"What has emerged as the primary forum for international economic cooperation?","options":["The United Nations","The G20","NATO"],"answer":1},{"q":"What threatens to fragment the rules-based international order?","options":["Climate change","Strategic competition between China and the US","Pandemic disease"],"answer":1}]},"writing":{"type":"task1","title":"表格 - 远程工作","task":"The table shows the results of a survey about remote working in 2019 and 2023. Summarise the information.","sample":"The table illustrates remote working patterns in 2019 compared to 2023.\n\nOverall, remote work increased dramatically, particularly following the 2020 pandemic. The survey reveals significant shifts in both frequency and employee preferences.\n\nPre-pandemic, only 12% worked remotely full-time, while 28% worked remotely occasionally, and 60% never worked remotely. The majority still traveled to offices daily.\n\nBy 2023, full-time remote work surged to 35%, occasional remote work reached 40%, and non-remote work dropped to just 25%. This represents fundamental restructuring of work patterns.\n\nEmployee satisfaction showed corresponding changes. Pre-pandemic, 45% expressed satisfaction with work-life balance, rising to 68% by 2023. This improvement likely reflects reduced commuting time and increased flexibility.\n\nProductivity measures proved more mixed. Self-reported productivity increased from 62% to 71%, but manager assessments showed smaller gains from 58% to 63%.\n\nIn conclusion, remote work transformed from minority practice to majority experience, with generally positive but complex implications for organizations."},"speaking":{"topic":"贫富差距","part1":["你认识有钱人吗？","你觉得钱重要吗？","你满意你的生活水平吗？","你认为社会应该平等吗？"],"part2":"Describe a way to reduce poverty in your society. You should say: what the problem is, what causes it, who it affects, and suggest solutions.","part3":["为什么会有贫富差距？","如何让社会更平等？","富人有责任帮助穷人吗？"]}},{"day":85,"phase":"phase3","listening":{"title":"AI安全研究","transcript":"Researcher: Outer alignment - goals don't match actual values. Example: maximize engagement promotes polarizing content.\nColleague: Inner alignment - systems develop internal objectives diverging from intended goals.\nExample: content moderation AI flags random posts to maximize reward.\nResearcher: Need interpretability to inspect networks, understand what they've learned.\nColleague: Mesa-optimizers - systems developing internal search processes could be concerning.","questions":[{"q":"外部对齐问题是？","options":["内部问题","目标设定不符","硬件故障"],"answer":1},{"q":"最大化参与度导致？","options":["推广极化内容","系统崩溃","用户流失"],"answer":0},{"q":"内部对齐关注？","options":["外部环境","内部目标偏移","用户反馈"],"answer":1},{"q":"Mesa-optimizer是？","options":["编程语言","内部优化过程","硬件"],"answer":1}]},"reading":{"title":"Artificial Intelligence and Employment","passage":"The rapid advancement of artificial intelligence, particularly machine learning and generative AI systems capable of creating text, images, code, and video that are increasingly difficult to distinguish from human-produced content, has reignited long-standing debates about the impact of automation on employment, sparking both optimistic visions of a future of abundance and leisure and dark warnings of mass unemployment, social unrest, and the concentration of economic and political power in the hands of those who control AI systems. Economic research has consistently shown that automation and technological change, while displacing workers in certain occupations, have historically also created new jobs, industries, and opportunities that more than compensated for short-term disruptions, with the net effect of technological progress on employment being positive over the long term. However economists and technologists are divided over whether the current wave of AI advancement is different in kind as well as degree, with some arguing that artificial general intelligence, AI systems capable of performing any intellectual task that a human can perform, may be achievable within decades, potentially automating cognitive as well as physical labour and undermining the assumption that technological progress always creates as many jobs as it destroys. The immediate impacts of AI on specific sectors are already becoming apparent, with AI-powered systems now performing tasks in fields including customer service, legal research, medical diagnosis, financial analysis, content creation, and software development that were previously considered the exclusive domain of human professionals, leading to hiring slowdowns and layoffs in affected industries even as demand for workers with AI-related skills has surged dramatically. The distribution of AI's economic benefits has also raised concerns, as the productivity gains from AI tend to accrue disproportionately to capital owners and highly skilled workers, potentially exacerbating income inequality within and between nations. Artificial intelligence has advanced with breathtaking speed, with large language models and image generation systems demonstrating capabilities that were science fiction a decade ago. The economic and social implications are already being felt across sectors as diverse as legal services, journalism, software development, and creative industries. While AI proponents emphasise the potential for productivity gains, scientific discovery, and the automation of dangerous or tedious work, critics highlight the risks of mass unemployment in white-collar occupations, algorithmic bias that entrenches existing social inequalities, and the concentration of AI power in the hands of a small number of technology corporations.","questions":[{"q":"What type of AI can create text, images, and video?","options":["Narrow AI","Generative AI","Robotic AI"],"answer":1},{"q":"What is artificial general intelligence?","options":["AI for playing games","AI capable of any human intellectual task","AI controlled by humans"],"answer":1},{"q":"Which sectors have already seen AI perform tasks previously done by professionals?","options":["Only manufacturing","Customer service, legal research, and medical diagnosis","Only agriculture"],"answer":1},{"q":"What has been the historical net effect of technological progress on employment?","options":["Always negative","Always neutral","Positive over the long term"],"answer":2}]},"writing":{"type":"task2","title":"讨论类 - 社交媒体审查","task":"Some people believe that social media should be regulated by the government. Others believe that it should be regulated by the users themselves. Discuss both views and give your opinion.","sample":"Social media's influence demands consideration of appropriate governance mechanisms.\n\nGovernment regulation proponents argue that platforms wield enormous power over public discourse, requiring democratic accountability. Unregulated platforms enable misinformation spread, harassment campaigns, and foreign election interference. Furthermore, government can establish consistent standards protecting citizens regardless of platform choice.\n\nHowever, user self-regulation advocates emphasize that individuals should control their online experiences. Users can choose which platforms to join, what content to consume, and how to configure privacy settings. Heavy-handed government intervention risks censorship and threatens free expression. Furthermore, platforms compete to satisfy user preferences, creating market-driven accountability.\n\nI believe both approaches possess merit, requiring appropriate balance. Government should establish baseline protections against fraud, harassment, and illegal content while avoiding excessive interference with legitimate expression. Platforms should maintain robust community standards with transparent enforcement.\n\nUsers also bear responsibility for exercising judgment and developing critical media literacy. Education enabling individuals to evaluate online content represents essential complement to both regulatory approaches.\n\nIn conclusion, effective social media governance requires coordinated action across levels: appropriate government framework, responsible platform management, and educated user participation."},"speaking":{"topic":"道德","part1":["你觉得什么是对？","你做过后悔的事吗？","你相信人性本善吗？","道德可以被教导吗？"],"part2":"Describe an ethical issue facing your society. You should say: what the issue is, how it affects people, what different opinions exist, and suggest how it should be addressed.","part3":["道德是绝对的还是相对的？","法律和道德一样吗？","人们应该按道德标准生活吗？"]}},{"day":86,"phase":"phase3","listening":{"title":"太空探索政策","transcript":"Panelist A: Falcon 9 launches at $2,700/kg vs $18,000 for Shuttle. Opens new possibilities.\nPanelist B: Environmental concerns - each launch deposits particles. Orbital debris: 36,500 objects >10cm. Kessler syndrome risk.\nPanelist A: Benefits: Earth observation, communications, 'planetary insurance' via Mars.\nPanelist C: Governance challenges - Outer Space Treaty from 1967 needs updating.\nPanelist B: Science vs human spaceflight - robots deliver better science per dollar.","questions":[{"q":"Falcon 9发射成本？","options":["$1,700/kg","$2,700/kg","$5,000/kg"],"answer":1},{"q":"大于10cm碎片数量？","options":["25,500","36,500","47,500"],"answer":1},{"q":"外层空间条约签署年份？","options":["1962","1967","1972"],"answer":1},{"q":"毅力号成本？","options":["$17亿","$27亿","$37亿"],"answer":1}]},"reading":{"title":"Climate Migration","passage":"Climate migration, the movement of people forced to relocate either temporarily or permanently due to the impacts of climate change including extreme weather events, sea level rise, desertification, and resource scarcity, is emerging as one of the most significant and potentially destabilising consequences of global warming, challenging existing legal frameworks for refugee protection and raising profound questions about justice, responsibility, and solidarity. The World Bank has estimated that without urgent action to reduce emissions and adapt to climate change, as many as 216 million people across six world regions could be forced to migrate within their own countries by 2050, creating enormous pressures on urban infrastructure, social services, and political systems in both sending and receiving areas. Unlike refugees fleeing persecution, for whom there is an established international legal framework under the 1951 Refugee Convention, people displaced by climate change have no formal legal status or guaranteed protections under international law, and most climate migrants are expected to move within their own countries rather than across international borders, placing the primary responsibility for response on national governments whose capacity to manage large-scale internal displacement is often severely limited. Small island developing states, many of which are barely above sea level, face the prospect of complete uninhabitability due to sea level rise within the lifetime of people alive today, raising the unprecedented legal and ethical question of whether entire nations could cease to exist as sovereign states if their territory becomes uninhabitable. The concept of climate justice emphasises that those who have contributed least to global warming are often the most vulnerable to its impacts, as low-income countries and communities have fewer resources to adapt to changing conditions, leading to calls for wealthy nations that are historically responsible for the majority of greenhouse gas emissions to provide financial and technical support to help vulnerable communities adapt and to accept climate migrants as a matter of moral obligation. Climate change is already driving human displacement on a scale that will intensify dramatically in the coming decades. The Internal Displacement Monitoring Centre estimates that approximately 26 million people are forced to flee their homes each year as a result of weather-related disasters. The legal framework for protecting climate migrants is woefully inadequate: international refugee law offers no recognised status to those displaced by environmental change. The social and political tensions generated by climate migration are already visible in debates over immigration policy in countries across Europe, Australasia, and North America.","questions":[{"q":"How many people could be forced to migrate within their countries by 2050 according to the World Bank?","options":["About 50 million","About 216 million","About 500 million"],"answer":1},{"q":"When was the 1951 Refugee Convention established?","options":["1945","1951","1970"],"answer":1},{"q":"Why are small island nations particularly vulnerable?","options":["They have few natural resources","They may become completely uninhabitable due to sea level rise","They lack international recognition"],"answer":1},{"q":"What does climate justice emphasise?","options":["Economic efficiency","That those least responsible are often most vulnerable","Technological solutions"],"answer":1}]},"writing":{"type":"task1","title":"线图 - 森林覆盖","task":"The line graph shows forest cover in five countries from 1990 to 2020. Summarise the information.","sample":"The line graph illustrates forest cover changes in five countries over thirty years.\n\nOverall, patterns diverged significantly, with some countries reforesting while others experienced continued loss.\n\nBrazil showed concerning decline, losing forest from 65% to 55% coverage. This 10% reduction reflects ongoing deforestation for agriculture and development despite conservation efforts.\n\nCanada maintained relatively stable coverage at around 38-39%, with minimal change across the period. This stability suggests effective sustainable forest management.\n\nSweden demonstrated impressive recovery, rising from 52% to 62% forest cover. This 10% increase resulted from aggressive reforestation policies implemented since the 1970s.\n\nThe USA showed modest increase from 33% to 35%, reflecting post-industrial forest recovery in eastern regions despite continued logging in the northwest.\n\nAustralia experienced the most dramatic loss, dropping from 21% to just 13% coverage. This severe reduction reflects clearing for agriculture, particularly during earlier decades.\n\nIn conclusion, forest cover trends varied dramatically, with Sweden's success story contrasting Australia's decline and Brazil's ongoing challenges."},"speaking":{"topic":"创新","part1":["你创新过吗？","你喜欢新想法吗？","你觉得创新重要吗？","谁是最具创新精神的人？"],"part2":"Describe an innovation that changed the world. You should say: what it is, when it was invented, how it changed our lives, and explain whether its impact has been positive or negative.","part3":["创新有什么障碍？","政府应该支持创新吗？","传统和创新哪个更重要？"]}},{"day":87,"phase":"phase3","listening":{"title":"公共卫生政策","transcript":"Speaker: COVID revealed strengths and weaknesses. Surveillance worked but information sharing delays hampered response.\nSupply chain: countries competed for medical supplies.\nVaccines: developed in under one year vs previous record 4 years.\nBut distribution unequal - high-income 60%+ vaccinated by late 2021, low-income <5%.\nRespondent: Trust crucial - misinformation spread, 40%+ expressed vaccine reluctance.","questions":[{"q":"中国向世卫组织报告日期？","options":["12月21日","12月31日","1月10日"],"answer":1},{"q":"疫苗研发最短时间？","options":["1年","2年","4年"],"answer":2},{"q":"2021年底高收入国家接种率？","options":["40%","50%","60%+"],"answer":2},{"q":"疫苗犹豫比例？","options":["30%","40%","50%"],"answer":1}]},"reading":{"title":"Neuroplasticity and the Changing Brain","passage":"Neuroplasticity, the brain's remarkable capacity to reorganise itself by forming new neural connections throughout life in response to learning, experience, injury, and environmental demands, has revolutionised our understanding of the brain and overturned the long-held assumption that the adult brain is essentially fixed and unchangeable after a critical period of development in childhood. For much of the 20th century the prevailing scientific view held that the brain reached its mature configuration by early adulthood and that subsequent learning and recovery from injury were accomplished primarily through existing neural pathways rather than through the creation of new ones, a view that implied significant limits on the potential for adult education, rehabilitation from brain injury, and recovery from neurological conditions. Beginning in the 1960s and 1970s, pioneering research by scientists including Michael Merzenich, Paul Bach-y-Rita, and Eleanor Maguire began to reveal that the adult brain retains remarkable plasticity, demonstrating that the cortical maps representing different body parts in the somatosensory cortex can be reorganised in response to altered sensory input, that blind individuals show enhanced activity in visual cortex regions during tactile tasks such as Braille reading, and that London taxi drivers, who must memorise the complex layout of the city's streets, show enlarged posterior hippocampi compared with control subjects. These findings have profound implications for education, as they suggest that learning can physically reshape the brain at any age, for rehabilitation, where intensive, targeted practice has been shown to promote functional recovery from stroke and traumatic brain injury even years after the initial insult, and for understanding the effects of lifestyle factors including physical exercise, meditation, chronic stress, and sleep on brain structure and function. The discovery of adult neurogenesis, the birth of new neurons in the adult brain particularly in the hippocampus, has further challenged the notion of a fixed brain and opened new therapeutic possibilities for conditions ranging from depression to Alzheimer's disease. Neuroplasticity, the brain remarkable capacity to reorganise itself by forming new neural connections throughout life, has transformed our understanding of the nervous system and opened new horizons for treating neurological and psychiatric conditions. For much of the twentieth century, the prevailing view was that the adult brain was essentially fixed, its neural circuits sculpted during childhood and adolescence and thereafter unchangeable. The discovery that experience and learning continue to reshape the brain throughout life overturned this assumption and sparked a revolution in neuroscience and education alike. Researchers are now exploring how neuroplasticity can be harnessed therapeutically, using targeted electrical stimulation, pharmacological agents, and carefully designed cognitive training programmes.","questions":[{"q":"What is the brain's capacity to reorganise itself called?","options":["Neurogenesis","Neuroplasticity","Neural transmission"],"answer":1},{"q":"What part of the brain did London taxi drivers show as being enlarged?","options":["Prefrontal cortex","Posterior hippocampus","Temporal lobe"],"answer":1},{"q":"Which practice has been shown to promote recovery from stroke?","options":["Passive rest","Intensive, targeted practice","Medication only"],"answer":1},{"q":"In which century did scientists begin demonstrating adult brain plasticity?","options":["19th century","20th century","21st century"],"answer":1}]},"writing":{"type":"task2","title":"观点类 - 全民基本收入","task":"Some people think that governments should introduce a universal basic income for all adults. Others believe that it is better to target support only towards those who need it. Discuss both views and give your opinion.","sample":"Universal Basic Income (UBI) represents an innovative policy proposal generating substantial debate.\n\nUBI proponents highlight its simplicity and dignity. Cash transfers allow recipients freedom to meet their specific needs rather than imposing bureaucratic judgments about deserving recipients. Furthermore, UBI provides security enabling entrepreneurship, education, and caregiving without fear of destitution. Automation's threat to employment may require UBI as labor markets transform.\n\nHowever, targeted support advocates emphasize efficiency and fairness. Limited resources should focus on those with genuine needs rather than distributing payments to wealthy individuals who don't require support. Furthermore, unconditional cash may enable irresponsible behavior, while conditional programs can encourage positive actions like workforce participation.\n\nI support targeted approaches but recognize UBI's potential merits under specific conditions. Developing countries with limited administrative capacity may find simple universal programs more practical than complex targeting systems. Furthermore, UBI experiments in developed contexts show generally positive outcomes for wellbeing without significant work reduction.\n\nNevertheless, sustainable UBI requires careful design preventing dependency and maintaining work incentives. Phased implementation allowing learning from experience seems wise.\n\nIn conclusion, targeted support should generally take precedence, but UBI merits consideration in appropriate contexts with careful implementation."},"speaking":{"topic":"领导力","part1":["你尊敬什么样的领导？","你会当领导吗？","领导是天生的还是培养的？","你认为好的领导应该具备什么？"],"part2":"Describe a leader you admire. You should say: who they are, what position they hold/held, what qualities make them a good leader, and explain why you admire them.","part3":["好的领导和差的领导有什么区别？","人们为什么追随领导者？","领导力可以学习吗？"]}},{"day":88,"phase":"phase3","listening":{"title":"科技投资谈判","transcript":"Founder: MediScan AI - detects diabetic retinopathy from smartphone photos, 94% accuracy.\nInvestor: Regulatory pathway?\nFounder: Class II device, 510(k) clearance. 3,200 patient clinical study. Expect clearance in 18 months.\nInvestor: Business model?\nFounder: Three streams: health system licensing, pharma partnerships, government contracts.\nInvestor: Competition from Google?\nFounder: Our advantage: runs on smartphone without cloud, works in low-connectivity areas.","questions":[{"q":"准确率？","options":["89%","91%","94%"],"answer":2},{"q":"临床研究多少患者？","options":["2,200","3,200","4,200"],"answer":1},{"q":"期望多久获批？","options":["12个月","18个月","24个月"],"answer":1},{"q":"竞争优势是？","options":["更低价格","可在智能手机运行","更大品牌"],"answer":1}]},"reading":{"title":"Dark Matter and Dark Energy","passage":"Dark matter and dark energy are among the most profound mysteries in modern cosmology, together constituting approximately 95 percent of the total mass-energy content of the universe, yet remaining fundamentally invisible to direct observation and incompletely understood despite decades of intensive experimental and theoretical investigation. Dark matter, which accounts for approximately 27 percent of the universe's total mass-energy content, is inferred to exist from its gravitational effects on visible matter, radiation, and the large-scale structure of the universe, including the rotation curves of galaxies, which show that stars at the outer edges of galaxies rotate around the galactic centre at speeds that would cause them to fly off into space if only the visible mass of the galaxy were exerting gravitational force, and the gravitational lensing of light from distant galaxies by foreground mass concentrations, which is far stronger than can be explained by visible matter alone. Dark energy, which accounts for approximately 68 percent of the total mass-energy content of the universe, is the name given to whatever is causing the observed acceleration of the expansion of the universe, a phenomenon first detected in 1998 and recognised with the award of the Nobel Prize in Physics in 2011, which contradicts the expectation of most cosmological models that the expansion of the universe should be slowing due to the gravitational attraction of matter. Candidates for dark matter include weakly interacting massive particles, primordial black holes formed in the early universe, and more exotic theoretical constructs, while dark energy is most commonly associated with the cosmological constant, a term in Einstein's equations representing the energy of empty space. Numerous experiments around the world, including the Large Hadron Collider at CERN, underground detectors seeking to detect the rare collisions between dark matter particles and ordinary atoms, and astrophysical observations using telescopes and spacecraft, continue the search for evidence that will illuminate the nature of these mysterious components of the cosmos. Dark matter, the invisible substance that is believed to constitute approximately 27 percent of the universe mass-energy content, remains one of the most profound mysteries of modern physics. Its existence is inferred primarily from its gravitational effects: galaxies rotate in ways that cannot be explained by the gravity of their visible stars and gas alone, and the large-scale structure of the universe could not have formed without the gravitational scaffolding provided by dark matter. Yet despite decades of increasingly sophisticated experiments, dark matter has not been directly detected. Some physicists now wonder whether the failure to detect dark matter particles points not to the inadequacy of our experiments but to something more fundamental: that our understanding of gravity itself may need revision.","questions":[{"q":"What percentage of the universe is composed of dark matter and dark energy?","options":["About 25 percent","About 50 percent","About 95 percent"],"answer":2},{"q":"What phenomenon demonstrated the existence of dark energy?","options":["Rotation of galaxies slowing down","Acceleration of the universe's expansion","The big bang theory"],"answer":1},{"q":"When was dark energy first detected?","options":["1988","1998","2008"],"answer":1},{"q":"Which experiment searches for dark matter particle collisions?","options":["Hubble Space Telescope","Large Hadron Collider","James Webb Telescope"],"answer":1}]},"writing":{"type":"task1","title":"饼图 - 污染来源","task":"The pie chart shows the main sources of air pollution in a city. Summarise the information.","sample":"The pie chart illustrates air pollution sources in a typical city.\n\nOverall, transportation emerges as the dominant pollution source, followed by industrial activity and residential heating.\n\nVehicles represent the largest contributor at 40%. This includes cars, trucks, and buses running on fossil fuels, releasing nitrogen oxides, particulate matter, and carbon monoxide into the atmosphere.\n\nIndustry accounts for 25% of pollution, encompassing manufacturing, power generation, and construction activities. Factory emissions and industrial processes release various pollutants depending on fuel types and production methods.\n\nResidential heating contributes 20%, particularly in colder climates where homes burn fuel for warmth. This category includes both traditional heating systems and modern natural gas furnaces.\n\nThe remaining 15% derives from miscellaneous sources including commercial activities, waste management, and natural sources like dust and wildfires.\n\nIn conclusion, transportation dominates urban air pollution, suggesting priority attention to vehicle emissions through electrification, public transit improvement, and urban planning reducing travel needs."},"speaking":{"topic":"幸福","part1":["你幸福吗？","什么让你快乐？","钱能买到幸福吗？","你追求什么样的生活？"],"part2":"Describe what makes you happy. You should say: what makes you happy, how often you experience happiness, what you do when you are happy, and explain why these things bring you joy.","part3":["幸福是什么？","如何衡量幸福？","社会应该以GDP还是幸福感来衡量成功？"]}},{"day":89,"phase":"phase3","listening":{"title":"语言学演讲","transcript":"Linguist: Language shapes cognition. Russian has separate terms for light blue (goluboy) and dark blue (siniy).\nRussian speakers faster at discriminating these shades.\nGuugu Yimithirr uses cardinal directions (north, south, east, west) instead of left/right.\nAymara conceives past as in front (seen) and future as behind (unseen).\nBilingual individuals switch cognitive frames, linked to delayed dementia by 4-5 years.","questions":[{"q":"俄语浅蓝色是？","options":["siniy","goluboy","blue"],"answer":1},{"q":"Guugu Yimithirr用什么坐标？","options":["左右","基本方位","相对"],"answer":1},{"q":"Aymara认为过去在哪？","options":["前面","后面","上面"],"answer":0},{"q":"双语可推迟痴呆多久？","options":["2-3年","4-5年","6-7年"],"answer":1}]},"reading":{"title":"CRISPR and the Future of Medicine","passage":"CRISPR-Cas9, the revolutionary gene editing technology that allows scientists to make precise changes to DNA sequences with unprecedented accuracy and efficiency, is transforming medicine and biology, offering the prospect of treatments and potentially cures for thousands of genetic diseases that were previously considered incurable, and raising profound questions about the boundaries of human intervention in the biological world. The CRISPR system was originally discovered as a natural defence mechanism used by bacteria to recognise and destroy the DNA of invading viruses, a remarkable evolutionary adaptation that has been coopted by scientists as a tool for targeted gene editing, simplified and made accessible to laboratories around the world through the landmark 2012 paper by Jennifer Doudna and Emmanuelle Charpentier, who were awarded the Nobel Prize in Chemistry in 2020 for this discovery. The most advanced clinical applications of CRISPR are in the treatment of sickle cell disease and beta-thalassemia, blood disorders caused by mutations in the haemoglobin gene, where CRISPR-based therapies have shown extraordinary efficacy in early trials, with patients who previously required regular blood transfusions and suffered severe complications achieving functional cures following treatment. Cancer immunotherapy, in which CRISPR is used to engineer patients' own immune cells to better recognise and attack tumour cells, represents another promising avenue of clinical development, with several CAR-T cell therapies already approved for the treatment of certain blood cancers and trials underway for solid tumours. Beyond disease treatment, CRISPR raises the prospect of disease elimination, with proposals to use gene drives, genetic constructs that spread through populations much faster than Mendelian inheritance, to eliminate vector-borne diseases such as malaria by engineering mosquitoes that cannot transmit the parasite, though such applications raise enormous ecological and ethical concerns that remain intensely debated. The development of CRISPR-Cas9 gene editing technology has democratised genetic engineering by making it accessible, precise, and affordable in ways that were previously unimaginable. Beyond its medical applications, which include clinical trials for inherited blood disorders, cancers, and heart disease, CRISPR is transforming biological research, agriculture, and conservation. In 2023, the first CRISPR-based treatment received regulatory approval in the United Kingdom and United States, offering hope to patients with sickle cell disease and beta-thalassaemia. Yet the technology also raises complex ethical questions about the boundaries between therapy and enhancement, and the potential for its use in human germline editing that would create heritable genetic changes passed to future generations.","questions":[{"q":"What were the 2020 Nobel Prize in Chemistry winners known for?","options":["Cancer research","Discovery of CRISPR-Cas9","HIV treatment"],"answer":1},{"q":"For which conditions have CRISPR therapies shown extraordinary efficacy in trials?","options":["Heart disease","Sickle cell disease and beta-thalassemia","Common cold"],"answer":1},{"q":"What are CAR-T cell therapies used to treat?","options":["Diabetes","Certain blood cancers","Arthritis"],"answer":1},{"q":"What does CRISPR originally function as in nature?","options":["A digestive enzyme","A bacterial defence mechanism","A plant hormone"],"answer":1}]},"writing":{"type":"task2","title":"讨论类 - 动物实验","task":"Some people think that animal testing is necessary for medical progress. Others believe it is cruel and unnecessary. Discuss both views and give your opinion.","sample":"Animal testing presents ethical dilemmas balancing medical progress against animal welfare.\n\nProponents argue animal research remains essential for medical advancement. Before human trials, treatments must be evaluated in living systems, and alternative methods cannot fully replicate complex biological processes. Historical medical achievements from vaccines to surgical techniques relied on animal research. Without such testing, potentially dangerous treatments might reach patients, causing greater harm.\n\nHowever, critics emphasize that animal testing causes suffering to sentient beings capable of experiencing pain and distress. Many animal experiments produce results that fail to translate to human applications due to species differences. Furthermore, technological alternatives including computer modeling, organ-on-chip devices, and human tissue cultures increasingly offer viable alternatives.\n\nI believe a balanced approach minimizes animal suffering while preserving essential research. Strict ethical review should eliminate unnecessary experiments, and alternatives should be employed whenever scientifically valid. The '3Rs' framework - Replacement, Reduction, and Refinement - provides ethical guidance for acceptable research.\n\nAdditionally, increased transparency regarding animal research and rigorous scrutiny of proposed experiments can help ensure that only justified studies proceed. Researchers should actively pursue alternative methods.\n\nIn conclusion, while animal testing raises legitimate ethical concerns, complete elimination may compromise medical progress. Appropriate regulation can balance competing interests."},"speaking":{"topic":"教育公平","part1":["你上的学校好吗？","教育应该公平吗？","你支持教育投资吗？","你相信知识改变命运吗？"],"part2":"Describe an issue related to education equality. You should say: what the issue is, what causes it, how it affects students, and suggest possible solutions.","part3":["为什么教育不平等存在？","如何确保每个人都能获得好教育？","教育应该免费还是付费？"]}},{"day":90,"phase":"phase3","listening":{"title":"生物伦理会议","transcript":"Chair: Proposal for CRISPR embryo editing for cystic fibrosis.\nResearcher: Correct mutation causing CF. 87% of affected families support.\nCommittee: Line between therapy and enhancement?\nResearcher: Distinguishing therapeutic (correct disease mutations) from enhancement.\nCommittee: Off-target effects?\nResearcher: Rate below 0.1%, verification protocol to exclude unintended edits.\nCommittee: Access and equity?\nResearcher: Propose inclusion in national health coverage.","questions":[{"q":"研究针对什么疾病？","options":["癌症","囊性纤维化","糖尿病"],"answer":1},{"q":"受影响家庭支持比例？","options":["67%","77%","87%"],"answer":2},{"q":"脱靶效应率？","options":["0.01%","0.1%","1%"],"answer":1},{"q":"CF预期寿命？","options":["30岁","40岁","50岁"],"answer":1}]},"reading":{"title":"The Philosophy of Free Will","passage":"The question of whether human beings possess free will, the capacity to make choices that are genuinely free from deter
